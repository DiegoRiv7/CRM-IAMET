version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Opcional: para persistir archivos estáticos
      - static_files:/app/staticfiles
      # Opcional: para persistir uploads
      - media_files:/app/media
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=tu-dominio.com,localhost,127.0.0.1
      - DJANGO_SECRET_KEY=tu-clave-secreta-super-segura
      # Variables para la base de datos (si usas una externa)
      # - DATABASE_HOST=db
      # - DATABASE_PORT=3306
      # - DATABASE_NAME=gestion_ventas
      # - DATABASE_USER=admin
      # - DATABASE_PASSWORD=password
      # Variables opcionales para crear superusuario automáticamente
      - DJANGO_SUPERUSER_EMAIL=admin@tudominio.com
      - DJANGO_SUPERUSER_PASSWORD=admin123
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/app/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Descomenta si quieres usar MySQL en lugar de SQLite
  # db:
  #   image: mysql:8.0
  #   environment:
  #     MYSQL_DATABASE: gestion_ventas
  #     MYSQL_USER: admin
  #     MYSQL_PASSWORD: password
  #     MYSQL_ROOT_PASSWORD: rootpassword
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   restart: unless-stopped
  #   ports:
  #     - "3306:3306"

  # Nginx para servir archivos estáticos (opcional pero recomendado)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/usr/share/nginx/html/static:ro
      - media_files:/usr/share/nginx/html/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_files:
  media_files:
  # mysql_data:  # Descomenta si usas MySQL