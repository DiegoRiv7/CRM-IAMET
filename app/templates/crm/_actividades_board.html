<!-- ═══ TABLERO CALENDARIO — INGENIERO ═══ -->
<div id="actividadesBoard" style="display:none;width:100%;height:calc(100vh - 72px);flex-direction:column;box-sizing:border-box;overflow:hidden;background:#F7F7F9;">

    <!-- Header del tablero -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #E5E5EA;background:#fff;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:12px;">
            <h2 style="margin:0;font-size:0.92rem;font-weight:700;color:#1D1D1F;">Tablero</h2>
            <!-- Week navigation -->
            <div style="display:flex;align-items:center;gap:4px;">
                <button onclick="boardPrevWeek()"
                    style="background:#F2F2F7;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.85rem;color:#3C3C43;font-weight:600;line-height:1;">&lsaquo;</button>
                <span id="boardWeekLabel"
                    style="font-size:0.75rem;font-weight:600;color:#1D1D1F;white-space:nowrap;min-width:170px;text-align:center;padding:0 4px;">—</span>
                <button onclick="boardNextWeek()"
                    style="background:#F2F2F7;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.85rem;color:#3C3C43;font-weight:600;line-height:1;">&rsaquo;</button>
                <button onclick="boardGoToday()"
                    style="background:#F2F2F7;border:none;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:0.7rem;font-weight:700;color:#007AFF;">Hoy</button>
            </div>
        </div>
        <button onclick="ingenieroCargarActividades()"
            style="background:#F2F2F7;border:1px solid #E5E5EA;border-radius:8px;padding:5px 12px;font-size:0.72rem;font-weight:600;color:#3C3C43;cursor:pointer;">
            &#8635; Actualizar
        </button>
    </div>

    <!-- Loading -->
    <div id="boardLoading" style="text-align:center;padding:3rem;color:#8E8E93;font-size:0.85rem;flex-shrink:0;">
        <svg style="animation:boardSpin 1s linear infinite;width:20px;height:20px;margin:0 auto 0.5rem;display:block;" viewBox="0 0 24 24" fill="none" stroke="#5856D6" stroke-width="2">
            <path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M7.76 7.76L4.93 4.93"/>
        </svg>
        Cargando...
    </div>

    <!-- Empty -->
    <div id="boardEmpty" style="display:none;text-align:center;padding:4rem 2rem;color:#8E8E93;">
        <div style="font-size:2.5rem;margin-bottom:0.5rem;">&#10003;</div>
        <div style="font-size:0.9rem;font-weight:600;color:#1D1D1F;margin-bottom:0.3rem;">Sin tareas esta semana</div>
        <div style="font-size:0.78rem;">No tienes tareas asignadas para estos días.</div>
    </div>

    <!-- Calendar grid container -->
    <div id="boardColumns" style="display:none;flex:1;overflow-y:auto;overflow-x:auto;padding:12px 16px;box-sizing:border-box;"></div>

</div>

<!-- ── Mini-overlay: detalle de tarea ── -->
<div id="boardTareaOverlay"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:8000;align-items:center;justify-content:center;"
    onclick="if(event.target===this)ingenieroTareaCerrar();">
    <div style="background:#fff;border-radius:18px;padding:22px 24px;box-shadow:0 20px 56px rgba(0,0,0,0.22);width:400px;max-width:94vw;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
            <div id="btpTitulo" style="font-size:0.9rem;font-weight:700;color:#1D1D1F;line-height:1.4;flex:1;padding-right:8px;"></div>
            <button onclick="ingenieroTareaCerrar()"
                style="background:none;border:none;font-size:1.3rem;color:#8E8E93;cursor:pointer;padding:0;line-height:1;flex-shrink:0;">&times;</button>
        </div>
        <div id="btpMeta" style="font-size:0.72rem;color:#8E8E93;margin-bottom:6px;"></div>
        <div id="btpFecha" style="font-size:0.72rem;font-weight:600;color:#3C3C43;margin-bottom:18px;"></div>
        <div style="display:flex;gap:8px;">
            <button id="btpCompleteBtn"
                style="flex:1;background:#34C759;color:#fff;border:none;border-radius:9px;padding:10px;font-size:0.82rem;font-weight:700;cursor:pointer;">&#10003; Completar</button>
            <button onclick="ingenieroTareaCerrar()"
                style="background:#F2F2F7;border:none;border-radius:9px;padding:10px 16px;font-size:0.82rem;font-weight:600;color:#3C3C43;cursor:pointer;">Cerrar</button>
        </div>
    </div>
</div>

<style>
@keyframes boardSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.cal-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    align-items: start;
    min-width: 600px;
}
.cal-col {
    background: #FAFAFA;
    border-radius: 10px;
    border: 1px solid #E5E5EA;
    overflow: hidden;
}
.cal-col-today {
    background: #EEF5FF;
    border-color: #007AFF;
}
.cal-col-header {
    padding: 8px 10px;
    text-align: center;
    background: #F2F2F7;
    border-bottom: 1px solid #E5E5EA;
}
.cal-col-today .cal-col-header {
    background: #007AFF;
    border-bottom-color: #0062CC;
}
.cal-day-name {
    font-size: 0.63rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #8E8E93;
    margin-bottom: 2px;
}
.cal-col-today .cal-day-name { color: rgba(255,255,255,0.8); }
.cal-day-num {
    font-size: 1.3rem;
    font-weight: 700;
    color: #1D1D1F;
    line-height: 1.1;
}
.cal-col-today .cal-day-num { color: #fff; }
.cal-day-month {
    font-size: 0.58rem;
    color: #8E8E93;
    margin-top: 1px;
}
.cal-col-today .cal-day-month { color: rgba(255,255,255,0.7); }
.cal-col-body {
    padding: 6px;
    min-height: 60px;
}
.cal-card {
    background: #fff;
    border: 1px solid #E5E5EA;
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 6px;
    cursor: pointer;
    border-left: 3px solid #E5E5EA;
    transition: box-shadow 0.12s, transform 0.1s;
}
.cal-card:hover {
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    transform: translateY(-1px);
}
.cal-card-alta { border-left-color: #FF3B30; }
.cal-card-vencida { border-left-color: #FF3B30; background: #FFF8F8; }
.cal-card-title {
    font-size: 0.74rem;
    font-weight: 600;
    color: #1D1D1F;
    margin-bottom: 3px;
    line-height: 1.3;
}
.cal-card-client {
    font-size: 0.62rem;
    color: #8E8E93;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}
.cal-card-btn {
    font-size: 0.6rem;
    font-weight: 700;
    color: #34C759;
    border: 1px solid #34C759;
    background: none;
    border-radius: 5px;
    padding: 2px 7px;
    cursor: pointer;
}
.cal-card-btn:hover { background: #34C759; color: #fff; }
.cal-extras {
    margin-top: 10px;
    padding: 10px 14px;
    background: #F9F9FB;
    border-radius: 10px;
    border: 1px solid #E5E5EA;
}
</style>
