<script>
'use strict';

// ═══ INGENIERO — Tablero Calendario ═══

var _boardItems = [];
var _currentWeekStart = null;

// ── Inicialización ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
    _currentWeekStart = getWeekStart(new Date());
    ingenieroMostrarActividades();

    // Tareas: solo mostrar tareasSection, NO crmContentSection
    var btnTareas = document.getElementById('btnTareas');
    if (btnTareas) btnTareas.addEventListener('click', function () {
        setIngenieroNav('tareas');
        var board = document.getElementById('actividadesBoard');
        if (board) board.style.display = 'none';
        var crmContent = document.getElementById('crmContentSection');
        if (crmContent) crmContent.style.display = 'none';
        var tareasSection = document.getElementById('tareasSection');
        if (tareasSection) tareasSection.classList.add('active');
    });

    // Ocultar tabs que el ingeniero no debe ver
    ['tabCotizado', 'tabCobrado', 'tabFacturado'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.style.display = 'none';
    });

    // Ocultar meta/progreso/filtros en topbar
    ['facturadoAmount', 'progressPct', 'islandFiltersSection', 'islandSepFilters'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.style.display = 'none';
    });
});

function setIngenieroNav(active) {
    document.querySelectorAll('.island-nav .island-nav-btn').forEach(function (b) {
        b.classList.remove('active');
    });
    var map = { 'tablero': 'btnTablero', 'tareas': 'btnTareas' };
    var el = document.getElementById(map[active]);
    if (el) el.classList.add('active');
}

function ingenieroMostrarActividades() {
    setIngenieroNav('tablero');
    var board = document.getElementById('actividadesBoard');
    var content = document.getElementById('crmContentSection');
    var tareasSection = document.getElementById('tareasSection');
    if (board) { board.style.display = 'flex'; board.style.flexDirection = 'column'; }
    if (content) content.style.display = 'none';
    if (tareasSection) tareasSection.classList.remove('active');
    ingenieroCargarActividades();
}
window.ingenieroMostrarActividades = ingenieroMostrarActividades;

// ── Week helpers ─────────────────────────────────────────────────
function getWeekStart(date) {
    var d = new Date(date);
    var day = d.getDay();
    var diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
}

function addDays(d, n) {
    var r = new Date(d);
    r.setDate(r.getDate() + n);
    return r;
}

function toYMD(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
}

function fmtShortDate(d) {
    var months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
    return d.getDate() + ' ' + months[d.getMonth()];
}

function boardPrevWeek() {
    _currentWeekStart = addDays(_currentWeekStart, -7);
    renderBoard();
}
window.boardPrevWeek = boardPrevWeek;

function boardNextWeek() {
    _currentWeekStart = addDays(_currentWeekStart, 7);
    renderBoard();
}
window.boardNextWeek = boardNextWeek;

function boardGoToday() {
    _currentWeekStart = getWeekStart(new Date());
    renderBoard();
}
window.boardGoToday = boardGoToday;

// ── Cargar actividades ──────────────────────────────────────────
function ingenieroCargarActividades() {
    var loading = document.getElementById('boardLoading');
    var empty = document.getElementById('boardEmpty');
    var cols = document.getElementById('boardColumns');
    if (loading) loading.style.display = 'block';
    if (empty) empty.style.display = 'none';
    if (cols) cols.style.display = 'none';

    fetch('/app/api/ingeniero/actividades/')
        .then(function (r) { return r.json(); })
        .then(function (data) {
            _boardItems = data.items || [];
            if (loading) loading.style.display = 'none';
            if (_boardItems.length === 0) {
                if (empty) empty.style.display = 'block';
            } else {
                renderBoard();
            }
        })
        .catch(function () {
            if (loading) loading.style.display = 'none';
        });
}
window.ingenieroCargarActividades = ingenieroCargarActividades;

// ── Render tablero como calendario semanal ──────────────────────
function renderBoard() {
    var cols = document.getElementById('boardColumns');
    var empty = document.getElementById('boardEmpty');
    if (!cols) return;
    if (!_currentWeekStart) _currentWeekStart = getWeekStart(new Date());

    var DAY_NAMES = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'];
    var MONTHS = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var todayStr = toYMD(today);

    var weekDays = [];
    for (var i = 0; i < 5; i++) weekDays.push(addDays(_currentWeekStart, i));

    // Update week label
    var weekLabel = document.getElementById('boardWeekLabel');
    if (weekLabel) {
        weekLabel.textContent = fmtShortDate(_currentWeekStart) + ' — ' + fmtShortDate(addDays(_currentWeekStart, 4));
    }

    // Group tasks by day
    var byDay = {};
    weekDays.forEach(function (d) { byDay[toYMD(d)] = []; });
    var otrasItems = [];

    _boardItems.forEach(function (item) {
        var f = (item.fecha_planeada || item.fecha_limite || '').substring(0, 10);
        if (!f) { otrasItems.push(item); return; }
        if (byDay.hasOwnProperty(f)) {
            byDay[f].push(item);
        } else {
            otrasItems.push(item);
        }
    });

    // Build calendar HTML
    var h = '<div class="cal-grid">';
    weekDays.forEach(function (day, idx) {
        var dStr = toYMD(day);
        var isToday = dStr === todayStr;
        var tasks = byDay[dStr] || [];
        h += '<div class="cal-col' + (isToday ? ' cal-col-today' : '') + '">';
        h += '<div class="cal-col-header">';
        h += '<div class="cal-day-name">' + DAY_NAMES[idx] + '</div>';
        h += '<div class="cal-day-num">' + day.getDate() + '</div>';
        h += '<div class="cal-day-month">' + MONTHS[day.getMonth()] + '</div>';
        h += '</div>';
        h += '<div class="cal-col-body">';
        if (tasks.length === 0) {
            h += '<div style="color:#C7C7CC;font-size:0.65rem;text-align:center;padding:10px 0;">—</div>';
        } else {
            tasks.forEach(function (item) {
                var isVencida = item.fecha_limite && item.fecha_limite.substring(0, 10) < todayStr;
                var cardClass = 'cal-card' + (isVencida ? ' cal-card-vencida' : (item.prioridad === 'alta' ? ' cal-card-alta' : ''));
                var safeKey = String(item.key).replace(/'/g, "\\'");
                h += '<div class="' + cardClass + '" onclick="ingenieroAbrirTarea(\'' + safeKey + '\',' + item.id + ',\'' + item.tipo + '\')">';
                h += '<div class="cal-card-title">' + escHtml(truncar(item.titulo, 50)) + '</div>';
                if (item.cliente) h += '<div class="cal-card-client">&#128205; ' + escHtml(truncar(item.cliente, 28)) + '</div>';
                h += '<button class="cal-card-btn" onclick="event.stopPropagation();ingenieroCompletarTarea(\'' + safeKey + '\',' + item.id + ',\'' + item.tipo + '\')">&#10003; Completar</button>';
                h += '</div>';
            });
        }
        h += '</div></div>';
    });
    h += '</div>';

    // Otras semanas
    if (otrasItems.length > 0) {
        h += '<div class="cal-extras">';
        h += '<div style="font-size:0.68rem;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Otras semanas (' + otrasItems.length + ')</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
        otrasItems.forEach(function (item) {
            var f = (item.fecha_planeada || item.fecha_limite || '').substring(0, 10);
            var fDisplay = f ? formatDate(f) : '—';
            var todayStr2 = toYMD(today);
            var isVencida = f && f < todayStr2;
            var safeKey = String(item.key).replace(/'/g, "\\'");
            h += '<div class="cal-card" style="flex:0 0 auto;min-width:140px;max-width:180px;" onclick="ingenieroAbrirTarea(\'' + safeKey + '\',' + item.id + ',\'' + item.tipo + '\')">';
            h += '<div class="cal-card-title">' + escHtml(truncar(item.titulo, 32)) + '</div>';
            h += '<div class="cal-card-client" style="color:' + (isVencida ? '#FF3B30' : '#8E8E93') + ';">' + escHtml(fDisplay) + '</div>';
            h += '</div>';
        });
        h += '</div></div>';
    }

    cols.innerHTML = h;
    cols.style.display = '';
    if (empty) empty.style.display = 'none';
}

// ── Abrir tarea directamente (no la oportunidad) ─────────────────
function ingenieroAbrirTarea(key, id, tipo) {
    var item = _boardItems.find(function (i) { return i.key === key; });
    var overlay = document.getElementById('boardTareaOverlay');
    if (!overlay || !item) return;

    var tituloEl = document.getElementById('btpTitulo');
    var metaEl = document.getElementById('btpMeta');
    var fechaEl = document.getElementById('btpFecha');
    var completeBtn = document.getElementById('btpCompleteBtn');

    if (tituloEl) tituloEl.textContent = item.titulo || '—';
    var meta = [];
    if (item.cliente) meta.push('&#128205; ' + item.cliente);
    if (item.oportunidad) meta.push(item.oportunidad);
    if (metaEl) metaEl.innerHTML = meta.join(' &middot; ') || '&mdash;';

    var f = item.fecha_limite_display || (item.fecha_limite ? formatDate(item.fecha_limite.substring(0, 10)) : '—');
    if (fechaEl) fechaEl.textContent = 'Vence: ' + f;

    if (completeBtn) {
        completeBtn.onclick = function () {
            ingenieroCompletarTarea(key, id, tipo);
            ingenieroTareaCerrar();
        };
    }

    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
window.ingenieroAbrirTarea = ingenieroAbrirTarea;

function ingenieroTareaCerrar() {
    var overlay = document.getElementById('boardTareaOverlay');
    if (overlay) overlay.style.display = 'none';
    document.body.style.overflow = '';
}
window.ingenieroTareaCerrar = ingenieroTareaCerrar;

// ── Completar tarea ─────────────────────────────────────────────
function ingenieroCompletarTarea(key, id, tipo) {
    if (!confirm('¿Marcar esta tarea como completada?')) return;
    var url = tipo === 'tarea_opp'
        ? '/app/api/tareas-oportunidad/' + id + '/completar/'
        : '/app/api/tareas/' + id + '/completar/';
    fetch(url, {
        method: 'POST',
        headers: { 'X-CSRFToken': getCSRF() }
    }).then(function (r) { return r.json(); }).then(function (resp) {
        if (resp.ok || resp.success) {
            _boardItems = _boardItems.filter(function (i) { return i.key !== key; });
            if (_boardItems.length === 0) {
                var cols = document.getElementById('boardColumns');
                if (cols) cols.style.display = 'none';
                var empty = document.getElementById('boardEmpty');
                if (empty) empty.style.display = 'block';
            } else {
                renderBoard();
            }
        }
    }).catch(function () {});
}
window.ingenieroCompletarTarea = ingenieroCompletarTarea;

// ── Restricciones ingeniero en widget oportunidad ───────────────
document.addEventListener('DOMContentLoaded', function () {
    var observer = new MutationObserver(function () {
        if (!window.ES_INGENIERO) return;
        var detalleContent = document.getElementById('detalleContent');
        if (detalleContent && !detalleContent.dataset.ingBound) {
            detalleContent.dataset.ingBound = '1';
            window._ingenieroModeActive = true;
        }
    });
    var overlay = document.getElementById('widgetDetalle');
    if (overlay) observer.observe(overlay, { attributes: true, attributeFilter: ['class'] });
});

// ── Helpers ─────────────────────────────────────────────────────
function truncar(str, n) {
    if (!str) return '';
    return str.length > n ? str.substring(0, n) + '\u2026' : str;
}
function formatDate(str) {
    if (!str) return '—';
    var p = str.split('-');
    return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : str;
}
function escHtml(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function getCSRF() {
    var el = document.querySelector('[name=csrfmiddlewaretoken]');
    return el ? el.value : '';
}
</script>
