<script>
    'use strict';

    // ═══════════════════════════════════════════════════════════════════
    // INGENIERO — Dashboard Apple Style + Programación Avanzada
    // ═══════════════════════════════════════════════════════════════════

    var _dashCurrentView = 'proyectos';
    var _dashSelectedItem = null;
    var _dashAllItems = [];
    var _dashBoardItems = [];
    var _currentMonthStart = null;

    // Calendar data from backend
    var _dashCalData = [];    // ProgramacionActividad items from API
    var _dashCalPending = {}; // {tempId: {titulo,dia_semana,hora_inicio,hora_fin,responsables:[]}}

    // Person modal state
    var _dashPersonModalActId = null;
    var _dashPersonModalDay = null;
    var _dashPersonSelectedIds = [];

    // ═══ Proyectos de Ingeniería (cargados desde API) ═══
    var _dashProyectos = [];

    // ═══ INICIALIZACIÓN ═══
    document.addEventListener('DOMContentLoaded', function () {
        _currentMonthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
        var avatarEl = document.getElementById('dashAvatarLetters');
        if (avatarEl) {
            var fn = '{{ request.user.first_name|default:"" }}';
            var ln = '{{ request.user.last_name|default:"" }}';
            if (fn || ln) avatarEl.textContent = (fn.charAt(0) + ln.charAt(0)).toUpperCase();
        }
        ingenieroMostrarActividades();
        var btnTareas = document.getElementById('btnTareas');
        if (btnTareas) btnTareas.addEventListener('click', function () {
            setIngenieroNav('tareas');
            var b = document.getElementById('actividadesBoard'); if (b) b.style.display = 'none';
            var c = document.getElementById('crmContentSection'); if (c) c.style.display = 'none';
            var t = document.getElementById('tareasSection'); if (t) t.classList.add('active');
        });
        ['tabCotizado', 'tabCobrado', 'tabFacturado', 'facturadoAmount', 'progressPct', 'islandFiltersSection', 'islandSepFilters'].forEach(function (id) {
            var el = document.getElementById(id); if (el) el.style.display = 'none';
        });
    });

    // ═══ NAVEGACIÓN ═══
    function setIngenieroNav(a) { document.querySelectorAll('.island-nav .island-nav-btn').forEach(function (b) { b.classList.remove('active'); }); var m = { 'tablero': 'btnTablero', 'tareas': 'btnTareas' }; var e = document.getElementById(m[a]); if (e) e.classList.add('active'); }
    function ingenieroMostrarActividades() { setIngenieroNav('tablero'); var b = document.getElementById('actividadesBoard'); var c = document.getElementById('crmContentSection'); var t = document.getElementById('tareasSection'); if (b) { b.style.display = 'flex'; b.style.flexDirection = 'column'; } if (c) c.style.display = 'none'; if (t) t.classList.remove('active'); dashRefreshData(); }
    window.ingenieroMostrarActividades = ingenieroMostrarActividades;

    // ═══ CONTROL SEGMENTADO ═══
    function dashSwitchView(v) { _dashCurrentView = v; _dashSelectedItem = null; document.querySelectorAll('.dash-seg-btn').forEach(function (b) { b.classList.remove('dash-seg-active'); if (b.getAttribute('data-view') === v) b.classList.add('dash-seg-active'); }); var cn = document.getElementById('dashColName'); if (cn) { var l = { tareas: 'Tarea', actividades: 'Actividad', proyectos: 'Proyecto' }; cn.textContent = l[v] || 'Item'; } dashCalShowEmpty(); dashHorasShowEmpty(); dashRenderTable(); dashUpdateWidgets(); }
    window.dashSwitchView = dashSwitchView;

    // ═══ CARGA DATOS ═══
    function dashRefreshData() {
        var ld = document.getElementById('dashTableLoading'), rw = document.getElementById('dashTableRows');
        if (ld) ld.style.display = 'flex'; if (rw) rw.style.display = 'none';
        var p1 = fetch('/app/api/ingeniero/actividades/').then(function (r) { return r.json(); }).then(function (d) {
            _dashBoardItems = d.items || []; _dashAllItems = _dashBoardItems.slice();
        });
        var p2 = fetch('/app/api/ingeniero/proyectos/').then(function (r) { return r.json(); }).then(function (d) {
            _dashProyectos = d.items || [];
        });
        Promise.all([p1, p2]).then(function () {
            if (ld) ld.style.display = 'none'; dashRenderTable(); dashFetchStats();
        }).catch(function (e) { console.error(e); if (ld) ld.innerHTML = '<div style="text-align:center;color:#EF4444;">Error al cargar</div>'; });
    }
    window.dashRefreshData = dashRefreshData;
    function ingenieroCargarActividades() { dashRefreshData(); }
    window.ingenieroCargarActividades = ingenieroCargarActividades;

    function dashFetchStats(sk) {
        var u = '/app/api/ingeniero/dashboard-stats/'; if (sk) u += '?selected=' + encodeURIComponent(sk);
        fetch(u).then(function (r) { return r.json(); }).then(function (s) { dashUpdateWidgetsFromStats(s, sk); }).catch(function () { dashUpdateWidgets(); });
    }

    // ═══ DATOS ACTUALES ═══
    function dashGetCurrentData() {
        if (_dashCurrentView === 'proyectos') return _dashProyectos.map(function (p) { return { id: p.id, key: p.key, tipo: 'proyecto', titulo: p.titulo, prioridad: p.prioridad, estado: dashNE(p.estado), fecha_limite: p.fecha_limite, subtitulo: '' }; });
        if (_dashCurrentView === 'actividades') return _dashAllItems.filter(function (t) { return t.tipo === 'tarea_opp'; }).map(function (t) { return { id: t.id, key: t.key, tipo: t.tipo, titulo: t.titulo, prioridad: t.prioridad, estado: dashNE(t.estado), fecha_limite: t.fecha_limite, subtitulo: t.oportunidad || t.cliente || '' }; });
        return _dashAllItems.filter(function (t) { return t.tipo === 'tarea'; }).map(function (t) { return { id: t.id, key: t.key, tipo: t.tipo, titulo: t.titulo, prioridad: t.prioridad, estado: dashNE(t.estado), fecha_limite: t.fecha_limite, subtitulo: t.oportunidad || t.cliente || '' }; });
    }
    function dashNE(e) { if (!e) return 'pendiente'; if (e === 'completada') return 'completada'; if (e === 'en_progreso' || e === 'iniciada') return 'en_progreso'; return 'pendiente'; }

    // ═══ RENDER TABLA ═══
    function dashRenderTable() {
        var c = document.getElementById('dashTableRows'), ld = document.getElementById('dashTableLoading'); if (!c) return;
        var items = dashGetCurrentData();
        var s = (document.getElementById('dashSearchInput') || {}).value || ''; s = s.toLowerCase().trim();
        if (s) items = items.filter(function (i) { return (i.titulo || '').toLowerCase().indexOf(s) !== -1 || (i.asignado || '').toLowerCase().indexOf(s) !== -1; });
        if (!items.length) { c.innerHTML = '<div style="text-align:center;padding:50px 24px;color:#9CA3AF;font-size:0.88rem;"><div style="font-size:2rem;margin-bottom:10px;">✓</div><div style="font-weight:600;color:#374151;margin-bottom:5px;">Sin ' + _dashCurrentView + '</div></div>'; c.style.display = 'block'; if (ld) ld.style.display = 'none'; return; }
        var h = ''; items.forEach(function (it, ix) {
            var sel = _dashSelectedItem === it.key, st = dashSC(it.estado, it.fecha_limite), pr = dashPS(it.prioridad);
            h += '<div class="dash-tr' + (sel ? ' dash-tr-selected' : '') + '" onclick="dashSelectItem(\'' + escH(it.key) + '\')" style="animation-delay:' + ix * 0.03 + 's;">';
            var subtituloHtml = it.subtitulo ? '<div style="font-size:0.7rem;color:#9CA3AF;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escH(trun(it.subtitulo, 30)) + '</div>' : '';
            h += '<div onclick="event.stopPropagation(); window.ingenieroAbrirTarea(\'' + escH(it.key) + '\', \'' + it.id + '\', \'' + it.tipo + '\')" style="cursor:pointer;overflow:hidden;">' +
                 '<div style="font-weight:600;color:#007AFF;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8rem;" title="' + escH(it.titulo) + '">' + escH(trun(it.titulo, 32)) + '</div>' +
                 subtituloHtml + '</div>';
            h += '<div style="display:flex;justify-content:center;">' + pr + '</div>';
            h += '<div style="display:flex;justify-content:center;"><span class="dash-badge ' + st.bc + '">' + st.l + '</span></div></div>';
        });
        c.innerHTML = h; c.style.display = 'block'; if (ld) ld.style.display = 'none';
    }
    function dashFilterTable() { dashRenderTable(); }
    window.dashFilterTable = dashFilterTable;

    // ═══ SELECCIONAR ITEM ═══
    function dashSelectItem(key) {
        if (_dashSelectedItem === key) { _dashSelectedItem = null; dashCalShowEmpty(); dashHorasShowEmpty(); }
        else { _dashSelectedItem = key; dashCalShowActive(); dashFetchStats(key); dashLoadCalendar(key); }
        dashRenderTable();
    }
    window.dashSelectItem = dashSelectItem;

    // ═══ CALENDARIO: CARGAR DESDE API ═══
    function dashLoadCalendar(proyectoKey) {
        if (!proyectoKey) return;
        fetch('/app/api/programacion/actividades/?proyecto_key=' + encodeURIComponent(proyectoKey))
            .then(function (r) { return r.json(); }).then(function (d) {
                _dashCalData = d.items || []; dashRenderCalendar();
            }).catch(function () { _dashCalData = []; dashRenderCalendar(); });
    }

    // ═══ CALENDARIO: RENDER (reusable) ═══
    var _dashExpandMode = false;

    function dashRenderCalGrid(gridEl, days) {
        if (!gridEl || !_dashSelectedItem) return;
        var h = '';
        days.forEach(function (day) {
            var acts = _dashCalData.filter(function (a) { return a.dia_semana === day; });
            h += '<div class="dash-cal-day"><div class="dash-cal-day-title">' + day + '</div>';
            h += '<div style="flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding-bottom:4px;">';
            acts.forEach(function (act) {
                var personsHtml = '';
                if (act.responsables && act.responsables.length) {
                    personsHtml = '<div class="dash-persons-row">';
                    act.responsables.forEach(function (p) {
                        personsHtml += '<span class="dash-person-chip"><span class="dash-person-avatar">' + escH(p.iniciales) + '</span>' + escH(p.nombre.split(' ')[0]) + '</span>';
                    });
                    personsHtml += '<button class="dash-add-person-btn" onclick="event.stopPropagation();dashOpenPersonModal(' + act.id + ',\'' + day + '\',\'' + act.hora_inicio + '\',\'' + act.hora_fin + '\')" title="Agregar persona">+</button>';
                    personsHtml += '</div>';
                } else {
                    personsHtml = '<div class="dash-persons-row"><button class="dash-add-person-btn" onclick="event.stopPropagation();dashOpenPersonModal(' + act.id + ',\'' + day + '\',\'' + act.hora_inicio + '\',\'' + act.hora_fin + '\')" title="Asignar personas">+</button></div>';
                }
                h += '<div class="dash-cal-card">';
                h += '<button class="dash-cal-card-del" onclick="event.stopPropagation();dashDeleteCalAct(' + act.id + ')" title="Eliminar">✕</button>';
                // Time badge (compact)
                h += '<div style="display:flex;align-items:center;gap:4px;margin-bottom:6px;">';
                h += '<span style="font-size:0.68rem;font-weight:700;color:#3B82F6;background:#EFF6FF;padding:3px 8px;border-radius:6px;">' + escH(act.hora_inicio) + '</span>';
                h += '<span style="font-size:0.6rem;color:#D1D5DB;">→</span>';
                h += '<span style="font-size:0.68rem;font-weight:700;color:#3B82F6;background:#EFF6FF;padding:3px 8px;border-radius:6px;">' + escH(act.hora_fin) + '</span>';
                h += '</div>';
                // Title text
                h += '<div style="font-size:0.78rem;color:#374151;font-weight:500;line-height:1.4;margin-bottom:4px;word-break:break-word;">' + escH(act.titulo || 'Sin descripción') + '</div>';
                // Persons
                h += personsHtml;
                h += '</div>';
            });
            // Add button
            h += '<button class="dash-cal-add" onclick="dashAddCalAct(\'' + day + '\')">';
            h += '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Añadir</button>';
            h += '</div></div>';
        });
        gridEl.innerHTML = h;
    }

    function dashRenderCalendar() {
        // Main grid (5 days)
        var grid = document.getElementById('dashCalGrid');
        dashRenderCalGrid(grid, ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes']);
        // If expanded, also render expanded grid (7 days)
        if (_dashExpandMode) {
            var egrid = document.getElementById('dashExpandCalGrid');
            dashRenderCalGrid(egrid, ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo']);
        }
    }

    // ═══ EXPANDIR/COLAPSAR ═══
    function dashExpandCal() {
        if (!_dashSelectedItem) return;
        _dashExpandMode = true;
        var ov = document.getElementById('dashExpandOverlay');
        if (ov) ov.style.display = 'flex';
        // Set title
        var items = dashGetCurrentData();
        var si = items.find(function (i) { return i.key === _dashSelectedItem; });
        var t = document.getElementById('dashExpandCalTitle');
        if (t) t.textContent = si ? si.titulo : _dashSelectedItem;
        // Render 7 days
        var egrid = document.getElementById('dashExpandCalGrid');
        dashRenderCalGrid(egrid, ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo']);
        // Lock body scroll
        document.body.style.overflow = 'hidden';
    }
    window.dashExpandCal = dashExpandCal;

    function dashCollapseCal() {
        _dashExpandMode = false;
        var ov = document.getElementById('dashExpandOverlay');
        if (ov) ov.style.display = 'none';
        document.body.style.overflow = '';
    }
    window.dashCollapseCal = dashCollapseCal;

    // ═══ NUEVA ACTIVIDAD: ABRIR MODAL ═══
    var _dashNewActDay = '';
    var _dashNewActPersonIds = [];

    function dashAddCalAct(day) {
        if (!_dashSelectedItem) return;
        _dashNewActDay = day;
        _dashNewActPersonIds = [];
        var modal = document.getElementById('dashNewActModal');
        if (!modal) return;
        modal.style.display = 'flex';
        // Set day label
        var lbl = document.getElementById('dashNewActDayLabel');
        if (lbl) lbl.textContent = day;
        // Reset fields
        var s = document.getElementById('dashNewActStart'); if (s) s.value = '08:00';
        var e = document.getElementById('dashNewActEnd'); if (e) e.value = '09:00';
        var d = document.getElementById('dashNewActDesc'); if (d) d.value = '';
        var sel = document.getElementById('dashNewActPersonsSelected');
        if (sel) sel.innerHTML = '<span style="font-size:0.72rem;color:#9CA3AF;">Ninguno seleccionado</span>';
        // Load persons with availability
        dashLoadNewActPersons();
    }
    window.dashAddCalAct = dashAddCalAct;

    function dashCloseNewActModal() {
        var modal = document.getElementById('dashNewActModal');
        if (modal) modal.style.display = 'none';
    }
    window.dashCloseNewActModal = dashCloseNewActModal;

    function dashLoadNewActPersons() {
        var start = (document.getElementById('dashNewActStart') || {}).value || '08:00';
        var end = (document.getElementById('dashNewActEnd') || {}).value || '09:00';
        var ld = document.getElementById('dashNewActPersonsLoading');
        var list = document.getElementById('dashNewActPersonsList');
        if (ld) ld.style.display = 'block';
        if (list) list.innerHTML = '';
        var url = '/app/api/programacion/disponibilidad/?dia_semana=' + encodeURIComponent(_dashNewActDay) + '&hora_inicio=' + encodeURIComponent(start) + '&hora_fin=' + encodeURIComponent(end);
        fetch(url).then(function (r) { return r.json(); }).then(function (data) {
            if (ld) ld.style.display = 'none';
            if (!list) return;
            var usuarios = data.usuarios || [];
            var h = '';
            usuarios.forEach(function (u) {
                var isSel = _dashNewActPersonIds.indexOf(u.id) !== -1;
                var isBusy = !u.disponible && !isSel;
                h += '<div class="dash-person-item' + (isBusy ? ' dash-person-busy' : '') + (isSel ? ' dash-person-selected' : '') + '" onclick="dashToggleNewActPerson(' + u.id + ',\'' + escA(u.nombre) + '\',\'' + escA(u.iniciales) + '\',' + u.disponible + ')" data-uid="' + u.id + '">';
                h += '<div class="dash-person-avatar" style="width:30px;height:30px;font-size:0.55rem;">' + escH(u.iniciales) + '</div>';
                h += '<div style="flex:1;">';
                h += '<div style="font-size:0.8rem;font-weight:600;color:#1D1D1F;">' + escH(u.nombre) + '</div>';
                h += '<div style="font-size:0.62rem;color:#9CA3AF;">' + escH(u.rol) + '</div>';
                if (u.conflictos && u.conflictos.length) {
                    u.conflictos.forEach(function (c) {
                        h += '<div style="font-size:0.58rem;color:#EF4444;margin-top:1px;">⚠ ' + escH(c.titulo) + ' (' + escH(c.hora) + ')</div>';
                    });
                }
                h += '</div>';
                h += '<div style="width:9px;height:9px;border-radius:50%;background:' + (u.disponible ? '#22C55E' : '#EF4444') + ';flex-shrink:0;"></div>';
                h += '</div>';
            });
            list.innerHTML = h;
        }).catch(function () { if (ld) ld.textContent = 'Error'; });
    }

    function dashToggleNewActPerson(uid, nombre, iniciales, disponible) {
        var idx = _dashNewActPersonIds.indexOf(uid);
        if (idx !== -1) {
            _dashNewActPersonIds.splice(idx, 1);
        } else {
            if (!disponible) {
                if (!confirm(nombre + ' tiene conflicto. ¿Agregar de todos modos?')) return;
            }
            _dashNewActPersonIds.push(uid);
        }
        // Update selection chips
        var sel = document.getElementById('dashNewActPersonsSelected');
        if (sel) {
            if (!_dashNewActPersonIds.length) {
                sel.innerHTML = '<span style="font-size:0.72rem;color:#9CA3AF;">Ninguno seleccionado</span>';
            } else {
                sel.innerHTML = _dashNewActPersonIds.map(function (id) {
                    return '<span class="dash-person-chip" style="font-size:0.68rem;">ID ' + id + '</span>';
                }).join('');
            }
        }
        // Update visual
        document.querySelectorAll('#dashNewActPersonsList .dash-person-item').forEach(function (el) {
            var id = parseInt(el.getAttribute('data-uid'));
            if (_dashNewActPersonIds.indexOf(id) !== -1) el.classList.add('dash-person-selected');
            else el.classList.remove('dash-person-selected');
        });
    }
    window.dashToggleNewActPerson = dashToggleNewActPerson;

    // Reload persons when time changes
    document.addEventListener('DOMContentLoaded', function () {
        var s = document.getElementById('dashNewActStart');
        var e = document.getElementById('dashNewActEnd');
        if (s) s.addEventListener('change', function () { dashLoadNewActPersons(); });
        if (e) e.addEventListener('change', function () { dashLoadNewActPersons(); });
    });

    function dashConfirmNewAct() {
        if (!_dashSelectedItem || !_dashNewActDay) return;
        var start = (document.getElementById('dashNewActStart') || {}).value || '08:00';
        var end = (document.getElementById('dashNewActEnd') || {}).value || '09:00';
        var desc = (document.getElementById('dashNewActDesc') || {}).value || '';
        // Get the project title from the current selected item
        var items = dashGetCurrentData();
        var si = items.find(function (i) { return i.key === _dashSelectedItem; });
        var proyTitulo = si ? si.titulo : _dashSelectedItem;

        var body = JSON.stringify({
            proyecto_key: _dashSelectedItem,
            proyecto_titulo: proyTitulo,
            dia_semana: _dashNewActDay,
            hora_inicio: start,
            hora_fin: end,
            titulo: desc,
            responsables: _dashNewActPersonIds
        });
        fetch('/app/api/programacion/actividades/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() }, body: body })
            .then(function (r) { return r.json(); }).then(function (d) {
                if (d.success) {
                    dashCloseNewActModal();
                    dashLoadCalendar(_dashSelectedItem);
                } else if (d.error === 'conflicto') {
                    var msg = '⚠ Conflictos de horario:\n';
                    (d.conflictos || []).forEach(function (c) { msg += '• ' + c.usuario + ': ' + c.actividad + ' (' + c.hora + ')\n'; });
                    alert(msg);
                } else {
                    alert(d.error || 'Error al crear');
                }
            }).catch(function (e) { console.error(e); alert('Error de red'); });
    }
    window.dashConfirmNewAct = dashConfirmNewAct;

    // ═══ CALENDARIO: ELIMINAR ═══
    var _dashDeletePendingId = null;

    function dashDeleteCalAct(actId) {
        _dashDeletePendingId = actId;
        // Find the activity to show its title
        var act = _dashCalData.find(function (a) { return a.id === actId; });
        var txt = document.getElementById('dashDeleteConfirmText');
        if (txt && act) {
            txt.innerHTML = 'Se eliminará <strong>"' + escH(act.titulo || 'Sin título') + '"</strong> de la programación. Esta acción no se puede deshacer.';
        } else if (txt) {
            txt.textContent = 'Esta acción no se puede deshacer.';
        }
        var modal = document.getElementById('dashDeleteConfirmModal');
        if (modal) modal.style.display = 'flex';
    }
    window.dashDeleteCalAct = dashDeleteCalAct;

    function dashCancelDelete() {
        _dashDeletePendingId = null;
        var modal = document.getElementById('dashDeleteConfirmModal');
        if (modal) modal.style.display = 'none';
    }
    window.dashCancelDelete = dashCancelDelete;

    function dashExecDelete() {
        var actId = _dashDeletePendingId;
        if (!actId) return;
        dashCancelDelete();
        fetch('/app/api/programacion/actividad/' + actId + '/', { method: 'DELETE', headers: { 'X-CSRFToken': getCSRF() } })
            .then(function (r) { return r.json(); }).then(function (d) { if (d.success) dashLoadCalendar(_dashSelectedItem); })
            .catch(function (e) { console.error(e); });
    }
    window.dashExecDelete = dashExecDelete;

    // ═══ CALENDARIO: ACTUALIZAR HORA ═══
    function dashUpdateCalTime(actId, field, value) {
        var data = {};
        // Need both times to update
        var act = _dashCalData.find(function (a) { return a.id === actId; });
        if (!act) return;
        data.hora_inicio = field === 'hora_inicio' ? value : act.hora_inicio;
        data.hora_fin = field === 'hora_fin' ? value : act.hora_fin;
        fetch('/app/api/programacion/actividad/' + actId + '/', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() }, body: JSON.stringify(data) })
            .then(function (r) { return r.json(); }).then(function (d) { if (d.success) { act[field] = value; } })
            .catch(function (e) { console.error(e); });
    }
    window.dashUpdateCalTime = dashUpdateCalTime;

    // ═══ CALENDARIO: ACTUALIZAR TEXTO ═══
    function dashUpdateCalText(actId, value) {
        fetch('/app/api/programacion/actividad/' + actId + '/', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() }, body: JSON.stringify({ titulo: value }) })
            .then(function (r) { return r.json(); }).then(function (d) {
                var act = _dashCalData.find(function (a) { return a.id === actId; });
                if (act && d.success) act.titulo = value;
            });
    }
    window.dashUpdateCalText = dashUpdateCalText;

    // ═══ PERSONA MODAL: ABRIR ═══
    function dashOpenPersonModal(actId, day, horaIni, horaFin) {
        _dashPersonModalActId = actId;
        _dashPersonModalDay = day;
        var act = _dashCalData.find(function (a) { return a.id === actId; });
        _dashPersonSelectedIds = act && act.responsables ? act.responsables.map(function (r) { return r.id; }) : [];

        var modal = document.getElementById('dashPersonModal');
        if (!modal) return;
        modal.style.display = 'flex';

        var info = document.getElementById('dashPersonTimeInfo');
        if (info) info.textContent = day + ' • ' + horaIni + ' – ' + horaFin;

        dashRenderSelectedChips();

    // ═══ WIDGETS: Actualizar desde Stats ═══
    function dashUpdateWidgetsFromStats(st, sk) {
        var comp = (st.tareas_completadas || 0) + (st.acts_completadas || 0), prog = st.tareas_progreso || 0, venc = (st.tareas_vencidas || 0) + (st.acts_vencidas || 0), pend = (st.tareas_pendientes || 0) + (st.acts_pendientes || 0);
        var total = comp + prog + venc + pend; if (!total) total = 1;
        var pc = Math.round(comp / total * 100), pp = Math.round(prog / total * 100), pv = Math.round(venc / total * 100);
        var pie = document.getElementById('dashPieChart'); if (pie) { var c1 = pc, c2 = c1 + pp, c3 = c2 + pv; pie.style.background = 'conic-gradient(#22C55E 0% ' + c1 + '%, #F97316 ' + c1 + '% ' + c2 + '%, #EF4444 ' + c2 + '% ' + c3 + '%, #E5E7EB ' + c3 + '% 100%)'; }
        var piePct = document.getElementById('dashPiePct'); if (piePct) piePct.textContent = pc + '%';
        dashST('dashLegCompletadas', 'Ejecutadas (' + comp + ')'); dashST('dashLegProgreso', 'En progreso (' + prog + ')'); dashST('dashLegAtrasadas', 'Atrasadas (' + venc + ')'); dashST('dashLegPendientes', 'Sin empezar (' + pend + ')');
        if (sk && (st.horas_plan > 0 || st.horas_actual > 0)) { var it = dashGetCurrentData(), si = it.find(function (i) { return i.key === sk; }); dashHorasShowForItem(st.horas_actual, st.horas_plan, si ? si.titulo : ''); } else if (sk) { var it2 = dashGetCurrentData(), si2 = it2.find(function (i) { return i.key === sk; }); dashHorasShowForItem(0, 0, si2 ? si2.titulo : ''); }
        var ef = st.eficiencia || 0, em = st.eficiencia_mensual || 0;
        var arc = document.getElementById('dashEficienciaArc'); if (arc) { arc.style.strokeDashoffset = 314.16 - (314.16 * ef / 100); arc.style.stroke = ef >= 80 ? '#22C55E' : ef >= 50 ? '#F97316' : '#EF4444'; }
        var pE = document.getElementById('dashEficienciaPct'); if (pE) { pE.textContent = Math.round(ef) + '%'; pE.style.color = ef >= 80 ? '#16A34A' : ef >= 50 ? '#EA580C' : '#DC2626'; }
        dashST('dashEficCompletadas', comp); dashST('dashEficProgreso', prog); dashST('dashEficVencidas', venc); dashST('dashEficMensual', Math.round(em) + '%');
    }

    function dashUpdateWidgets() {
        var items = dashGetCurrentData(), ts = dashToYMD(new Date()), t = items.length || 1, co = 0, pr = 0, pe = 0, ve = 0;
        items.forEach(function (i) { if (i.estado === 'completada') co++; else if (i.estado === 'en_progreso') pr++; else pe++; if (i.estado !== 'completada' && i.fecha_limite && i.fecha_limite < ts) ve++; });
        var pc = Math.round(co / t * 100), pp = Math.round(pr / t * 100), pv = Math.round(ve / t * 100);
        var pie = document.getElementById('dashPieChart'); if (pie) { var c1 = pc, c2 = c1 + pp, c3 = c2 + pv; pie.style.background = 'conic-gradient(#22C55E 0% ' + c1 + '%,#F97316 ' + c1 + '% ' + c2 + '%,#EF4444 ' + c2 + '% ' + c3 + '%,#E5E7EB ' + c3 + '% 100%)'; }
        dashST('dashPiePct', pc + '%'); dashST('dashLegCompletadas', 'Ejecutadas (' + co + ')'); dashST('dashLegProgreso', 'En progreso (' + pr + ')'); dashST('dashLegAtrasadas', 'Atrasadas (' + ve + ')'); dashST('dashLegPendientes', 'Sin empezar (' + pe + ')');
    }

    // ═══ UTILIDADES ═══
    function dashSC(e, f) { var ts = dashToYMD(new Date()), v = e !== 'completada' && f && f < ts; if (v) return { l: 'Atrasado', bc: 'dash-badge-delayed' }; if (e === 'completada') return { l: 'Ejecutado', bc: 'dash-badge-completed' }; if (e === 'en_progreso' || e === 'iniciada') return { l: 'En progreso', bc: 'dash-badge-progress' }; return { l: 'Sin empezar', bc: 'dash-badge-pending' }; }
    function dashPS(p) { var lv = 1; if (p === 'alta') lv = 3; else if (p === 'media' || p === 'normal') lv = 2; var h = '<div class="dash-stars">'; for (var i = 0; i < 3; i++) { if (i < lv) h += '<svg class="dash-star dash-star-filled" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'; else h += '<svg class="dash-star dash-star-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'; } h += '</div>'; return h; }
    function dashToYMD(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
    function trun(s, n) { if (!s) return ''; return s.length > n ? s.substring(0, n) + '\u2026' : s; }
    function escH(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function escA(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function getCSRF() {
        // 1. Try form hidden field
        var el = document.querySelector('[name=csrfmiddlewaretoken]');
        if (el && el.value) return el.value;
        // 2. Try Django csrftoken cookie  
        var cookies = document.cookie.split(';');
        for (var i = 0; i < cookies.length; i++) {
            var c = cookies[i].trim();
            if (c.indexOf('csrftoken=') === 0) return c.substring(10);
        }
        // 3. Fallback: Django template tag
        return '{{ csrf_token }}';
    }
