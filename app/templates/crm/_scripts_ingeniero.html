<script>
'use strict';

// ═══ INGENIERO — Tablero Calendario ═══

var _boardItems = [];
var _currentMonthStart = null;

// ── Inicialización ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
    _currentMonthStart = getMonthStart(new Date());
    ingenieroMostrarActividades();

    var btnTareas = document.getElementById('btnTareas');
    if (btnTareas) btnTareas.addEventListener('click', function () {
        setIngenieroNav('tareas');
        var board = document.getElementById('actividadesBoard');
        if (board) board.style.display = 'none';
        var crmContent = document.getElementById('crmContentSection');
        if (crmContent) crmContent.style.display = 'none';
        var tareasSection = document.getElementById('tareasSection');
        if (tareasSection) tareasSection.classList.add('active');
    });

    ['tabCotizado', 'tabCobrado', 'tabFacturado'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.style.display = 'none';
    });

    ['facturadoAmount', 'progressPct', 'islandFiltersSection', 'islandSepFilters'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.style.display = 'none';
    });
});

function setIngenieroNav(active) {
    document.querySelectorAll('.island-nav .island-nav-btn').forEach(function (b) {
        b.classList.remove('active');
    });
    var map = { 'tablero': 'btnTablero', 'tareas': 'btnTareas' };
    var el = document.getElementById(map[active]);
    if (el) el.classList.add('active');
}

function ingenieroMostrarActividades() {
    setIngenieroNav('tablero');
    var board = document.getElementById('actividadesBoard');
    var content = document.getElementById('crmContentSection');
    var tareasSection = document.getElementById('tareasSection');
    if (board) { board.style.display = 'flex'; board.style.flexDirection = 'column'; }
    if (content) content.style.display = 'none';
    if (tareasSection) tareasSection.classList.remove('active');
    ingenieroCargarActividades();
}
window.ingenieroMostrarActividades = ingenieroMostrarActividades;

// ── Month helpers ─────────────────────────────────────────────────
function getMonthStart(date) {
    return new Date(date.getFullYear(), date.getMonth(), 1);
}

function toYMD(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
}

function boardPrevMonth() {
    _currentMonthStart = new Date(_currentMonthStart.getFullYear(), _currentMonthStart.getMonth() - 1, 1);
    renderBoard();
}
window.boardPrevMonth = boardPrevMonth;

function boardNextMonth() {
    _currentMonthStart = new Date(_currentMonthStart.getFullYear(), _currentMonthStart.getMonth() + 1, 1);
    renderBoard();
}
window.boardNextMonth = boardNextMonth;

function boardGoToday() {
    _currentMonthStart = getMonthStart(new Date());
    renderBoard();
}
window.boardGoToday = boardGoToday;

// ── Cargar actividades ──────────────────────────────────────────
function ingenieroCargarActividades() {
    var loading = document.getElementById('boardLoading');
    var empty = document.getElementById('boardEmpty');
    var cols = document.getElementById('boardColumns');
    if (loading) loading.style.display = 'block';
    if (empty) empty.style.display = 'none';
    if (cols) cols.style.display = 'none';

    fetch('/app/api/ingeniero/actividades/')
        .then(function (r) { return r.json(); })
        .then(function (data) {
            _boardItems = data.items || [];
            if (loading) loading.style.display = 'none';
            if (_boardItems.length === 0) {
                if (empty) empty.style.display = 'block';
            } else {
                renderBoard();
            }
        })
        .catch(function () {
            if (loading) loading.style.display = 'none';
        });
}
window.ingenieroCargarActividades = ingenieroCargarActividades;

// ── Render: 4-5 semanas del mes, cada fila = Lun-Vie ─────────────
function renderBoard() {
    var cols = document.getElementById('boardColumns');
    var empty = document.getElementById('boardEmpty');
    if (!cols) return;
    if (!_currentMonthStart) _currentMonthStart = getMonthStart(new Date());

    var MONTHS_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    var MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    var DAY_NAMES = ['Lunes','Martes','Miércoles','Jueves','Viernes'];

    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var todayStr = toYMD(today);

    var year  = _currentMonthStart.getFullYear();
    var month = _currentMonthStart.getMonth();
    var lastDay = new Date(year, month + 1, 0);

    // Etiqueta del mes
    var label = document.getElementById('boardWeekLabel');
    if (label) label.textContent = MONTHS_FULL[month] + ' ' + year;

    // Agrupar tareas por fecha
    var byDay = {};
    var otrosMeses = [];
    var sinFecha = [];

    _boardItems.forEach(function (item) {
        var f = (item.fecha_planeada || item.fecha_limite || '').substring(0, 10);
        if (!f) { sinFecha.push(item); return; }
        var parts = f.split('-');
        var fy = parseInt(parts[0]), fm = parseInt(parts[1]) - 1;
        if (fy === year && fm === month) {
            if (!byDay[f]) byDay[f] = [];
            byDay[f].push(item);
        } else {
            otrosMeses.push(item);
        }
    });

    // ── Calcular semanas del mes (Lun-Vie) ──
    // Monday de la primera semana que toca el mes
    var firstDow = _currentMonthStart.getDay(); // 0=Dom, 1=Lun...
    var backDays = firstDow === 0 ? 6 : firstDow - 1; // retroceso hasta lunes
    var firstMonday = new Date(year, month, 1 - backDays);

    // Generar todos los lunes hasta cubrir el último día del mes
    var weeks = [];
    var mon = new Date(firstMonday);
    while (mon <= lastDay) {
        // Generar la semana completa (Lun=0 … Vie=4)
        var week = [];
        for (var d = 0; d < 5; d++) {
            var dayDate = new Date(mon);
            dayDate.setDate(dayDate.getDate() + d);
            week.push({
                date: dayDate,
                inMonth: dayDate.getMonth() === month && dayDate.getFullYear() === year
            });
        }
        // Solo incluir semanas que tengan al menos un día del mes
        if (week.some(function (c) { return c.inMonth; })) {
            weeks.push(week);
        }
        mon.setDate(mon.getDate() + 7);
    }

    var MAX_VISIBLE = 3;

    // ── Construir HTML ──
    var h = '';

    weeks.forEach(function (week, wi) {
        // Etiqueta semana (opcional, sutil)
        var firstInMonth = week.find(function (c) { return c.inMonth; });
        h += '<div class="cal-week-label">Semana ' + (wi + 1) + ' &mdash; ' + (firstInMonth ? firstInMonth.date.getDate() + ' ' + MONTHS_SHORT[firstInMonth.date.getMonth()] : '') + '</div>';

        h += '<div class="cal-grid">';
        week.forEach(function (cell) {
            var dStr   = toYMD(cell.date);
            var isToday = dStr === todayStr;
            var tasks  = cell.inMonth ? (byDay[dStr] || []) : [];
            var extra  = tasks.length > MAX_VISIBLE ? tasks.length - MAX_VISIBLE : 0;

            var colClass = 'cal-col';
            if (isToday) colClass += ' cal-col-today';
            if (!cell.inMonth) colClass += ' cal-col-outside';

            h += '<div class="' + colClass + '">';
            h += '<div class="cal-col-header">';
            h += '<div class="cal-day-name">' + DAY_NAMES[cell.date.getDay() - 1] + '</div>';
            h += '<div class="cal-day-num">' + cell.date.getDate() + '</div>';
            h += '<div class="cal-day-month">' + MONTHS_SHORT[cell.date.getMonth()] + '</div>';
            h += '</div>';
            h += '<div class="cal-col-body">';

            if (!cell.inMonth) {
                // celda fuera del mes, vacía
            } else if (tasks.length === 0) {
                h += '<div style="color:#C7C7CC;font-size:0.65rem;text-align:center;padding:10px 0;">—</div>';
            } else {
                // Tarjetas visibles
                tasks.slice(0, MAX_VISIBLE).forEach(function (item) {
                    h += buildCard(item, todayStr);
                });
                // Extra colapsadas
                if (extra > 0) {
                    h += '<div id="calExtra-' + dStr + '" style="display:none;">';
                    tasks.slice(MAX_VISIBLE).forEach(function (item) {
                        h += buildCard(item, todayStr);
                    });
                    h += '</div>';
                    h += '<button class="cal-card-more" data-count="' + extra + '" onclick="calToggleExtra(\'' + dStr + '\', this)">+' + extra + ' más</button>';
                }
            }

            h += '</div></div>';
        });
        h += '</div>';
    });

    // ── Otros meses ──
    if (otrosMeses.length > 0) {
        h += '<div class="cal-extras">';
        h += '<div style="font-size:0.68rem;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Otros meses (' + otrosMeses.length + ')</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
        otrosMeses.forEach(function (item) {
            var f = (item.fecha_planeada || item.fecha_limite || '').substring(0, 10);
            var isVencida = f && f < todayStr;
            var safeKey = String(item.key).replace(/'/g, "\\'");
            var p = f ? f.split('-') : null;
            var fDisp = p ? p[2] + '/' + p[1] + '/' + p[0] : '—';
            h += '<div class="cal-card" style="flex:0 0 auto;min-width:140px;max-width:200px;" onclick="ingenieroAbrirTarea(\'' + safeKey + '\',' + item.id + ',\'' + item.tipo + '\')">';
            h += '<div class="cal-card-title">' + escHtml(truncar(item.titulo, 32)) + '</div>';
            h += '<div class="cal-card-client" style="color:' + (isVencida ? '#FF3B30' : '#8E8E93') + ';">' + escHtml(fDisp) + '</div>';
            h += '</div>';
        });
        h += '</div></div>';
    }

    // ── Sin fecha ──
    if (sinFecha.length > 0) {
        h += '<div class="cal-extras" style="margin-top:6px;">';
        h += '<div style="font-size:0.68rem;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Sin fecha (' + sinFecha.length + ')</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
        sinFecha.forEach(function (item) {
            var safeKey = String(item.key).replace(/'/g, "\\'");
            h += '<div class="cal-card" style="flex:0 0 auto;min-width:140px;max-width:200px;" onclick="ingenieroAbrirTarea(\'' + safeKey + '\',' + item.id + ',\'' + item.tipo + '\')">';
            h += '<div class="cal-card-title">' + escHtml(truncar(item.titulo, 32)) + '</div>';
            h += '</div>';
        });
        h += '</div></div>';
    }

    cols.innerHTML = h;
    cols.style.display = '';
    if (empty) empty.style.display = 'none';
}

// ── Construir tarjeta ────────────────────────────────────────────
function buildCard(item, todayStr) {
    var fDate = (item.fecha_limite || '').substring(0, 10);
    var isVencida = fDate && fDate < todayStr;
    var cardClass = 'cal-card' +
        (isVencida ? ' cal-card-vencida' : (item.prioridad === 'alta' ? ' cal-card-alta' : ''));
    var safeKey = String(item.key).replace(/'/g, "\\'");

    // Hora de vencimiento (sólo si no es 00:00)
    var timeStr = '';
    var fl = item.fecha_limite || '';
    if (fl.length > 10) {
        var tp = fl.substring(11, 16);
        if (tp && tp !== '00:00') timeStr = tp;
    }

    var h = '<div class="' + cardClass + '" onclick="ingenieroAbrirTarea(\'' + safeKey + '\',' + item.id + ',\'' + item.tipo + '\')">';
    h += '<div class="cal-card-title">' + escHtml(truncar(item.titulo, 50)) + '</div>';
    if (item.cliente) h += '<div class="cal-card-client">&#128205; ' + escHtml(truncar(item.cliente, 28)) + '</div>';
    if (timeStr) h += '<div class="cal-card-time">&#9201; ' + timeStr + '</div>';
    h += '</div>';
    return h;
}

// ── Toggle extra tareas de un día ────────────────────────────────
function calToggleExtra(dStr, btn) {
    var extra = document.getElementById('calExtra-' + dStr);
    if (!extra) return;
    var hidden = extra.style.display === 'none';
    extra.style.display = hidden ? '' : 'none';
    btn.textContent = hidden ? 'Ver menos' : ('+' + btn.getAttribute('data-count') + ' más');
}
window.calToggleExtra = calToggleExtra;

// ── Abrir tarea en widget de detalle ─────────────────────────────
function ingenieroAbrirTarea(key, id, tipo) {
    if (tipo === 'tarea') {
        if (window.crmTaskVerDetalle) { window.crmTaskVerDetalle(id); return; }
    }
    var modal = document.getElementById('crmTaskDetailModal');
    if (!modal) return;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';

    fetch('/app/api/tarea-opp/' + id + '/detalle/')
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (window.crmTaskRenderData) window.crmTaskRenderData(data);

            var btnT = document.getElementById('crmTaskBtnTerminar');
            if (btnT && data.estado !== 'completada') {
                btnT.onclick = function () {
                    ingenieroCompletarTarea(key, id, tipo);
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                };
            }
            var feed = document.getElementById('crm-task-activity-feed');
            if (feed) {
                feed.innerHTML = '<div style="text-align:center;padding:1rem;color:#9CA3AF;">Cargando...</div>';
                fetch('/app/api/tarea-opp/' + id + '/comentarios/')
                    .then(function (r) { return r.json(); })
                    .then(function (cd) {
                        var cs = cd.comentarios || [];
                        if (cs.length === 0) {
                            feed.innerHTML = '<div style="text-align:center;padding:1rem;color:#9CA3AF;font-size:0.85rem;">No hay comentarios aún.</div>';
                        } else {
                            feed.innerHTML = cs.map(function (c) {
                                var nm = (c.usuario && c.usuario.nombre) ? c.usuario.nombre : 'Usuario';
                                var parts = nm.trim().split(/\s+/);
                                var ini = (parts.length >= 2 ? parts[0][0] + parts[1][0] : nm.substring(0, 2)).toUpperCase();
                                return '<div style="display:flex;gap:0.75rem;padding:0.75rem;background:#F9FAFB;border-radius:10px;border:1px solid #F3F4F6;margin-bottom:6px;">' +
                                    '<div style="width:32px;height:32px;border-radius:50%;background:#0052D4;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#fff;font-weight:700;flex-shrink:0;">' + ini + '</div>' +
                                    '<div style="flex:1;"><div style="font-weight:600;font-size:0.85rem;color:#1D1D1F;margin-bottom:2px;">' + escHtml(nm) + '</div>' +
                                    '<div style="font-size:0.85rem;color:#374151;line-height:1.5;">' + escHtml(c.contenido || '') + '</div></div></div>';
                            }).join('');
                        }
                    }).catch(function () { feed.innerHTML = ''; });
            }
        }).catch(function () {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        });
}
window.ingenieroAbrirTarea = ingenieroAbrirTarea;

// ── Completar tarea ──────────────────────────────────────────────
function ingenieroCompletarTarea(key, id, tipo) {
    if (!confirm('¿Marcar esta tarea como completada?')) return;
    var url = tipo === 'tarea_opp'
        ? '/app/api/tareas-oportunidad/' + id + '/completar/'
        : '/app/api/tareas/' + id + '/completar/';
    fetch(url, { method: 'POST', headers: { 'X-CSRFToken': getCSRF() } })
        .then(function (r) { return r.json(); })
        .then(function (resp) {
            if (resp.ok || resp.success) {
                _boardItems = _boardItems.filter(function (i) { return i.key !== key; });
                if (_boardItems.length === 0) {
                    var c = document.getElementById('boardColumns');
                    if (c) c.style.display = 'none';
                    var e = document.getElementById('boardEmpty');
                    if (e) e.style.display = 'block';
                } else {
                    renderBoard();
                }
            }
        }).catch(function () {});
}
window.ingenieroCompletarTarea = ingenieroCompletarTarea;

// ── Restricciones ingeniero en widget oportunidad ────────────────
document.addEventListener('DOMContentLoaded', function () {
    var observer = new MutationObserver(function () {
        if (!window.ES_INGENIERO) return;
        var detalleContent = document.getElementById('detalleContent');
        if (detalleContent && !detalleContent.dataset.ingBound) {
            detalleContent.dataset.ingBound = '1';
            window._ingenieroModeActive = true;
        }
    });
    var overlay = document.getElementById('widgetDetalle');
    if (overlay) observer.observe(overlay, { attributes: true, attributeFilter: ['class'] });
});

// ── Helpers ──────────────────────────────────────────────────────
function truncar(str, n) {
    if (!str) return '';
    return str.length > n ? str.substring(0, n) + '\u2026' : str;
}
function escHtml(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function getCSRF() {
    var el = document.querySelector('[name=csrfmiddlewaretoken]');
    return el ? el.value : '';
}
</script>
