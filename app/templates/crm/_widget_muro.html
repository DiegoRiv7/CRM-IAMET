<!-- ═══ MURO EMPRESARIAL ═══ -->
<div class="widget-overlay" id="widgetMuro" style="z-index:10200;">
    <div
        style="width:94vw;max-width:94vw;height:92vh;max-height:92vh;display:flex;flex-direction:column;background:#F3F4F8;border-radius:22px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,30,0.22);">
        <!-- Header -->
        <div
            style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;background:#fff;border-bottom:1.5px solid #E5E7EB;flex-shrink:0;">
            <div style="display:flex;align-items:center;gap:0.7rem;">
                <div
                    style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0052D4,#4364F7);display:flex;align-items:center;justify-content:center;">
                    <svg width="18" height="18" fill="none" stroke="#fff" viewBox="0 0 24 24" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                </div> <span style="font-size:1.1rem;font-weight:700;color:#1A1A2E;">Muro Empresarial</span>
            </div>
            <div style="display:flex;gap:0.4rem;">
                <button class="muro-filter-btn active" data-filtro="todos"
                    onclick="muroSetFilter('todos',this)">Todos</button> <button class="muro-filter-btn"
                    data-filtro="anuncios" onclick="muroSetFilter('anuncios',this)">📢 Anuncios</button> <button
                    class="muro-filter-btn" data-filtro="mios" onclick="muroSetFilter('mios',this)">Mis
                    posts</button>
            </div> <button onclick="muroCerrar()"
                style="border:none;background:none;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#888;transition:background 0.15s;"
                onmouseenter="this.style.background='#F3F4F8'"
                onmouseleave="this.style.background='none'">&times;</button>
        </div> <!-- Body -->
        <div style="flex:1;overflow-y:auto;padding:1.2rem 1.2rem 2rem;display:flex;flex-direction:column;gap:1rem;"
            id="muroBody"> <!-- Crear post -->
            <div style="background:#fff;border-radius:16px;padding:1.2rem;box-shadow:0 2px 8px rgba(0,0,30,0.06);"
                id="muroCreateCard">
                <div style="display:flex;gap:0.8rem;align-items:flex-start;">
                    <div id="muroMiAvatar"
                        style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#0052D4,#4364F7);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;">
                        {{ request.user.first_name|slice:":1" }}{{ request.user.last_name|slice:":1" }} </div>
                    <textarea id="muroContenido" placeholder="¿Qué quieres compartir?" rows="3"
                        style="flex:1;border:1.5px solid #E5E7EB;border-radius:10px;padding:0.7rem 0.9rem;font-size:0.92rem;resize:vertical;outline:none;font-family:inherit;color:#1A1A2E;transition:border-color 0.15s;"
                        onfocus="this.style.borderColor='#0052D4'" onblur="this.style.borderColor='#E5E7EB'"></textarea>
                </div> <!-- Preview imagen -->
                <div id="muroImgPreview" style="display:none;margin-top:0.8rem;position:relative;"> <img
                        id="muroImgPreviewImg" src=""
                        style="max-height:200px;border-radius:10px;object-fit:cover;max-width:100%;"> <button
                        onclick="muroQuitarImagen()"
                        style="position:absolute;top:6px;right:6px;border:none;background:rgba(0,0,0,0.55);color:#fff;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;">&times;</button>
                </div> <!-- Etiquetados -->
                <div id="muroEtiqContainer" style="display:none;margin-top:0.7rem;">
                    <div style="font-size:0.78rem;color:#6B7280;margin-bottom:0.4rem;font-weight:600;">Etiquetados:
                    </div>
                    <div id="muroEtiqChips" style="display:flex;flex-wrap:wrap;gap:0.35rem;margin-bottom:0.5rem;">
                    </div>
                    <div style="position:relative;"> <input type="text" id="muroEtiqSearch"
                            placeholder="Buscar usuario..." oninput="muroBuscarEtiquetado(this.value)"
                            style="width:100%;border:1.5px solid #E5E7EB;border-radius:8px;padding:0.45rem 0.7rem;font-size:0.85rem;outline:none;"
                            onfocus="this.style.borderColor='#0052D4'"
                            onblur="setTimeout(function(){document.getElementById('muroEtiqResults').style.display='none'},200)">
                        <div id="muroEtiqResults"
                            style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #E5E7EB;border-radius:8px;max-height:160px;overflow-y:auto;z-index:10;box-shadow:0 4px 16px rgba(0,0,30,0.12);">
                        </div>
                    </div>
                </div> <!-- Programar -->
                <div id="muroProgramarContainer" style="display:none;margin-top:0.7rem;"> <label
                        style="font-size:0.78rem;color:#6B7280;font-weight:600;display:block;margin-bottom:0.3rem;">Programar
                        publicación:</label> <input type="datetime-local" id="muroProgramarFecha"
                        style="border:1.5px solid #E5E7EB;border-radius:8px;padding:0.4rem 0.7rem;font-size:0.85rem;outline:none;"
                        onfocus="this.style.borderColor='#0052D4'" onblur="this.style.borderColor='#E5E7EB'"> </div>
                <!-- Acciones crear -->
                <div
                    style="display:flex;align-items:center;justify-content:space-between;margin-top:0.9rem;flex-wrap:wrap;gap:0.5rem;">
                    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;"> <!-- Imagen --> <label
                            style="cursor:pointer;display:flex;align-items:center;gap:0.3rem;font-size:0.82rem;color:#4B5563;background:#F3F4F8;border-radius:20px;padding:5px 12px;transition:background 0.15s;"
                            onmouseenter="this.style.background='#E5E7EB'"
                            onmouseleave="this.style.background='#F3F4F8'"> <svg width="16" height="16" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" />
                                <circle cx="8.5" cy="8.5" r="1.5" />
                                <polyline points="21 15 16 10 5 21" />
                            </svg> Foto <input type="file" id="muroImgInput" accept="image/*" style="display:none;"
                                onchange="muroPreviewImagen(this)"> </label> <!-- Etiquetar --> <button type="button"
                            onclick="muroToggleEtiquetar()"
                            style="display:flex;align-items:center;gap:0.3rem;font-size:0.82rem;color:#4B5563;background:#F3F4F8;border-radius:20px;padding:5px 12px;border:none;cursor:pointer;transition:background 0.15s;"
                            onmouseenter="this.style.background='#E5E7EB'"
                            onmouseleave="this.style.background='#F3F4F8'"> <svg width="16" height="16" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path
                                    d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
                                <line x1="7" y1="7" x2="7.01" y2="7" />
                            </svg> Etiquetar </button> {% if es_supervisor %} <!-- Anuncio --> <button type="button"
                            onclick="muroToggleAnuncio(this)" id="muroBtnAnuncio"
                            style="display:flex;align-items:center;gap:0.3rem;font-size:0.82rem;color:#4B5563;background:#F3F4F8;border-radius:20px;padding:5px 12px;border:none;cursor:pointer;transition:background 0.15s;"
                            onmouseenter="this.style.background='#E5E7EB'"
                            onmouseleave="this.style.background='#F3F4F8'" data-activo="false"> 📢 Anuncio </button>
                        <!-- Programar --> <button type="button" onclick="muroToggleProgramar()"
                            style="display:flex;align-items:center;gap:0.3rem;font-size:0.82rem;color:#4B5563;background:#F3F4F8;border-radius:20px;padding:5px 12px;border:none;cursor:pointer;transition:background 0.15s;"
                            onmouseenter="this.style.background='#E5E7EB'"
                            onmouseleave="this.style.background='#F3F4F8'"> 🕐 Programar </button> {% endif %}
                    </div> <button onclick="muroPublicar()"
                        style="background:linear-gradient(135deg,#0052D4,#4364F7);color:#fff;border:none;border-radius:20px;padding:7px 22px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:opacity 0.15s;"
                        onmouseenter="this.style.opacity='0.88'" onmouseleave="this.style.opacity='1'">Publicar</button>
                </div>
            </div> <!-- Feed de posts -->
            <div id="muroFeed" style="display:flex;flex-direction:column;gap:1rem;">
                <div style="text-align:center;padding:3rem;color:#9CA3AF;">Cargando muro…</div>
            </div>
        </div>
    </div>
</div>
