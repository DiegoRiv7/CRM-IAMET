<!-- ═══ MURO EMPRESARIAL ═══ -->
<div class="widget-overlay" id="widgetMuro" style="z-index:10100;"><!-- CAPA 1 -->
    <div class="muro-card">
        <!-- Header -->
        <div class="muro-card-header">
            <div style="display:flex;align-items:center;gap:0.7rem;">
                <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0052D4,#4364F7);display:flex;align-items:center;justify-content:center;">
                    <svg width="18" height="18" fill="none" stroke="#fff" viewBox="0 0 24 24" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <span style="font-size:1.05rem;font-weight:700;color:#1A1A2E;">Muro Empresarial</span>
            </div>
            <div style="display:flex;gap:0.4rem;">
                <button class="muro-filter-btn active" data-filtro="todos" onclick="muroSetFilter('todos',this)">Todos</button>
                <button class="muro-filter-btn" data-filtro="anuncios" onclick="muroSetFilter('anuncios',this)">📢 Anuncios</button>
                <button class="muro-filter-btn" data-filtro="mios" onclick="muroSetFilter('mios',this)">Mis posts</button>
            </div>
            <button onclick="muroCerrar()" class="muro-close-btn">&times;</button>
        </div>

        <!-- Body -->
        <div style="flex:1;overflow-y:auto;padding:1.2rem 1.2rem 2rem;display:flex;flex-direction:column;gap:1rem;" id="muroBody">

            <!-- Crear post -->
            <div class="muro-create-card" id="muroCreateCard">
                <div style="display:flex;gap:0.8rem;align-items:flex-start;">
                    <div id="muroMiAvatar" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#0052D4,#4364F7);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;">
                        {{ request.user.first_name|slice:":1" }}{{ request.user.last_name|slice:":1" }}
                    </div>
                    <textarea id="muroContenido" placeholder="¿Qué quieres compartir?" rows="3" class="muro-textarea"
                        onfocus="this.style.borderColor='rgba(0,82,212,0.5)'" onblur="this.style.borderColor='rgba(0,0,0,0.1)'"></textarea>
                </div>

                <!-- Preview imagen -->
                <div id="muroImgPreview" style="display:none;margin-top:0.8rem;position:relative;">
                    <img id="muroImgPreviewImg" src="" style="max-height:200px;border-radius:10px;object-fit:cover;max-width:100%;">
                    <button onclick="muroQuitarImagen()" style="position:absolute;top:6px;right:6px;border:none;background:rgba(0,0,0,0.55);color:#fff;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;">&times;</button>
                </div>

                <!-- Etiquetados -->
                <div id="muroEtiqContainer" style="display:none;margin-top:0.7rem;">
                    <div style="font-size:0.78rem;color:#6B7280;margin-bottom:0.4rem;font-weight:600;">Etiquetados:</div>
                    <div id="muroEtiqChips" style="display:flex;flex-wrap:wrap;gap:0.35rem;margin-bottom:0.5rem;"></div>
                    <div style="position:relative;">
                        <input type="text" id="muroEtiqSearch" placeholder="Buscar usuario..." oninput="muroBuscarEtiquetado(this.value)"
                            style="width:100%;border:1.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:0.45rem 0.7rem;font-size:0.85rem;outline:none;background:rgba(255,255,255,0.6);box-sizing:border-box;"
                            onfocus="this.style.borderColor='rgba(0,82,212,0.5)'"
                            onblur="setTimeout(function(){document.getElementById('muroEtiqResults').style.display='none'},200)">
                        <div id="muroEtiqResults" style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #E5E7EB;border-radius:8px;max-height:160px;overflow-y:auto;z-index:10;box-shadow:0 4px 16px rgba(0,0,30,0.12);"></div>
                    </div>
                </div>

                <!-- Programar -->
                <div id="muroProgramarContainer" style="display:none;margin-top:0.7rem;">
                    <label style="font-size:0.78rem;color:#6B7280;font-weight:600;display:block;margin-bottom:0.3rem;">Programar publicación:</label>
                    <input type="datetime-local" id="muroProgramarFecha"
                        style="border:1.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:0.4rem 0.7rem;font-size:0.85rem;outline:none;background:rgba(255,255,255,0.6);"
                        onfocus="this.style.borderColor='rgba(0,82,212,0.5)'" onblur="this.style.borderColor='rgba(0,0,0,0.1)'">
                </div>

                <!-- Acciones crear -->
                <div style="display:flex;align-items:center;justify-content:space-between;margin-top:0.9rem;flex-wrap:wrap;gap:0.5rem;">
                    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
                        <label class="muro-action-btn">
                            <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            Foto
                            <input type="file" id="muroImgInput" accept="image/*" style="display:none;" onchange="muroPreviewImagen(this)">
                        </label>
                        <button type="button" onclick="muroToggleEtiquetar()" class="muro-action-btn">
                            <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                            Etiquetar
                        </button>
                        {% if es_supervisor %}
                        <button type="button" onclick="muroToggleAnuncio(this)" id="muroBtnAnuncio" class="muro-action-btn" data-activo="false">📢 Anuncio</button>
                        <button type="button" onclick="muroToggleProgramar()" class="muro-action-btn">🕐 Programar</button>
                        {% endif %}
                    </div>
                    <button onclick="muroPublicar()" class="muro-publish-btn">Publicar</button>
                </div>
            </div>

            <!-- Feed de posts -->
            <div id="muroFeed" style="display:flex;flex-direction:column;gap:1rem;">
                <div style="text-align:center;padding:3rem;color:#9CA3AF;">Cargando muro…</div>
            </div>
        </div>
    </div>
</div>

<!-- ═══ MURO: CONFIRMAR ELIMINACIÓN ═══ -->
<div id="muroWidgetEliminar" style="display:none;position:fixed;inset:0;z-index:10500;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;">
    <div style="background:rgba(255,255,255,0.93);backdrop-filter:blur(64px) saturate(200%);-webkit-backdrop-filter:blur(64px) saturate(200%);border:1px solid rgba(255,255,255,0.85);border-radius:20px;padding:2rem;width:360px;max-width:90vw;box-shadow:0 2px 0 rgba(255,255,255,0.95) inset,0 32px 64px rgba(0,0,0,0.16);display:flex;flex-direction:column;gap:1.25rem;">
        <div style="display:flex;align-items:center;gap:0.75rem;">
            <div style="width:42px;height:42px;border-radius:50%;background:#FFF0F0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="20" height="20" fill="none" stroke="#FF3B30" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
            </div>
            <div>
                <div style="font-weight:700;font-size:1rem;color:#1D1D1F;">Eliminar publicación</div>
                <div style="font-size:0.82rem;color:#86868B;margin-top:2px;">Esta acción no se puede deshacer.</div>
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
            <button onclick="muroWidgetEliminarCerrar()" style="padding:0.65rem 1.2rem;background:rgba(242,242,247,0.8);border:1px solid rgba(0,0,0,0.1);border-radius:10px;font-weight:600;font-size:0.9rem;cursor:pointer;color:#1D1D1F;">Cancelar</button>
            <button id="muroWidgetEliminarBtn" style="padding:0.65rem 1.2rem;background:#FF3B30;border:none;border-radius:10px;font-weight:600;font-size:0.9rem;cursor:pointer;color:#fff;">Eliminar</button>
        </div>
    </div>
</div>

<!-- ═══ MURO: EDITAR PUBLICACIÓN ═══ -->
<div id="muroWidgetEditar" style="display:none;position:fixed;inset:0;z-index:10500;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;">
    <div style="background:rgba(255,255,255,0.93);backdrop-filter:blur(64px) saturate(200%);-webkit-backdrop-filter:blur(64px) saturate(200%);border:1px solid rgba(255,255,255,0.85);border-radius:20px;padding:2rem;width:480px;max-width:90vw;box-shadow:0 2px 0 rgba(255,255,255,0.95) inset,0 32px 64px rgba(0,0,0,0.16);display:flex;flex-direction:column;gap:1.25rem;">
        <div style="font-weight:700;font-size:1rem;color:#1D1D1F;">✏️ Editar publicación</div>
        <textarea id="muroWidgetEditarTexto" rows="5"
            style="width:100%;padding:0.85rem;border:1.5px solid rgba(0,0,0,0.1);border-radius:12px;font-size:0.95rem;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box;background:rgba(255,255,255,0.6);"
            placeholder="Escribe tu publicación..."></textarea>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
            <button onclick="muroWidgetEditarCerrar()" style="padding:0.65rem 1.2rem;background:rgba(242,242,247,0.8);border:1px solid rgba(0,0,0,0.1);border-radius:10px;font-weight:600;font-size:0.9rem;cursor:pointer;color:#1D1D1F;">Cancelar</button>
            <button id="muroWidgetEditarBtn" style="padding:0.65rem 1.2rem;background:#0052D4;border:none;border-radius:10px;font-weight:600;font-size:0.9rem;cursor:pointer;color:#fff;">Guardar</button>
        </div>
    </div>
</div>
