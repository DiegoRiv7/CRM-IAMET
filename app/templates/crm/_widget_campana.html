<!-- ═══ WIDGET: EDITOR DE CAMPAÑA ═══ -->
<div class="widget-overlay" id="widgetCampana" style="z-index:10400;">
    <div class="widget-card" style="width:95vw;max-width:1200px;height:92vh;display:flex;flex-direction:column;">

        <!-- Header -->
        <div style="padding:16px 24px;border-bottom:1px solid #E5E5EA;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:36px;height:36px;border-radius:8px;background:#FF950022;display:flex;align-items:center;justify-content:center;">
                    <svg width="20" height="20" fill="none" stroke="#FF9500" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div>
                    <input type="text" id="campNombre" placeholder="Nombre de la campaña..."
                        style="border:none;font-size:1.1rem;font-weight:700;color:#1D1D1F;outline:none;width:300px;">
                    <div style="display:flex;gap:8px;margin-top:4px;">
                        <input type="text" id="campAsunto" placeholder="Asunto del correo..."
                            style="border:none;font-size:0.8rem;color:#86868B;outline:none;width:300px;">
                    </div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <button id="campBtnPreview" style="padding:8px 16px;border:1px solid #D1D1D6;border-radius:8px;background:#fff;font-size:0.8rem;font-weight:600;cursor:pointer;color:#3C3C43;">
                    👁 Vista Previa
                </button>
                <button id="campBtnGuardar" style="padding:8px 16px;border:none;border-radius:8px;background:#0052D4;color:#fff;font-size:0.8rem;font-weight:700;cursor:pointer;">
                    Guardar Template
                </button>
                <button type="button" class="widget-close" id="campClose">&times;</button>
            </div>
        </div>

        <!-- Main content: sidebar + editor + preview -->
        <div style="display:flex;flex:1;overflow:hidden;">

            <!-- LEFT: Block palette -->
            <div id="campPalette" style="width:200px;border-right:1px solid #E5E5EA;padding:16px;overflow-y:auto;background:#F9FAFB;flex-shrink:0;">
                <div style="font-size:0.7rem;font-weight:700;color:#86868B;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">Bloques</div>

                <!-- Draggable block items -->
                <div class="camp-palette-item" data-block-type="header" draggable="true">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
                    Encabezado
                </div>
                <div class="camp-palette-item" data-block-type="text" draggable="true">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Texto
                </div>
                <div class="camp-palette-item" data-block-type="image" draggable="true">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
                    Imagen
                </div>
                <div class="camp-palette-item" data-block-type="button" draggable="true">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="5"/></svg>
                    Botón
                </div>
                <div class="camp-palette-item" data-block-type="divider" draggable="true">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="2" y1="12" x2="22" y2="12"/></svg>
                    Separador
                </div>
                <div class="camp-palette-item" data-block-type="product" draggable="true">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
                    Producto
                </div>
                <div class="camp-palette-item" data-block-type="spacer" draggable="true">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                    Espacio
                </div>
                <div class="camp-palette-item" data-block-type="footer" draggable="true">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
                    Pie de página
                </div>

                <div style="font-size:0.7rem;font-weight:700;color:#86868B;text-transform:uppercase;letter-spacing:0.05em;margin:20px 0 12px;">Estilo</div>

                <div style="margin-bottom:10px;">
                    <label style="font-size:0.7rem;color:#86868B;display:block;margin-bottom:4px;">Color principal</label>
                    <input type="color" id="campColorPrimario" value="#0052D4" style="width:100%;height:32px;border:1px solid #E5E5EA;border-radius:6px;cursor:pointer;">
                </div>
                <div style="margin-bottom:10px;">
                    <label style="font-size:0.7rem;color:#86868B;display:block;margin-bottom:4px;">Color fondo</label>
                    <input type="color" id="campColorFondo" value="#F5F5F7" style="width:100%;height:32px;border:1px solid #E5E5EA;border-radius:6px;cursor:pointer;">
                </div>
                <div style="margin-bottom:10px;">
                    <label style="font-size:0.7rem;color:#86868B;display:block;margin-bottom:4px;">Logo URL</label>
                    <input type="text" id="campLogoUrl" placeholder="https://..." style="width:100%;padding:6px 8px;border:1px solid #E5E5EA;border-radius:6px;font-size:0.75rem;">
                </div>
            </div>

            <!-- CENTER: Canvas / Drop zone -->
            <div style="flex:1;overflow-y:auto;background:#E5E5EA;padding:24px;display:flex;justify-content:center;" id="campCanvasWrap">
                <div id="campCanvas" style="width:600px;min-height:400px;background:#fff;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.1);padding:0;position:relative;">
                    <!-- Blocks will be rendered here -->
                    <div id="campDropZone" style="min-height:200px;padding:20px;">
                        <div id="campEmptyMsg" style="text-align:center;padding:60px 20px;color:#C7C7CC;">
                            <svg width="48" height="48" fill="none" stroke="#D1D1D6" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 12px;display:block;">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                            </svg>
                            <p style="font-size:0.9rem;font-weight:600;">Arrastra bloques aquí</p>
                            <p style="font-size:0.8rem;margin-top:4px;">o haz click en un bloque del panel izquierdo</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Block properties panel (shown when a block is selected) -->
            <div id="campProperties" style="width:280px;border-left:1px solid #E5E5EA;padding:16px;overflow-y:auto;background:#fff;display:none;flex-shrink:0;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <span style="font-size:0.8rem;font-weight:700;color:#1D1D1F;">Propiedades</span>
                    <button id="campPropClose" style="background:none;border:none;font-size:1.2rem;color:#86868B;cursor:pointer;">&times;</button>
                </div>
                <div id="campPropContent">
                    <!-- Dynamic properties based on block type -->
                </div>
                <div style="margin-top:16px;padding-top:12px;border-top:1px solid #E5E5EA;">
                    <button id="campBtnDeleteBlock" style="width:100%;padding:8px;border:1px solid #FF3B30;border-radius:8px;background:#FF3B3011;color:#FF3B30;font-size:0.8rem;font-weight:600;cursor:pointer;">
                        Eliminar bloque
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Preview overlay -->
<div id="campPreviewOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:10500;display:none;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;width:700px;max-width:95vw;height:85vh;display:flex;flex-direction:column;overflow:hidden;">
        <div style="padding:12px 20px;border-bottom:1px solid #E5E5EA;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:700;font-size:0.9rem;">Vista Previa del Email</span>
            <button onclick="document.getElementById('campPreviewOverlay').style.display='none'" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#86868B;">&times;</button>
        </div>
        <div style="flex:1;overflow-y:auto;background:#E5E5EA;padding:20px;display:flex;justify-content:center;">
            <iframe id="campPreviewIframe" style="width:600px;border:none;background:#fff;border-radius:8px;" sandbox="allow-same-origin"></iframe>
        </div>
    </div>
</div>
