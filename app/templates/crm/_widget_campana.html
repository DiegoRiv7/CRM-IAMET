<!-- ═══ WIDGET: CAMPAÑAS — Import (admin) + Select (user) ═══ -->
<div class="widget-overlay" id="widgetCampana" style="z-index:10400;">
    <div class="widget-card" style="width:90vw;max-width:900px;height:85vh;display:flex;flex-direction:column;">

        <!-- Header -->
        <div style="padding:16px 24px;border-bottom:1px solid #E5E5EA;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:36px;height:36px;border-radius:8px;background:#FF950022;display:flex;align-items:center;justify-content:center;">
                    <svg width="20" height="20" fill="none" stroke="#FF9500" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div>
                    <h2 style="margin:0;font-size:1.1rem;font-weight:700;color:#1D1D1F;" id="campTitle">Plantillas de Campaña</h2>
                    <p style="margin:2px 0 0;font-size:0.75rem;color:#86868B;" id="campSubtitle">Selecciona una plantilla para enviar</p>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <!-- Import button (admin only, controlled by JS) -->
                <button id="campBtnImportar" style="display:none;padding:8px 16px;border:1px solid #0052D4;border-radius:8px;background:#0052D411;color:#0052D4;font-size:0.8rem;font-weight:700;cursor:pointer;">
                    ⬆ Subir Campaña
                </button>
                <button type="button" class="widget-close" id="campClose">&times;</button>
            </div>
        </div>

        <!-- Marca filter tabs -->
        <div style="padding:12px 24px;border-bottom:1px solid #F2F2F7;display:flex;gap:6px;flex-wrap:wrap;" id="campMarcaTabs">
            <!-- Rendered by JS -->
        </div>

        <!-- Content: template cards grid -->
        <div style="flex:1;overflow-y:auto;padding:20px 24px;" id="campContent">
            <div id="campGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
                <!-- Template cards rendered by JS -->
            </div>
            <div id="campEmpty" style="display:none;text-align:center;padding:40px 20px;color:#C7C7CC;">
                <svg width="48" height="48" fill="none" stroke="#D1D1D6" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 12px;display:block;">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                </svg>
                <p style="font-size:0.9rem;font-weight:600;">No hay plantillas para esta marca</p>
                <p style="font-size:0.8rem;margin-top:4px;" id="campEmptyHint">Pide al administrador que importe una plantilla HTML.</p>
            </div>
        </div>
    </div>
</div>

<!-- Import dialog (admin) — with drag & drop -->
<div id="campImportDialog" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10500;display:none;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:28px;max-width:500px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h3 style="margin:0;font-size:1.1rem;font-weight:700;color:#1D1D1F;">Subir Plantilla de Campaña</h3>
            <button onclick="document.getElementById('campImportDialog').style.display='none'" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#86868B;">&times;</button>
        </div>
        <form id="campImportForm" enctype="multipart/form-data">
            <!-- Marca selector -->
            <div style="margin-bottom:16px;">
                <label style="font-size:0.78rem;font-weight:700;color:#3C3C43;display:block;margin-bottom:6px;">¿Para qué marca es esta plantilla?</label>
                <div id="campImpMarcaGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">
                    <button type="button" class="camp-marca-opt" data-marca="ZEBRA" style="padding:8px 4px;border:2px solid #E5E5EA;border-radius:8px;background:#fff;font-size:0.72rem;font-weight:700;color:#3C3C43;cursor:pointer;transition:all 0.15s;">Zebra</button>
                    <button type="button" class="camp-marca-opt" data-marca="PANDUIT" style="padding:8px 4px;border:2px solid #E5E5EA;border-radius:8px;background:#fff;font-size:0.72rem;font-weight:700;color:#3C3C43;cursor:pointer;transition:all 0.15s;">Panduit</button>
                    <button type="button" class="camp-marca-opt" data-marca="APC" style="padding:8px 4px;border:2px solid #E5E5EA;border-radius:8px;background:#fff;font-size:0.72rem;font-weight:700;color:#3C3C43;cursor:pointer;transition:all 0.15s;">APC</button>
                    <button type="button" class="camp-marca-opt" data-marca="AVIGILION" style="padding:8px 4px;border:2px solid #E5E5EA;border-radius:8px;background:#fff;font-size:0.72rem;font-weight:700;color:#3C3C43;cursor:pointer;transition:all 0.15s;">Avigilon</button>
                    <button type="button" class="camp-marca-opt" data-marca="GENETEC" style="padding:8px 4px;border:2px solid #E5E5EA;border-radius:8px;background:#fff;font-size:0.72rem;font-weight:700;color:#3C3C43;cursor:pointer;transition:all 0.15s;">Genetec</button>
                    <button type="button" class="camp-marca-opt" data-marca="AXIS" style="padding:8px 4px;border:2px solid #E5E5EA;border-radius:8px;background:#fff;font-size:0.72rem;font-weight:700;color:#3C3C43;cursor:pointer;transition:all 0.15s;">Axis</button>
                    <button type="button" class="camp-marca-opt" data-marca="CISCO" style="padding:8px 4px;border:2px solid #E5E5EA;border-radius:8px;background:#fff;font-size:0.72rem;font-weight:700;color:#3C3C43;cursor:pointer;transition:all 0.15s;">Cisco</button>
                    <button type="button" class="camp-marca-opt" data-marca="GENERAL" style="padding:8px 4px;border:2px solid #E5E5EA;border-radius:8px;background:#fff;font-size:0.72rem;font-weight:700;color:#3C3C43;cursor:pointer;transition:all 0.15s;">General</button>
                </div>
                <input type="hidden" id="campImpMarca" value="">
            </div>

            <!-- Nombre -->
            <div style="margin-bottom:16px;">
                <label style="font-size:0.78rem;font-weight:700;color:#3C3C43;display:block;margin-bottom:6px;">Nombre de la plantilla</label>
                <input type="text" id="campImpNombre" required placeholder="Ej: Panduit — Seguimiento Comercial v2" style="width:100%;padding:10px 14px;border:1px solid #E5E5EA;border-radius:10px;font-size:0.85rem;outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='#0052D4'" onblur="this.style.borderColor='#E5E5EA'">
            </div>

            <!-- Drag & drop zone -->
            <div style="margin-bottom:20px;">
                <label style="font-size:0.78rem;font-weight:700;color:#3C3C43;display:block;margin-bottom:6px;">Archivo HTML</label>
                <div id="campDropArea" style="border:2px dashed #D1D1D6;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:#FAFAFA;">
                    <svg width="36" height="36" fill="none" stroke="#86868B" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 10px;display:block;">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p style="margin:0;font-size:0.85rem;font-weight:600;color:#3C3C43;" id="campDropText">Arrastra tu archivo .html aquí</p>
                    <p style="margin:4px 0 0;font-size:0.75rem;color:#86868B;">o haz click para seleccionar</p>
                    <input type="file" id="campImpFile" accept=".html,.htm" required style="display:none;">
                </div>
                <p id="campFileName" style="display:none;margin:8px 0 0;font-size:0.8rem;color:#34C759;font-weight:600;"></p>
            </div>

            <!-- Submit -->
            <div style="display:flex;gap:10px;">
                <button type="button" onclick="document.getElementById('campImportDialog').style.display='none'" style="flex:1;padding:12px;border:none;background:#F2F2F7;border-radius:10px;color:#86868B;font-size:0.85rem;font-weight:600;cursor:pointer;">Cancelar</button>
                <button type="submit" id="campImpSubmit" style="flex:1;padding:12px;border:none;background:#0052D4;border-radius:10px;color:#fff;font-weight:700;font-size:0.85rem;cursor:pointer;transition:background 0.2s;">Subir Plantilla</button>
            </div>
        </form>
    </div>
</div>

<!-- Preview overlay -->
<div id="campPreviewOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:10600;display:none;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;width:700px;max-width:95vw;height:85vh;display:flex;flex-direction:column;overflow:hidden;">
        <div style="padding:12px 20px;border-bottom:1px solid #E5E5EA;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:700;font-size:0.9rem;" id="campPreviewTitle">Vista Previa</span>
            <button onclick="document.getElementById('campPreviewOverlay').style.display='none'" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#86868B;">&times;</button>
        </div>
        <div style="flex:1;overflow-y:auto;background:#E5E5EA;padding:20px;display:flex;justify-content:center;">
            <iframe id="campPreviewIframe" style="width:600px;border:none;background:#fff;border-radius:8px;" sandbox="allow-same-origin"></iframe>
        </div>
    </div>
</div>
