<!-- ═══ WIDGET COTIZAR RÁPIDO ═══ -->
<div class="widget-overlay wn-overlay" id="widgetCotizarRapido"
    onclick="if(event.target===this){cotizarRapidoCerrar();}">
    <div class="wn-card">

        <!-- Header -->
        <div class="wn-header">
            <div class="wn-header-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <div>
                <div class="wn-title">Cotizar Rápido</div>
                <div class="wn-subtitle">Selecciona cliente y oportunidad para cotizar</div>
            </div>
            <button type="button" class="wn-close" onclick="cotizarRapidoCerrar()">&times;</button>
        </div>

        <!-- Body -->
        <div class="wn-body">

            <!-- Cliente -->
            <div class="wn-field">
                <div class="wn-label-row">
                    <label class="wn-label">Cliente</label>
                    <button type="button" class="wn-add-btn" onclick="crToggleNuevoCliente()" title="Crear nuevo cliente">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
                <div style="position:relative;">
                    <input type="text" class="wn-input wf-input" id="crClienteInput"
                        placeholder="Buscar cliente..." autocomplete="off" oninput="crFiltrarClientes()">
                    <input type="hidden" id="crClienteId" value="">
                    <div class="wf-autocomplete" id="crClienteDropdown"></div>
                </div>
                <!-- Mini-form nuevo cliente -->
                <div class="wn-mini-form" id="crNuevoClienteSection" style="display:none;">
                    <div class="wn-mini-title">Nuevo cliente</div>
                    <input type="text" class="wn-input wn-mini-input" id="crNuevoClienteNombre" placeholder="Nombre de la empresa">
                    <div class="wn-mini-actions">
                        <button type="button" class="wn-mini-cancel" onclick="crToggleNuevoCliente()">Cancelar</button>
                        <button type="button" class="wn-mini-save" onclick="crCrearCliente()">Guardar cliente</button>
                    </div>
                </div>
            </div>

            <!-- Divider -->
            <div class="wn-divider"></div>

            <!-- Oportunidad -->
            <div class="wn-field">
                <div class="wn-label-row">
                    <label class="wn-label">Oportunidad</label>
                    <button type="button" class="wn-add-btn" onclick="crToggleNuevaOpp()" title="Nueva oportunidad">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
                <select class="wn-input wn-select" id="crOppSelect" onchange="crOppChanged()" disabled>
                    <option value="">— seleccionar oportunidad —</option>
                </select>
                <!-- Mini-form nueva oportunidad -->
                <div class="wn-mini-form" id="crNuevaOppSection" style="display:none;">
                    <div class="wn-mini-title">Nueva oportunidad</div>
                    <input type="text" class="wn-input wn-mini-input" id="crNuevaOppNombre" placeholder="Ej. Proyecto Cableado 2026">
                    <div class="wn-mini-actions">
                        <button type="button" class="wn-mini-cancel" onclick="crToggleNuevaOpp()">Cancelar</button>
                        <button type="button" class="wn-mini-save" onclick="crCrearOpp()">Guardar oportunidad</button>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="wn-actions">
                <button type="button" class="wn-btn wn-btn--cancel" onclick="cotizarRapidoCerrar()">Cancelar</button>
                <button type="button" class="wn-btn wn-btn--submit" id="crGoBtn" onclick="cotizarRapidoIr()" disabled style="opacity:0.5;cursor:not-allowed;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Ir a Cotizar
                </button>
            </div>

        </div>
    </div>
</div>
