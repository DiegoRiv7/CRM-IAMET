{% load static %}
<script>
var _CRM_CONFIG = {
    vendedoresFilter: '{{ vendedores_filter|default:""|escapejs }}',
    tabActivo:        '{{ tab_activo|escapejs }}',
    mesFiltro:        '{{ mes_filter|escapejs }}',
    anioFiltro:       '{{ anio_filter|escapejs }}',
    usuarioNombre:    '{{ usuario.get_full_name|default:usuario.username|escapejs }}',
    usuarioAvatar:    '{{ request.user.userprofile.get_avatar_url|default:""|escapejs }}',
    userId:           parseInt("{{ user.id }}") || -1,
    isSuperuser:      "{{ user.is_superuser|yesno:'true,false' }}" === "true",
    esSupervisor:     "{{ es_supervisor|yesno:'true,false' }}" === "true",
    etapasPipeline:   {{ etapas_pipeline_json|safe }}
};
</script>
<script src="{% static 'js/crm_main.js' %}"></script>
<script>
/* Contador workspace: # real de tarjetas visibles */
(function(){
    function updateCount(){
        var el = document.getElementById('crmWorkspaceCount');
        if (!el) return;
        var grid = document.getElementById('crmCardsGrid');
        if (!grid) return;
        var n = grid.querySelectorAll('.crm-postit').length;
        el.textContent = n;
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', updateCount);
    else updateCount();
})();
/* KPI facturado: siempre usar el total real del endpoint desglose */
(function() {
    var params = new URLSearchParams(window.location.search);
    var mes = params.get('mes') || '{{ mes_filter|escapejs }}';
    var anio = params.get('anio') || '{{ anio_filter|escapejs }}';
    fetch('/app/api/desglose-facturacion/?mes=' + mes + '&anio=' + anio, { credentials: 'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(resp) {
            if (resp.ok && resp.total !== undefined) {
                var fa = document.getElementById('facturadoAmount');
                if (fa) fa.textContent = '$' + Number(resp.total).toLocaleString('en-US', { maximumFractionDigits: 0 });
            }
        })
        .catch(function() {});
})();
</script>
