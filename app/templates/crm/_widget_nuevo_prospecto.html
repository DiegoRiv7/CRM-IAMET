    <!-- ═══ WIDGET: NUEVO PROSPECTO ═══ -->
    <div class="widget-overlay wn-overlay" id="widgetNuevoProspecto" style="z-index:10300;"
        onclick="if(event.target===this){this.classList.add('closing');var self=this;setTimeout(function(){self.classList.remove('active','closing');},220);}">
        <div class="wn-card">

            <!-- Header -->
            <div class="wn-header">
                <div class="wn-header-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                </div>
                <div>
                    <div class="wn-title">Nuevo Prospecto</div>
                    <div class="wn-subtitle">Ingresa los datos para registrar la prospeccion</div>
                </div>
                <button type="button" class="wn-close" id="wpNuevoClose"
                    onclick="var w=document.getElementById('widgetNuevoProspecto');w.classList.add('closing');setTimeout(function(){w.classList.remove('active','closing');},220);">&times;</button>
            </div>

            <!-- Body -->
            <div class="wn-body">
                <form id="formNuevoProspecto" autocomplete="off">
                    {% csrf_token %}

                    <!-- Nombre -->
                    <div class="wn-field">
                        <label class="wn-label">Nombre del prospecto</label>
                        <input type="text" class="wn-input" id="wpfNombre"
                            placeholder="Ej: Implementacion RFID para almacen..." required>
                    </div>

                    <!-- Cliente -->
                    <div class="wn-field">
                        <div class="wn-label-row">
                            <label class="wn-label">Cliente</label>
                            <button type="button" class="wn-add-btn" id="wpnAddClienteBtn" title="Crear nuevo cliente">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                        <input type="text" class="wn-input wf-input" id="wpfCliente" placeholder="Buscar o escribir cliente..." required>
                        <input type="hidden" id="wpfClienteId" value="">
                        <div class="wf-autocomplete" id="wpfClienteAC"></div>
                        <!-- Mini-form crear cliente -->
                        <div class="wn-mini-form" id="wpnMiniCliente" style="display:none;">
                            <div class="wn-mini-title">Nuevo cliente</div>
                            <input type="text" class="wn-input wn-mini-input" id="wpfNuevoClienteNombre" placeholder="Nombre de la empresa">
                            <div class="wn-mini-actions">
                                <button type="button" class="wn-mini-cancel" id="wpfNuevoClienteCancel">Cancelar</button>
                                <button type="button" class="wn-mini-save" id="wpfNuevoClienteGuardar">Guardar cliente</button>
                            </div>
                        </div>
                    </div>

                    <!-- Contacto -->
                    <div class="wn-field">
                        <div class="wn-label-row">
                            <label class="wn-label">Contacto</label>
                            <button type="button" class="wn-add-btn" id="wpnAddContactoBtn" title="Crear nuevo contacto">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                        <input type="text" class="wn-input wf-input" id="wpfContacto" placeholder="Nombre del contacto...">
                        <input type="hidden" id="wpfContactoId" value="">
                        <div class="wf-autocomplete" id="wpfContactoAC"></div>
                        <!-- Mini-form crear contacto -->
                        <div class="wn-mini-form" id="wpnMiniContacto" style="display:none;">
                            <div class="wn-mini-title">Nuevo contacto</div>
                            <div class="wn-mini-row">
                                <input type="text" class="wn-input wn-mini-input" id="wpfNuevoContactoNombre" placeholder="Nombre">
                                <input type="text" class="wn-input wn-mini-input" id="wpfNuevoContactoApellido" placeholder="Apellido">
                            </div>
                            <div class="wn-mini-actions">
                                <button type="button" class="wn-mini-cancel" id="wpfNuevoContactoCancel">Cancelar</button>
                                <button type="button" class="wn-mini-save" id="wpfNuevoContactoGuardar">Guardar contacto</button>
                            </div>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="wn-divider"></div>

                    <!-- Area + Producto -->
                    <div class="wn-row">
                        <div class="wn-field">
                            <label class="wn-label">Area</label>
                            <select class="wn-input wn-select" id="wpfArea">
                                <option value="SISTEMAS">Sistemas</option>
                                <option value="Recursos Humanos">Recursos Humanos</option>
                                <option value="Compras">Compras</option>
                                <option value="Seguridad">Seguridad</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                                <option value="Almacen">Almacen</option>
                            </select>
                        </div>
                        <div class="wn-field">
                            <label class="wn-label">Producto</label>
                            <select class="wn-input wn-select" id="wpfProducto">
                                <option value="ZEBRA">Zebra</option>
                                <option value="PANDUIT">Panduit</option>
                                <option value="APC">APC</option>
                                <option value="AVIGILION">Avigilon</option>
                                <option value="GENETEC">Genetec</option>
                                <option value="AXIS">Axis</option>
                                <option value="SOFTWARE" selected>Software</option>
                                <option value="RUNRATE">Runrate</option>
                                <option value="POLIZA">Poliza</option>
                                <option value="CISCO">Cisco</option>
                                <option value="SERVICIO">Servicio</option>
                            </select>
                        </div>
                    </div>

                    <!-- Tipo Pipeline -->
                    <div class="wn-field">
                        <label class="wn-label">Tipo de Pipeline</label>
                        <select class="wn-input wn-select" id="wpfTipoPipeline">
                            <option value="runrate">Runrate</option>
                            <option value="proyecto">Proyecto</option>
                        </select>
                    </div>

                    <!-- Comentarios -->
                    <div class="wn-field">
                        <label class="wn-label">Comentarios <span class="wn-optional">opcional</span></label>
                        <textarea class="wn-input wn-textarea" id="wpfComentarios"
                            placeholder="Contexto adicional, notas, proximos pasos..." rows="2"></textarea>
                    </div>

                    <!-- Actions -->
                    <div class="wn-actions">
                        <button type="button" class="wn-btn wn-btn--cancel" id="wpfCancel"
                            onclick="var w=document.getElementById('widgetNuevoProspecto');w.classList.add('closing');setTimeout(function(){w.classList.remove('active','closing');},220);">Cancelar</button>
                        <button type="submit" class="wn-btn wn-btn--submit" id="wpfSubmit">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><path d="M12 5v14M5 12h14"/></svg>
                            Crear prospecto
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var csrf = function() { return document.querySelector('[name=csrfmiddlewaretoken]').value; };
        var _wpSelectedClienteId = null;

        // ── Autocomplete Cliente ──
        var clienteInput = document.getElementById('wpfCliente');
        var clienteAC = document.getElementById('wpfClienteAC');
        var clienteIdField = document.getElementById('wpfClienteId');
        var _wpClienteTimer = null;

        if (clienteInput) {
            clienteInput.addEventListener('input', function() {
                clearTimeout(_wpClienteTimer);
                var q = this.value.trim();
                if (q.length < 2) { clienteAC.innerHTML = ''; clienteAC.style.display = 'none'; return; }
                _wpClienteTimer = setTimeout(function() {
                    fetch('/app/api/buscar-clientes/?q=' + encodeURIComponent(q))
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            var items = data.clientes || data.results || [];
                            if (!items.length) { clienteAC.innerHTML = ''; clienteAC.style.display = 'none'; return; }
                            clienteAC.innerHTML = '';
                            items.forEach(function(c) {
                                var div = document.createElement('div');
                                div.className = 'wf-ac-item';
                                div.textContent = c.nombre_empresa || c.nombre || c.text;
                                div.addEventListener('click', function() {
                                    clienteInput.value = c.nombre_empresa || c.nombre || c.text;
                                    clienteIdField.value = c.id;
                                    _wpSelectedClienteId = c.id;
                                    clienteAC.innerHTML = '';
                                    clienteAC.style.display = 'none';
                                });
                                clienteAC.appendChild(div);
                            });
                            clienteAC.style.display = 'block';
                        });
                }, 300);
            });
        }

        // ── Autocomplete Contacto ──
        var contactoInput = document.getElementById('wpfContacto');
        var contactoAC = document.getElementById('wpfContactoAC');
        var contactoIdField = document.getElementById('wpfContactoId');
        var _wpContactoTimer = null;

        if (contactoInput) {
            contactoInput.addEventListener('input', function() {
                clearTimeout(_wpContactoTimer);
                var q = this.value.trim();
                if (q.length < 2) { contactoAC.innerHTML = ''; contactoAC.style.display = 'none'; return; }
                _wpContactoTimer = setTimeout(function() {
                    var url = '/app/api/buscar-contactos/?q=' + encodeURIComponent(q);
                    if (_wpSelectedClienteId) url += '&cliente_id=' + _wpSelectedClienteId;
                    fetch(url)
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            var items = data.contactos || data.results || [];
                            if (!items.length) { contactoAC.innerHTML = ''; contactoAC.style.display = 'none'; return; }
                            contactoAC.innerHTML = '';
                            items.forEach(function(c) {
                                var div = document.createElement('div');
                                div.className = 'wf-ac-item';
                                div.textContent = c.nombre || c.text;
                                div.addEventListener('click', function() {
                                    contactoInput.value = c.nombre || c.text;
                                    contactoIdField.value = c.id;
                                    contactoAC.innerHTML = '';
                                    contactoAC.style.display = 'none';
                                });
                                contactoAC.appendChild(div);
                            });
                            contactoAC.style.display = 'block';
                        });
                }, 300);
            });
        }

        // ── Boton + Cliente ──
        document.getElementById('wpnAddClienteBtn').addEventListener('click', function() {
            var mini = document.getElementById('wpnMiniCliente');
            mini.style.display = mini.style.display === 'none' ? 'block' : 'none';
            if (mini.style.display === 'block') document.getElementById('wpfNuevoClienteNombre').focus();
        });
        document.getElementById('wpfNuevoClienteCancel').addEventListener('click', function() {
            document.getElementById('wpnMiniCliente').style.display = 'none';
            document.getElementById('wpfNuevoClienteNombre').value = '';
        });
        document.getElementById('wpfNuevoClienteGuardar').addEventListener('click', function() {
            var nombre = document.getElementById('wpfNuevoClienteNombre').value.trim();
            if (!nombre) { document.getElementById('wpfNuevoClienteNombre').focus(); return; }
            var btn = this;
            btn.disabled = true; btn.textContent = 'Guardando...';
            fetch('/app/api/quick-crear-cliente/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
                body: JSON.stringify({ nombre_empresa: nombre })
            }).then(function(r) { return r.json(); }).then(function(res) {
                if (res.success) {
                    clienteInput.value = res.nombre;
                    clienteIdField.value = res.id;
                    _wpSelectedClienteId = res.id;
                    document.getElementById('wpnMiniCliente').style.display = 'none';
                    document.getElementById('wpfNuevoClienteNombre').value = '';
                } else {
                    alert(res.error || 'Error al crear cliente');
                }
                btn.disabled = false; btn.textContent = 'Guardar cliente';
            }).catch(function() { btn.disabled = false; btn.textContent = 'Guardar cliente'; });
        });

        // ── Boton + Contacto ──
        document.getElementById('wpnAddContactoBtn').addEventListener('click', function() {
            var mini = document.getElementById('wpnMiniContacto');
            mini.style.display = mini.style.display === 'none' ? 'block' : 'none';
            if (mini.style.display === 'block') document.getElementById('wpfNuevoContactoNombre').focus();
        });
        document.getElementById('wpfNuevoContactoCancel').addEventListener('click', function() {
            document.getElementById('wpnMiniContacto').style.display = 'none';
            document.getElementById('wpfNuevoContactoNombre').value = '';
            document.getElementById('wpfNuevoContactoApellido').value = '';
        });
        document.getElementById('wpfNuevoContactoGuardar').addEventListener('click', function() {
            var nombre = document.getElementById('wpfNuevoContactoNombre').value.trim();
            if (!nombre) { document.getElementById('wpfNuevoContactoNombre').focus(); return; }
            var btn = this;
            btn.disabled = true; btn.textContent = 'Guardando...';
            fetch('/app/api/quick-crear-contacto/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
                body: JSON.stringify({
                    nombre: nombre,
                    apellido: document.getElementById('wpfNuevoContactoApellido').value.trim(),
                    empresa_id: _wpSelectedClienteId
                })
            }).then(function(r) { return r.json(); }).then(function(res) {
                if (res.success) {
                    contactoInput.value = res.nombre_completo;
                    contactoIdField.value = res.id;
                    document.getElementById('wpnMiniContacto').style.display = 'none';
                    document.getElementById('wpfNuevoContactoNombre').value = '';
                    document.getElementById('wpfNuevoContactoApellido').value = '';
                } else {
                    alert(res.error || 'Error al crear contacto');
                }
                btn.disabled = false; btn.textContent = 'Guardar contacto';
            }).catch(function() { btn.disabled = false; btn.textContent = 'Guardar contacto'; });
        });

        // ── Submit form ──
        document.getElementById('formNuevoProspecto').addEventListener('submit', function(e) {
            e.preventDefault();
            var nombre = document.getElementById('wpfNombre').value.trim();
            var clienteId = document.getElementById('wpfClienteId').value;
            var contactoId = document.getElementById('wpfContactoId').value;

            if (!nombre) { document.getElementById('wpfNombre').focus(); return; }
            if (!clienteId) { alert('Selecciona un cliente'); document.getElementById('wpfCliente').focus(); return; }

            var submitBtn = document.getElementById('wpfSubmit');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creando...';

            fetch('/app/api/crear-prospecto/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
                body: JSON.stringify({
                    nombre: nombre,
                    cliente_id: parseInt(clienteId),
                    contacto_id: contactoId ? parseInt(contactoId) : null,
                    producto: document.getElementById('wpfProducto').value,
                    area: document.getElementById('wpfArea').value,
                    tipo_pipeline: document.getElementById('wpfTipoPipeline').value,
                    comentarios: document.getElementById('wpfComentarios').value.trim()
                })
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.success) {
                    // Cerrar widget
                    var w = document.getElementById('widgetNuevoProspecto');
                    w.classList.add('closing');
                    setTimeout(function() { w.classList.remove('active', 'closing'); }, 220);

                    // Reset form
                    document.getElementById('formNuevoProspecto').reset();
                    document.getElementById('wpfClienteId').value = '';
                    document.getElementById('wpfContactoId').value = '';
                    _wpSelectedClienteId = null;

                    // Recargar tabla de clientes si estamos en tab prospeccion
                    if (typeof window.cargarProspectos === 'function') {
                        window.cargarProspectos();
                    }
                    // Recargar prospectos del cliente en el widget si esta abierto
                    if (typeof window._recargarProspectosCliente === 'function') {
                        window._recargarProspectosCliente();
                    }

                    // Toast
                    var toast = document.getElementById('widgetToast');
                    if (toast) {
                        toast.textContent = 'Prospecto "' + data.nombre + '" creado exitosamente';
                        toast.classList.add('show');
                        setTimeout(function() { toast.classList.remove('show'); }, 3000);
                    }
                } else {
                    alert(data.error || 'Error al crear prospecto');
                }
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><path d="M12 5v14M5 12h14"/></svg> Crear prospecto';
            }).catch(function() {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><path d="M12 5v14M5 12h14"/></svg> Crear prospecto';
            });
        });
    })();
    </script>
