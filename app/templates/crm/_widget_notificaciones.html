<!-- ═══ WIDGET: NOTIFICACIONES v2 — Centro de Comando ═══ -->
<div class="widget-overlay" id="widgetNotificaciones" style="z-index:10300;"><!-- CAPA 3 -->
    <div class="notif-v2-shell">

        <!-- ── Body: Sidebar (filtros) + Main (lista) ── -->
        <div class="notif-v2-body">

            <!-- Sidebar Filtros (estilo Linear: slate-50, flat nav) -->
            <aside class="notif-v2-sidebar">
                <div class="notif-v2-sidebar-head">Notificaciones</div>
                <div class="notif-v2-sidebar-inner">
                    <div class="notif-v2-sidebar-label">Filtros</div>

                    <button class="notif-v2-filter active" data-filter="all" onclick="notifSetFiltro('all', this)">
                        <span>
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                            Todas
                        </span>
                        <span class="notif-v2-badge" id="nv2BadgeAll" style="display:none;">0</span>
                    </button>
                    <button class="notif-v2-filter" data-filter="unread" onclick="notifSetFiltro('unread', this)">
                        <span>
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                            No leídas
                        </span>
                        <span class="notif-v2-badge gray" id="nv2BadgeUnread" style="display:none;">0</span>
                    </button>

                    <div class="notif-v2-sidebar-label">Categorías</div>

                    <button class="notif-v2-filter danger" data-filter="criticas" onclick="notifSetFiltro('criticas', this)">
                        <span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            Críticas
                        </span>
                        <span class="notif-v2-badge notif-v2-badge-red" id="nv2BadgeCriticas" style="display:none;">0</span>
                    </button>
                    <button class="notif-v2-filter" data-filter="tareas" onclick="notifSetFiltro('tareas', this)">
                        <span>
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                            Tareas
                        </span>
                        <span class="notif-v2-badge" id="nv2BadgeTareas" style="display:none;">0</span>
                    </button>
                    <button class="notif-v2-filter" data-filter="oportunidades" onclick="notifSetFiltro('oportunidades', this)">
                        <span>
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
                            Oportunidades
                        </span>
                        <span class="notif-v2-badge" id="nv2BadgeOportunidades" style="display:none;">0</span>
                    </button>
                    <button class="notif-v2-filter" data-filter="equipo" onclick="notifSetFiltro('equipo', this)">
                        <span>
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                            Equipo & Muro
                        </span>
                        <span class="notif-v2-badge" id="nv2BadgeEquipo" style="display:none;">0</span>
                    </button>
                    {% if request.user.is_superuser %}
                    <button class="notif-v2-filter" data-filter="admin" onclick="notifSetFiltro('admin', this)">
                        <span>
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                            Admin & Permisos
                        </span>
                        <span class="notif-v2-badge notif-v2-badge-amber" id="nv2BadgeAdmin" style="display:none;">0</span>
                    </button>
                    {% endif %}
                </div>
            </aside>

            <!-- Main: Bandeja -->
            <main class="notif-v2-main">
                <header class="notif-v2-main-head">
                    <span class="notif-v2-main-title">
                        Bandeja de entrada
                        <span id="notifHeaderCount" style="color:#94A3B8;font-weight:500;margin-left:6px;"></span>
                    </span>
                    <div class="notif-v2-main-actions">
                        <button class="notif-v2-btn-ghost" onclick="notifMarcarTodoLeido()">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                            Marcar todo como leído
                        </button>
                        <button class="notif-v2-btn-close" title="Cerrar"
                            onclick="document.getElementById('widgetNotificaciones').classList.remove('active'); document.body.style.overflow='auto'; document.querySelectorAll('.z-elevated,.z-elevated-top').forEach(function(el){el.classList.remove('z-elevated','z-elevated-top');});">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </header>

                <div class="notif-v2-list" id="notifListContainer">
                    <div class="notif-v2-empty">Cargando notificaciones…</div>
                </div>
            </main>
        </div>
    </div>
</div>

<!-- macOS Style Toasts Container -->
<div id="macostToastContainer" style="position:fixed; top:20px; right:20px; z-index:10800; /* CAPA TOP */ display:flex; flex-direction:column; gap:10px; pointer-events:none;"></div>

<style>
/* ═══ macOS Toasts ═══ */
.macos-toast {
    width: 360px;
    background: rgba(248, 249, 252, 0.65);
    backdrop-filter: blur(50px) saturate(220%) contrast(105%);
    -webkit-backdrop-filter: blur(50px) saturate(220%) contrast(105%);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 28px;
    box-shadow: 0 10px 45px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.04), inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    padding: 12px 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    pointer-events: auto;
    cursor: pointer;
    transform: translateX(120%);
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.2), opacity 0.4s ease, box-shadow 0.2s ease;
}
.macos-toast.show {
    transform: translateX(0);
    opacity: 1;
}
.macos-toast:hover {
    box-shadow: 0 14px 44px rgba(0, 0, 0, 0.16), 0 2px 8px rgba(0, 0, 0, 0.06), inset 0 0 0 1px rgba(255, 255, 255, 0.4);
}
.macos-toast-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(255,255,255,1), rgba(255,255,255,0.6));
    box-shadow: 0 2px 6px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    margin-top: 2px;
}
.macos-toast-content { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.macos-toast-appname { font-size: 0.82rem; font-weight: 700; color: #1C1C1E; letter-spacing: 0.01em; margin-bottom: 2px; }
.macos-toast-title { font-size: 0.92rem; font-weight: 800; color: #1C1C1E; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
.macos-toast-desc { font-size: 0.9rem; color: #1C1C1E; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.35; font-weight: 500; }
.macos-toast-close { border: none; background: rgba(0,0,0,0.06); color: #86868B; border-radius: 14px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: all 0.2s cubic-bezier(0.2,0.9,0.3,1.2); padding: 0; font-size: 1.3rem; line-height: 1; margin-top: 8px; margin-right: -2px; transform: scale(0.9); }
.macos-toast:hover .macos-toast-close { opacity: 1; transform: scale(1); }
.macos-toast-close:hover { background: rgba(0,0,0,0.15); color: #1D1D1F; transform: scale(1.1); }

/* ═══ Notificaciones — Inbox estilo Linear (rediseño) ═══
   Tamaño mantenido igual al anterior: 94vw × 92vh
*/
.notif-v2-shell {
    width: 94vw; max-width: 94vw; height: 92vh; max-height: 92vh;
    display: flex; flex-direction: column;
    background: #fff; border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(226, 232, 240, 0.8);
    box-shadow: 0 30px 60px -15px rgba(15, 23, 42, 0.30), 0 0 0 1px rgba(15, 23, 42, 0.04);
}

/* ── Layout principal: ahora es sidebar + main (sin header global) ── */
.notif-v2-body {
    display: flex; flex: 1; overflow: hidden; background: #fff;
}

/* ── Sidebar (filtros a la izquierda) ── */
.notif-v2-sidebar {
    width: 240px; background: #fbfbfc;
    display: flex; flex-direction: column;
    border-right: 1px solid #E2E8F0;
    overflow: hidden;
    flex-shrink: 0;
}
.notif-v2-sidebar-head {
    height: 52px;
    display: flex; align-items: center;
    padding: 0 16px;
    font-size: 14px; font-weight: 600;
    color: #0F172A;
    flex-shrink: 0;
}
.notif-v2-sidebar-inner {
    padding: 12px 8px;
    display: flex; flex-direction: column; gap: 2px;
    overflow-y: auto;
    flex: 1;
}
.notif-v2-sidebar-label {
    font-size: 11px; font-weight: 600;
    color: #94A3B8;
    text-transform: uppercase; letter-spacing: 0.04em;
    margin: 16px 8px 6px;
    user-select: none;
}
.notif-v2-sidebar-label:first-child { margin-top: 0; }
.notif-v2-sidebar-sep { display: none; }

.notif-v2-filter {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px;
    background: none; border: none; border-radius: 6px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: #64748B;
    cursor: pointer; text-align: left; width: 100%;
    transition: all 0.18s;
}
.notif-v2-filter:hover { background: #F1F5F9; color: #0F172A; }
.notif-v2-filter.active {
    background: #fff;
    color: #0F172A;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 0 0 1px rgba(15, 23, 42, 0.02);
    font-weight: 600;
}
.notif-v2-filter > :first-child {
    display: inline-flex; align-items: center; gap: 8px;
    min-width: 0;
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.notif-v2-filter svg { flex-shrink: 0; color: #94A3B8; }
.notif-v2-filter.active svg { color: #3B82F6; }
.notif-v2-filter.danger svg { color: #EF4444; }

/* Badges en sidebar */
.notif-v2-badge {
    background: #3B82F6; color: #fff;
    font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 100px;
    min-width: 18px; text-align: center; line-height: 1.4;
    flex-shrink: 0;
}
.notif-v2-badge.gray,
.notif-v2-badge-gray { background: #E2E8F0; color: #64748B; }
.notif-v2-badge-red { background: #EF4444; }
.notif-v2-badge-amber { background: #F59E0B; }

/* ── Main area (lista) ── */
.notif-v2-main {
    flex: 1;
    display: flex; flex-direction: column;
    background: #fff;
    min-width: 0;
}
.notif-v2-main-head {
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid #E2E8F0;
    flex-shrink: 0;
    gap: 12px;
}
.notif-v2-main-title {
    font-size: 14px; font-weight: 600; color: #0F172A;
}
.notif-v2-main-actions { display: flex; align-items: center; gap: 8px; }
.notif-v2-btn-ghost {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none;
    padding: 5px 10px;
    border-radius: 6px;
    font-family: inherit; font-size: 12px; font-weight: 500;
    color: #64748B; cursor: pointer;
    transition: all 0.18s;
}
.notif-v2-btn-ghost:hover { background: #F1F5F9; color: #0F172A; }
.notif-v2-btn-close {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    background: none; border: none; border-radius: 6px;
    color: #94A3B8; cursor: pointer;
    transition: all 0.18s;
}
.notif-v2-btn-close:hover { background: #F1F5F9; color: #0F172A; }

.notif-v2-list {
    flex: 1; overflow-y: auto;
    padding: 0;
}
.notif-v2-empty {
    text-align: center; color: #94A3B8; padding: 60px 20px;
    font-size: 13px; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
}

/* Encabezados de grupo por fecha — sticky */
.notif-v2-date-group {
    padding: 16px 24px 8px;
    font-size: 12px; font-weight: 600;
    color: #0F172A;
    position: sticky; top: 0;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 10;
    user-select: none;
}
.notif-v2-date-group:first-child { padding-top: 12px; }

/* ── Fila (cada notificación) ── */
.notif-v2-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 24px;
    border: none; border-bottom: 1px solid #E2E8F0;
    border-radius: 0;
    background: #fff;
    cursor: pointer;
    text-decoration: none; color: inherit;
    position: relative;
    transition: background 0.15s;
    margin: 0;
}
.notif-v2-item:hover { background: #F8FAFC; }
.notif-v2-item:hover .notif-v2-time { opacity: 0; }
.notif-v2-item:hover .notif-v2-actions { opacity: 1; transform: translateX(0); pointer-events: auto; }

/* Estado unread */
.notif-v2-item.unread { background: #F8FAFC; }
.notif-v2-item.unread:hover { background: #F1F5F9; }
.notif-v2-item.unread .notif-v2-text { color: #0F172A; }

/* Unread indicator (punto azul absoluto a la izquierda) */
.notif-v2-item::before {
    content: '';
    position: absolute;
    left: 10px; top: 20px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3B82F6;
    opacity: 0;
    transition: opacity 0.15s;
}
.notif-v2-item.unread::before { opacity: 1; }
.notif-v2-item.priority-critical.unread::before { background: #EF4444; }
.notif-v2-item.priority-important.unread::before { background: #F59E0B; }

/* Avatar circular (sistema/usuario) */
.notif-v2-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 10px; font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
    overflow: hidden;
}
.notif-v2-avatar svg { color: #fff; }
.notif-v2-avatar.av-sys { background: #94A3B8; }
.notif-v2-avatar.av-critical { background: #EF4444; }
.notif-v2-avatar.av-important { background: #F59E0B; }
.notif-v2-avatar.av-info { background: #3B82F6; }
.notif-v2-avatar.av-user-a { background: #534AB7; }
.notif-v2-avatar.av-user-b { background: #1D9E75; }
.notif-v2-avatar.av-user-c { background: #DB2777; }
.notif-v2-avatar.av-user-d { background: #7C3AED; }
.notif-v2-avatar.av-user-e { background: #0EA5E9; }

/* Legacy: el viejo .notif-v2-icon lo mantenemos como alias del avatar */
.notif-v2-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
    color: #fff; overflow: hidden;
}
.notif-v2-icon svg { width: 14px; height: 14px; stroke: #fff; color: #fff; fill: none; }
.notif-v2-icon.ic-critical { background: #EF4444; }
.notif-v2-icon.ic-important { background: #F59E0B; }
.notif-v2-icon.ic-info { background: #3B82F6; }

/* Contenido central */
.notif-v2-content {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 4px;
}
.notif-v2-text {
    font-size: 13px; line-height: 1.5;
    color: #475569;
    overflow: hidden;
}
.notif-v2-text strong {
    font-weight: 600;
    color: #0F172A;
}
.notif-v2-title,
.notif-v2-desc {
    display: block;
}
.notif-v2-title {
    font-weight: 600; color: #0F172A;
    font-size: 13px; line-height: 1.5;
}
.notif-v2-item.unread .notif-v2-title { font-weight: 700; }
.notif-v2-desc {
    font-size: 13px; color: #64748B; font-weight: 400;
    line-height: 1.5;
    margin-top: 1px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    word-break: break-word;
}

/* Contexto (línea pequeña bajo el texto) */
.notif-v2-context {
    font-size: 11px; color: #94A3B8;
    display: inline-flex; align-items: center; gap: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 100%;
}
.notif-v2-context svg { flex-shrink: 0; color: #94A3B8; }
/* Meta viejo (usado por el JS legacy) queda como alias */
.notif-v2-meta {
    font-size: 11px; color: #94A3B8;
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 0; font-weight: 500;
}
.notif-v2-meta-sep { color: #CBD5E1; }
.notif-v2-tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.03em;
}
.notif-v2-tag-critical { background: #FEE2E2; color: #B91C1C; }
.notif-v2-tag-important { background: #FEF3C7; color: #B45309; }

/* Meta a la derecha (hora / acciones) */
.notif-v2-right {
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 8px;
    flex-shrink: 0; min-width: 60px;
    position: relative;
}
.notif-v2-time {
    font-size: 11px; color: #94A3B8;
    white-space: nowrap;
    transition: opacity 0.18s;
}

/* Hover Actions (aparecen sobre la hora) */
.notif-v2-actions {
    display: flex; align-items: center; gap: 4px;
    position: absolute;
    right: 0; top: 0;
    opacity: 0; transform: translateX(4px);
    pointer-events: none;
    transition: all 0.18s;
    background: inherit;
    padding-left: 8px;
}
.notif-v2-action-btn {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 26px; height: 26px; padding: 0 6px;
    border-radius: 5px;
    background: #fff;
    border: 1px solid #E2E8F0;
    color: #64748B;
    font-family: inherit; font-size: 11px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}
.notif-v2-action-btn:hover { background: #fff; color: #3B82F6; border-color: #CBD5E1; }
.notif-v2-action-btn.btn-primary { background: #2563EB; color: #fff; border-color: #2563EB; padding: 0 10px; }
.notif-v2-action-btn.btn-primary:hover { background: #1D4ED8; color: #fff; }
.notif-v2-action-btn.btn-success { background: #10B981; color: #fff; border-color: #10B981; padding: 0 10px; }
.notif-v2-action-btn.btn-success:hover { background: #059669; }
.notif-v2-action-btn.btn-danger { background: #EF4444; color: #fff; border-color: #EF4444; padding: 0 10px; }
.notif-v2-action-btn.btn-danger:hover { background: #DC2626; }

/* Expandable (solicitud perfil, rendimiento) */
.notif-v2-item.expanded .notif-v2-desc {
    -webkit-line-clamp: unset; display: block;
}

<script>

    /* ═══ Helpers ═══ */
    function _csrf() {
        return document.querySelector('[name=csrfmiddlewaretoken]')?.value
            || document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
    }

    function _getPriority(tipo) {
        if (PRIORITY_CRITICAL.includes(tipo)) return 'critical';
        if (PRIORITY_IMPORTANT.includes(tipo)) return 'important';
        return 'info';
    }

    function _getIconClass(tipo) {
        const p = _getPriority(tipo);
        return 'ic-' + p;
    }

    function _timeAgo(dateStr) {
        // dateStr format: "dd/mm/yyyy HH:MM"
        if (!dateStr) return '';
        const parts = dateStr.split(' ');
        if (parts.length < 2) return dateStr;
        const dParts = parts[0].split('/');
        const tParts = parts[1].split(':');
        if (dParts.length < 3 || tParts.length < 2) return dateStr;
        const d = new Date(dParts[2], dParts[1] - 1, dParts[0], tParts[0], tParts[1]);
        const now = new Date();
        const diff = Math.floor((now - d) / 1000);
        if (diff < 60) return 'ahora';
        if (diff < 3600) return Math.floor(diff / 60) + 'm';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h';
        if (diff < 172800) return 'ayer';
        if (diff < 604800) return Math.floor(diff / 86400) + 'd';
        return parts[0]; // fallback to date
    }

    function _dateGroup(dateStr) {
        if (!dateStr) return 'Otro';
        const parts = dateStr.split(' ');
        const dParts = parts[0].split('/');
        if (dParts.length < 3) return 'Otro';
        const d = new Date(dParts[2], dParts[1] - 1, dParts[0]);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
        const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 7);

        if (d >= today) return 'Hoy';
        if (d >= yesterday) return 'Ayer';
        if (d >= weekAgo) return 'Esta semana';
        return 'Anteriores';
    }

    function _matchFilter(n) {
        if (_nFiltro === 'all') return true;
        if (_nFiltro === 'unread') return !n.leida;
        if (_nFiltro === 'criticas') return PRIORITY_CRITICAL.includes(n.tipo);
        if (_nFiltro === 'tareas') return CAT_TAREAS.includes(n.tipo);
        if (_nFiltro === 'oportunidades') return CAT_OPPS.includes(n.tipo);
        if (_nFiltro === 'equipo') return CAT_EQUIPO.includes(n.tipo);
        if (_nFiltro === 'admin') return CAT_ADMIN.includes(n.tipo);
        return true;
    }

    function _sortNotifs(arr) {
        const prioOrder = { critical: 0, important: 1, info: 2 };
        return arr.sort((a, b) => {
            // Unread first
            if (a.leida !== b.leida) return a.leida ? 1 : -1;
            // Then by priority
            const pa = prioOrder[_getPriority(a.tipo)] || 2;
            const pb = prioOrder[_getPriority(b.tipo)] || 2;
            if (pa !== pb) return pa - pb;
            // Then by date (newest first)
            return b.id - a.id;
        });
    }

    /* ═══ Actions HTML per type ═══ */
    function _getActions(n) {
        const tipo = n.tipo;
        let html = '';

        // "Ver" button for almost all types
        if (n.tarea_id || n.oportunidad_id || n.tarea_opp_id) {
            html += `<button class="notif-v2-action-btn btn-primary" onclick="event.stopPropagation(); notifQuickAction('ver', ${n.id})">Ver</button>`;
        }

        // Completar for vencidas/por vencer
        if (['tarea_vencida', 'tarea_por_vencer'].includes(tipo) && n.tarea_id) {
            html += `<button class="notif-v2-action-btn btn-success" onclick="event.stopPropagation(); notifQuickAction('completar_tarea', ${n.id})">Completar</button>`;
        }

        // Solicitud perfil: Aprobar/Rechazar
        if (tipo === 'solicitud_cambio_perfil' && n.solicitud_perfil_data) {
            html += `<button class="notif-v2-action-btn btn-success" onclick="event.stopPropagation(); procesarSolicitudPerfil(${n.solicitud_perfil_data.id}, true, ${n.id})">Aprobar</button>`;

        }

        // Mark read for unread items
        if (!n.leida) {
            html += `<button class="notif-v2-action-btn" onclick="event.stopPropagation(); notifQuickAction('leer', ${n.id})" title="Marcar como leída">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
            </button>`;
        }

        return html;
    }

    /* ═══ Render ═══ */
    function _render() {
        const container = document.getElementById('notifListContainer');
        if (!container) return;

        let filtered = _nData.filter(_matchFilter);
        filtered = _sortNotifs(filtered);

        if (filtered.length === 0) {
            const msgs = {
                'all': 'No tienes notificaciones.',
                'unread': 'No tienes notificaciones sin leer.',
                'criticas': 'No hay alertas críticas. Todo en orden.',
                'tareas': 'No hay notificaciones de tareas.',
                'oportunidades': 'No hay notificaciones de oportunidades.',
                'equipo': 'No hay actividad del equipo.',
                'admin': 'No hay notificaciones de administración.'
            };
            container.innerHTML = `<div class="notif-v2-empty">
                <svg width="40" height="40" fill="none" stroke="#D1D5DB" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:12px;"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><br>
                ${msgs[_nFiltro] || 'No hay notificaciones.'}
            </div>`;
            return;
        }

        // Group by date
        let html = '';
        let lastGroup = '';

        // Check for groupable critical notifications (multiple vencidas)
        const vencidasHoy = filtered.filter(n =>
            ['tarea_vencida', 'actividad_vencida'].includes(n.tipo) && _dateGroup(n.fecha) === 'Hoy'
        );

        const showGrouped = vencidasHoy.length >= 3 && _nFiltro === 'all';

        if (showGrouped) {
            html += `<div class="notif-v2-date-group">Hoy</div>`;
            html += `<div class="notif-v2-grouped" onclick="this.classList.toggle('expanded')">
                <div class="notif-v2-grouped-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    ${vencidasHoy.length} tareas/actividades vencidas hoy
                    <span class="notif-v2-grouped-count">${vencidasHoy.length}</span>
                    <svg width="14" height="14" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24" style="margin-left:auto;"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                <div class="notif-v2-grouped-items">
                    ${vencidasHoy.map(n => `<div class="notif-v2-grouped-sub" onclick="event.stopPropagation(); notifHandleClick(${n.id}, ${n.tarea_id}, ${n.oportunidad_id}, ${n.tarea_opp_id}, '${n.tipo}')">

                    </div>`).join('')}

            </div>`;
            lastGroup = 'Hoy';

            const vencidasIds = new Set(vencidasHoy.map(n => n.id));
            filtered = filtered.filter(n => !vencidasIds.has(n.id));

        // ── Simplificador de texto (menos ruido, más velocidad de lectura) ──
        // Convierte "Sistema creó la tarea \"X\" en la oportunidad \"Y\" al pasar a etapa \"Z\""
        // en:
        //   main:   "Se creó: X"
        //   extras: "Oportunidad: Y" / "Etapa: Z"
        function _simplifyText(titulo, mensaje, n) {
            titulo = titulo || '';
            mensaje = mensaje || '';
            const info = { titulo: titulo, mensaje: mensaje, extras: [] };

            // Extraer "en la oportunidad \"Y\"" (y variantes con y sin comillas)
            var mOpp = mensaje.match(/ en la oportunidad ["“]([^"”]+)["”]/i);
            if (mOpp) {
                info.extras.push({ label: 'Oportunidad', value: mOpp[1] });
                mensaje = mensaje.replace(mOpp[0], '');
            }

            // Extraer "al pasar a etapa \"Z\"" / "al pasar la oportunidad a \"Z\""
            var mEtapa = mensaje.match(/ al pasar (?:la oportunidad )?a (?:etapa )?["“]([^"”]+)["”]\.?/i);
            if (mEtapa) {
                info.extras.push({ label: 'Etapa', value: mEtapa[1] });
                mensaje = mensaje.replace(mEtapa[0], '');
            }

            // Quitar prefijo "Sistema " cuando el avatar ya lo representa
            mensaje = mensaje.replace(/^sistema\s+/i, '');

            // Verbos comunes → formato compacto "Verbo: Objeto"
            var reCreo = /^se creó la tarea ["“]([^"”]+)["”]/i;
            var reAsign = /^te (asignó|asignaron) la tarea ["“]([^"”]+)["”]/i;
            var reReprog = /^(reprogramó|se reprogramó) la tarea ["“]([^"”]+)["”]/i;
            var reComent = /^(comentó|te mencionó) en ["“]?([^"”]+?)["”]?(?:\.|$)/i;
            var m;
            if ((m = mensaje.match(reCreo))) {
                mensaje = 'Se creó: ' + m[1];
            } else if ((m = mensaje.match(reAsign))) {
                mensaje = 'Asignada: ' + m[2];
            } else if ((m = mensaje.match(reReprog))) {
                mensaje = 'Reprogramada: ' + m[2];
            } else if ((m = mensaje.match(reComent))) {
                mensaje = (m[1].toLowerCase() === 'comentó' ? 'Comentó en: ' : 'Mencionó en: ') + m[2];
            }

            mensaje = mensaje.replace(/\s{2,}/g, ' ').replace(/\s+\./g, '.').trim();

            // Si el titulo se volvió redundante (termina igual que el mensaje compacto),
            // lo ocultamos — el mensaje ya lo cuenta todo.
            var tituloLow = titulo.toLowerCase();
            if (/^tarea asignada autom/i.test(tituloLow) || /^nueva tarea/i.test(tituloLow)) {
                info.titulo = '';
            } else {
                info.titulo = titulo;
            }
            info.mensaje = mensaje;
            return info;
        }

        // Avatar helpers: genera iniciales y color por nombre
        const _avColors = ['av-user-a','av-user-b','av-user-c','av-user-d','av-user-e'];
        function _avatarFor(n) {
            const priority = _getPriority(n.tipo);
            const rem = n.remitente || '';
            // Si no hay remitente o es "Sistema", icono en badge gris
            if (!rem || /sistema/i.test(rem)) {
                const color = priority === 'critical' ? 'av-critical' : (priority === 'important' ? 'av-important' : 'av-sys');
                return `<div class="notif-v2-avatar ${color}" title="Sistema">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                </div>`;
            }
            const parts = rem.trim().split(/\s+/);
            const initials = (parts.length >= 2 ? (parts[0][0] + parts[1][0]) : parts[0].slice(0, 2)).toUpperCase();
            // Color determinista por hash del nombre
            let hash = 0;
            for (let i = 0; i < rem.length; i++) hash = (hash * 31 + rem.charCodeAt(i)) >>> 0;
            const color = _avColors[hash % _avColors.length];
            return `<div class="notif-v2-avatar ${color}" title="${rem}">${initials}</div>`;
        }

        function _contextFor(n) {
            // Línea de contexto: Tipo + referencia (Oportunidad / Tarea / etc.)
            if (n.oportunidad_id) {
                return `<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/></svg>Oportunidad${n.remitente && !/sistema/i.test(n.remitente) ? ' · ' + n.remitente : ''}`;
            }
            if (n.tarea_id || n.tarea_opp_id) {
                return `<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/></svg>Tarea${n.remitente && !/sistema/i.test(n.remitente) ? ' · ' + n.remitente : ''}`;
            }
            return n.remitente ? `<span>${n.remitente}</span>` : '';
        }

        // ── Agrupación inteligente: runs de 3+ con mismo título + fecha + leída ──
        function _renderSingleRow(n) {
            const priority = _getPriority(n.tipo);
            const unreadClass = n.leida ? '' : ' unread';
            const actionsHtml = _getActions(n);
            const avatarHtml = _avatarFor(n);
            const ctxBase = _contextFor(n);
            const simp = _simplifyText(n.titulo, n.mensaje, n);

            // Construir línea de contexto: combina extras (Oportunidad, Etapa) + base
            var ctxParts = [];
            simp.extras.forEach(function (e) {
                ctxParts.push(`<span>${e.label}: <span style="color:#475569;font-weight:500;">${e.value}</span></span>`);
            });
            if (ctxBase) ctxParts.push(`<span>${ctxBase}</span>`);
            const contextHtml = ctxParts.length
                ? ctxParts.join('<span style="color:#CBD5E1;margin:0 4px;">·</span>')
                : '';

            const textInner = simp.titulo
                ? `<strong>${simp.titulo}</strong>${simp.mensaje ? '<div class="notif-v2-desc">' + simp.mensaje + '</div>' : ''}`
                : `<strong>${simp.mensaje || n.mensaje}</strong>`;

            return `<div class="notif-v2-item priority-${priority}${unreadClass}" id="notif-${n.id}"
                onclick="notifHandleClick(${n.id}, ${n.tarea_id}, ${n.oportunidad_id}, ${n.tarea_opp_id}, '${n.tipo}')">
                ${avatarHtml}
                <div class="notif-v2-content">
                    <div class="notif-v2-text">${textInner}</div>
                    ${contextHtml ? `<div class="notif-v2-context">${contextHtml}</div>` : ''}
                </div>
                <div class="notif-v2-right">
                    <span class="notif-v2-time">${_timeAgo(n.fecha)}</span>
                    <div class="notif-v2-actions">${actionsHtml}</div>
                </div>
            </div>`;
        }

        function _renderTitleCluster(items) {
            const first = items[0];
            const unreadCount = items.filter(x => !x.leida).length;
            const unreadClass = unreadCount > 0 ? ' unread' : '';
            const priority = _getPriority(first.tipo);
            const avatarHtml = _avatarFor(first);
            const cleanTitulo = first.titulo || 'Notificaciones';
            const clusterId = 'cluster-' + first.id;

            // Sub-items colapsados (se muestran al hacer clic)
            var subRows = items.map(function (n) {
                const simp = _simplifyText(n.titulo, n.mensaje, n);
                const line = simp.mensaje || simp.titulo || n.titulo;
                const ex = simp.extras.length ? ' · <span style="color:#94A3B8;">' + simp.extras.map(e => e.value).join(' · ') + '</span>' : '';
                return `<div class="notif-v2-cluster-sub" onclick="event.stopPropagation(); notifHandleClick(${n.id}, ${n.tarea_id}, ${n.oportunidad_id}, ${n.tarea_opp_id}, '${n.tipo}')">
                    <span class="notif-v2-cluster-bullet${n.leida ? '' : ' unread'}"></span>
                    <span class="notif-v2-cluster-sub-text">${line}${ex}</span>
                    <span class="notif-v2-cluster-sub-time">${_timeAgo(n.fecha)}</span>
                </div>`;
            }).join('');

            return `<div class="notif-v2-item notif-v2-cluster priority-${priority}${unreadClass}" id="${clusterId}"
                onclick="this.classList.toggle('expanded')">
                ${avatarHtml}
                <div class="notif-v2-content">
                    <div class="notif-v2-text">
                        <strong>${cleanTitulo}</strong>
                        <div class="notif-v2-desc">${items.length} notificaciones agrupadas${unreadCount ? ' · ' + unreadCount + ' sin leer' : ''}</div>
                    </div>
                </div>
                <div class="notif-v2-right">
                    <span class="notif-v2-cluster-badge">${items.length}</span>
                    <svg class="notif-v2-cluster-chev" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="notif-v2-cluster-items">${subRows}</div>
            </div>`;
        }

        // ── Clustering: solo cuando MÚLTIPLES notifs apuntan al MISMO objeto ──
        // Se cluster-iza SOLO si comparten entidad objetivo (misma tarea,
        // misma oportunidad, misma tarea_opp). Notifs del mismo título genérico
        // pero de objetos distintos (ej: 5 "Tarea asignada" para 5 tareas
        // diferentes) quedan como filas individuales.
        function _clusterKey(n) {
            // Prioridad: tarea > tarea_opp > oportunidad
            if (n.tarea_id) return 'T' + n.tarea_id;
            if (n.tarea_opp_id) return 'X' + n.tarea_opp_id;
            if (n.oportunidad_id) return 'O' + n.oportunidad_id;
            return null; // notifs globales / sin objeto no se cluster-izan
        }

        const CLUSTER_MIN = 3;
        let i = 0;
        while (i < filtered.length) {
            const cur = filtered[i];
            const curGroup = _dateGroup(cur.fecha);
            const curKey = _clusterKey(cur);
            const run = [cur];
            let j = i + 1;
            // Agrupar solo si hay clave de objeto y es la misma
            if (curKey) {
                while (j < filtered.length
                       && filtered[j].leida === cur.leida
                       && _dateGroup(filtered[j].fecha) === curGroup
                       && _clusterKey(filtered[j]) === curKey) {
                    run.push(filtered[j]);
                    j++;
                }
            }
            // Header de grupo si cambió la fecha
            if (curGroup !== lastGroup) {
                html += `<div class="notif-v2-date-group">${curGroup}</div>`;
                lastGroup = curGroup;
            }
            if (run.length >= CLUSTER_MIN) {
                html += _renderTitleCluster(run);
            } else {
                run.forEach(n => { html += _renderSingleRow(n); });
            }
            i = j;
        }

        container.innerHTML = html;
    }

    /* ═══ Update Counts ═══ */
    function _updateCounts() {
        let counts = { all: 0, unread: 0, criticas: 0, tareas: 0, oportunidades: 0, equipo: 0, admin: 0 };
        _nData.forEach(n => {
            if (!n.leida) {
                counts.all++;
                counts.unread++;
                if (PRIORITY_CRITICAL.includes(n.tipo)) counts.criticas++;
                if (CAT_TAREAS.includes(n.tipo)) counts.tareas++;
                if (CAT_OPPS.includes(n.tipo)) counts.oportunidades++;
                if (CAT_EQUIPO.includes(n.tipo)) counts.equipo++;
                if (CAT_ADMIN.includes(n.tipo)) counts.admin++;
            }
        });

        // Update sidebar badges
        ['All', 'Unread', 'Criticas', 'Tareas', 'Oportunidades', 'Equipo', 'Admin'].forEach(key => {
            const el = document.getElementById('nv2Badge' + key);
            const val = counts[key.toLowerCase()] || 0;
            if (el) {
                el.innerText = val;
                el.style.display = val > 0 ? '' : 'none';
            }
        });

        // Header count
        const hc = document.getElementById('notifHeaderCount');
        if (hc) {
            hc.textContent = counts.all > 0 ? `(${counts.all} sin leer)` : '';
        }

        // Nav button badge (topbar bell)
        const btnNav = document.getElementById('btnNotificaciones');
        if (btnNav) {
            let badge = btnNav.querySelector('.nav-red-badge');
            if (counts.all > 0) {
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'nav-red-badge';
                    badge.style.cssText = 'position:absolute;top:-4px;right:-8px;background:#EF4444;color:#fff;font-size:0.65rem;font-weight:700;padding:2px 5px;border-radius:10px;line-height:1;pointer-events:none;z-index:10;border:2px solid #fff;';
                    btnNav.style.position = 'relative';
                    btnNav.appendChild(badge);
                }
                badge.innerText = counts.all > 99 ? '99+' : counts.all;
            } else if (badge) {
                badge.remove();
            }
        }

        if (typeof window.updateGlobalNavBadges === 'function') {
            window.updateGlobalNavBadges(counts);
        }
    }

    /* ═══ Load ═══ */
    function _load() {
        fetch('/app/api/obtener-notificaciones/')
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    _nData = data.notifications;
                    _updateCounts();
                    _render();

                    if (!_firstLoadDone) {
                        if (_nData.length > 0) {
                            _maxNotifIdSeen = Math.max(..._nData.map(n => n.id));
                        }
                        _firstLoadDone = true;
                    } else {
                        // Check for new notifications
                        const news = _nData.filter(n => n.id > _maxNotifIdSeen && !n.leida);
                        if (news.length > 0) {
                            _maxNotifIdSeen = Math.max(..._nData.map(n => n.id));
                            // Show toast for up to 3 newest
                            news.slice(0, 3).forEach(n => _showMacOSToast(n));
                        }
                    }
                }
            })
            .catch(err => console.error('Notif load error:', err));
    }

    function _showMacOSToast(n) {
        const c = document.getElementById('macostToastContainer');
        if (!c) return;
        const div = document.createElement('div');
        div.className = 'macos-toast';
        const iconHtml = ICONS[n.tipo] || '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';
        const iconClass = _getIconClass(n.tipo);
        let appName = 'CRM Notificaciones';
        if (CAT_TAREAS.includes(n.tipo)) appName = 'Tareas & Actividades';
        else if (CAT_EQUIPO.includes(n.tipo)) appName = 'Muro del Equipo';
        else if (n.tipo === 'oportunidad_mensaje' || n.tipo === 'comentario_oportunidad') appName = 'Conversaciones';
        
        div.innerHTML = `
            <div class="macos-toast-icon ${iconClass}">${iconHtml}</div>
            <div class="macos-toast-content">
                <div class="macos-toast-appname">${appName}</div>
                <div class="macos-toast-title">${n.titulo}</div>
                <div class="macos-toast-desc">${n.mensaje}</div>
            </div>
            <button class="macos-toast-close" title="Cerrar">&times;</button>
        `;
        
        div.addEventListener('click', (e) => {
            if(e.target.closest('.macos-toast-close')) return;
            _dismissToast(div);
            notifHandleClick(n.id, n.tarea_id, n.oportunidad_id, n.tarea_opp_id, n.tipo);
        });

        div.querySelector('.macos-toast-close').addEventListener('click', (e) => {
            e.stopPropagation();
            _dismissToast(div);
        });
        
        c.appendChild(div);
        setTimeout(() => div.classList.add('show'), 50);
        // Durar 12 segundos para que el usuario pueda verla sin prisas
        setTimeout(() => { if (div.parentNode) _dismissToast(div); }, 12000);
    }
    
    function _dismissToast(div) {
        div.classList.remove('show');
        setTimeout(() => { if(div.parentNode) div.parentNode.removeChild(div); }, 500);
    }

    /* ═══ Filter ═══ */
    window.notifSetFiltro = function(cat, btn) {
        document.querySelectorAll('.notif-v2-filter').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        _nFiltro = cat;
        _render();
    };

    /* ═══ Click Handler ═══ */
    window.notifHandleClick = async function(id, tareaId, oppId, actId, tipo) {
        const nRel = _nData.find(x => x.id === id);

        // Expandable types: rendimiento_bajo, solicitud_cambio_perfil
        if (tipo === 'rendimiento_bajo' || tipo === 'solicitud_cambio_perfil') {
            const row = document.getElementById('notif-' + id);
            if (row) {
                const wasExpanded = row.classList.contains('expanded');
                document.querySelectorAll('.notif-v2-item.expanded').forEach(r => r.classList.remove('expanded'));

                if (!wasExpanded) {
                    row.classList.add('expanded');

                    // Render solicitud perfil details
                    if (tipo === 'solicitud_cambio_perfil' && !row.querySelector('.notif-v2-expand-panel') && nRel?.solicitud_perfil_data) {
                        const sData = nRel.solicitud_perfil_data;
                        const panel = document.createElement('div');
                        panel.className = 'notif-v2-expand-panel';

                        let phtml = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">`;
                        phtml += `<div style="font-weight:700;color:#9CA3AF;font-size:0.68rem;text-transform:uppercase;">Campo</div>`;
                        phtml += `<div style="font-weight:700;color:#9CA3AF;font-size:0.68rem;text-transform:uppercase;">Cambio solicitado</div>`;
                        if (sData.first_name !== sData.old_first_name) phtml += `<div style="color:#6B7280;">Nombre</div><div style="color:#2563EB;font-weight:600;">${sData.old_first_name} → ${sData.first_name}</div>`;
                        if (sData.last_name !== sData.old_last_name) phtml += `<div style="color:#6B7280;">Apellido</div><div style="color:#2563EB;font-weight:600;">${sData.old_last_name} → ${sData.last_name}</div>`;
                        if (sData.email !== sData.old_email) phtml += `<div style="color:#6B7280;">Email</div><div style="color:#2563EB;font-weight:600;">${sData.old_email} → ${sData.email}</div>`;
                        if (sData.language !== sData.old_language) phtml += `<div style="color:#6B7280;">Idioma</div><div style="color:#2563EB;font-weight:600;">${sData.old_language} → ${sData.language}</div>`;
                        phtml += `</div>`;

                        if (sData.avatar_url) {
                            phtml += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
                                <span style="color:#6B7280;font-size:0.82rem;">Nuevo avatar:</span>
                                <img src="${sData.avatar_url}" style="width:40px;height:40px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                            </div>`;
                        }

                        phtml += `<div style="display:flex;gap:8px;">
                            <button class="notif-v2-action-btn btn-success" style="flex:1;padding:8px;" onclick="event.stopPropagation(); procesarSolicitudPerfil(${sData.id}, true, ${id})">Aprobar</button>
                            <button class="notif-v2-action-btn btn-danger" style="flex:1;padding:8px;" onclick="event.stopPropagation(); procesarSolicitudPerfil(${sData.id}, false, ${id})">Rechazar</button>
                        </div>`;

                        panel.innerHTML = phtml;
                        row.querySelector('.notif-v2-content').appendChild(panel);
                    }

                    // Mark as read
                    try {
                        fetch('/app/api/marcar-notificacion-leida/' + id + '/', { method: 'POST', headers: { 'X-CSRFToken': _csrf() } });
                        if (nRel) { nRel.leida = true; _updateCounts(); }
                    } catch(e) {}
                }
                return;
            }
        }

        // Mark as read (except chat messages)
        const esMensajeChat = tipo === 'oportunidad_mensaje' || tipo === 'comentario_oportunidad';
        if (!esMensajeChat) {
            try {
                fetch('/app/api/marcar-notificacion-leida/' + id + '/', { method: 'POST', headers: { 'X-CSRFToken': _csrf() } });
                if (nRel) { nRel.leida = true; _updateCounts(); }
            } catch(e) {}
        }

        // NO cerrar notificaciones — el widget que se abre se muestra ENCIMA
        // El usuario cierra notificaciones manualmente con la X

        // Navigate to the right place
        const tiposConv = ['mencion', 'comentario_oportunidad', 'oportunidad_mensaje', 'tarea_opp_asignada', 'tarea_opp_comentario'];
        const tiposActividad = ['actividad_por_vencer', 'actividad_vencida'];
        const tiposTareaOpp = ['tarea_opp_asignada', 'tarea_opp_comentario'];

        // Elevar widgets para que se abran ENCIMA de notificaciones (CAPA 3)
        function _elevarWidget(id) {
            var el = document.getElementById(id);
            if (el) el.classList.add('z-elevated');
        }

        if (tiposActividad.includes(tipo) && typeof window.calendarioAbrir === 'function') {
            _elevarWidget('widgetCalendarioMaster');
            window.calendarioAbrir();
        } else if (tiposTareaOpp.includes(tipo) && actId && typeof window.crmTaskVerDetalle === 'function') {
            window.crmTaskVerDetalle(actId);
        } else if (esMensajeChat && oppId && typeof window.openDetalle === 'function') {
            _elevarWidget('widgetDetalle');
            _elevarWidget('widgetOppConversacion');
            window.openDetalle(oppId);
            setTimeout(() => { if (typeof window.woAbrirGestorConversacion === 'function') window.woAbrirGestorConversacion(); }, 600);
        } else if (tiposConv.includes(tipo) && oppId && typeof window.openDetalle === 'function') {
            _elevarWidget('widgetDetalle');
            window.openDetalle(oppId);
        } else if (tipo === 'tarea_reprogramada' && tareaId && typeof window.crmTaskVerDetalle === 'function') {
            window.crmTaskVerDetalle(tareaId);
        } else if (CAT_TAREAS.includes(tipo) && tareaId && typeof window.crmTaskVerDetalle === 'function') {
            window.crmTaskVerDetalle(tareaId);
        } else if (tipo === 'mensaje_grupo' && typeof window.grupoAbrir === 'function') {
            window.grupoAbrir();
        } else if (CAT_EQUIPO.includes(tipo) && typeof window.muroAbrir === 'function') {
            _elevarWidget('widgetMuro');
            window.muroAbrir();
        } else if (oppId && typeof window.openDetalle === 'function') {
            _elevarWidget('widgetDetalle');
            window.openDetalle(oppId);
        }
    };

    /* ═══ Quick Actions ═══ */
    window.notifQuickAction = async function(action, notifId) {
        const nRel = _nData.find(x => x.id === notifId);
        if (!nRel) return;

        if (action === 'leer') {
            try {
                await fetch('/app/api/marcar-notificacion-leida/' + notifId + '/', { method: 'POST', headers: { 'X-CSRFToken': _csrf() } });
                nRel.leida = true;
                _updateCounts();
                _render();
            } catch(e) {}
            return;
        }

        if (action === 'ver') {
            notifHandleClick(notifId, nRel.tarea_id, nRel.oportunidad_id, nRel.tarea_opp_id, nRel.tipo);
            return;
        }

        if (action === 'completar_tarea' && nRel.tarea_id) {
            try {
                const resp = await fetch('/app/api/tarea/' + nRel.tarea_id + '/completar/', {
                    method: 'POST',
                    headers: { 'X-CSRFToken': _csrf(), 'Content-Type': 'application/json' }
                });
                const data = await resp.json();
                if (data.success || data.status === 'ok') {
                    // Mark notification as read
                    await fetch('/app/api/marcar-notificacion-leida/' + notifId + '/', { method: 'POST', headers: { 'X-CSRFToken': _csrf() } });
                    nRel.leida = true;
                    _updateCounts();
                    _render();
                }
            } catch(e) {
                console.error('Error completing task:', e);
            }
            return;
        }
    };

    /* ═══ Solicitud Perfil ═══ */
    window.procesarSolicitudPerfil = async function(solicitudId, aprobado, notifId) {
        const comentario = aprobado ? '' : prompt('Motivo del rechazo:');
        if (!aprobado && comentario === null) return;

        try {
            const resp = await fetch('/app/api/perfil/procesar-solicitud/' + solicitudId + '/', {
                method: 'POST',
                headers: { 'X-CSRFToken': _csrf(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ aprobado, comentario })
            });
            const data = await resp.json();
            if (data.success) {
                _load(); // Reload all
            } else {
                alert('Error: ' + (data.message || 'Error desconocido'));
            }
        } catch(err) {
            console.error(err);
            alert('Error de conexión');
        }
    };

    /* ═══ Mark All Read ═══ */
    window.notifMarcarTodoLeido = async function() {
        try {
            await fetch('/app/api/marcar-todas-notificaciones-leidas/', {
                method: 'POST',
                headers: { 'X-CSRFToken': _csrf() }
            });
            _nData.forEach(n => n.leida = true);
            _updateCounts();
            _render();
        } catch(e) {}
    };

    /* ═══ Fast Toast Polling ═══ */
    function _pollForToasts() {
        if (!_firstLoadDone) return;
        fetch('/app/api/obtener-notificaciones/')
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const newMaxId = Math.max(0, ...data.notifications.map(n => n.id));
                    if (newMaxId > _maxNotifIdSeen) {
                        const news = data.notifications.filter(n => n.id > _maxNotifIdSeen && !n.leida);
                        if (news.length > 0) {
                            _nData = data.notifications;
                            _maxNotifIdSeen = newMaxId;
                            // Update counts and render before showing toast
                            _updateCounts();
                            _render();
                            // Show toast for up to 3 newest
                            news.slice(0, 3).forEach(n => _showMacOSToast(n));
                            // Auto-refresh tareas table if a task-related notification arrived
                            if (typeof window.recargarTareasCRM === 'function') {
                                var hasTareaNotif = news.some(n =>
                                    CAT_TAREAS.includes(n.tipo) ||
                                    n.tipo === 'mensaje_grupo'
                                );
                                if (hasTareaNotif) {
                                    window.recargarTareasCRM();
                                }
                            }
                        }
                    }
                }
            })
            .catch(e => {});
    }

    /* ═══ Expose for external use ═══ */
    window.notifLoad = _load;

    /* ═══ Init ═══ */
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(_load, 1800);
        setInterval(_load, 30000); // reduced from 15s since pollForToasts updates _nData anyway when seeing new things
        setInterval(_pollForToasts, 3000); // 3 seconds fast polling
    });

})();
</script>
