<!-- ═══ WIDGET: NOTIFICACIONES v2 — Centro de Comando ═══ -->
<div class="widget-overlay" id="widgetNotificaciones" style="z-index:10210;">
    <div class="notif-v2-shell">

        <!-- ── Header ── -->
        <div class="notif-v2-header">
            <div style="display:flex;align-items:center;gap:12px;">
                <div class="notif-v2-header-icon">
                    <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </div>
                <div>
                    <span class="notif-v2-header-title">Notificaciones</span>
                    <span class="notif-v2-header-count" id="notifHeaderCount"></span>
                </div>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="notif-v2-btn-ghost" onclick="notifMarcarTodoLeido()">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                    Marcar todo como leído
                </button>
                <button class="notif-v2-btn-close"
                    onclick="document.getElementById('widgetNotificaciones').classList.remove('active'); document.body.style.overflow='auto';">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
        </div>

        <!-- ── Body: Sidebar + Lista ── -->
        <div class="notif-v2-body">

            <!-- Sidebar Filtros -->
            <div class="notif-v2-sidebar">
                <div class="notif-v2-sidebar-label">Filtros</div>

                <button class="notif-v2-filter active" data-filter="all" onclick="notifSetFiltro('all', this)">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                    Todas
                    <span class="notif-v2-badge" id="nv2BadgeAll" style="display:none;">0</span>
                </button>
                <button class="notif-v2-filter" data-filter="unread" onclick="notifSetFiltro('unread', this)">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>
                    No leídas
                    <span class="notif-v2-badge" id="nv2BadgeUnread" style="display:none;">0</span>
                </button>

                <div class="notif-v2-sidebar-sep"></div>
                <div class="notif-v2-sidebar-label">Categorías</div>

                <button class="notif-v2-filter" data-filter="criticas" onclick="notifSetFiltro('criticas', this)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    Críticas
                    <span class="notif-v2-badge notif-v2-badge-red" id="nv2BadgeCriticas" style="display:none;">0</span>
                </button>
                <button class="notif-v2-filter" data-filter="tareas" onclick="notifSetFiltro('tareas', this)">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                    Tareas & Actividades
                    <span class="notif-v2-badge" id="nv2BadgeTareas" style="display:none;">0</span>
                </button>
                <button class="notif-v2-filter" data-filter="oportunidades" onclick="notifSetFiltro('oportunidades', this)">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    Oportunidades
                    <span class="notif-v2-badge" id="nv2BadgeOportunidades" style="display:none;">0</span>
                </button>
                <button class="notif-v2-filter" data-filter="equipo" onclick="notifSetFiltro('equipo', this)">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    Equipo & Muro
                    <span class="notif-v2-badge" id="nv2BadgeEquipo" style="display:none;">0</span>
                </button>
                {% if request.user.is_superuser %}
                <button class="notif-v2-filter" data-filter="admin" onclick="notifSetFiltro('admin', this)">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    Admin & Permisos
                    <span class="notif-v2-badge notif-v2-badge-amber" id="nv2BadgeAdmin" style="display:none;">0</span>
                </button>
                {% endif %}
            </div>

            <!-- Lista Principal -->
            <div class="notif-v2-main">
                <div class="notif-v2-list" id="notifListContainer">
                    <div class="notif-v2-empty">Cargando notificaciones...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- macOS Style Toasts Container -->
<div id="macostToastContainer" style="position:fixed; top:20px; right:20px; z-index:10600; display:flex; flex-direction:column; gap:10px; pointer-events:none;"></div>

<style>
/* ═══ macOS Toasts ═══ */
.macos-toast {
    width: 360px;
    background: rgba(248, 249, 252, 0.65);
    backdrop-filter: blur(50px) saturate(220%) contrast(105%);
    -webkit-backdrop-filter: blur(50px) saturate(220%) contrast(105%);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 28px;
    box-shadow: 0 10px 45px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.04), inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    padding: 12px 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    pointer-events: auto;
    cursor: pointer;
    transform: translateX(120%);
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.2), opacity 0.4s ease, box-shadow 0.2s ease;
}
.macos-toast.show {
    transform: translateX(0);
    opacity: 1;
}
.macos-toast:hover {
    box-shadow: 0 14px 44px rgba(0, 0, 0, 0.16), 0 2px 8px rgba(0, 0, 0, 0.06), inset 0 0 0 1px rgba(255, 255, 255, 0.4);
}
.macos-toast-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(255,255,255,1), rgba(255,255,255,0.6));
    box-shadow: 0 2px 6px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    margin-top: 2px;
}
.macos-toast-content { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.macos-toast-appname { font-size: 0.82rem; font-weight: 700; color: #1C1C1E; letter-spacing: 0.01em; margin-bottom: 2px; }
.macos-toast-title { font-size: 0.92rem; font-weight: 800; color: #1C1C1E; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
.macos-toast-desc { font-size: 0.9rem; color: #1C1C1E; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.35; font-weight: 500; }
.macos-toast-close { border: none; background: rgba(0,0,0,0.06); color: #86868B; border-radius: 14px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: all 0.2s cubic-bezier(0.2,0.9,0.3,1.2); padding: 0; font-size: 1.3rem; line-height: 1; margin-top: 8px; margin-right: -2px; transform: scale(0.9); }
.macos-toast:hover .macos-toast-close { opacity: 1; transform: scale(1); }
.macos-toast-close:hover { background: rgba(0,0,0,0.15); color: #1D1D1F; transform: scale(1.1); }

/* ═══ Notificaciones v2 — Shell ═══ */
.notif-v2-shell {
    width: 94vw; max-width: 94vw; height: 92vh; max-height: 92vh;
    display: flex; flex-direction: column;
    background: #fff; border-radius: 20px; overflow: hidden;
    box-shadow: 0 25px 80px rgba(0,0,30,0.18);
}

/* ── Header ── */
.notif-v2-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid #F0F2F5; flex-shrink: 0;
    background: #fff;
}
.notif-v2-header-icon {
    width: 38px; height: 38px; border-radius: 12px;
    background: linear-gradient(135deg, #3B82F6, #1D4ED8);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.notif-v2-header-title {
    font-size: 1.15rem; font-weight: 700; color: #111827;
}
.notif-v2-header-count {
    font-size: 0.75rem; font-weight: 600; color: #6B7280;
    margin-left: 8px;
}
.notif-v2-btn-ghost {
    display: flex; align-items: center; gap: 6px;
    background: #F3F4F6; color: #374151; border: none; border-radius: 10px;
    padding: 8px 14px; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
}
.notif-v2-btn-ghost:hover { background: #E5E7EB; color: #111827; }
.notif-v2-btn-close {
    border: none; background: #F9FAFB; cursor: pointer;
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #6B7280; transition: all 0.15s;
}
.notif-v2-btn-close:hover { background: #F0F2F5; color: #374151; }

/* ── Body ── */
.notif-v2-body {
    display: flex; flex: 1; overflow: hidden; background: #F9FAFB;
}

/* ── Sidebar ── */
.notif-v2-sidebar {
    width: 220px; background: #fff; display: flex; flex-direction: column;
    padding: 16px 12px; gap: 4px; border-right: 1px solid #F0F2F5;
    overflow-y: auto; flex-shrink: 0;
}
.notif-v2-sidebar-label {
    font-size: 0.68rem; font-weight: 700; color: #9CA3AF;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 4px 12px 6px; margin-top: 4px;
}
.notif-v2-sidebar-sep {
    height: 1px; background: #F0F2F5; margin: 8px 8px;
}
.notif-v2-filter {
    display: flex; align-items: center; gap: 10px;
    background: none; border: none; border-radius: 10px;
    padding: 10px 12px; font-size: 0.85rem; font-weight: 500;
    color: #4B5563; cursor: pointer; text-align: left;
    transition: all 0.15s; position: relative; width: 100%;
}
.notif-v2-filter:hover { background: #F3F4F6; color: #1F2937; }
.notif-v2-filter.active { background: #EFF6FF; color: #2563EB; font-weight: 600; }
.notif-v2-filter svg { flex-shrink: 0; }

/* Badges */
.notif-v2-badge {
    position: absolute; right: 10px;
    background: #3B82F6; color: #fff; border-radius: 10px;
    font-size: 0.65rem; font-weight: 700; padding: 2px 7px;
    min-width: 20px; text-align: center; line-height: 1.3;
}
.notif-v2-badge-red { background: #EF4444; }
.notif-v2-badge-amber { background: #F59E0B; }

/* ── Main List ── */
.notif-v2-main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.notif-v2-list {
    flex: 1; overflow-y: auto; padding: 16px 20px;
}
.notif-v2-empty {
    text-align: center; color: #9CA3AF; padding: 60px 20px;
    font-size: 0.9rem; font-weight: 500;
}

/* ── Date Group Headers ── */
.notif-v2-date-group {
    font-size: 0.72rem; font-weight: 700; color: #9CA3AF;
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 12px 4px 8px; margin-top: 4px;
}
.notif-v2-date-group:first-child { margin-top: 0; padding-top: 0; }

/* ── Notification Item ── */
.notif-v2-item {
    background: #fff; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 8px;
    border: 1px solid #E5E7EB;
    cursor: pointer; transition: all 0.15s;
    display: flex; gap: 12px; align-items: flex-start;
    position: relative;
}
.notif-v2-item:hover {
    border-color: #D1D5DB;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.notif-v2-item:hover .notif-v2-actions { opacity: 1; pointer-events: auto; }

/* Priority Indicators */
.notif-v2-item.priority-critical {
    border-left: 3px solid #EF4444;
}
.notif-v2-item.priority-critical.unread {
    background: #FEF2F2;
    border-color: #FECACA;
    border-left: 3px solid #EF4444;
}
.notif-v2-item.priority-important {
    border-left: 3px solid #F59E0B;
}
.notif-v2-item.priority-important.unread {
    background: #FFFBEB;
    border-color: #FDE68A;
    border-left: 3px solid #F59E0B;
}
.notif-v2-item.priority-info {
    border-left: 3px solid #3B82F6;
}
.notif-v2-item.priority-info.unread {
    background: #EFF6FF;
    border-color: #BFDBFE;
    border-left: 3px solid #3B82F6;
}

/* Unread dot */
.notif-v2-item.unread::before {
    content: '';
    position: absolute; top: 18px; left: 6px;
    width: 6px; height: 6px; border-radius: 50%;
    background: #3B82F6;
}
.notif-v2-item.priority-critical.unread::before { background: #EF4444; }
.notif-v2-item.priority-important.unread::before { background: #F59E0B; }

/* Icon */
.notif-v2-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 1.1rem;
}
.notif-v2-icon.ic-critical { background: #FEE2E2; }
.notif-v2-icon.ic-important { background: #FEF3C7; }
.notif-v2-icon.ic-info { background: #DBEAFE; }

/* Content */
.notif-v2-content { flex: 1; min-width: 0; }
.notif-v2-title {
    font-size: 0.88rem; font-weight: 500; color: #374151;
    line-height: 1.35; margin-bottom: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.notif-v2-item.unread .notif-v2-title { font-weight: 700; color: #111827; }
.notif-v2-desc {
    font-size: 0.8rem; color: #6B7280; line-height: 1.45;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.notif-v2-meta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 6px; font-size: 0.72rem; color: #9CA3AF; font-weight: 500;
}
.notif-v2-meta-sep { color: #D1D5DB; }
.notif-v2-tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 1px 6px; border-radius: 4px; font-size: 0.65rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
}
.notif-v2-tag-critical { background: #FEE2E2; color: #DC2626; }
.notif-v2-tag-important { background: #FEF3C7; color: #D97706; }

/* Hover Actions */
.notif-v2-actions {
    position: absolute; top: 10px; right: 12px;
    display: flex; gap: 4px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
}
.notif-v2-action-btn {
    background: #F3F4F6; border: 1px solid #E5E7EB; border-radius: 8px;
    padding: 5px 10px; font-size: 0.72rem; font-weight: 600;
    color: #374151; cursor: pointer; transition: all 0.12s;
    white-space: nowrap;
}
.notif-v2-action-btn:hover { background: #E5E7EB; color: #111827; }
.notif-v2-action-btn.btn-primary {
    background: #3B82F6; color: #fff; border-color: #3B82F6;
}
.notif-v2-action-btn.btn-primary:hover { background: #2563EB; }
.notif-v2-action-btn.btn-success {
    background: #10B981; color: #fff; border-color: #10B981;
}
.notif-v2-action-btn.btn-success:hover { background: #059669; }
.notif-v2-action-btn.btn-danger {
    background: #EF4444; color: #fff; border-color: #EF4444;
}
.notif-v2-action-btn.btn-danger:hover { background: #DC2626; }

/* Expandable content (solicitud perfil, rendimiento) */
.notif-v2-item.expanded .notif-v2-desc {
    -webkit-line-clamp: unset; display: block;
}
.notif-v2-expand-panel {
    background: #F9FAFB; border-radius: 10px; padding: 14px;
    margin-top: 10px; border: 1px solid #F0F2F5;
    font-size: 0.82rem; animation: nv2FadeIn 0.2s ease;
}
@keyframes nv2FadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* Grouped notification */
.notif-v2-grouped {
    background: #fff; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 8px;
    border: 1px solid #E5E7EB; cursor: pointer;
    transition: all 0.15s;
}
.notif-v2-grouped:hover { border-color: #D1D5DB; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.notif-v2-grouped-header {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.88rem; font-weight: 600; color: #374151;
}
.notif-v2-grouped-count {
    background: #EF4444; color: #fff; border-radius: 8px;
    padding: 2px 8px; font-size: 0.7rem; font-weight: 700;
}
.notif-v2-grouped-items {
    display: none; margin-top: 10px; padding-top: 10px;
    border-top: 1px solid #F0F2F5;
}
.notif-v2-grouped.expanded .notif-v2-grouped-items { display: block; }
.notif-v2-grouped-sub {
    padding: 8px 0; border-bottom: 1px solid #F9FAFB;
    font-size: 0.82rem; color: #4B5563;
    display: flex; align-items: center; gap: 8px;
}
.notif-v2-grouped-sub:last-child { border-bottom: none; }

/* ── Responsive ── */
@media (max-width: 768px) {
    .notif-v2-shell { width: 100vw; height: 100vh; border-radius: 0; }
    .notif-v2-sidebar { display: none; }
}
</style>

<script>
(function() {
    'use strict';

    /* ═══ State ═══ */
    let _nData = [];
    let _nFiltro = 'all';
    let _maxNotifIdSeen = 0;
    let _firstLoadDone = false;

    /* ═══ Priority & Category Maps ═══ */
    const PRIORITY_CRITICAL = ['tarea_vencida', 'actividad_vencida', 'tarea_por_vencer', 'actividad_por_vencer', 'rendimiento_bajo'];
    const PRIORITY_IMPORTANT = ['tarea_reprogramada', 'tarea_asignada', 'tarea_opp_asignada', 'mencion', 'muro_mencion', 'tarea_mencion', 'solicitud_cambio_perfil'];
    const PRIORITY_INFO = ['tarea_participante', 'tarea_observador', 'comentario_oportunidad', 'tarea_comentario', 'tarea_opp_comentario', 'oportunidad_mensaje', 'muro_post', 'respuesta', 'sistema', 'proyecto_agregado', 'programacion_proyecto', 'mensaje_grupo'];

    const CAT_TAREAS = ['tarea_vencida', 'tarea_por_vencer', 'tarea_asignada', 'tarea_participante', 'tarea_observador', 'tarea_mencion', 'tarea_comentario', 'tarea_reprogramada', 'actividad_vencida', 'actividad_por_vencer', 'tarea_opp_asignada', 'tarea_opp_comentario', 'programacion_proyecto'];
    const CAT_OPPS = ['comentario_oportunidad', 'oportunidad_mensaje'];
    const CAT_EQUIPO = ['muro_post', 'muro_mencion', 'mencion', 'respuesta', 'proyecto_agregado', 'mensaje_grupo'];

    /* ═══ Helpers ═══ */
    function _csrf() {
        return document.querySelector('[name=csrfmiddlewaretoken]')?.value
            || document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
    }

    function _getPriority(tipo) {
        if (PRIORITY_CRITICAL.includes(tipo)) return 'critical';
        if (PRIORITY_IMPORTANT.includes(tipo)) return 'important';
        return 'info';
    }

    function _getIconClass(tipo) {
        const p = _getPriority(tipo);
        return 'ic-' + p;
    }

    function _timeAgo(dateStr) {
        // dateStr format: "dd/mm/yyyy HH:MM"
        if (!dateStr) return '';
        const parts = dateStr.split(' ');
        if (parts.length < 2) return dateStr;
        const dParts = parts[0].split('/');
        const tParts = parts[1].split(':');
        if (dParts.length < 3 || tParts.length < 2) return dateStr;
        const d = new Date(dParts[2], dParts[1] - 1, dParts[0], tParts[0], tParts[1]);
        const now = new Date();
        const diff = Math.floor((now - d) / 1000);
        if (diff < 60) return 'ahora';
        if (diff < 3600) return Math.floor(diff / 60) + 'm';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h';
        if (diff < 172800) return 'ayer';
        if (diff < 604800) return Math.floor(diff / 86400) + 'd';
        return parts[0]; // fallback to date
    }

    function _dateGroup(dateStr) {
        if (!dateStr) return 'Otro';
        const parts = dateStr.split(' ');
        const dParts = parts[0].split('/');
        if (dParts.length < 3) return 'Otro';
        const d = new Date(dParts[2], dParts[1] - 1, dParts[0]);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
        const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 7);

        if (d >= today) return 'Hoy';
        if (d >= yesterday) return 'Ayer';
        if (d >= weekAgo) return 'Esta semana';
        return 'Anteriores';
    }

    function _matchFilter(n) {
        if (_nFiltro === 'all') return true;
        if (_nFiltro === 'unread') return !n.leida;
        if (_nFiltro === 'criticas') return PRIORITY_CRITICAL.includes(n.tipo);
        if (_nFiltro === 'tareas') return CAT_TAREAS.includes(n.tipo);
        if (_nFiltro === 'oportunidades') return CAT_OPPS.includes(n.tipo);
        if (_nFiltro === 'equipo') return CAT_EQUIPO.includes(n.tipo);
        if (_nFiltro === 'admin') return CAT_ADMIN.includes(n.tipo);
        return true;
    }

    function _sortNotifs(arr) {
        const prioOrder = { critical: 0, important: 1, info: 2 };
        return arr.sort((a, b) => {
            // Unread first
            if (a.leida !== b.leida) return a.leida ? 1 : -1;
            // Then by priority
            const pa = prioOrder[_getPriority(a.tipo)] || 2;
            const pb = prioOrder[_getPriority(b.tipo)] || 2;
            if (pa !== pb) return pa - pb;
            // Then by date (newest first)
            return b.id - a.id;
        });
    }

    /* ═══ Actions HTML per type ═══ */
    function _getActions(n) {
        const tipo = n.tipo;
        let html = '';

        // "Ver" button for almost all types
        if (n.tarea_id || n.oportunidad_id || n.tarea_opp_id) {
            html += `<button class="notif-v2-action-btn btn-primary" onclick="event.stopPropagation(); notifQuickAction('ver', ${n.id})">Ver</button>`;
        }

        // Completar for vencidas/por vencer
        if (['tarea_vencida', 'tarea_por_vencer'].includes(tipo) && n.tarea_id) {
            html += `<button class="notif-v2-action-btn btn-success" onclick="event.stopPropagation(); notifQuickAction('completar_tarea', ${n.id})">Completar</button>`;
        }

        // Solicitud perfil: Aprobar/Rechazar
        if (tipo === 'solicitud_cambio_perfil' && n.solicitud_perfil_data) {
            html += `<button class="notif-v2-action-btn btn-success" onclick="event.stopPropagation(); procesarSolicitudPerfil(${n.solicitud_perfil_data.id}, true, ${n.id})">Aprobar</button>`;
            html += `<button class="notif-v2-action-btn btn-danger" onclick="event.stopPropagation(); procesarSolicitudPerfil(${n.solicitud_perfil_data.id}, false, ${n.id})">Rechazar</button>`;
        }

        // Mark read for unread items
        if (!n.leida) {
            html += `<button class="notif-v2-action-btn" onclick="event.stopPropagation(); notifQuickAction('leer', ${n.id})" title="Marcar como leída">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
            </button>`;
        }

        return html;
    }

    /* ═══ Render ═══ */
    function _render() {
        const container = document.getElementById('notifListContainer');
        if (!container) return;

        let filtered = _nData.filter(_matchFilter);
        filtered = _sortNotifs(filtered);

        if (filtered.length === 0) {
            const msgs = {
                'all': 'No tienes notificaciones.',
                'unread': 'No tienes notificaciones sin leer.',
                'criticas': 'No hay alertas críticas. Todo en orden.',
                'tareas': 'No hay notificaciones de tareas.',
                'oportunidades': 'No hay notificaciones de oportunidades.',
                'equipo': 'No hay actividad del equipo.',
                'admin': 'No hay notificaciones de administración.'
            };
            container.innerHTML = `<div class="notif-v2-empty">
                <svg width="40" height="40" fill="none" stroke="#D1D5DB" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:12px;"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><br>
                ${msgs[_nFiltro] || 'No hay notificaciones.'}
            </div>`;
            return;
        }

        // Group by date
        let html = '';
        let lastGroup = '';

        // Check for groupable critical notifications (multiple vencidas)
        const vencidasHoy = filtered.filter(n =>
            ['tarea_vencida', 'actividad_vencida'].includes(n.tipo) && _dateGroup(n.fecha) === 'Hoy'
        );

        const showGrouped = vencidasHoy.length >= 3 && _nFiltro === 'all';

        if (showGrouped) {
            html += `<div class="notif-v2-date-group">Hoy</div>`;
            html += `<div class="notif-v2-grouped" onclick="this.classList.toggle('expanded')">
                <div class="notif-v2-grouped-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    ${vencidasHoy.length} tareas/actividades vencidas hoy
                    <span class="notif-v2-grouped-count">${vencidasHoy.length}</span>
                    <svg width="14" height="14" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24" style="margin-left:auto;"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                <div class="notif-v2-grouped-items">
                    ${vencidasHoy.map(n => `<div class="notif-v2-grouped-sub" onclick="event.stopPropagation(); notifHandleClick(${n.id}, ${n.tarea_id}, ${n.oportunidad_id}, ${n.tarea_opp_id}, '${n.tipo}')">
                        ${ICONS[n.tipo] || ''} <span style="flex:1;">${n.titulo}</span> <span style="color:#9CA3AF;font-size:0.72rem;">${_timeAgo(n.fecha)}</span>
                    </div>`).join('')}
                </div>
            </div>`;
            lastGroup = 'Hoy';
            // Remove vencidas from filtered for individual rendering
            const vencidasIds = new Set(vencidasHoy.map(n => n.id));
            filtered = filtered.filter(n => !vencidasIds.has(n.id));
        }

        filtered.forEach(n => {
            const group = _dateGroup(n.fecha);
            if (group !== lastGroup) {
                html += `<div class="notif-v2-date-group">${group}</div>`;
                lastGroup = group;
            }

            const priority = _getPriority(n.tipo);
            const iconHtml = ICONS[n.tipo] || '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';
            const iconClass = _getIconClass(n.tipo);
            const unreadClass = n.leida ? '' : ' unread';
            const actionsHtml = _getActions(n);

            let tagHtml = '';
            if (priority === 'critical' && !n.leida) {
                tagHtml = '<span class="notif-v2-tag notif-v2-tag-critical">Urgente</span>';
            } else if (priority === 'important' && !n.leida) {
                tagHtml = '<span class="notif-v2-tag notif-v2-tag-important">Importante</span>';
            }

            html += `<div class="notif-v2-item priority-${priority}${unreadClass}" id="notif-${n.id}"
                onclick="notifHandleClick(${n.id}, ${n.tarea_id}, ${n.oportunidad_id}, ${n.tarea_opp_id}, '${n.tipo}')">
                <div class="notif-v2-icon ${iconClass}">${iconHtml}</div>
                <div class="notif-v2-content">
                    <div class="notif-v2-title">${n.titulo}</div>
                    <div class="notif-v2-desc">${n.mensaje}</div>
                    <div class="notif-v2-meta">
                        <span>${n.remitente || 'Sistema'}</span>
                        <span class="notif-v2-meta-sep">&middot;</span>
                        <span>${_timeAgo(n.fecha)}</span>
                        ${tagHtml ? '<span class="notif-v2-meta-sep">&middot;</span>' + tagHtml : ''}
                    </div>
                </div>
                <div class="notif-v2-actions">${actionsHtml}</div>
            </div>`;
        });

        container.innerHTML = html;
    }

    /* ═══ Update Counts ═══ */
    function _updateCounts() {
        let counts = { all: 0, unread: 0, criticas: 0, tareas: 0, oportunidades: 0, equipo: 0, admin: 0 };
        _nData.forEach(n => {
            if (!n.leida) {
                counts.all++;
                counts.unread++;
                if (PRIORITY_CRITICAL.includes(n.tipo)) counts.criticas++;
                if (CAT_TAREAS.includes(n.tipo)) counts.tareas++;
                if (CAT_OPPS.includes(n.tipo)) counts.oportunidades++;
                if (CAT_EQUIPO.includes(n.tipo)) counts.equipo++;
                if (CAT_ADMIN.includes(n.tipo)) counts.admin++;
            }
        });

        // Update sidebar badges
        ['All', 'Unread', 'Criticas', 'Tareas', 'Oportunidades', 'Equipo', 'Admin'].forEach(key => {
            const el = document.getElementById('nv2Badge' + key);
            const val = counts[key.toLowerCase()] || 0;
            if (el) {
                el.innerText = val;
                el.style.display = val > 0 ? '' : 'none';
            }
        });

        // Header count
        const hc = document.getElementById('notifHeaderCount');
        if (hc) {
            hc.textContent = counts.all > 0 ? `(${counts.all} sin leer)` : '';
        }

        // Nav button badge (topbar bell)
        const btnNav = document.getElementById('btnNotificaciones');
        if (btnNav) {
            let badge = btnNav.querySelector('.nav-red-badge');
            if (counts.all > 0) {
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'nav-red-badge';
                    badge.style.cssText = 'position:absolute;top:-4px;right:-8px;background:#EF4444;color:#fff;font-size:0.65rem;font-weight:700;padding:2px 5px;border-radius:10px;line-height:1;pointer-events:none;z-index:10;border:2px solid #fff;';
                    btnNav.style.position = 'relative';
                    btnNav.appendChild(badge);
                }
                badge.innerText = counts.all > 99 ? '99+' : counts.all;
            } else if (badge) {
                badge.remove();
            }
        }

        if (typeof window.updateGlobalNavBadges === 'function') {
            window.updateGlobalNavBadges(counts);
        }
    }

    /* ═══ Load ═══ */
    function _load() {
        fetch('/app/api/obtener-notificaciones/')
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    _nData = data.notifications;
                    _updateCounts();
                    _render();

                    if (!_firstLoadDone) {
                        if (_nData.length > 0) {
                            _maxNotifIdSeen = Math.max(..._nData.map(n => n.id));
                        }
                        _firstLoadDone = true;
                    } else {
                        // Check for new notifications
                        const news = _nData.filter(n => n.id > _maxNotifIdSeen && !n.leida);
                        if (news.length > 0) {
                            _maxNotifIdSeen = Math.max(..._nData.map(n => n.id));
                            // Show toast for up to 3 newest
                            news.slice(0, 3).forEach(n => _showMacOSToast(n));
                        }
                    }
                }
            })
            .catch(err => console.error('Notif load error:', err));
    }

    function _showMacOSToast(n) {
        const c = document.getElementById('macostToastContainer');
        if (!c) return;
        const div = document.createElement('div');
        div.className = 'macos-toast';
        const iconHtml = ICONS[n.tipo] || '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';
        const iconClass = _getIconClass(n.tipo);
        let appName = 'CRM Notificaciones';
        if (CAT_TAREAS.includes(n.tipo)) appName = 'Tareas & Actividades';
        else if (CAT_EQUIPO.includes(n.tipo)) appName = 'Muro del Equipo';
        else if (n.tipo === 'oportunidad_mensaje' || n.tipo === 'comentario_oportunidad') appName = 'Conversaciones';
        
        div.innerHTML = `
            <div class="macos-toast-icon ${iconClass}">${iconHtml}</div>
            <div class="macos-toast-content">
                <div class="macos-toast-appname">${appName}</div>
                <div class="macos-toast-title">${n.titulo}</div>
                <div class="macos-toast-desc">${n.mensaje}</div>
            </div>
            <button class="macos-toast-close" title="Cerrar">&times;</button>
        `;
        
        div.addEventListener('click', (e) => {
            if(e.target.closest('.macos-toast-close')) return;
            _dismissToast(div);
            notifHandleClick(n.id, n.tarea_id, n.oportunidad_id, n.tarea_opp_id, n.tipo);
        });

        div.querySelector('.macos-toast-close').addEventListener('click', (e) => {
            e.stopPropagation();
            _dismissToast(div);
        });
        
        c.appendChild(div);
        setTimeout(() => div.classList.add('show'), 50);
        // Durar 12 segundos para que el usuario pueda verla sin prisas
        setTimeout(() => { if (div.parentNode) _dismissToast(div); }, 12000);
    }
    
    function _dismissToast(div) {
        div.classList.remove('show');
        setTimeout(() => { if(div.parentNode) div.parentNode.removeChild(div); }, 500);
    }

    /* ═══ Filter ═══ */
    window.notifSetFiltro = function(cat, btn) {
        document.querySelectorAll('.notif-v2-filter').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        _nFiltro = cat;
        _render();
    };

    /* ═══ Click Handler ═══ */
    window.notifHandleClick = async function(id, tareaId, oppId, actId, tipo) {
        const nRel = _nData.find(x => x.id === id);

        // Expandable types: rendimiento_bajo, solicitud_cambio_perfil
        if (tipo === 'rendimiento_bajo' || tipo === 'solicitud_cambio_perfil') {
            const row = document.getElementById('notif-' + id);
            if (row) {
                const wasExpanded = row.classList.contains('expanded');
                document.querySelectorAll('.notif-v2-item.expanded').forEach(r => r.classList.remove('expanded'));

                if (!wasExpanded) {
                    row.classList.add('expanded');

                    // Render solicitud perfil details
                    if (tipo === 'solicitud_cambio_perfil' && !row.querySelector('.notif-v2-expand-panel') && nRel?.solicitud_perfil_data) {
                        const sData = nRel.solicitud_perfil_data;
                        const panel = document.createElement('div');
                        panel.className = 'notif-v2-expand-panel';

                        let phtml = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">`;
                        phtml += `<div style="font-weight:700;color:#9CA3AF;font-size:0.68rem;text-transform:uppercase;">Campo</div>`;
                        phtml += `<div style="font-weight:700;color:#9CA3AF;font-size:0.68rem;text-transform:uppercase;">Cambio solicitado</div>`;
                        if (sData.first_name !== sData.old_first_name) phtml += `<div style="color:#6B7280;">Nombre</div><div style="color:#2563EB;font-weight:600;">${sData.old_first_name} → ${sData.first_name}</div>`;
                        if (sData.last_name !== sData.old_last_name) phtml += `<div style="color:#6B7280;">Apellido</div><div style="color:#2563EB;font-weight:600;">${sData.old_last_name} → ${sData.last_name}</div>`;
                        if (sData.email !== sData.old_email) phtml += `<div style="color:#6B7280;">Email</div><div style="color:#2563EB;font-weight:600;">${sData.old_email} → ${sData.email}</div>`;
                        if (sData.language !== sData.old_language) phtml += `<div style="color:#6B7280;">Idioma</div><div style="color:#2563EB;font-weight:600;">${sData.old_language} → ${sData.language}</div>`;
                        phtml += `</div>`;

                        if (sData.avatar_url) {
                            phtml += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
                                <span style="color:#6B7280;font-size:0.82rem;">Nuevo avatar:</span>
                                <img src="${sData.avatar_url}" style="width:40px;height:40px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                            </div>`;
                        }

                        phtml += `<div style="display:flex;gap:8px;">
                            <button class="notif-v2-action-btn btn-success" style="flex:1;padding:8px;" onclick="event.stopPropagation(); procesarSolicitudPerfil(${sData.id}, true, ${id})">Aprobar</button>
                            <button class="notif-v2-action-btn btn-danger" style="flex:1;padding:8px;" onclick="event.stopPropagation(); procesarSolicitudPerfil(${sData.id}, false, ${id})">Rechazar</button>
                        </div>`;

                        panel.innerHTML = phtml;
                        row.querySelector('.notif-v2-content').appendChild(panel);
                    }

                    // Mark as read
                    try {
                        fetch('/app/api/marcar-notificacion-leida/' + id + '/', { method: 'POST', headers: { 'X-CSRFToken': _csrf() } });
                        if (nRel) { nRel.leida = true; _updateCounts(); }
                    } catch(e) {}
                }
                return;
            }
        }

        // Mark as read (except chat messages)
        const esMensajeChat = tipo === 'oportunidad_mensaje' || tipo === 'comentario_oportunidad';
        if (!esMensajeChat) {
            try {
                fetch('/app/api/marcar-notificacion-leida/' + id + '/', { method: 'POST', headers: { 'X-CSRFToken': _csrf() } });
                if (nRel) { nRel.leida = true; _updateCounts(); }
            } catch(e) {}
        }

        // Close widget
        document.getElementById('widgetNotificaciones').classList.remove('active');
        document.body.style.overflow = 'auto';

        // Navigate to the right place
        const tiposConv = ['mencion', 'comentario_oportunidad', 'oportunidad_mensaje', 'tarea_opp_asignada', 'tarea_opp_comentario'];
        const tiposActividad = ['actividad_por_vencer', 'actividad_vencida'];
        const tiposTareaOpp = ['tarea_opp_asignada', 'tarea_opp_comentario'];

        if (tiposActividad.includes(tipo) && typeof window.calendarioAbrir === 'function') {
            window.calendarioAbrir();
        } else if (tiposTareaOpp.includes(tipo) && actId && typeof window.crmTaskVerDetalle === 'function') {
            window.crmTaskVerDetalle(actId);
        } else if (esMensajeChat && oppId && typeof window.openDetalle === 'function') {
            window.openDetalle(oppId);
            setTimeout(() => { if (typeof window.woAbrirGestorConversacion === 'function') window.woAbrirGestorConversacion(); }, 600);
        } else if (tiposConv.includes(tipo) && oppId && typeof window.openDetalle === 'function') {
            window.openDetalle(oppId);
        } else if (tipo === 'tarea_reprogramada' && tareaId && typeof window.crmTaskVerDetalle === 'function') {
            window.crmTaskVerDetalle(tareaId);
        } else if (CAT_TAREAS.includes(tipo) && tareaId && typeof window.crmTaskVerDetalle === 'function') {
            window.crmTaskVerDetalle(tareaId);
        } else if (tipo === 'mensaje_grupo' && typeof window.grupoAbrir === 'function') {
            window.grupoAbrir();
        } else if (CAT_EQUIPO.includes(tipo) && typeof window.muroAbrir === 'function') {
            window.muroAbrir();
        } else if (oppId && typeof window.openDetalle === 'function') {
            window.openDetalle(oppId);
        }
    };

    /* ═══ Quick Actions ═══ */
    window.notifQuickAction = async function(action, notifId) {
        const nRel = _nData.find(x => x.id === notifId);
        if (!nRel) return;

        if (action === 'leer') {
            try {
                await fetch('/app/api/marcar-notificacion-leida/' + notifId + '/', { method: 'POST', headers: { 'X-CSRFToken': _csrf() } });
                nRel.leida = true;
                _updateCounts();
                _render();
            } catch(e) {}
            return;
        }

        if (action === 'ver') {
            notifHandleClick(notifId, nRel.tarea_id, nRel.oportunidad_id, nRel.tarea_opp_id, nRel.tipo);
            return;
        }

        if (action === 'completar_tarea' && nRel.tarea_id) {
            try {
                const resp = await fetch('/app/api/tarea/' + nRel.tarea_id + '/completar/', {
                    method: 'POST',
                    headers: { 'X-CSRFToken': _csrf(), 'Content-Type': 'application/json' }
                });
                const data = await resp.json();
                if (data.success || data.status === 'ok') {
                    // Mark notification as read
                    await fetch('/app/api/marcar-notificacion-leida/' + notifId + '/', { method: 'POST', headers: { 'X-CSRFToken': _csrf() } });
                    nRel.leida = true;
                    _updateCounts();
                    _render();
                }
            } catch(e) {
                console.error('Error completing task:', e);
            }
            return;
        }
    };

    /* ═══ Solicitud Perfil ═══ */
    window.procesarSolicitudPerfil = async function(solicitudId, aprobado, notifId) {
        const comentario = aprobado ? '' : prompt('Motivo del rechazo:');
        if (!aprobado && comentario === null) return;

        try {
            const resp = await fetch('/app/api/perfil/procesar-solicitud/' + solicitudId + '/', {
                method: 'POST',
                headers: { 'X-CSRFToken': _csrf(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ aprobado, comentario })
            });
            const data = await resp.json();
            if (data.success) {
                _load(); // Reload all
            } else {
                alert('Error: ' + (data.message || 'Error desconocido'));
            }
        } catch(err) {
            console.error(err);
            alert('Error de conexión');
        }
    };

    /* ═══ Mark All Read ═══ */
    window.notifMarcarTodoLeido = async function() {
        try {
            await fetch('/app/api/marcar-todas-notificaciones-leidas/', {
                method: 'POST',
                headers: { 'X-CSRFToken': _csrf() }
            });
            _nData.forEach(n => n.leida = true);
            _updateCounts();
            _render();
        } catch(e) {}
    };

    /* ═══ Fast Toast Polling ═══ */
    function _pollForToasts() {
        if (!_firstLoadDone) return;
        fetch('/app/api/obtener-notificaciones/')
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const newMaxId = Math.max(0, ...data.notifications.map(n => n.id));
                    if (newMaxId > _maxNotifIdSeen) {
                        const news = data.notifications.filter(n => n.id > _maxNotifIdSeen && !n.leida);
                        if (news.length > 0) {
                            _nData = data.notifications;
                            _maxNotifIdSeen = newMaxId;
                            // Update counts and render before showing toast
                            _updateCounts();
                            _render();
                            // Show toast for up to 3 newest
                            news.slice(0, 3).forEach(n => _showMacOSToast(n));
                            // Auto-refresh tareas table if a task-related notification arrived
                            if (window._crmTareasMode && typeof window.recargarTareasCRM === 'function') {
                                var hasTareaNotif = news.some(n =>
                                    CAT_TAREAS.includes(n.tipo) ||
                                    n.tipo === 'tarea_nueva' ||
                                    n.tipo === 'tarea_reabierta' ||
                                    n.tipo === 'mensaje_grupo'
                                );
                                if (hasTareaNotif) {
                                    window.recargarTareasCRM();
                                }
                            }
                        }
                    }
                }
            })
            .catch(e => {});
    }

    /* ═══ Expose for external use ═══ */
    window.notifLoad = _load;

    /* ═══ Init ═══ */
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(_load, 1800);
        setInterval(_load, 30000); // reduced from 15s since pollForToasts updates _nData anyway when seeing new things
        setInterval(_pollForToasts, 3000); // 3 seconds fast polling
    });

})();
</script>
