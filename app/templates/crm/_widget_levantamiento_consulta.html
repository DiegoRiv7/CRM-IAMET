<!--
  Widget de CONSULTA de levantamiento (modo solo-lectura, vendedor).
  Distinto del wizard del ingeniero: muestra las 5 fases como cards
  apilables con un resumen de qué se capturó y botones de descarga
  PDF. No carga los inputs del wizard ni dispara autosave (que
  fallaría con 403 para vendedores).
-->
<div class="lvc-overlay" id="widgetLevantamientoConsulta" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="lvcTitle">
  <div class="lvc-card">

    <!-- Header -->
    <div class="lvc-header">
      <button class="lvc-back" type="button" onclick="levantamientoConsultaCerrar()" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        <span>Volver</span>
      </button>
      <h2 class="lvc-title" id="lvcTitle">Levantamiento</h2>
      <span class="lvc-status" id="lvcStatus">—</span>
      <span class="lvc-readonly-chip" title="Vista de solo lectura">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        Solo lectura
      </span>
      <button class="lvc-close" type="button" onclick="levantamientoConsultaCerrar()" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Hint del proyecto / actualizado -->
    <div class="lvc-meta" id="lvcMeta"></div>

    <!-- Lista de fases (5 cards) — pintada por JS -->
    <div class="lvc-phases" id="lvcPhases">
      <!-- renderizado por levantamientoConsultaAbrir -->
    </div>

  </div>
</div>
