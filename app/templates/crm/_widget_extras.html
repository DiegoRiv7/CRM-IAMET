<!-- ═══ WIDGET: COTIZADOR (iframe) ═══ -->
<div class="widget-overlay" id="widgetCotizador" style="z-index:10100;"><!-- CAPA 1 -->
    <div class="widget-card widget-card-cotizador">
        <div class="wo-header"
            style="padding:1.25rem 2rem 0.75rem; border-bottom:1px solid #F2F2F7; display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; align-items:center; gap:10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0052D4" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                    <polyline points="10 9 9 9 8 9" />
                </svg>
                <h1 style="font-size:1.3rem; font-weight:700; color:#1D1D1F; margin:0; letter-spacing:-0.02em;">
                    Crear Cotización</h1>
            </div>
            <button type="button" class="widget-close" id="cotizadorClose">&times;</button>
        </div>
        <iframe id="cotizadorIframe" class="cotizador-iframe" src="about:blank"></iframe>
    </div>
</div>

<!-- ═══ WIDGET: OPORTUNIDADES POR CLIENTE ═══ -->
<div class="widget-overlay" id="widgetClienteOportunidades">
    <div class="widget-card widget-card-lg">
        <div class="wo-header"
            style="padding:1.25rem 2rem 0.75rem; border-bottom:1px solid #F2F2F7; display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; align-items:center; gap:10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0052D4" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <h1 style="font-size:1.3rem; font-weight:700; color:#1D1D1F; margin:0; letter-spacing:-0.02em;"
                    id="clienteOppTitle">
                    Oportunidades del Cliente</h1>
            </div>
            <button type="button" class="widget-close" id="clienteOppClose">&times;</button>
        </div>

        <!-- Search and Filters Bar -->
        <div style="padding:1rem 2rem; border-bottom:1px solid #F2F2F7; background:#FAFAFA;">
            <div style="display:flex; gap:1rem; align-items:center;">
                <div style="flex:1; position:relative;">
                    <input type="text" id="clienteOppSearch" placeholder="Buscar..."
                        style="width:100%; padding:0.75rem 1rem 0.75rem 2.5rem; border:1px solid #E5E5EA; border-radius:8px; font-size:0.875rem;">
                    <svg style="position:absolute; left:0.75rem; top:50%; transform:translateY(-50%); width:16px; height:16px;"
                        viewBox="0 0 24 24" fill="none" stroke="#86868B" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </div>
                <!-- Filtros solo visibles en modo oportunidades/cobrado -->
                <div id="clienteOppFiltersOpp" style="display:flex; gap:1rem; align-items:center;">
                    <select id="clienteOppFilterArea"
                        style="padding:0.75rem 1rem; border:1px solid #E5E5EA; border-radius:8px; font-size:0.875rem;">
                        <option value="">Todas las áreas</option>
                        <option value="SISTEMAS">Sistemas</option>
                        <option value="Recursos Humanos">Recursos Humanos</option>
                        <option value="Compras">Compras</option>
                        <option value="Seguridad">Seguridad</option>
                        <option value="Mantenimiento">Mantenimiento</option>
                        <option value="Almacén">Almacén</option>
                    </select>
                    <select id="clienteOppFilterProducto"
                        style="padding:0.75rem 1rem; border:1px solid #E5E5EA; border-radius:8px; font-size:0.875rem;">
                        <option value="">Todos los productos</option>
                        <option value="ZEBRA">Zebra</option>
                        <option value="PANDUIT">Panduit</option>
                        <option value="APC">APC</option>
                        <option value="AVIGILON">Avigilon</option>
                        <option value="GENETEC">Genetec</option>
                        <option value="AXIS">Axis</option>
                        <option value="SOFTWARE">Software</option>
                        <option value="RUNRATE">Runrate</option>
                        <option value="PÓLIZA">Póliza</option>
                    </select>
                </div>
                <button id="clienteOppClearFilters"
                    style="padding:0.75rem 1.5rem; background:#F5F5F7; border:1px solid #E5E5EA; border-radius:8px; font-size:0.875rem; font-weight:600; cursor:pointer;">
                    Limpiar
                </button>
            </div>
        </div>

        <!-- Table Container -->
        <div style="overflow-y:auto; max-height:500px; padding:1rem 2rem;">
            <table class="w-full" id="clienteOppTable">
                <thead class="bg-gray-50/80 sticky top-0 z-10">
                    <!-- Cabecera para modo oportunidades/cobrado -->
                    <tr id="clienteOppHeadOpp" class="text-[9px] text-gray-400 uppercase tracking-widest border-b border-gray-100">
                        <th class="px-2 py-3 text-left font-black">Oportunidad</th>
                        <th class="px-2 py-3 text-left font-black">Contacto</th>
                        <th class="px-2 py-3 text-left font-black">Área</th>
                        <th class="px-2 py-3 text-left font-black">Producto</th>
                        <th class="px-2 py-3 text-right font-black">Monto</th>
                        <th class="px-2 py-3 text-center font-black">Prob.</th>
                        <th class="px-2 py-3 text-center font-black">Acciones</th>
                    </tr>
                    <!-- Cabecera para modo cotizaciones -->
                    <tr id="clienteOppHeadCot" class="text-[9px] text-gray-400 uppercase tracking-widest border-b border-gray-100" style="display:none">
                        <th class="px-2 py-3 text-left font-black"># Cot.</th>
                        <th class="px-2 py-3 text-left font-black">Título</th>
                        <th class="px-2 py-3 text-left font-black">Oportunidad</th>
                        <th class="px-2 py-3 text-left font-black">Fecha</th>
                        <th class="px-2 py-3 text-left font-black">Creado por</th>
                        <th class="px-2 py-3 text-right font-black">Total</th>
                    </tr>
                </thead>
                <tbody id="clienteOppTbody" class="text-[11px] divide-y divide-gray-100">
                    <!-- Rows will be populated via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ═══ WIDGET: CONFIRMACIÓN CAMBIO TIPO ═══ -->
<div class="widget-overlay" id="widgetConfirmTipo" style="z-index:10500; align-items:center; justify-content:center;"><!-- CAPA 5 -->
    <div class="widget-card"
        style="width:400px; max-width:90vw; padding:1.5rem; text-align:center; border-radius:16px;">
        <div
            style="background:rgba(239,68,68,0.1); color:#EF4444; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                <line x1="12" y1="9" x2="12" y2="13" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
        </div>
        <h2 style="font-size:1.2rem; font-weight:700; color:#1D1D1F; margin-bottom:0.5rem;" id="confirmTipoTitle">
            Confirmar cambio</h2>
        <p style="font-size:0.9rem; color:#86868B; margin-bottom:1.5rem; line-height:1.4;" id="confirmTipoText">
            ¿Estás seguro que deseas cambiar esta oportunidad? Al confirmar, las etapas del pipeline se reiniciarán a su
            estado inicial.
        </p>
        <div style="display:flex; gap:0.75rem; justify-content:center;">
            <button id="confirmTipoCancel"
                style="flex:1; padding:0.75rem; background:#F5F5F7; border:none; border-radius:10px; font-weight:600; color:#1D1D1F; cursor:pointer; transition:background 0.2s;">
                Cancelar
            </button>
            <button id="confirmTipoAccept"
                style="flex:1; padding:0.75rem; background:#0052D4; border:none; border-radius:10px; font-weight:600; color:white; cursor:pointer; transition:background 0.2s;">
                Sí, cambiar
            </button>
        </div>
    </div>
</div>
