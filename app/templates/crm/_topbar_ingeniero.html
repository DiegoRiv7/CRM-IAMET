<!-- ═══ TOPBAR INGENIERO ═══ -->
<div class="crm-unified-header">
    <div class="crm-island" id="mainIsland">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;">

            <!-- Avatar + usuario + eficiencia -->
            <div style="display:flex;align-items:center;gap:8px;cursor:pointer;"
                onclick="var wp=document.getElementById('widgetPerfil'); if(wp) wp.classList.add('active');">
                <div class="crm-avatar crm-avatar-lg">
                    {{ request.user.first_name|slice:":1"|upper }}{{ request.user.last_name|slice:":1"|upper }}
                </div>
                <div style="font-size:0.70rem;color:#4A6FA5;font-weight:700;white-space:nowrap;line-height:1.4;">
                    {{ usuario.get_full_name|default:usuario.username }}&nbsp;<span id="islandEfectAyer" style="display:none;font-size:0.62rem;font-weight:700;"></span><br>
                    <span style="font-size:0.60rem;color:#5856D6;font-weight:700;">INGENIERO</span>
                </div>
            </div>

            <div class="island-sep"></div>

            <!-- Navegación ingeniero -->
            <nav class="island-nav">
                <button type="button" class="island-nav-btn active" id="btnTablero"
                    onclick="ingenieroMostrarActividades()">
                    TABLERO
                </button>
                <button type="button" class="island-nav-btn" id="btnTareas">TAREAS</button>
                <button type="button" class="island-nav-btn" id="btnMuro" onclick="muroAbrir()">MURO</button>
                <button type="button" class="island-nav-btn" id="btnCalendario" onclick="calendarioAbrir()">CALENDARIO</button>
                <button type="button" class="island-nav-btn" id="btnCorreo" onclick="mailAbrir()">
                    &#9993; CORREO
                </button>
                {% if mis_grupos %}
                <button type="button" class="island-nav-btn" id="btnGrupo"
                    onclick="grupoAbrir()"
                    style="position:relative;"
                    title="Mi grupo">
                    GRUPO
                    <span id="grupoBadge" style="display:none;position:absolute;top:2px;right:2px;width:7px;height:7px;background:#FF3B30;border-radius:50%;"></span>
                </button>
                {% endif %}
                <button type="button" class="island-nav-btn" id="btnNotificaciones"
                    onclick="document.getElementById('widgetNotificaciones').classList.add('active'); document.body.style.overflow='hidden';"
                    title="Notificaciones" style="padding:0 9px;font-size:1rem;position:relative;">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <span id="notifBadge" style="display:none;position:absolute;top:2px;right:2px;width:7px;height:7px;background:#FF3B30;border-radius:50%;"></span>
                </button>
                {% if es_supervisor %}
                <button type="button" class="island-nav-btn" id="btnAdminPanel" style="opacity:0.7;"
                    onclick="document.getElementById('widgetAdmin').classList.add('active');">
                    &#9881; CONFIG.
                </button>
                {% endif %}
            </nav>

        </div>
    </div>
</div>

<div id="islandExpandedContent" style="display:none;"></div>

<script>
(function () {
    fetch('/app/api/jornada/ayer/')
        .then(function (r) { return r.json(); })
        .then(function (d) {
            var el = document.getElementById('islandEfectAyer');
            if (!el) return;
            if (d.eficiencia !== null && d.eficiencia !== undefined) {
                var pct = Math.round(d.eficiencia);
                el.textContent = pct + '%';
                el.style.color = pct >= 80 ? '#34C759' : pct >= 50 ? '#FF9500' : '#FF3B30';
                el.style.display = 'inline';
            }
        })
        .catch(function () {});
})();
</script>
