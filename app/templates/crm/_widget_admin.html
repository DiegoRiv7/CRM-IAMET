    {% if es_supervisor %}
    <!-- ═══ ADMIN PANEL OVERLAY ═══ -->
    <div class="widget-overlay" id="adminOverlay"
        onclick="if(event.target===this){var ao=this;ao.classList.add('closing');setTimeout(function(){ao.classList.remove('active','closing');},250);}">
        <div class="admin-panel">
            <div class="admin-sidebar">
                <div class="admin-sidebar-header">Configuraci&oacute;n</div>
                <button class="admin-nav-item active" data-section="usuarios"
                    onclick="adminNavClick(this,'usuarios')"><span class="admin-nav-icon">&#128100;</span>
                    Usuarios</button>
                <button class="admin-nav-item" data-section="clientes" onclick="adminNavClick(this,'clientes')"><span
                        class="admin-nav-icon">&#127970;</span> Clientes</button>
                <button class="admin-nav-item" data-section="contactos" onclick="adminNavClick(this,'contactos')"><span
                        class="admin-nav-icon">&#128222;</span> Contactos</button>
                <button class="admin-nav-item" data-section="metas" onclick="adminNavClick(this,'metas')"><span

                <div style="color:#8E8E93;text-align:center;margin-top:40px;">Selecciona una secci&oacute;n</div>
            </div>

                onclick="var ao=document.getElementById('adminOverlay');ao.classList.add('closing');setTimeout(function(){ao.classList.remove('active','closing');},250);">&times;</button>
        </div>

    <script>
        var _adminCsrfToken = null;
        function getAdminCsrf() { if (!_adminCsrfToken) { var el = document.querySelector('[name=csrfmiddlewaretoken]'); _adminCsrfToken = el ? el.value : ''; } return _adminCsrfToken; }
        function getAC() { return document.getElementById('adminContent'); }

        function adminNavClick(btn, section) {
            document.querySelectorAll('.admin-nav-item').forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
            loadAdminSection(section);
        }
        function loadAdminSection(section) {
            var ac = getAC(); if (!ac) return;
            ac.innerHTML = '<div style="text-align:center;color:#8E8E93;margin-top:40px;">Cargando...</div>';
            if (section === 'usuarios') loadUsuarios();
            else if (section === 'clientes') loadClientes();
            else if (section === 'contactos') loadContactos();
            else if (section === 'metas') loadMetas();
            else if (section === 'permisos') loadPermisos();
        }
        function loadUsuarios() { var ac = getAC(), ct = getAdminCsrf(); fetch('/app/api/admin/usuarios/').then(function (r) { return r.json(); }).then(function (data) { window._admUsuarios = data.usuarios; var h = '<div class="adm-section-title">Usuarios del Sistema</div>'; h += '<div style="margin-bottom:16px;"><button class="adm-btn adm-btn-primary" id="admNewUser">+ Nuevo Usuario</button></div>'; h += '<div id="admNewUserForm" style="display:none;background:#F9F9FB;border-radius:12px;padding:16px;margin-bottom:16px;">'; h += '<div class="adm-form-row"><input class="adm-input" id="nuUsername" placeholder="Username"><input class="adm-input" id="nuPassword" placeholder="Password" type="password"></div>'; h += '<div class="adm-form-row"><input class="adm-input" id="nuFirstName" placeholder="Nombre"><input class="adm-input" id="nuLastName" placeholder="Apellido"></div>'; h += '<div class="adm-form-row"><input class="adm-input" id="nuEmail" placeholder="Email" type="email"></div>'; h += '<div class="adm-form-row"><select class="adm-input adm-select" id="nuRol"><option value="vendedor">Vendedor</option><option value="ingeniero">Ingeniero</option></select></div>'; h += '<div style="display:flex;gap:8px;margin-top:8px;"><button class="adm-btn adm-btn-primary" id="admSaveUser">Crear</button><button class="adm-btn adm-btn-secondary" id="admCancelUser">Cancelar</button></div></div>'; h += '<input class="adm-input" id="admUserSearch" placeholder="Buscar por nombre o usuario..." style="margin-bottom:12px;width:100%;max-width:320px;box-sizing:border-box;">';
h += '<table class="adm-table"><thead><tr><th>Usuario</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th></tr></thead><tbody>'; data.usuarios.forEach(function (u) { var rolLabel = u.is_supervisor ? 'admin' : (u.rol || 'vendedor'); var rolText = u.is_supervisor ? 'Admin' : (rolLabel === 'ingeniero' ? 'Ingeniero' : 'Vendedor'); var rolColor = u.is_supervisor ? 'adm-badge-blue' : (rolLabel === 'ingeniero' ? 'adm-badge-purple' : 'adm-badge-gray'); var badge = u.is_supervisor ? '<span class="adm-badge adm-badge-blue">Admin</span>' : '<span class="adm-badge ' + rolColor + '" style="cursor:pointer;" onclick="admCambiarRol(' + u.id + ',\'' + rolLabel + '\')" title="Clic para cambiar rol">' + rolText + ' &#9660;</span>'; var estado = u.is_active ? '<span class="adm-badge adm-badge-green">Activo</span>' : '<span class="adm-badge adm-badge-gray">Inactivo</span>'; h += '<tr><td><strong>' + u.username + '</strong></td><td><span style="cursor:pointer;color:#007AFF;text-decoration:underline;" onclick="admEditUser(' + u.id + ')" title="Editar usuario">' + (u.first_name + ' ' + u.last_name).trim() + '</span></td><td>' + u.email + '</td><td>' + badge + '</td><td>' + estado + '</td></tr>'; }); h += '</tbody></table>'; ac.innerHTML = h; document.getElementById('admNewUser').addEventListener('click', function () { document.getElementById('admNewUserForm').style.display = 'block'; }); document.getElementById('admCancelUser').addEventListener('click', function () { document.getElementById('admNewUserForm').style.display = 'none'; });
var admUserSearch = document.getElementById('admUserSearch'); if (admUserSearch) { admUserSearch.addEventListener('input', function () { var q = this.value.toLowerCase(); document.querySelectorAll('.adm-table tbody tr').forEach(function (row) { row.style.display = row.textContent.toLowerCase().indexOf(q) !== -1 ? '' : 'none'; }); }); } document.getElementById('admSaveUser').addEventListener('click', function () { var body = { username: document.getElementById('nuUsername').value, password: document.getElementById('nuPassword').value, first_name: document.getElementById('nuFirstName').value, last_name: document.getElementById('nuLastName').value, email: document.getElementById('nuEmail').value, rol: document.getElementById('nuRol').value }; fetch('/app/api/admin/usuarios/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': ct }, body: JSON.stringify(body) }).then(function (r) { return r.json(); }).then(function (res) { if (res.success) loadUsuarios(); else alert(res.error || 'Error'); }); }); }); } function loadClientes() { var ac = getAC(), ct = getAdminCsrf(); Promise.all([fetch('/app/api/admin/clientes/').then(function (r) { return r.json(); }), fetch('/app/api/admin/usuarios/').then(function (r) { return r.json(); })]).then(function (results) { var clientes = results[0].clientes, usuarios = results[1].usuarios; var h = '<div class="adm-section-title">Clientes (' + clientes.length + ')</div>'; h += '<p style="font-size:0.78rem;color:#8E8E93;margin-bottom:12px;">Metas mensuales por cliente y tipo de vista.</p>'; h += '<table class="adm-table"><thead><tr><th>Empresa</th><th>Asignado a</th><th>Meta Fact.</th><th>Meta Cobr.</th><th>Meta Oport.</th><th>Meta Cot.</th></tr></thead><tbody>'; clientes.forEach(function (c) { var opts = '<option value="">Sin asignar</option>'; usuarios.forEach(function (u) { var sel = u.id == c.asignado_a_id ? ' selected' : ''; opts += '<option value="' + u.id + '"' + sel + '>' + (u.first_name + ' ' + u.last_name).trim() + '</option>'; }); var inp = function(tipo, val) { return '<input type="number" class="adm-input adm-client-meta" data-cliente-id="' + c.id + '" data-meta-tipo="' + tipo + '" value="' + (val || 0) + '" style="width:90px;">'; }; h += '<tr data-cliente-id="' + c.id + '"><td><strong>' + c.nombre_empresa + '</strong></td><td><select class="adm-select adm-assign-user" data-cliente-id="' + c.id + '">' + opts + '</select></td><td>' + inp('meta_mensual', c.meta_mensual) + '</td><td>' + inp('meta_cobrado', c.meta_cobrado) + '</td><td>' + inp('meta_oportunidades', c.meta_oportunidades) + '</td><td>' + inp('meta_cotizado', c.meta_cotizado) + '</td></tr>'; }); h += '</tbody></table>'; h += '<div style="margin-top:16px;"><button class="adm-btn adm-btn-primary" id="admSaveClientMetas">Guardar Metas</button></div>'; ac.innerHTML = h; document.querySelectorAll('.adm-assign-user').forEach(function (sel) { sel.addEventListener('change', function () { var cid = this.getAttribute('data-cliente-id'); fetch('/app/api/admin/clientes/' + cid + '/', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': ct }, body: JSON.stringify({ asignado_a_id: this.value ? parseInt(this.value) : null }) }).then(function (r) { return r.json(); }).then(function (res) { if (!res.success) alert(res.error || 'Error'); }); }); }); document.getElementById('admSaveClientMetas').addEventListener('click', function () { var porCliente = {}; document.querySelectorAll('.adm-client-meta').forEach(function (inp) { var cid = inp.getAttribute('data-cliente-id'); var tipo = inp.getAttribute('data-meta-tipo'); if (!porCliente[cid]) porCliente[cid] = {}; porCliente[cid][tipo] = inp.value; }); var promises = Object.keys(porCliente).map(function (cid) { return fetch('/app/api/admin/clientes/' + cid + '/', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': ct }, body: JSON.stringify(porCliente[cid]) }).then(function (r) { return r.json(); }); }); Promise.all(promises).then(function () { alert('Metas guardadas'); }).catch(function () { alert('Error al guardar alguna meta'); }); }); }); } function loadContactos() { var ac = getAC(); fetch('/app/api/admin/clientes/').then(function (r) { return r.json(); }).then(function (data) { var h = '<div class="adm-section-title">Contactos</div><div style="margin-bottom:16px;"><select class="adm-select" id="admContactCliente" style="min-width:200px;"><option value="">Seleccionar cliente...</option>'; data.clientes.forEach(function (c) { h += '<option value="' + c.id + '">' + c.nombre_empresa + '</option>'; }); h += '</select></div><div id="admContactList"></div>'; ac.innerHTML = h; document.getElementById('admContactCliente').addEventListener('change', function () { var cid = this.value; if (!cid) { document.getElementById('admContactList').innerHTML = ''; return; } loadContactosForCliente(cid); }); }); } function loadContactosForCliente(clienteId) { var ct = getAdminCsrf(); fetch('/app/api/admin/contactos/?cliente_id=' + clienteId).then(function (r) { return r.json(); }).then(function (data) { var h = '<div style="margin-bottom:12px;"><button class="adm-btn adm-btn-primary" id="admNewContact">+ Nuevo Contacto</button></div><div id="admNewContactForm" style="display:none;background:#F9F9FB;border-radius:12px;padding:16px;margin-bottom:16px;"><div class="adm-form-row"><input class="adm-input" id="ncNombre" placeholder="Nombre"><input class="adm-input" id="ncApellido" placeholder="Apellido"></div><div class="adm-form-row"><input class="adm-input" id="ncEmail" placeholder="Email"><input class="adm-input" id="ncTelefono" placeholder="Telefono"></div><div style="display:flex;gap:8px;margin-top:8px;"><button class="adm-btn adm-btn-primary" id="admSaveContact">Crear</button><button class="adm-btn adm-btn-secondary" id="admCancelContact">Cancelar</button></div></div>'; if (data.contactos.length === 0) { h += '<div style="color:#8E8E93;text-align:center;padding:20px;">No hay contactos</div>'; } else { h += '<table class="adm-table"><thead><tr><th>Nombre</th><th>Email</th><th>Telefono</th></tr></thead><tbody>'; data.contactos.forEach(function (c) { h += '<tr><td><strong>' + c.nombre + ' ' + c.apellido + '</strong></td><td>' + c.email + '</td><td>' + c.telefono + '</td></tr>'; }); h += '</tbody></table>'; } document.getElementById('admContactList').innerHTML = h; document.getElementById('admNewContact').addEventListener('click', function () { document.getElementById('admNewContactForm').style.display = 'block'; }); document.getElementById('admCancelContact').addEventListener('click', function () { document.getElementById('admNewContactForm').style.display = 'none'; }); document.getElementById('admSaveContact').addEventListener('click', function () { var body = { nombre: document.getElementById('ncNombre').value, apellido: document.getElementById('ncApellido').value, email: document.getElementById('ncEmail').value, telefono: document.getElementById('ncTelefono').value, empresa_id: parseInt(clienteId) }; fetch('/app/api/admin/contactos/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': ct }, body: JSON.stringify(body) }).then(function (r) { return r.json(); }).then(function (res) { if (res.success) loadContactosForCliente(clienteId); else alert(res.error || 'Error'); }); }); }); } function loadMetas() { var ac = getAC(), ct = getAdminCsrf(); fetch('/app/api/admin/usuarios/').then(function (r) { return r.json(); }).then(function (data) { var h = '<div class="adm-section-title">Metas Mensuales por Vendedor</div><table class="adm-table"><thead><tr><th>Vendedor</th><th>Meta Mensual (USD)</th></tr></thead><tbody>'; data.usuarios.forEach(function (u) { if (u.is_supervisor) return; h += '<tr><td><strong>' + (u.first_name + ' ' + u.last_name).trim() + '</strong><br><span style="color:#8E8E93;font-size:0.72rem;">@' + u.username + '</span></td><td><input class="adm-input adm-meta-input" data-uid="' + u.id + '" value="' + parseFloat(u.meta_mensual).toLocaleString('en-US', { maximumFractionDigits: 0 }) + '" style="max-width:180px;text-align:right;font-weight:600;"></td></tr>'; }); h += '</tbody></table><div style="margin-top:16px;"><button class="adm-btn adm-btn-primary" id="admSaveMetas">Guardar Metas</button></div>'; ac.innerHTML = h; document.getElementById('admSaveMetas').addEventListener('click', function () { var metas = {}; document.querySelectorAll('.adm-meta-input').forEach(function (inp) { var uid = inp.getAttribute('data-uid'); var val = inp.value.replace(/,/g, '').trim(); if (val) metas[uid] = val; }); fetch('/app/api/admin/metas/', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': ct }, body: JSON.stringify({ metas: metas }) }).then(function (r) { return r.json(); }).then(function (res) { if (res.success) alert(res.updated + ' metas actualizadas'); else alert(res.error || 'Error'); }); }); }); } function loadPermisos() { var ac = getAC(), ct = getAdminCsrf(); fetch('/app/api/admin/usuarios/').then(function (r) { return r.json(); }).then(function (data) { var h = '<div class="adm-section-title">Permisos de Usuario</div><p style="color:#8E8E93;font-size:0.78rem;margin-bottom:16px;">Los administradores pueden ver datos de todos los vendedores y acceder a este panel.</p><table class="adm-table"><thead><tr><th>Usuario</th><th>Nombre</th><th>Administrador</th></tr></thead><tbody>'; data.usuarios.forEach(function (u) { var cls = u.is_supervisor ? 'adm-toggle on' : 'adm-toggle'; h += '<tr><td><strong>' + u.username + '</strong></td><td>' + (u.first_name + ' ' + u.last_name).trim() + '</td><td><button class="' + cls + ' adm-perm-toggle" data-uid="' + u.id + '"></button></td></tr>'; }); h += '</tbody></table>'; ac.innerHTML = h; document.querySelectorAll('.adm-perm-toggle').forEach(function (btn) { btn.addEventListener('click', function () { var uid = this.getAttribute('data-uid'); var isOn = this.classList.contains('on'); var el = this; fetch('/app/api/admin/permisos/' + uid + '/', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': ct }, body: JSON.stringify({ is_supervisor: !isOn }) }).then(function (r) { return r.json(); }).then(function (res) { if (res.success) { if (res.is_supervisor) el.classList.add('on'); else el.classList.remove('on'); } }); }); }); }); } function admCambiarRol(uid, currentRol) { var newRol = currentRol === 'ingeniero' ? 'vendedor' : 'ingeniero'; var ct = getAdminCsrf(); fetch('/app/api/admin/usuarios/' + uid + '/', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': ct }, body: JSON.stringify({ rol: newRol }) }).then(function (r) { return r.json(); }).then(function (res) { if (res.success) loadUsuarios(); else alert(res.error || 'Error al cambiar rol'); }); }
        function admEditUser(uid) {
            var u = (window._admUsuarios || []).find(function(x) { return x.id === uid; });
            if (!u) return;
            var ac = getAC();
            var h = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;"><button class="adm-btn adm-btn-secondary" onclick="loadUsuarios()">&#8592; Volver</button><div class="adm-section-title" style="margin:0;">Editar Usuario</div></div>';
            h += '<div style="background:#F9F9FB;border-radius:12px;padding:20px;max-width:480px;">';
            h += '<div style="color:#8E8E93;font-size:0.78rem;margin-bottom:16px;">@' + u.username + '</div>';
            h += '<div class="adm-form-row"><input class="adm-input" id="euFirstName" placeholder="Nombre" value="' + (u.first_name || '') + '"><input class="adm-input" id="euLastName" placeholder="Apellido" value="' + (u.last_name || '') + '"></div>';
            h += '<div class="adm-form-row"><input class="adm-input" id="euEmail" placeholder="Email" type="email" value="' + (u.email || '') + '"></div>';
            h += '<div class="adm-form-row"><input class="adm-input" id="euPassword" placeholder="Nueva contrase\u00f1a (dejar vac\u00edo para no cambiar)" type="password"></div>';
            h += '<div style="display:flex;gap:8px;margin-top:16px;"><button class="adm-btn adm-btn-primary" onclick="admSaveEditUser(' + uid + ')">Guardar</button><button class="adm-btn adm-btn-secondary" onclick="loadUsuarios()">Cancelar</button></div>';
            h += '</div>';
            ac.innerHTML = h;
        }
        function admSaveEditUser(uid) {
            var ct = getAdminCsrf();
            var body = {
                first_name: document.getElementById('euFirstName').value.trim(),
                last_name: document.getElementById('euLastName').value.trim(),
                email: document.getElementById('euEmail').value.trim(),
                password: document.getElementById('euPassword').value
            };
            fetch('/app/api/admin/usuarios/' + uid + '/', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': ct },
                body: JSON.stringify(body)
            }).then(function(r) { return r.json(); }).then(function(res) {
                if (res.success) loadUsuarios();
                else alert(res.error || 'Error al guardar');
            });
        }
    </script>
