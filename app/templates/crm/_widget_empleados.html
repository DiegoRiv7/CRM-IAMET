{% if es_supervisor %}
<!-- ═══ WIDGET EMPLEADOS — JORNADAS ═══ -->
<div class="widget-overlay" id="widgetEmpleados"
    onclick="if(event.target===this){empCerrar();}">
    <div style="width:95vw;height:95vh;max-width:1600px;background:#fff;border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.2);border:1px solid rgba(0,0,0,0.05);">

        <!-- Header -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid #F2F2F7;flex-shrink:0;">
            <div style="display:flex;align-items:center;gap:14px;">
                <h2 style="margin:0;font-size:0.95rem;font-weight:700;color:#1D1D1F;">Empleados</h2>

                <!-- Custom date picker -->
                <div style="position:relative;" id="empPickerWrap">
                    <button id="empDatePickerBtn" onclick="empToggleDatePicker(event)"
                        style="background:#F2F2F7;border:none;border-radius:8px;padding:5px 12px;font-size:0.75rem;font-weight:600;color:#1D1D1F;cursor:pointer;display:inline-flex;align-items:center;gap:6px;">
                        <span id="empDatePickerLabel">— —</span>
                        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="#8E8E93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <input type="hidden" id="empMesFilter" value="">
                    <input type="hidden" id="empAnioFilter" value="">

                    <div id="empDatePickerDropdown" style="display:none;position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid #E5E5EA;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,0.14);z-index:10000;padding:12px 10px;min-width:270px;">
                        <div style="display:flex;gap:8px;">
                            <div style="flex:1;">
                                <div style="font-size:0.6rem;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;padding-left:6px;">Mes</div>
                                <div id="empMesOpts"></div>
                            </div>
                            <div style="width:1px;background:#F2F2F7;flex-shrink:0;"></div>
                            <div style="flex:0 0 auto;">
                                <div style="font-size:0.6rem;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;padding-left:6px;">Año</div>
                                <div id="empAnioOpts"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="empCerrar()"
                style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#8E8E93;padding:4px 8px;border-radius:8px;line-height:1;">&times;</button>
        </div>

        <!-- Content -->
        <div id="empContent" style="flex:1;overflow-y:auto;padding:16px 24px;">
            <div style="text-align:center;padding:3rem;color:#8E8E93;font-size:0.85rem;">Cargando...</div>
        </div>

    </div>
</div>
{% endif %}
