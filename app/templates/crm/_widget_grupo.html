<!-- ═══ WIDGET GRUPOS / CHAT DE EQUIPO ═══ -->
<style>
.grupo-overlay {
  display:none;position:fixed;inset:0;z-index:10300; /* CAPA 3 */
  align-items:center;justify-content:center;
  background:rgba(15,23,42,0.42);backdrop-filter:blur(3px);
  padding:32px;
}
.grupo-overlay.active { display:flex; }
.grupo-card {
  width:100%;max-width:1200px;height:92vh;max-height:92vh;
  background:#fff;
  border:1px solid rgba(226,232,240,0.8);
  border-radius:16px;
  box-shadow:0 30px 60px -15px rgba(15,23,42,0.30), 0 0 0 1px rgba(15,23,42,0.04);
  display:flex;overflow:hidden;position:relative;
}
/* Sidebar de grupos */
.grupo-sidebar {
  width:240px;flex-shrink:0;
  background:rgba(242,242,247,0.7);
  border-right:1px solid rgba(0,0,0,0.07);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.grupo-sidebar-header {
  padding:18px 16px 12px;
  border-bottom:1px solid rgba(0,0,0,0.06);
  flex-shrink:0;
}
.grupo-sidebar-header h3 {
  font-size:0.9rem;font-weight:700;color:#1C1C1E;margin:0;
}
.grupo-sidebar-list { flex:1;overflow-y:auto;padding:8px; }
.grupo-sidebar-item {
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:12px;cursor:pointer;
  transition:background 0.12s;position:relative;
}
.grupo-sidebar-item:hover { background:rgba(0,0,0,0.05); }
.grupo-sidebar-item.active { background:rgba(0,122,255,0.1); }
.grupo-sidebar-item .gs-avatar {
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:0.88rem;flex-shrink:0;
}
.grupo-sidebar-item .gs-info { flex:1;min-width:0; }
.grupo-sidebar-item .gs-nombre {
  font-size:0.82rem;font-weight:600;color:#1C1C1E;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.grupo-sidebar-item .gs-miembros {
  font-size:0.7rem;color:#8E8E93;margin-top:1px;
}
.grupo-sidebar-item .gs-badge {
  background:#FF3B30;color:#fff;border-radius:10px;
  padding:1px 6px;font-size:0.65rem;font-weight:700;flex-shrink:0;
}
/* Panel principal del chat */
.grupo-main {
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}
.grupo-chat-header {
  padding:14px 18px 12px;
  border-bottom:1px solid rgba(0,0,0,0.06);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;background:rgba(255,255,255,0.6);
}
.grupo-chat-feed {
  flex:1;overflow-y:auto;padding:20px 28px;
  display:flex;flex-direction:column;gap:2px;
}
/* Filas tipo Slack/Linear: avatar + bloque (autor + hora + burbuja) */
.grupo-msg {
  display:flex;gap:12px;align-items:flex-start;
  padding:6px 10px;margin:0 -10px;
  border-radius:10px;
  transition:background 0.12s;
}
.grupo-msg:hover { background:rgba(248,250,252,0.6); }
.grupo-msg.sistema { padding:4px 10px;margin:4px -10px; }
.grupo-msg-avatar {
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.82rem;font-weight:700;color:#fff;flex-shrink:0;
  box-shadow:0 1px 2px rgba(15,23,42,0.08);
}
.grupo-msg-body {
  flex:1;min-width:0;
  display:flex;flex-direction:column;gap:2px;
}
.grupo-msg-head {
  display:flex;align-items:baseline;gap:8px;
  font-size:0.82rem;
}
.grupo-msg-autor {
  font-weight:700;color:#0F172A;
}
.grupo-msg-hora {
  font-size:0.72rem;color:#94A3B8;font-weight:500;
}
.grupo-msg-content {
  font-size:0.88rem;color:#1E293B;line-height:1.55;
  word-wrap:break-word;overflow-wrap:anywhere;
}
.grupo-msg-content a { color:#2563EB;font-weight:500;text-decoration:none;border-bottom:1px solid rgba(37,99,235,0.2); }
.grupo-msg-content a:hover { border-bottom-color:#2563EB; }

/* Mensajes del sistema: línea fina con ícono + texto + link — sin burbuja */
.grupo-msg.sistema { gap:10px;align-items:center; }
.grupo-msg.sistema .grupo-msg-avatar {
  width:28px;height:28px;border-radius:8px;
  background:#ECFDF5;color:#047857;
  font-size:0.95rem;box-shadow:none;
}
.grupo-msg.sistema .grupo-msg-body { flex-direction:row;align-items:baseline;gap:8px;flex-wrap:wrap; }
.grupo-msg.sistema .grupo-msg-content {
  font-size:0.84rem;color:#475569;line-height:1.5;
}
.grupo-msg.sistema .grupo-msg-content strong { color:#0F172A;font-weight:600; }
.grupo-msg.sistema .grupo-msg-content a {
  color:#2563EB;font-weight:600;border-bottom:none;
}
.grupo-msg.sistema .grupo-msg-content a:hover { text-decoration:underline; }
.grupo-msg.sistema .grupo-msg-hora { color:#94A3B8; }

/* Variantes de color para ícono de sistema según acción */
.grupo-msg.sistema.accion-editar .grupo-msg-avatar { background:#EFF6FF;color:#2563EB; }
.grupo-msg.sistema.accion-cambio .grupo-msg-avatar { background:#F3E8FF;color:#7C3AED; }
.grupo-msg.sistema.accion-completar .grupo-msg-avatar { background:#ECFDF5;color:#047857; }
.grupo-msg.sistema.accion-programar .grupo-msg-avatar { background:#FFFBEB;color:#B45309; }

/* Adjuntos */
.grupo-msg-attachments {
  display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;
}
.grupo-att-img {
  max-width:320px;max-height:240px;
  border-radius:10px;border:1px solid #E2E8F0;
  cursor:zoom-in;display:block;
  box-shadow:0 1px 3px rgba(15,23,42,0.06);
}
.grupo-att-file {
  display:inline-flex;align-items:center;gap:10px;
  padding:8px 12px 8px 10px;
  background:#F8FAFC;border:1px solid #E2E8F0;
  border-radius:10px;
  text-decoration:none;color:#334155;
  transition:all 0.15s;max-width:320px;
}
.grupo-att-file:hover { background:#F1F5F9;border-color:#CBD5E1; }
.grupo-att-file-ico {
  width:32px;height:32px;flex-shrink:0;
  background:#2563EB;color:#fff;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.grupo-att-file-info { min-width:0; }
.grupo-att-file-name { font-size:0.82rem;font-weight:600;color:#0F172A;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px; }
.grupo-att-file-size { font-size:0.7rem;color:#94A3B8;margin-top:1px; }

/* Lightbox para imágenes */
.grupo-img-lightbox {
  position:fixed;inset:0;z-index:10600;
  background:rgba(15,23,42,0.85);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;padding:40px;
  cursor:zoom-out;
}
.grupo-img-lightbox.active { display:flex; }
.grupo-img-lightbox img { max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.5); }
/* Input de chat — composer más pulido */
.grupo-input-bar {
  padding:14px 20px 18px;
  background:#fff;
  border-top:1px solid #E2E8F0;
  display:flex;flex-direction:column;gap:10px;flex-shrink:0;
}
.grupo-input-box {
  border:1px solid #E2E8F0;
  border-radius:12px;
  background:#fff;
  transition:all 0.18s;
}
.grupo-input-box:focus-within {
  border-color:#BFDBFE;
  box-shadow:0 0 0 4px rgba(191,219,254,0.35);
}
.grupo-input-wrap { position:relative;padding:2px 2px 0; }
.grupo-textarea {
  width:100%;background:transparent;
  border:none;padding:12px 14px 4px;
  font-family:inherit;font-size:0.92rem;color:#0F172A;
  outline:none;resize:none;line-height:1.55;max-height:160px;
  overflow-y:auto;box-sizing:border-box;
}
.grupo-textarea::placeholder { color:#94A3B8; }

/* Fila inferior del composer: tools izquierda + send derecha */
.grupo-input-toolbar {
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 6px 8px;
}
.grupo-input-tools { display:flex;align-items:center;gap:2px; }
.grupo-input-tool {
  width:30px;height:30px;border-radius:7px;
  background:none;border:none;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  color:#94A3B8;font-family:inherit;
  transition:all 0.15s;
}
.grupo-input-tool:hover { background:#F1F5F9;color:#475569; }
.grupo-input-tool.active { background:#EFF6FF;color:#2563EB; }

.grupo-send-btn {
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;
  background:linear-gradient(180deg, #3B82F6 0%, #2563EB 100%);
  color:#fff;border:none;border-radius:8px;
  font-family:inherit;font-size:0.8rem;font-weight:700;
  cursor:pointer;
  box-shadow:0 1px 3px rgba(37,99,235,0.28), 0 2px 8px -2px rgba(37,99,235,0.3);
  transition:all 0.15s;
}
.grupo-send-btn:hover {
  background:linear-gradient(180deg, #2563EB 0%, #1D4ED8 100%);
  box-shadow:0 6px 14px -4px rgba(37,99,235,0.4);
  transform:translateY(-1px);
}
.grupo-send-btn:disabled {
  background:#E2E8F0;color:#94A3B8;
  box-shadow:none;cursor:default;transform:none;
}

/* Preview de adjuntos pendientes */
.grupo-pending-attachments {
  display:flex;flex-wrap:wrap;gap:6px;
  padding:6px 12px 0;
}
.grupo-pending-attachments:empty { display:none; }
.grupo-pending-chip {
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 6px 4px 8px;
  background:#F1F5F9;border:1px solid #E2E8F0;
  border-radius:999px;
  font-size:0.75rem;color:#334155;font-weight:500;
  max-width:220px;
}
.grupo-pending-chip svg { color:#64748B;flex-shrink:0; }
.grupo-pending-chip .nm { overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px; }
.grupo-pending-chip .rm {
  background:none;border:none;padding:2px;
  color:#94A3B8;cursor:pointer;border-radius:4px;
  display:inline-flex;align-items:center;justify-content:center;
}
.grupo-pending-chip .rm:hover { background:#FEE2E2;color:#E11D48; }
/* Vacío */
.grupo-empty {
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:#8E8E93;font-size:0.85rem;text-align:center;padding:40px;
}
/* Gestión (supervisor de grupo) */
.grupo-gestionar-btn {
  background:transparent;border:1px solid rgba(0,0,0,0.1);
  border-radius:8px;padding:4px 10px;font-size:0.75rem;
  color:#3A3A3C;cursor:pointer;font-weight:500;
  transition:background 0.12s;
}
.grupo-gestionar-btn:hover { background:rgba(0,0,0,0.05); }
/* Mentions autocomplete */
.grupo-mention-list {
  position:absolute;bottom:calc(100% + 6px);left:0;right:0;
  background:#fff;border:1px solid rgba(0,0,0,0.1);
  border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);
  max-height:160px;overflow-y:auto;z-index:10;
}
.grupo-mention-item {
  padding:7px 12px;font-size:0.82rem;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:background 0.1s;
}
.grupo-mention-item:hover { background:#F2F2F7; }
/* Panel gestionar */
.grupo-gestionar-panel {
  position:absolute;top:58px;right:16px;z-index:20;
  background:rgba(255,255,255,0.96);backdrop-filter:blur(24px);
  border:1px solid rgba(0,0,0,0.1);border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.14);
  padding:14px;width:280px;
}
.grupo-fecha-sep {
  text-align:center;font-size:0.7rem;color:#8E8E93;
  padding:6px 0 2px;font-weight:500;
}
</style>

<div class="grupo-overlay" id="widgetGrupo">
  <div class="grupo-card">

    <!-- Sidebar: lista de grupos -->
    <div class="grupo-sidebar">
      <div class="grupo-sidebar-header">
        <h3>{% if es_supervisor %}Grupos{% else %}Mi Grupo{% endif %}</h3>
      </div>
      <div class="grupo-sidebar-list" id="grupoSidebarList">
        {% for g in mis_grupos %}
        <div class="grupo-sidebar-item {% if forloop.first %}active{% endif %}"
             id="gs-item-{{ g.id }}"
             onclick="grupoChatAbrir({{ g.id }})">
          <div class="gs-avatar" style="background:{{ g.color }};">
            {{ g.nombre|slice:":1"|upper }}
          </div>
          <div class="gs-info">
            <div class="gs-nombre">{{ g.nombre }}</div>
            <div class="gs-miembros" id="gs-miembros-{{ g.id }}">Cargando...</div>
          </div>
          <span class="gs-badge" id="gs-badge-{{ g.id }}" style="display:none;"></span>
        </div>
        {% endfor %}
      </div>
    </div>

    <!-- Panel principal -->
    <div class="grupo-main" id="grupoMain">
      <div class="grupo-empty" id="grupoEmptyPanel">
        <svg width="40" height="40" fill="none" stroke="#C7C7CC" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:12px;">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <div>Selecciona un grupo</div>
      </div>
    </div>

    <!-- Cerrar -->
    <button onclick="grupoCerrar()" style="position:absolute;top:14px;right:16px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.07);border:none;cursor:pointer;font-size:1.1rem;color:#636366;display:flex;align-items:center;justify-content:center;z-index:5;">&times;</button>
  </div>
</div>

<script>
(function(){
  var _grupoActualId = null;
  var _grupoActualData = null;
  var _pollInterval = null;
  var _ultimoMsgId = 0;
  var _misGrupos = {{ mis_grupos|safe }};
  var _esSupervisor = {{ es_supervisor|yesno:"true,false" }};
  var _esSuperDeGrupo = {{ es_supervisor_de_grupo|yesno:"true,false" }};
  var _miUserId = {{ usuario.id }};
  var _miNombre = '{{ usuario.get_full_name|default:usuario.username }}';

  function _csrf() {
    var el = document.querySelector('[name=csrfmiddlewaretoken]');
    return el ? el.value : '';
  }

  function _avatarColor(nombre) {
    var colors = ['#007AFF','#34C759','#FF9500','#FF2D55','#AF52DE','#5AC8FA','#FF3B30'];
    var h = 0;
    for(var i=0;i<nombre.length;i++) h = nombre.charCodeAt(i) + ((h<<5)-h);
    return colors[Math.abs(h) % colors.length];
  }

  function _initials(nombre) {
    if(!nombre) return '?';
    var parts = nombre.trim().split(' ');
    if(parts.length >= 2) return (parts[0][0]||'') + (parts[1][0]||'');
    return nombre[0]||'?';
  }

  /* ── Abrir / cerrar ─────────────────────────── */
  window.grupoAbrir = function() {
    document.getElementById('widgetGrupo').classList.add('active');
    document.body.style.overflow = 'hidden';
    _cargarBadgesYMiembros();
    // Abrir el primer grupo automáticamente
    if(_misGrupos.length === 1 || !_esSupervisor) {
      var primero = _misGrupos[0];
      if(primero) grupoChatAbrir(primero.id);
    } else if(_misGrupos.length > 0) {
      grupoChatAbrir(_misGrupos[0].id);
    }
  };

  window.grupoCerrar = function() {
    document.getElementById('widgetGrupo').classList.remove('active');
    document.body.style.overflow = '';
    _stopPoll();
    _grupoActualId = null;
  };

  /* ── Badges sidebar ─────────────────────────── */
  function _cargarBadgesYMiembros() {
    _misGrupos.forEach(function(g) {
      // No-leídos
      fetch('/app/api/grupos/'+g.id+'/no-leidos/')
        .then(function(r){return r.json();})
        .then(function(d){
          var badge = document.getElementById('gs-badge-'+g.id);
          if(badge) {
            if(d.no_leidos > 0) {
              badge.textContent = d.no_leidos > 99 ? '99+' : d.no_leidos;
              badge.style.display = '';
            } else {
              badge.style.display = 'none';
            }
          }
        }).catch(function(){});
      // Miembros
      fetch('/app/api/grupos/mis-grupos/')
        .then(function(r){return r.json();})
        .then(function(d){
          var grupos = d.grupos || [];
          var gr = grupos.find(function(x){return x.id===g.id;});
          if(gr) {
            var el = document.getElementById('gs-miembros-'+g.id);
            if(el) el.textContent = (gr.miembros.length||0) + ' miembro' + (gr.miembros.length===1?'':'s');
          }
        }).catch(function(){});
    });
  }

  /* ── Abrir chat de un grupo ─────────────────── */
  window.grupoChatAbrir = function(grupoId) {
    _stopPoll();
    _grupoActualId = grupoId;
    _ultimoMsgId = 0;

    // Activar sidebar
    document.querySelectorAll('.grupo-sidebar-item').forEach(function(el){
      el.classList.remove('active');
    });
    var item = document.getElementById('gs-item-'+grupoId);
    if(item) item.classList.add('active');

    // Limpiar badge
    var badge = document.getElementById('gs-badge-'+grupoId);
    if(badge) badge.style.display = 'none';

    // Mostrar loader en main
    var main = document.getElementById('grupoMain');
    main.innerHTML = '<div class="grupo-empty"><svg width="24" height="24" fill="none" stroke="#C7C7CC" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div style="margin-top:8px;font-size:0.8rem;">Cargando...</div></div>';

    fetch('/app/api/grupos/'+grupoId+'/chat/')
      .then(function(r){return r.json();})
      .then(function(data){
        _grupoActualData = data.grupo;
        _renderChatPanel(data.grupo, data.mensajes);
        // Marcar como leído
        fetch('/app/api/grupos/'+grupoId+'/chat/leer/',{method:'POST',headers:{'X-CSRFToken':_csrf()}});
        _startPoll();
      }).catch(function(){
        document.getElementById('grupoMain').innerHTML = '<div class="grupo-empty">Error cargando el chat.</div>';
      });
  };

  /* ── Render panel chat ──────────────────────── */
  function _renderChatPanel(grupo, mensajes) {
    var puedeGestionar = _esSupervisor || (grupo.supervisor && grupo.supervisor.id === _miUserId);
    var h = '';

    // Header
    h += '<div class="grupo-chat-header">';
    h += '<div style="display:flex;align-items:center;gap:10px;">';
    h += '<div style="width:36px;height:36px;border-radius:10px;background:'+grupo.color+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1rem;">'+grupo.nombre.charAt(0).toUpperCase()+'</div>';
    h += '<div>';
    h += '<div style="font-size:0.9rem;font-weight:700;color:#1C1C1E;">'+_esc(grupo.nombre)+'</div>';
    var miembrosNames = grupo.miembros.map(function(m){return m.nombre.split(' ')[0];}).join(', ');
    h += '<div style="font-size:0.72rem;color:#8E8E93;">'+(miembrosNames||'Sin miembros')+'</div>';
    h += '</div></div>';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-right:36px;">';
    if(puedeGestionar) {
      h += '<button class="grupo-gestionar-btn" onclick="_grupoGestionarToggle('+grupo.id+')">Gestionar</button>';
    }
    h += '</div>';
    h += '</div>';

    // Panel de gestión (hidden por defecto)
    h += '<div id="grupoGestionarPanel" style="display:none;border-bottom:1px solid rgba(0,0,0,0.06);padding:12px 18px;background:rgba(255,255,255,0.5);">';
    h += _renderGestionPanel(grupo);
    h += '</div>';

    // Feed
    h += '<div class="grupo-chat-feed" id="grupoChatFeed">';
    if(mensajes.length === 0) {
      h += '<div style="text-align:center;color:#C7C7CC;font-size:0.8rem;padding:40px 0;">Sé el primero en escribir en el grupo</div>';
    } else {
      h += _renderMensajes(mensajes, true);
    }
    h += '</div>';

    // Mentions dropdown
    h += '<div style="position:relative;padding:0 20px 0;">';
    h += '<div class="grupo-mention-list" id="grupoMentionList" style="display:none;"></div>';
    h += '</div>';

    // Input bar: composer con pending attachments + textarea + toolbar
    var nomGrupo = _esc(grupo.nombre);
    h += '<div class="grupo-input-bar">';
    h += '<div class="grupo-input-box" id="grupoInputBox">';
    h += '<div class="grupo-pending-attachments" id="grupoPendingAttachments"></div>';
    h += '<div class="grupo-input-wrap">';
    h += '<textarea class="grupo-textarea" id="grupoTextarea" rows="1" placeholder="Mensaje a ' + nomGrupo + '… usa @ para mencionar" oninput="_grupoInputAuto(this);_grupoCheckMention(this);" onkeydown="_grupoEnterSend(event)" onpaste="_grupoPasteHandler(event)"></textarea>';
    h += '</div>';
    h += '<div class="grupo-input-toolbar">';
    h += '<div class="grupo-input-tools">';
    h += '<button class="grupo-input-tool" title="Adjuntar archivo o imagen" onclick="document.getElementById(\'grupoFileInput\').click()">';

  function _cargarUsersParaSelect(grupo) {
    var sel = document.getElementById('grupoAddUserSel');

    var miembrosIds = grupo.miembros.map(function(m){return m.id;});
    if(grupo.supervisor) miembrosIds.push(grupo.supervisor.id);
    fetch('/app/api/admin/usuarios/')
      .then(function(r){return r.json();})
      .then(function(d){
        var usuarios = (d.usuarios||[]).filter(function(u){ return miembrosIds.indexOf(u.id)===-1; });

        usuarios.forEach(function(u){
          var nombre = ((u.first_name||'')+' '+(u.last_name||'')).trim()||u.username;
          sel.innerHTML += '<option value="'+u.id+'">'+_esc(nombre)+'</option>';
        });
      }).catch(function(){});

  window._grupoRenombrar = function(grupoId) {

  /* ── Render mensajes ────────────────────────── */
  function _renderMensajes(mensajes, conFechas) {
    var h = '';
    var fechaAnterior = null;
    mensajes.forEach(function(msg){
      var fechaMsg = msg.fecha.split(' ')[0];
      if(conFechas && fechaMsg !== fechaAnterior) {
        h += '<div class="grupo-fecha-sep">'+fechaMsg+'</div>';
        fechaAnterior = fechaMsg;
      }
      h += _renderMensaje(msg);
    });
    return h;
  }

  function _renderMensaje(msg) {
    var hora = (msg.fecha || '').split(' ')[1] || '';

    // ── Mensajes del sistema ── línea fina con ícono + texto (mantiene emojis)
    if(msg.tipo === 'sistema') {
      var emoji = _iconoAccion(msg.accion);
      var accionClass = {
        'editar_oportunidad':'accion-editar',
        'cambio_etapa':'accion-cambio',
        'cerrar_tarea':'accion-completar',
        'completar_actividad':'accion-completar',
        'programar_actividad':'accion-programar',
      }[msg.accion] || '';
      var linkObj = '';
      if(msg.objeto_tipo && msg.objeto_id) {
        if(msg.objeto_tipo === 'tarea') {
          linkObj = ' — <a href="javascript:void(0)" onclick="var m=document.getElementById(\'crmTaskDetailModal\');if(m)m.classList.add(\'z-elevated\');if(typeof crmTaskVerDetalle===\'function\')crmTaskVerDetalle('+msg.objeto_id+');">'+_esc(msg.objeto_titulo||'Ver tarea')+'</a>';
        } else {
          var href = _linkObjeto(msg.objeto_tipo, msg.objeto_id);
          if(href) linkObj = ' — <a href="'+href+'" target="_blank">'+_esc(msg.objeto_titulo||msg.objeto_tipo)+'</a>';
        }
      }
      var h = '<div class="grupo-msg sistema '+accionClass+'">';
      h += '<div class="grupo-msg-avatar">'+emoji+'</div>';
      h += '<div class="grupo-msg-body">';
      h += '<div class="grupo-msg-content">'+_parseMenciones(msg.contenido)+linkObj+'</div>';
      h += '<span class="grupo-msg-hora">'+hora+'</span>';
      h += '</div>';
      h += '</div>';
      return h;
    }

    // ── Mensajes de usuario ── estilo Slack/Linear (avatar + autor + hora + texto)
    var color = _avatarColor(msg.autor_nombre||'?');
    var ini = _initials(msg.autor_nombre||'?');
    var autor = _esc(msg.autor_nombre || msg.autor_username || 'Usuario');
    var contenido = _parseMenciones(_esc(msg.contenido)).replace(/\n/g, '<br>');

    // Adjuntos
    var adjuntos = '';
    if(msg.archivos && msg.archivos.length > 0) {
      adjuntos = '<div class="grupo-msg-attachments">';
      msg.archivos.forEach(function(a){
        if(a.es_imagen) {
          adjuntos += '<img class="grupo-att-img" src="'+a.url+'" alt="'+_esc(a.nombre)+'" onclick="_grupoLightbox(\''+a.url+'\')">';
        } else {
          adjuntos += '<a class="grupo-att-file" href="'+a.url+'" download="'+_esc(a.nombre)+'" target="_blank">';
          adjuntos += '<span class="grupo-att-file-ico"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>';
          adjuntos += '<div class="grupo-att-file-info">';
          adjuntos += '<div class="grupo-att-file-name" title="'+_esc(a.nombre)+'">'+_esc(a.nombre)+'</div>';
          adjuntos += '<div class="grupo-att-file-size">'+_formatBytes(a.tamano)+'</div>';
          adjuntos += '</div></a>';
        }
      });
      adjuntos += '</div>';
    }

    var h = '<div class="grupo-msg">';
    h += '<div class="grupo-msg-avatar" style="background:'+color+';">'+ini+'</div>';
    h += '<div class="grupo-msg-body">';
    h += '<div class="grupo-msg-head">';
    h += '<span class="grupo-msg-autor">'+autor+'</span>';
    h += '<span class="grupo-msg-hora">'+hora+'</span>';
    h += '</div>';
    if(contenido) h += '<div class="grupo-msg-content">'+contenido+'</div>';
    h += adjuntos;
    h += '</div>';
    h += '</div>';
    return h;
  }

  function _formatBytes(bytes) {
    if(!bytes) return '';
    if(bytes < 1024) return bytes + ' B';
    if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  window._grupoLightbox = function(url) {
    var lb = document.getElementById('grupoImgLightbox');
    if(!lb) {
      lb = document.createElement('div');
      lb.id = 'grupoImgLightbox';
      lb.className = 'grupo-img-lightbox';
      lb.onclick = function(){ lb.classList.remove('active'); };
      document.body.appendChild(lb);
    }
    lb.innerHTML = '<img src="'+url+'">';
    lb.classList.add('active');
  };

  function _iconoAccion(accion) {
    var icons = {
      'editar_oportunidad': '✏️',
      'cambio_etapa': '🔀',
      'cerrar_tarea': '✅',
      'completar_actividad': '✅',
      'programar_actividad': '📅',
    };
    return icons[accion] || '🔔';
  }

  function _linkObjeto(tipo, id) {
    if(tipo === 'oportunidad') return '/app/home/?tab=crm#opp-'+id;
    if(tipo === 'tarea') return '/app/home/?tab=tareas#tarea-'+id;
    return null;
  }

  function _parseMenciones(texto) {
    return texto.replace(/@\[([^\]]+)\]/g, '<strong style="color:#007AFF;">@$1</strong>');
  }

  function _esc(s) {
    if(!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Adjuntos pendientes ───────────────────── */
  var _grupoPending = [];
  function _renderPendingAttachments() {
    var c = document.getElementById('grupoPendingAttachments');
    if(!c) return;
    if(_grupoPending.length === 0) { c.innerHTML = ''; return; }
    c.innerHTML = _grupoPending.map(function(f, i){
      var isImg = (f.type||'').toLowerCase().indexOf('image/') === 0;
      var ico = isImg
        ? '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
        : '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
      return '<span class="grupo-pending-chip">'+ico+'<span class="nm" title="'+_esc(f.name)+'">'+_esc(f.name)+'</span>'+
        '<button class="rm" type="button" onclick="_grupoRemovePending('+i+')"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></span>';
    }).join('');
  }
  window._grupoOnFilesPicked = function(inp) {
    if(!inp || !inp.files) return;
    for(var i=0;i<inp.files.length;i++) _grupoPending.push(inp.files[i]);
    inp.value = '';
    _renderPendingAttachments();
  };
  window._grupoRemovePending = function(idx) {
    _grupoPending.splice(idx, 1);
    _renderPendingAttachments();
  };

  // Paste handler: capturar imágenes pegadas del portapapeles (screenshots)
  window._grupoPasteHandler = function(e) {
    if(!e.clipboardData || !e.clipboardData.items) return;
    var items = e.clipboardData.items;
    var hasImage = false;
    for(var i=0;i<items.length;i++) {
      var it = items[i];
      if(it.kind === 'file' && (it.type||'').indexOf('image/') === 0) {
        var blob = it.getAsFile();
        if(blob) {
          // Dar un nombre legible si el blob viene sin uno
          if(!blob.name || blob.name === 'image.png') {
            var ext = (blob.type.split('/')[1] || 'png').split(';')[0];
            var stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            try {
              blob = new File([blob], 'captura-' + stamp + '.' + ext, { type: blob.type });
            } catch(_) {}
          }
          _grupoPending.push(blob);
          hasImage = true;
        }
      }
    }
    if(hasImage) {
      e.preventDefault();
      _renderPendingAttachments();
    }
  };

  window._grupoInsertAt = function() {
    var ta = document.getElementById('grupoTextarea');
    if(!ta) return;
    var pos = ta.selectionStart || ta.value.length;
    ta.value = ta.value.substring(0, pos) + '@' + ta.value.substring(pos);
    ta.focus();
    ta.setSelectionRange(pos+1, pos+1);
    _grupoCheckMention(ta);
  };

  /* ── Enviar mensaje ─────────────────────────── */
  window._grupoEnviar = function() {
    if(!_grupoActualId) return;
    var ta = document.getElementById('grupoTextarea');
    if(!ta) return;
    var texto = ta.value.trim();
    if(!texto && _grupoPending.length === 0) return;

    var btn = document.getElementById('grupoSendBtn');
    if(btn) btn.disabled = true;

    var fd = new FormData();
    fd.append('contenido', texto || '');
    _grupoPending.forEach(function(f, i){ fd.append('archivo_'+i, f); });

    fetch('/app/api/grupos/'+_grupoActualId+'/chat/enviar/',{
      method:'POST',
      headers:{'X-CSRFToken':_csrf()},
      body: fd
    }).then(function(r){return r.json();}).then(function(d){
      if(d.success){
        ta.value='';
        ta.style.height='';
        _grupoPending = [];
        _renderPendingAttachments();
        var msg = d.mensaje;
        _ultimoMsgId = msg.id;
        var feed = document.getElementById('grupoChatFeed');
        if(feed){
          feed.insertAdjacentHTML('beforeend', _renderMensaje(msg));
          _scrollChatFeed();
        }
      }
      if(btn) btn.disabled = false;
    }).catch(function(){ if(btn) btn.disabled = false; });
  };

  window._grupoEnterSend = function(e) {
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); _grupoEnviar(); }
  };

  /* ── Autosize textarea ──────────────────────── */
  window._grupoInputAuto = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120)+'px';
  };

  /* ── @menciones ─────────────────────────────── */
  window._grupoCheckMention = function(el) {
    var val = el.value;
    var pos = el.selectionStart;
    var at = val.lastIndexOf('@', pos-1);
    var list = document.getElementById('grupoMentionList');
    if(!list) return;
    if(at === -1 || (pos - at) > 20) { list.style.display='none'; return; }
    var query = val.substring(at+1, pos).toLowerCase();
    var miembros = (_grupoActualData && _grupoActualData.miembros) ? _grupoActualData.miembros : [];
    var filtrados = miembros.filter(function(m){
      return m.nombre.toLowerCase().indexOf(query) !== -1;
    });
    if(!filtrados.length){ list.style.display='none'; return; }
    list.innerHTML = filtrados.map(function(m){
      var color = _avatarColor(m.nombre);
      var ini = _initials(m.nombre);
      return '<div class="grupo-mention-item" onclick="_grupoInsertMencion(\''+_esc(m.nombre)+'\')">'+
        '<div style="width:22px;height:22px;border-radius:6px;background:'+color+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.65rem;font-weight:700;flex-shrink:0;">'+ini+'</div>'+
        '<span>'+_esc(m.nombre)+'</span>'+
        '</div>';
    }).join('');
    list.style.display = '';
  };

  window._grupoInsertMencion = function(nombre) {
    var ta = document.getElementById('grupoTextarea');
    if(!ta) return;
    var val = ta.value;
    var pos = ta.selectionStart;
    var at = val.lastIndexOf('@', pos-1);
    ta.value = val.substring(0, at) + '@['+nombre+'] ' + val.substring(pos);
    ta.focus();
    var newPos = at + nombre.length + 4;
    ta.setSelectionRange(newPos, newPos);
    var list = document.getElementById('grupoMentionList');
    if(list) list.style.display='none';
  };

  /* ── Notificación Mac-style ─────────────────── */
  function _notifMac(titulo, cuerpo, grupoId, color) {
    // Usa el sistema de notificaciones existente del CRM si está disponible
    if(typeof showToast === 'function') {
      showToast('<strong>'+_esc(titulo)+'</strong><br><span style="font-size:0.8rem;opacity:0.85;">'+_esc(cuerpo)+'</span>', 'info', 5000);
    } else {
      // Fallback: notificación nativa del browser
      if(window.Notification && Notification.permission === 'granted') {
        new Notification(titulo, {body: cuerpo, icon: '/static/img/icon.png'});
      }
    }
    // Actualizar badge del topbar
    var badge = document.getElementById('grupoBadge');
    if(badge) badge.style.display = '';
    // Badge en sidebar del grupo
    var sb = document.getElementById('gs-badge-'+grupoId);
    if(sb){ var n=parseInt(sb.textContent||0)+1; sb.textContent=n>99?'99+':n; sb.style.display=''; }
  }

  /* ── Polling para nuevos mensajes ───────────── */
  function _startPoll() {
    _pollInterval = setInterval(function(){
      if(!_grupoActualId) return;
      var widgetAbierto = document.getElementById('widgetGrupo').classList.contains('active');
      fetch('/app/api/grupos/'+_grupoActualId+'/chat/?desde_id='+_ultimoMsgId)
        .then(function(r){return r.json();})
        .then(function(d){
          if(d.mensajes && d.mensajes.length > 0){
            var hayAccionTarea = false;
            if(widgetAbierto) {
              var feed = document.getElementById('grupoChatFeed');
              if(feed){
                feed.insertAdjacentHTML('beforeend', _renderMensajes(d.mensajes, false));
                _scrollChatFeed();
              }
              fetch('/app/api/grupos/'+_grupoActualId+'/chat/leer/',{method:'POST',headers:{'X-CSRFToken':_csrf()}});
            } else {
              // Widget cerrado: mostrar notificación Mac por cada mensaje nuevo ajeno
              d.mensajes.forEach(function(msg){
                if(!msg.es_mio){
                  var autor = msg.autor_nombre || 'Grupo';
                  var grupoNombre = (_misGrupos.find(function(g){return g.id===_grupoActualId;})||{}).nombre || 'Grupo';
                  _notifMac(autor+' en '+grupoNombre, msg.contenido.substring(0,80), _grupoActualId);
                }
              });
            }
            // Si algun mensaje de sistema es sobre tareas/actividades, refrescar lista de tareas
            d.mensajes.forEach(function(msg){
              if(msg.tipo === 'sistema' && (msg.accion === 'cerrar_tarea' || msg.accion === 'completar_actividad' || msg.accion === 'programar_actividad')) {
                hayAccionTarea = true;
              }
            });
            if(hayAccionTarea && typeof window.recargarTareasCRM === 'function') {
              window.recargarTareasCRM();
            }
            _ultimoMsgId = d.mensajes[d.mensajes.length-1].id;
          }
        }).catch(function(){});
    }, 2000);
  }

  function _stopPoll() {
    if(_pollInterval){ clearInterval(_pollInterval); _pollInterval = null; }
  }

  /* ── Poll de fondo para todos los grupos (badge) ─ */
  var _bgPollInterval = null;
  function _startBgPoll() {
    _bgPollInterval = setInterval(function(){
      if(document.getElementById('widgetGrupo').classList.contains('active')) return;
      _misGrupos.forEach(function(g){
        if(g.id === _grupoActualId) return; // ya lo cubre el poll principal
        fetch('/app/api/grupos/'+g.id+'/no-leidos/')
          .then(function(r){return r.json();})
          .then(function(d){
            var sb = document.getElementById('gs-badge-'+g.id);
            if(sb){ if(d.no_leidos>0){sb.textContent=d.no_leidos>99?'99+':d.no_leidos;sb.style.display='';}else{sb.style.display='none';} }
            if(d.no_leidos>0){var b=document.getElementById('grupoBadge');if(b)b.style.display='';}
          }).catch(function(){});
      });
    }, 10000);
  }
  _startBgPoll();

  /* ── Scroll al fondo ────────────────────────── */
  function _scrollChatFeed() {
    var feed = document.getElementById('grupoChatFeed');
    if(feed) setTimeout(function(){ feed.scrollTop = feed.scrollHeight; }, 40);
  }

  /* ── Badge global (topbar) ──────────────────── */
  function _actualizarBadgeTopbar() {
    var total = 0;
    var pendientes = _misGrupos.length;
    _misGrupos.forEach(function(g){
      fetch('/app/api/grupos/'+g.id+'/no-leidos/')
        .then(function(r){return r.json();})
        .then(function(d){
          total += (d.no_leidos||0);
          pendientes--;
          if(pendientes === 0) {
            var badge = document.getElementById('grupoBadge');
            if(badge) badge.style.display = total > 0 ? '' : 'none';
          }
        }).catch(function(){ pendientes--; });
    });
  }

  // Verificar badge cada 30s
  setInterval(_actualizarBadgeTopbar, 30000);
  setTimeout(_actualizarBadgeTopbar, 3000);

})();
</script>
