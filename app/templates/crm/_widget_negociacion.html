    <!-- ═══ WIDGET: NUEVA NEGOCIACIÓN ═══ -->
    <div class="widget-overlay wn-overlay" id="widgetNegociacion" style="z-index:10100;"
        onclick="if(event.target===this){this.classList.add('closing');var self=this;setTimeout(function(){self.classList.remove('active','closing');},220);}"><!-- CAPA 1 -->
        <div class="wn-card">

            <!-- Header -->
            <div class="wn-header">
                <div class="wn-header-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                </div>
                <div>
                    <div class="wn-title">Nueva Oportunidad</div>
                    <div class="wn-subtitle">Ingresa los datos para registrar la negociación</div>
                </div>
                <button type="button" class="wn-close" id="widgetClose"
                    onclick="var w=document.getElementById('widgetNegociacion');w.classList.add('closing');setTimeout(function(){w.classList.remove('active','closing');},220);">&times;</button>
            </div>

            <!-- Body -->
            <div class="wn-body">
                <form id="formNegociacion" autocomplete="off">
                    {% csrf_token %}

                    <!-- Nombre -->
                    <div class="wn-field">
                        <label class="wn-label">Nombre de la oportunidad</label>
                        <input type="text" class="wn-input" id="wfOportunidad"
                            placeholder="Ej: Implementación de sistema RFID..." required>
                    </div>

                    <!-- Cliente -->
                    <div class="wn-field">
                        <div class="wn-label-row">
                            <label class="wn-label">Cliente</label>
                            <button type="button" class="wn-add-btn" id="wnAddClienteBtn" title="Crear nuevo cliente">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                        <input type="text" class="wn-input wf-input" id="wfCliente" placeholder="Buscar o escribir cliente..." required>
                        <div class="wf-autocomplete" id="wfClienteAC"></div>
                        <!-- Mini-form crear cliente -->
                        <div class="wn-mini-form" id="wnMiniCliente" style="display:none;">
                            <div class="wn-mini-title">Nuevo cliente</div>
                            <input type="text" class="wn-input wn-mini-input" id="wfNuevoClienteNombre" placeholder="Nombre de la empresa">
                            <div class="wn-mini-actions">
                                <button type="button" class="wn-mini-cancel" id="wfNuevoClienteCancel">Cancelar</button>
                                <button type="button" class="wn-mini-save" id="wfNuevoClienteGuardar">Guardar cliente</button>
                            </div>
                        </div>
                    </div>

                    <!-- Contacto -->
                    <div class="wn-field">
                        <div class="wn-label-row">
                            <label class="wn-label">Contacto</label>
                            <button type="button" class="wn-add-btn" id="wnAddContactoBtn" title="Crear nuevo contacto">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                        <input type="text" class="wn-input wf-input" id="wfContacto" placeholder="Nombre del contacto...">
                        <div class="wf-autocomplete" id="wfContactoAC"></div>
                        <!-- Mini-form crear contacto -->
                        <div class="wn-mini-form" id="wnMiniContacto" style="display:none;">
                            <div class="wn-mini-title">Nuevo contacto</div>
                            <div class="wn-mini-row">
                                <input type="text" class="wn-input wn-mini-input" id="wfNuevoContactoNombre" placeholder="Nombre">
                                <input type="text" class="wn-input wn-mini-input" id="wfNuevoContactoApellido" placeholder="Apellido">
                            </div>
                            <div class="wn-mini-actions">
                                <button type="button" class="wn-mini-cancel" id="wfNuevoContactoCancel">Cancelar</button>
                                <button type="button" class="wn-mini-save" id="wfNuevoContactoGuardar">Guardar contacto</button>
                            </div>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="wn-divider"></div>

                    <!-- Monto + Probabilidad -->
                    <div class="wn-row">
                        <div class="wn-field">
                            <label class="wn-label">Monto estimado</label>
                            <div class="wn-input-prefix">
                                <span class="wn-prefix">$</span>
                                <input type="number" class="wn-input wn-input--prefixed" id="wfMonto" placeholder="0.00" step="0.01" min="0" required>
                            </div>
                        </div>
                        <div class="wn-field">
                            <label class="wn-label">Probabilidad</label>
                            <div class="wn-input-prefix">
                                <input type="number" class="wn-input wn-input--suffixed" id="wfProbabilidad" value="25" min="5" max="100" step="5">
                                <span class="wn-suffix">%</span>
                            </div>
                        </div>
                    </div>

                    <!-- Área + Producto -->
                    <div class="wn-row">
                        <div class="wn-field">
                            <label class="wn-label">Área</label>
                            <select class="wn-input wn-select" id="wfArea">
                                <option value="SISTEMAS">Sistemas</option>
                                <option value="Recursos Humanos">Recursos Humanos</option>
                                <option value="Compras">Compras</option>
                                <option value="Seguridad">Seguridad</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                                <option value="Almacén">Almacén</option>
                            </select>
                        </div>
                        <div class="wn-field">
                            <label class="wn-label">Producto</label>
                            <select class="wn-input wn-select" id="wfProducto">
                                <option value="ZEBRA">Zebra</option>
                                <option value="PANDUIT">Panduit</option>
                                <option value="APC">APC</option>
                                <option value="AVIGILION">Avigilon</option>
                                <option value="GENETEC">Genetec</option>
                                <option value="AXIS">Axis</option>
                                <option value="SOFTWARE" selected>Software</option>
                                <option value="RUNRATE">Runrate</option>
                                <option value="PÓLIZA">Póliza</option>
                                <option value="CISCO">Cisco</option>
                                <option value="SERVICIO">Servicio</option>
                            </select>
                        </div>
                    </div>

                    <!-- Mes cierre + Tipo -->
                    <div class="wn-row">
                        <div class="wn-field">
                            <label class="wn-label">Mes de cierre</label>
                            <select class="wn-input wn-select" id="wfMesCierre">
                                {% for code, name in mes_choices %}
                                <option value="{{ code }}">{{ name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="wn-field">
                            <label class="wn-label">Tipo</label>
                            <select class="wn-input wn-select" id="wfTipo">
                                {% for pipeline_key in pipelines_list %}
                                <option value="{{ pipeline_key }}">{{ pipeline_key|title }}</option>
                                {% empty %}
                                <option value="runrate">Runrate</option>
                                <option value="proyecto">Proyecto</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <!-- Comentarios -->
                    <div class="wn-field">
                        <label class="wn-label">Comentarios <span class="wn-optional">opcional</span></label>
                        <textarea class="wn-input wn-textarea" id="wfComentarios"
                            placeholder="Contexto adicional, notas, próximos pasos..." rows="2"></textarea>
                    </div>

                    <!-- Actions -->
                    <div class="wn-actions">
                        <button type="button" class="wn-btn wn-btn--cancel" id="wfCancel"
                            onclick="var w=document.getElementById('widgetNegociacion');w.classList.add('closing');setTimeout(function(){w.classList.remove('active','closing');},220);">Cancelar</button>
                        <button type="submit" class="wn-btn wn-btn--submit" id="wfSubmit">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><path d="M12 5v14M5 12h14"/></svg>
                            Crear oportunidad
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var csrf = function() { return document.querySelector('[name=csrfmiddlewaretoken]').value; };

        // ── Botón + Cliente ──
        document.getElementById('wnAddClienteBtn').addEventListener('click', function() {
            var mini = document.getElementById('wnMiniCliente');
            mini.style.display = mini.style.display === 'none' ? 'block' : 'none';
            if (mini.style.display === 'block') document.getElementById('wfNuevoClienteNombre').focus();
        });
        document.getElementById('wfNuevoClienteCancel').addEventListener('click', function() {
            document.getElementById('wnMiniCliente').style.display = 'none';
            document.getElementById('wfNuevoClienteNombre').value = '';
        });
        document.getElementById('wfNuevoClienteGuardar').addEventListener('click', function() {
            var nombre = document.getElementById('wfNuevoClienteNombre').value.trim();
            if (!nombre) { document.getElementById('wfNuevoClienteNombre').focus(); return; }
            var btn = this;
            btn.disabled = true; btn.textContent = 'Guardando...';
            fetch('/app/api/quick-crear-cliente/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
                body: JSON.stringify({ nombre_empresa: nombre })
            }).then(function(r) { return r.json(); }).then(function(res) {
                if (res.success) {
                    document.getElementById('wfCliente').value = res.nombre;
                    // Set selectedClienteId used by contacto autocomplete
                    if (typeof window._wfSelectedClienteId !== 'undefined') window._wfSelectedClienteId = res.id;
                    document.getElementById('wfCliente').dispatchEvent(new CustomEvent('wn:cliente-set', { detail: { id: res.id, nombre: res.nombre } }));
                    document.getElementById('wnMiniCliente').style.display = 'none';
                    document.getElementById('wfNuevoClienteNombre').value = '';
                } else {
                    alert(res.error || 'Error al crear cliente');
                }
                btn.disabled = false; btn.textContent = 'Guardar cliente';
            }).catch(function() { btn.disabled = false; btn.textContent = 'Guardar cliente'; });
        });

        // ── Botón + Contacto ──
        document.getElementById('wnAddContactoBtn').addEventListener('click', function() {
            var mini = document.getElementById('wnMiniContacto');
            mini.style.display = mini.style.display === 'none' ? 'block' : 'none';
            if (mini.style.display === 'block') document.getElementById('wfNuevoContactoNombre').focus();
        });
        document.getElementById('wfNuevoContactoCancel').addEventListener('click', function() {
            document.getElementById('wnMiniContacto').style.display = 'none';
            document.getElementById('wfNuevoContactoNombre').value = '';
            document.getElementById('wfNuevoContactoApellido').value = '';
        });
        document.getElementById('wfNuevoContactoGuardar').addEventListener('click', function() {
            var nombre = document.getElementById('wfNuevoContactoNombre').value.trim();
            if (!nombre) { document.getElementById('wfNuevoContactoNombre').focus(); return; }
            var btn = this;
            btn.disabled = true; btn.textContent = 'Guardando...';
            var empresaId = typeof window._wfSelectedClienteId !== 'undefined' ? window._wfSelectedClienteId : null;
            fetch('/app/api/quick-crear-contacto/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
                body: JSON.stringify({
                    nombre: nombre,
                    apellido: document.getElementById('wfNuevoContactoApellido').value.trim(),
                    empresa_id: empresaId
                })
            }).then(function(r) { return r.json(); }).then(function(res) {
                if (res.success) {
                    document.getElementById('wfContacto').value = res.nombre_completo;
                    document.getElementById('wnMiniContacto').style.display = 'none';
                    document.getElementById('wfNuevoContactoNombre').value = '';
                    document.getElementById('wfNuevoContactoApellido').value = '';
                } else {
                    alert(res.error || 'Error al crear contacto');
                }
                btn.disabled = false; btn.textContent = 'Guardar contacto';
            }).catch(function() { btn.disabled = false; btn.textContent = 'Guardar contacto'; });
        });
    })();
    </script>
