    <!-- ═══ WIDGET: NUEVA OPORTUNIDAD (composer style) ═══ -->
    <div class="widget-overlay wn-overlay" id="widgetNegociacion" style="z-index:10100;"
        onclick="if(event.target===this){this.classList.add('closing');var self=this;setTimeout(function(){self.classList.remove('active','closing');},220);}"><!-- CAPA 1 -->
        <div class="wn-card wn-composer">

            <form id="formNegociacion" autocomplete="off" style="display:contents;">
                {% csrf_token %}

                <!-- ─── Header minimal: breadcrumb + cerrar ─── -->
                <header class="wn-ctw-header">
                    <div class="wn-ctw-breadcrumb">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                        <span class="wn-ctw-crumb-muted">Oportunidades</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                        <span class="wn-ctw-crumb-current">Nueva oportunidad</span>
                    </div>
                    <button type="button" class="wn-ctw-close" id="widgetClose" title="Cerrar (Esc)"
                        onclick="var w=document.getElementById('widgetNegociacion');w.classList.add('closing');setTimeout(function(){w.classList.remove('active','closing');},220);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </header>

                <!-- ─── Canvas: Título + "Para [Cliente]" + pills Tipo/Cierre + Notas ─── -->
                <main class="wn-ctw-canvas">

                    <!-- Título grande -->
                    <input type="text" class="wn-ctw-title" id="wfOportunidad" placeholder="Nombre de la oportunidad…" autocomplete="off" required>

                    <!-- Para [Cliente] — lenguaje natural -->
                    <div class="wn-ctw-nl-row">
                        <span class="wn-ctw-nl-label">Para</span>
                        <div class="wn-ctw-popwrap">
                            <button type="button" class="wn-ctw-pill-large empty" id="wnClienteBtn" onclick="wnOpenPop('cli', event)">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                <span id="wnClienteLabel">Selecciona un cliente (requerido)</span>
                            </button>
                            <div class="wn-ctw-pop wn-ctw-pop-wide" id="wnPopCli" style="display:none;">
                                <div class="wn-ctw-pop-title">Cliente</div>
                                <input type="text" class="wn-ctw-pop-input wf-input" id="wfCliente" placeholder="Buscar o escribir cliente…" required>
                                <div class="wf-autocomplete" id="wfClienteAC"></div>
                                <button type="button" class="wn-ctw-pop-add" id="wnAddClienteBtn">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    Crear cliente nuevo
                                </button>
                                <div class="wn-ctw-mini" id="wnMiniCliente" style="display:none;">
                                    <input type="text" class="wn-ctw-pop-input" id="wfNuevoClienteNombre" placeholder="Nombre de la empresa">
                                    <div class="wn-ctw-mini-actions">
                                        <button type="button" class="wn-mini-cancel" id="wfNuevoClienteCancel">Cancelar</button>
                                        <button type="button" class="wn-mini-save" id="wfNuevoClienteGuardar">Guardar cliente</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Pills obligatorios: Tipo + Cierre -->
                    <div class="wn-ctw-meta-row">
                        <!-- Tipo -->
                        <div class="wn-ctw-popwrap">
                            <button type="button" class="wn-ctw-pill-meta empty" id="wnTipoBtn" onclick="wnOpenPop('tipo', event)">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                                <span id="wnTipoLabel">Tipo (requerido)</span>
                            </button>
                            <div class="wn-ctw-pop" id="wnPopTipo" style="display:none;">
                                <div class="wn-ctw-pop-title">Tipo de pipeline</div>
                                <select class="wn-ctw-pop-input" id="wfTipo">
                                    {% for pipeline_key in pipelines_list %}
                                    <option value="{{ pipeline_key }}">{{ pipeline_key|title }}</option>
                                    {% empty %}
                                    <option value="runrate">Runrate</option>
                                    <option value="proyecto">Proyecto</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <!-- Cierre -->
                        <div class="wn-ctw-popwrap">
                            <button type="button" class="wn-ctw-pill-meta empty" id="wnCierreBtn" onclick="wnOpenPop('cierre', event)">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                <span id="wnCierreLabel">Cierre (requerido)</span>
                            </button>
                            <div class="wn-ctw-pop" id="wnPopCierre" style="display:none;">
                                <div class="wn-ctw-pop-title">Mes de cierre estimado</div>
                                <select class="wn-ctw-pop-input" id="wfMesCierre">
                                    <option value="">Selecciona un mes</option>
                                    {% for code, name in mes_choices %}
                                    {% if code != 'todos' %}<option value="{{ code }}">{{ name }}</option>{% endif %}
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Notas (opcional) -->
                    <textarea class="wn-ctw-desc" id="wfComentarios" placeholder="Añade contexto de la negociación, siguientes pasos o notas…" rows="4"></textarea>
                </main>

                <!-- ─── Toolbar: campos secundarios como ghost buttons ─── -->
                <footer class="wn-ctw-toolbar">
                    <div class="wn-ctw-tools">

                        <!-- Contacto -->
                        <div class="wn-ctw-popwrap">
                            <button type="button" class="wn-ctw-tool-ghost" id="wnContactoBtn" onclick="wnOpenPop('contacto', event)" title="Añadir contacto">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                                <span id="wnContactoLabel">Contacto</span>
                            </button>
                            <div class="wn-ctw-pop wn-ctw-pop-wide" id="wnPopContacto" style="display:none;">
                                <div class="wn-ctw-pop-title">Contacto</div>
                                <input type="text" class="wn-ctw-pop-input wf-input" id="wfContacto" placeholder="Nombre del contacto…">
                                <div class="wf-autocomplete" id="wfContactoAC"></div>
                                <button type="button" class="wn-ctw-pop-add" id="wnAddContactoBtn">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    Crear contacto nuevo
                                </button>
                                <div class="wn-ctw-mini" id="wnMiniContacto" style="display:none;">
                                    <div class="wn-ctw-mini-row">
                                        <input type="text" class="wn-ctw-pop-input" id="wfNuevoContactoNombre" placeholder="Nombre">
                                        <input type="text" class="wn-ctw-pop-input" id="wfNuevoContactoApellido" placeholder="Apellido">
                                    </div>
                                    <div class="wn-ctw-mini-actions">
                                        <button type="button" class="wn-mini-cancel" id="wfNuevoContactoCancel">Cancelar</button>
                                        <button type="button" class="wn-mini-save" id="wfNuevoContactoGuardar">Guardar contacto</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="wn-ctw-tool-sep"></div>

                        <!-- Producto -->
                        <div class="wn-ctw-popwrap">
                            <button type="button" class="wn-ctw-tool-ghost" id="wnProdBtn" onclick="wnOpenPop('prod', event)" title="Producto">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                                <span id="wnProdLabel">Producto</span>
                            </button>
                            <div class="wn-ctw-pop" id="wnPopProd" style="display:none;">
                                <div class="wn-ctw-pop-title">Producto</div>
                                <select class="wn-ctw-pop-input" id="wfProducto">
                                    <option value="ZEBRA">Zebra</option>
                                    <option value="PANDUIT">Panduit</option>
                                    <option value="APC">APC</option>
                                    <option value="AVIGILION">Avigilon</option>
                                    <option value="GENETEC">Genetec</option>
                                    <option value="AXIS">Axis</option>
                                    <option value="SOFTWARE" selected>Software</option>
                                    <option value="RUNRATE">Runrate</option>
                                    <option value="PÓLIZA">Póliza</option>
                                    <option value="CISCO">Cisco</option>
                                    <option value="SERVICIO">Servicio</option>
                                </select>
                            </div>
                        </div>

                        <!-- Área -->
                        <div class="wn-ctw-popwrap">
                            <button type="button" class="wn-ctw-tool-ghost" id="wnAreaBtn" onclick="wnOpenPop('area', event)" title="Área">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                                <span id="wnAreaLabel">Área</span>
                            </button>
                            <div class="wn-ctw-pop" id="wnPopArea" style="display:none;">
                                <div class="wn-ctw-pop-title">Área</div>
                                <select class="wn-ctw-pop-input" id="wfArea">
                                    <option value="SISTEMAS">Sistemas</option>
                                    <option value="Recursos Humanos">Recursos Humanos</option>
                                    <option value="Compras">Compras</option>
                                    <option value="Seguridad">Seguridad</option>
                                    <option value="Mantenimiento">Mantenimiento</option>
                                    <option value="Almacén">Almacén</option>
                                </select>
                            </div>
                        </div>

                        <!-- Probabilidad -->
                        <div class="wn-ctw-popwrap">
                            <button type="button" class="wn-ctw-tool-ghost" id="wnProbBtn" onclick="wnOpenPop('prob', event)" title="Probabilidad de cierre">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
                                <span id="wnProbLabel">Probabilidad</span>
                            </button>
                            <div class="wn-ctw-pop" id="wnPopProb" style="display:none;">
                                <div class="wn-ctw-pop-title">Probabilidad de cierre (%)</div>
                                <div class="wn-ctw-prob-wrap">
                                    <input type="number" class="wn-ctw-pop-input" id="wfProbabilidad" value="25" min="5" max="100" step="5">
                                    <span class="wn-ctw-prob-suffix">%</span>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="wn-ctw-actions">
                        <button type="button" class="wn-ctw-cancel" id="wfCancel"
                            onclick="var w=document.getElementById('widgetNegociacion');w.classList.add('closing');setTimeout(function(){w.classList.remove('active','closing');},220);">Cancelar</button>
                        <button type="submit" class="wn-ctw-submit" id="wfSubmit">
                            Crear oportunidad
                            <span class="wn-ctw-kbd">⌘ ↵</span>
                        </button>
                    </div>
                </footer>

                <!-- Monto: ya no se edita manualmente (lo calcula el sistema desde las cotizaciones) -->
                <input type="hidden" id="wfMonto" value="0">
            </form>
        </div>
    </div>

    <div id="widgetToast" class="widget-toast" aria-hidden="true"></div>

    <script>
    (function() {
        var csrf = function() {
            var el = document.querySelector('[name=csrfmiddlewaretoken]');
            return el ? el.value : '';
        };

        // ── Popovers (tipo, cierre, cliente, contacto, prod, area, prob) ──
        var POP_IDS = {
            cli: 'wnPopCli', tipo: 'wnPopTipo', cierre: 'wnPopCierre',
            contacto: 'wnPopContacto', prod: 'wnPopProd', area: 'wnPopArea', prob: 'wnPopProb'
        };
        var BTN_IDS = {
            cli: 'wnClienteBtn', tipo: 'wnTipoBtn', cierre: 'wnCierreBtn',
            contacto: 'wnContactoBtn', prod: 'wnProdBtn', area: 'wnAreaBtn', prob: 'wnProbBtn'
        };
        function _wnCloseAllPops() {
            Object.keys(POP_IDS).forEach(function(k) {
                var p = document.getElementById(POP_IDS[k]); if (p) p.style.display = 'none';
                var b = document.getElementById(BTN_IDS[k]); if (b) b.classList.remove('active');
            });
        }
        window.wnOpenPop = function(which, e) {
            if (e) e.stopPropagation();
            var pop = document.getElementById(POP_IDS[which]);
            var btn = document.getElementById(BTN_IDS[which]);
            if (!pop || !btn) return;
            var isOpen = pop.style.display !== 'none';
            _wnCloseAllPops();
            if (!isOpen) {
                pop.style.display = 'block';
                btn.classList.add('active');
                // Autofocus en el primer input visible del popover
                setTimeout(function() {
                    var firstInput = pop.querySelector('input, select, textarea');
                    if (firstInput && firstInput.focus) firstInput.focus();
                }, 30);
            }
        };
        // Cerrar al hacer click fuera
        document.addEventListener('click', function(e) {
            var modal = document.getElementById('widgetNegociacion');
            if (!modal || !modal.classList.contains('active')) return;
            var wraps = modal.querySelectorAll('.wn-ctw-popwrap');
            for (var i = 0; i < wraps.length; i++) {
                if (wraps[i].contains(e.target)) return;
            }
            _wnCloseAllPops();
        });

        // ── Labels dinámicas: refresca el texto de cada pill según selección ──
        function _labelOf(selectId, emptyText) {
            var el = document.getElementById(selectId);
            if (!el) return emptyText;
            var v = el.value;
            if (!v) return emptyText;
            if (el.tagName === 'SELECT') {
                return el.options[el.selectedIndex] ? el.options[el.selectedIndex].text : v;
            }
            return v;
        }
        function _setPillFilled(btnId, filled) {
            var b = document.getElementById(btnId);
            if (!b) return;
            b.classList.toggle('empty', !filled);
            b.classList.toggle('filled', !!filled);
            b.classList.remove('soft-error');
        }
        window.wnRefreshLabels = function() {
            // Tipo
            var tipoEl = document.getElementById('wfTipo');
            var tipoVal = tipoEl ? tipoEl.value : '';
            document.getElementById('wnTipoLabel').textContent = tipoVal ? _labelOf('wfTipo', 'Tipo (requerido)') : 'Tipo (requerido)';
            _setPillFilled('wnTipoBtn', !!tipoVal);

            // Cierre
            var mesEl = document.getElementById('wfMesCierre');
            var mesVal = mesEl ? mesEl.value : '';
            document.getElementById('wnCierreLabel').textContent = mesVal ? 'Cierre · ' + _labelOf('wfMesCierre', '') : 'Cierre (requerido)';
            _setPillFilled('wnCierreBtn', !!mesVal);

            // Cliente
            var cliVal = (document.getElementById('wfCliente') || {}).value || '';
            document.getElementById('wnClienteLabel').textContent = cliVal.trim() ? cliVal.trim() : 'Selecciona un cliente (requerido)';
            _setPillFilled('wnClienteBtn', !!cliVal.trim());

            // Contacto (opcional)
            var ctVal = (document.getElementById('wfContacto') || {}).value || '';
            document.getElementById('wnContactoLabel').textContent = ctVal.trim() ? ctVal.trim() : 'Contacto';
            document.getElementById('wnContactoBtn').classList.toggle('filled', !!ctVal.trim());

            // Producto
            document.getElementById('wnProdLabel').textContent = _labelOf('wfProducto', 'Producto');
            document.getElementById('wnProdBtn').classList.toggle('filled', true);

            // Área
            document.getElementById('wnAreaLabel').textContent = _labelOf('wfArea', 'Área');
            document.getElementById('wnAreaBtn').classList.toggle('filled', true);

            // Probabilidad
            var prob = (document.getElementById('wfProbabilidad') || {}).value || '25';
            document.getElementById('wnProbLabel').textContent = 'Probabilidad · ' + prob + '%';
            document.getElementById('wnProbBtn').classList.toggle('filled', true);
        };

        // Hook changes → refresh labels
        ['wfTipo', 'wfMesCierre', 'wfProducto', 'wfArea', 'wfProbabilidad', 'wfCliente', 'wfContacto'].forEach(function(id) {
            var el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('change', function() { wnRefreshLabels(); });
            el.addEventListener('input', function() { wnRefreshLabels(); });
        });

        // Refrescar al abrir el modal
        var openObserver = new MutationObserver(function(mutList) {
            var modal = document.getElementById('widgetNegociacion');
            if (modal && modal.classList.contains('active')) {
                setTimeout(wnRefreshLabels, 50);
            }
        });
        var modalEl = document.getElementById('widgetNegociacion');
        if (modalEl) openObserver.observe(modalEl, { attributes: true, attributeFilter: ['class'] });

        // Primera inicialización
        setTimeout(wnRefreshLabels, 100);

        // ── Botón + Cliente (mini-form) ──
        var btnAddCli = document.getElementById('wnAddClienteBtn');
        if (btnAddCli) {
            btnAddCli.addEventListener('click', function() {
                var mini = document.getElementById('wnMiniCliente');
                mini.style.display = mini.style.display === 'none' ? 'block' : 'none';
                if (mini.style.display === 'block') document.getElementById('wfNuevoClienteNombre').focus();
            });
        }
        var btnNuevoCliCancel = document.getElementById('wfNuevoClienteCancel');
        if (btnNuevoCliCancel) {
            btnNuevoCliCancel.addEventListener('click', function() {
                document.getElementById('wnMiniCliente').style.display = 'none';
                document.getElementById('wfNuevoClienteNombre').value = '';
            });
        }
        var btnNuevoCliSave = document.getElementById('wfNuevoClienteGuardar');
        if (btnNuevoCliSave) {
            btnNuevoCliSave.addEventListener('click', function() {
                var nombre = document.getElementById('wfNuevoClienteNombre').value.trim();
                if (!nombre) { document.getElementById('wfNuevoClienteNombre').focus(); return; }
                var btn = this;
                btn.disabled = true; btn.textContent = 'Guardando…';
                fetch('/app/api/quick-crear-cliente/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
                    body: JSON.stringify({ nombre_empresa: nombre })
                }).then(function(r) { return r.json(); }).then(function(res) {
                    if (res.success) {
                        document.getElementById('wfCliente').value = res.nombre;
                        if (typeof window._wfSelectedClienteId !== 'undefined') window._wfSelectedClienteId = res.id;
                        document.getElementById('wfCliente').dispatchEvent(new CustomEvent('wn:cliente-set', { detail: { id: res.id, nombre: res.nombre } }));
                        document.getElementById('wnMiniCliente').style.display = 'none';
                        document.getElementById('wfNuevoClienteNombre').value = '';
                        wnRefreshLabels();
                    } else {
                        alert(res.error || 'Error al crear cliente');
                    }
                    btn.disabled = false; btn.textContent = 'Guardar cliente';
                }).catch(function() { btn.disabled = false; btn.textContent = 'Guardar cliente'; });
            });
        }

        // ── Botón + Contacto (mini-form) ──
        var btnAddCt = document.getElementById('wnAddContactoBtn');
        if (btnAddCt) {
            btnAddCt.addEventListener('click', function() {
                var mini = document.getElementById('wnMiniContacto');
                mini.style.display = mini.style.display === 'none' ? 'block' : 'none';
                if (mini.style.display === 'block') document.getElementById('wfNuevoContactoNombre').focus();
            });
        }
        var btnNuevoCtCancel = document.getElementById('wfNuevoContactoCancel');
        if (btnNuevoCtCancel) {
            btnNuevoCtCancel.addEventListener('click', function() {
                document.getElementById('wnMiniContacto').style.display = 'none';
                document.getElementById('wfNuevoContactoNombre').value = '';
                document.getElementById('wfNuevoContactoApellido').value = '';
            });
        }
        var btnNuevoCtSave = document.getElementById('wfNuevoContactoGuardar');
        if (btnNuevoCtSave) {
            btnNuevoCtSave.addEventListener('click', function() {
                var nombre = document.getElementById('wfNuevoContactoNombre').value.trim();
                if (!nombre) { document.getElementById('wfNuevoContactoNombre').focus(); return; }
                var btn = this;
                btn.disabled = true; btn.textContent = 'Guardando…';
                var empresaId = typeof window._wfSelectedClienteId !== 'undefined' ? window._wfSelectedClienteId : null;
                fetch('/app/api/quick-crear-contacto/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
                    body: JSON.stringify({
                        nombre: nombre,
                        apellido: document.getElementById('wfNuevoContactoApellido').value.trim(),
                        empresa_id: empresaId
                    })
                }).then(function(r) { return r.json(); }).then(function(res) {
                    if (res.success) {
                        document.getElementById('wfContacto').value = res.nombre_completo;
                        document.getElementById('wnMiniContacto').style.display = 'none';
                        document.getElementById('wfNuevoContactoNombre').value = '';
                        document.getElementById('wfNuevoContactoApellido').value = '';
                        wnRefreshLabels();
                    } else {
                        alert(res.error || 'Error al crear contacto');
                    }
                    btn.disabled = false; btn.textContent = 'Guardar contacto';
                }).catch(function() { btn.disabled = false; btn.textContent = 'Guardar contacto'; });
            });
        }

        // ⌘/Ctrl+Enter submite
        var formEl = document.getElementById('formNegociacion');
        if (formEl) {
            formEl.addEventListener('keydown', function(e) {
                if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                    e.preventDefault();
                    var btn = document.getElementById('wfSubmit');
                    if (btn) btn.click();
                }
            });
        }
    })();
    </script>
