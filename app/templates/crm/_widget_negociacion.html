    <!-- ═══ WIDGET: NUEVA NEGOCIACIÓN ═══ -->
    <div class="widget-overlay" id="widgetNegociacion" style="z-index:10300;"
        onclick="if(event.target===this){this.classList.add('closing');var self=this;setTimeout(function(){self.classList.remove('active','closing');},200);}">
        <div class="widget-card">
            <div class="widget-header">
                <h3>Nueva Negociacion</h3>
                <button type="button" class="widget-close" id="widgetClose"
                    onclick="var w=document.getElementById('widgetNegociacion');w.classList.add('closing');setTimeout(function(){w.classList.remove('active','closing');},200);">&times;</button>
            </div>
            <div class="widget-body">
                <form id="formNegociacion" autocomplete="off">
                    {% csrf_token %}

                    <div class="wf-group">
                        <label class="wf-label">Cliente</label>
                        <input type="text" class="wf-input" id="wfCliente" placeholder="Buscar o crear cliente..."
                            required>
                        <div class="wf-autocomplete" id="wfClienteAC"></div>
                    </div>

                    <div class="wf-group">
                        <label class="wf-label">Contacto</label>
                        <input type="text" class="wf-input" id="wfContacto" placeholder="Nombre del contacto...">
                        <div class="wf-autocomplete" id="wfContactoAC"></div>
                    </div>

                    <div class="wf-group">
                        <label class="wf-label">Nombre de la Oportunidad</label>
                        <input type="text" class="wf-input" id="wfOportunidad"
                            placeholder="Ej: Implementacion de sistema..." required>
                    </div>

                    <div class="wf-row">
                        <div class="wf-group">
                            <label class="wf-label">Monto Estimado</label>
                            <input type="number" class="wf-input" id="wfMonto" placeholder="0.00" step="0.01" min="0"
                                required>
                        </div>
                        <div class="wf-group">
                            <label class="wf-label">Probabilidad (%)</label>
                            <input type="number" class="wf-input" id="wfProbabilidad" value="25" min="5" max="100"
                                step="5">
                        </div>
                    </div>

                    <div class="wf-row">
                        <div class="wf-group">
                            <label class="wf-label">Area</label>
                            <select class="wf-select" id="wfArea">
                                <option value="SISTEMAS">Sistemas</option>
                                <option value="Recursos Humanos">Recursos Humanos</option>
                                <option value="Compras">Compras</option>
                                <option value="Seguridad">Seguridad</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                                <option value="Almacén">Almacen</option>
                            </select>
                        </div>
                        <div class="wf-group">
                            <label class="wf-label">Producto</label>
                            <select class="wf-select" id="wfProducto">
                                <option value="ZEBRA">Zebra</option>
                                <option value="PANDUIT">Panduit</option>
                                <option value="APC">APC</option>
                                <option value="AVIGILION">Avigilon</option>
                                <option value="GENETEC">Genetec</option>
                                <option value="AXIS">Axis</option>
                                <option value="SOFTWARE" selected>Software</option>
                                <option value="RUNRATE">Runrate</option>
                                <option value="PÓLIZA">Poliza</option>
                                <option value="CISCO">Cisco</option>
                                <option value="SERVICIO">Servicio</option>
                            </select>
                        </div>
                    </div>

                    <div class="wf-row">
                        <div class="wf-group">
                            <label class="wf-label">Mes de Cierre</label>
                            <select class="wf-select" id="wfMesCierre">
                                {% for code, name in mes_choices %}
                                <option value="{{ code }}">{{ name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="wf-group">
                            <label class="wf-label">Tipo</label>
                            <select class="wf-select" id="wfTipo">
                                <option value="runrate">Runrate</option>
                                <option value="proyecto">Proyecto</option>
                            </select>
                        </div>
                    </div>

                    <div class="wf-group">
                        <label class="wf-label">Comentarios</label>
                        <textarea class="wf-textarea" id="wfComentarios" placeholder="Informacion adicional..."
                            rows="2"></textarea>
                    </div>

                    <div class="widget-actions">
                        <button type="button" class="wf-btn wf-btn-cancel" id="wfCancel"
                            onclick="var w=document.getElementById('widgetNegociacion');w.classList.add('closing');setTimeout(function(){w.classList.remove('active','closing');},200);">Cancelar</button>
                        <button type="submit" class="wf-btn wf-btn-submit" id="wfSubmit">Crear Negociacion</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
