{% extends "base.html" %}
{% block title %}Reporte de Usuarios{% endblock %}
{% block content %}
<div class="mt-8 bg-white/10 backdrop-blur-lg text-gray-100 p-8 rounded-2xl shadow-2xl border border-gray-700 glass-card animate-fade-in">
    <h1 class="text-3xl font-extrabold text-white mb-8 text-center tracking-wide">Reporte de Usuarios</h1>
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-700 rounded-2xl overflow-hidden shadow-xl glass-table animate-fade-in">
            <thead class="bg-gray-800/80">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">Usuario</th>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">Nombre</th>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">Email</th>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">Acciones</th>
                </tr>
            </thead>
            <tbody class="bg-gray-800/60 divide-y divide-gray-700">
                {% for usuario in usuarios %}
                <tr class="hover:bg-indigo-900/30 transition-colors duration-200">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-white">{{ usuario.username }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">{{ usuario.get_full_name }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">{{ usuario.email }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <a href="{% url 'perfil_usuario' usuario.id %}" class="inline-flex items-center px-3 py-1 border border-transparent text-sm leading-4 font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">
                            Ver Perfil
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

<style>
.glass-card {
    background: rgba(30, 41, 59, 0.55);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
    border-radius: 1.5rem;
    border: 1.5px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
}
.glass-table {
    background: rgba(30, 41, 59, 0.35);
    border-radius: 1.5rem;
    box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
    overflow: hidden;
}
@media (max-width: 640px) {
    .glass-card, .glass-table {
        padding: 1rem !important;
        border-radius: 1rem !important;
    }
    table th, table td {
        padding-left: 0.5rem !important;
        padding-right: 0.5rem !important;
    }
}
@keyframes fade-in {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: none; }
}
.animate-fade-in {
    animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
}
</style>
