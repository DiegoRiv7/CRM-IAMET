{% extends 'base.html' %}
{% load static %}

{% block title %}Calendario de Actividades{% endblock %}

{% block extra_head %}
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet' />
    <style>
        body {
            font-family: var(--apple-font-family);
            background: var(--apple-background);
            color: var(--apple-label);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        .fc .fc-button-primary {
            background-color: var(--apple-blue);
            border-color: var(--apple-blue);
            color: var(--apple-label);
        }
        .fc .fc-button-primary:hover {
            background-color: var(--apple-blue-dark);
            border-color: var(--apple-blue-dark);
        }
        .fc .fc-button-primary:not(:disabled).fc-button-active {
            background-color: var(--apple-blue-dark);
            border-color: var(--apple-blue-dark);
        }
        .fc-event {
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85em;
            border: 1px solid transparent;
            padding: 2px 4px;
            text-align: center;
        }
        .fc-event-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fc-daygrid-event-harness {
            margin-bottom: 2px;
        }
        .fc-daygrid-event {
            background-color: var(--apple-blue);
            border-color: var(--apple-blue);
            color: white;
        }
        .fc-timegrid-event {
            background-color: var(--apple-blue-light);
            border-color: var(--apple-blue-light);
            color: white;
        }
        .fc-day-today {
            background-color: rgba(0, 122, 255, 0.1);
        }
        .fc-toolbar-title {
            color: var(--apple-label);
        }
        .fc-col-header-cell-cushion {
            color: var(--apple-label-secondary);
        }
        .fc-daygrid-day-number {
            color: var(--apple-label-secondary);
        }
        .fc-list-event-title {
            color: var(--apple-blue);
        }
        .fc-list-event-dot {
            border-color: var(--apple-blue) !important;
        }
        .fc-list-day-text, .fc-list-day-side-text {
            color: var(--apple-label-tertiary);
        }
        .fc-theme-standard td, .fc-theme-standard th {
            border-color: var(--apple-separator);
        }
        .fc-scrollgrid-sync-table {
            background-color: var(--apple-background-secondary);
        }
        .fc-popover {
            background-color: var(--apple-background-secondary);
            border-color: var(--apple-separator);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .fc-popover-header {
            background-color: var(--apple-background-tertiary);
            border-bottom-color: var(--apple-separator);
            color: var(--apple-label);
        }
        .fc-popover-title {
            color: var(--apple-label);
        }
        .fc-popover-close {
            color: var(--apple-label);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background-color: var(--apple-background-secondary);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            position: relative;
            border: 1px solid var(--apple-separator);
        }
        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--apple-separator);
        }
        .modal-header h2 {
            font-size: 1.8rem;
            color: var(--apple-label);
            font-weight: 600;
        }
        .modal-close-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--apple-gray);
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .modal-close-btn:hover {
            color: var(--apple-label);
        }
        .modal-body label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--apple-label-secondary);
            font-size: 0.95rem;
        }
        .modal-body input[type="text"],
        .modal-body input[type="datetime-local"],
        .modal-body textarea,
        .modal-body select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--apple-separator);
            border-radius: 8px;
            background-color: var(--apple-background-tertiary);
            color: var(--apple-label);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .modal-body input[type="text"]:focus,
        .modal-body input[type="datetime-local"]:focus,
        .modal-body textarea:focus,
        .modal-body select:focus {
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.3);
            outline: none;
        }
        .modal-body textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--apple-separator);
        }
        .modal-footer button {
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .btn-primary {
            background-color: var(--apple-blue);
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background-color: var(--apple-blue-dark);
        }
        .btn-secondary {
            background-color: var(--apple-gray-3);
            color: var(--apple-label);
            border: none;
        }
        .btn-secondary:hover {
            background-color: var(--apple-gray-2);
        }
        .btn-danger {
            background-color: #FF3B30;
            color: white;
            border: none;
        }
        .btn-danger:hover {
            background-color: #CC0000;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group.checkbox {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        .form-group.checkbox input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        .form-group.checkbox label {
            margin-bottom: 0;
        }
        .select2-container--default .select2-selection--multiple {
            background-color: var(--apple-background-tertiary) !important;
            border: 1px solid var(--apple-separator) !important;
            border-radius: 8px !important;
            color: var(--apple-label) !important;
            padding: 6px 12px !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: var(--apple-blue) !important;
            border: 1px solid var(--apple-blue-dark) !important;
            color: white !important;
            border-radius: 4px !important;
            padding: 2px 8px !important;
            margin-top: 4px !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            color: rgba(255, 255, 255, 0.7) !important;
            margin-right: 5px !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove:hover {
            color: white !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__rendered {
            color: var(--apple-label) !important;
        }
        .select2-container--default .select2-search--inline .select2-search__field {
            color: var(--apple-label) !important;
        }
        .select2-dropdown {
            background-color: var(--apple-background-secondary) !important;
            border: 1px solid var(--apple-separator) !important;
            border-radius: 8px !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .select2-results__option {
            color: var(--apple-label) !important;
        }
        .select2-results__option--highlighted {
            background-color: var(--apple-blue) !important;
            color: white !important;
        }
        .select2-search input {
            background-color: var(--apple-background-tertiary) !important;
            border: 1px solid var(--apple-separator) !important;
            color: var(--apple-label) !important;
        }
    </style>
{% endblock %}

{% block content %}
<div class="apple-bg"></div>
<main class="flex flex-col items-center justify-start min-h-screen p-8">
    <section class="w-full max-w-7xl mx-auto apple-fade-in" style="animation-delay:0.2s;">
        <h1 class="apple-title-1 text-center mb-8" style="color: var(--apple-blue);">Calendario de Actividades</h1>
        <div class="apple-card p-6 md:p-8">
            <div id='calendar'></div>
        </div>
    </section>
</main>

<!-- Modal para Ver/Crear/Editar Actividad -->
<div id="event-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Detalles de la Actividad</h2>
            <button class="modal-close-btn" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="event-form">
                {% csrf_token %}
                <input type="hidden" id="event-id">
                <div class="form-group">
                    <label for="event-title">Título</label>
                    <input type="text" id="event-title" required>
                </div>
                <div class="form-group">
                    <label for="event-description">Descripción</label>
                    <textarea id="event-description"></textarea>
                </div>
                <div class="form-group">
                    <label for="event-start">Inicio</label>
                    <input type="datetime-local" id="event-start" required>
                </div>
                <div class="form-group">
                    <label for="event-end">Fin</label>
                    <input type="datetime-local" id="event-end" required>
                </div>
                <div class="form-group">
                    <label for="event-color">Color</label>
                    <select id="event-color">
                        <option value="#007AFF" style="background-color: #007AFF; color: white;">Azul</option>
                        <option value="#34C759" style="background-color: #34C759; color: white;">Verde</option>
                        <option value="#FF9500" style="background-color: #FF9500; color: white;">Naranja</option>
                        <option value="#FF3B30" style="background-color: #FF3B30; color: white;">Rojo</option>
                        <option value="#AF52DE" style="background-color: #AF52DE; color: white;">Morado</option>
                        <option value="#5856D6" style="background-color: #5856D6; color: white;">Índigo</option>
                        <option value="#FF2D55" style="background-color: #FF2D55; color: white;">Rosa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="event-participants">Participantes</label>
                    <select id="event-participants" multiple="multiple" style="width: 100%;">
                        <!-- Options will be loaded dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="event-opportunity">Oportunidad Relacionada</label>
                    <select id="event-opportunity" style="width: 100%;">
                        <option value="">-- Seleccionar Oportunidad --</option>
                        <!-- Options will be loaded dynamically -->
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button id="delete-event-btn" class="btn-danger" onclick="deleteEvent()">Eliminar</button>
            <button id="save-event-btn" class="btn-primary" onclick="saveEvent()">Guardar</button>
            <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
    <!-- FullCalendar JS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <!-- Moment.js for date formatting (optional, but useful) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        let calendar;
        let currentEvent = null; // To store the event being edited/viewed

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es', // Set locale to Spanish
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
                },
                buttonText: {
                    today: 'Hoy',
                    month: 'Mes',
                    week: 'Semana',
                    day: 'Día',
                    list: 'Lista'
                },
                editable: true, // Allow dragging and resizing events
                selectable: true, // Allow selecting dates to create events
                eventStartEditable: true,
                eventDurationEditable: true,
                events: function(fetchInfo, successCallback, failureCallback) {
                    fetch('/app/api/actividades/', {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrfToken
                        }
                    })
                    .then(response => response.json())
                    .then(data => {
                        const events = data.map(event => ({
                            id: event.id,
                            title: event.title,
                            start: event.start,
                            end: event.end,
                            description: event.description,
                            color: event.color,
                            participants: event.participants, // Array of user IDs
                            opportunity: event.opportunity // Opportunity ID
                        }));
                        successCallback(events);
                    })
                    .catch(error => {
                        console.error('Error fetching events:', error);
                        failureCallback(error);
                    });
                },
                dateClick: function(info) {
                    openModalForCreation(info.dateStr);
                },
                eventClick: function(info) {
                    openModalForEdit(info.event);
                },
                eventDrop: function(info) {
                    updateEventDates(info.event);
                },
                eventResize: function(info) {
                    updateEventDates(info.event);
                }
            });
            calendar.render();

            // Initialize Select2 for participants and opportunity
            $('#event-participants').select2({
                placeholder: "Selecciona participantes",
                allowClear: true,
                ajax: {
                    url: '/app/api/users/', // API endpoint to fetch users
                    dataType: 'json',
                    delay: 250,
                    processResults: function (data) {
                        return {
                            results: data.map(user => ({
                                id: user.id,
                                text: user.username // Or user.full_name if available
                            }))
                        };
                    },
                    cache: true
                }
            });

            $('#event-opportunity').select2({
                placeholder: "Selecciona una oportunidad",
                allowClear: true,
                ajax: {
                    url: '/app/api/oportunidades/', // API endpoint to fetch opportunities
                    dataType: 'json',
                    delay: 250,
                    processResults: function (data) {
                        return {
                            results: data.map(opp => ({
                                id: opp.id,
                                text: opp.title
                            }))
                        };
                    },
                    cache: true
                }
            });
        });

        function openModal() {
            document.getElementById('event-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('event-modal').classList.remove('show');
            document.getElementById('event-form').reset();
            $('#event-participants').val(null).trigger('change'); // Clear Select2
            $('#event-opportunity').val(null).trigger('change'); // Clear Select2
            currentEvent = null;
            document.getElementById('delete-event-btn').style.display = 'none';
        }

        function openModalForCreation(dateStr) {
            document.getElementById('modal-title').innerText = 'Crear Nueva Actividad';
            document.getElementById('event-id').value = '';
            document.getElementById('event-start').value = moment(dateStr).format('YYYY-MM-DDTHH:mm');
            document.getElementById('event-end').value = moment(dateStr).add(1, 'hour').format('YYYY-MM-DDTHH:mm');
            document.getElementById('delete-event-btn').style.display = 'none';
            openModal();
        }

        function openModalForEdit(event) {
            currentEvent = event;
            document.getElementById('modal-title').innerText = 'Editar Actividad';
            document.getElementById('event-id').value = event.id;
            document.getElementById('event-title').value = event.title;
            document.getElementById('event-description').value = event.extendedProps.description || '';
            document.getElementById('event-start').value = moment(event.start).format('YYYY-MM-DDTHH:mm');
            document.getElementById('event-end').value = moment(event.end).format('YYYY-MM-DDTHH:mm');
            document.getElementById('event-color').value = event.backgroundColor || '#007AFF';
            
            // Set participants
            if (event.extendedProps.participants && event.extendedProps.participants.length > 0) {
                const participantSelect = $('#event-participants');
                participantSelect.empty(); // Clear existing options
                event.extendedProps.participants.forEach(p => {
                    // Check if option already exists, if not, add it
                    if (!participantSelect.find('option[value="' + p.id + '"]').length) {
                        participantSelect.append(new Option(p.text, p.id, true, true));
                    }
                });
                participantSelect.trigger('change'); // Notify Select2 of changes
            } else {
                $('#event-participants').val(null).trigger('change');
            }

            // Set opportunity
            if (event.extendedProps.opportunity) {
                const opportunitySelect = $('#event-opportunity');
                opportunitySelect.empty();
                opportunitySelect.append(new Option(event.extendedProps.opportunity.text, event.extendedProps.opportunity.id, true, true));
                opportunitySelect.trigger('change');
            } else {
                $('#event-opportunity').val(null).trigger('change');
            }

            document.getElementById('delete-event-btn').style.display = 'block';
            openModal();
        }

        function collectEventData() {
            return {
                id: document.getElementById('event-id').value || null,
                title: document.getElementById('event-title').value,
                description: document.getElementById('event-description').value,
                start: document.getElementById('event-start').value,
                end: document.getElementById('event-end').value,
                color: document.getElementById('event-color').value,
                participants: $('#event-participants').val(), // Array of selected user IDs
                opportunity: $('#event-opportunity').val() // Selected opportunity ID
            };
        }

        function saveEvent() {
            const eventData = collectEventData();
            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
            const method = eventData.id ? 'PUT' : 'POST';
            const url = eventData.id ? `/app/api/actividades/${eventData.id}/` : '/app/api/actividades/';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify(eventData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.id) {
                    if (eventData.id) {
                        // Update existing event
                        currentEvent.setProp('title', data.title);
                        currentEvent.setStart(data.start);
                        currentEvent.setEnd(data.end);
                        currentEvent.setProp('backgroundColor', data.color);
                        currentEvent.setProp('borderColor', data.color);
                        currentEvent.setExtendedProp('description', data.description);
                        currentEvent.setExtendedProp('participants', data.participants);
                        currentEvent.setExtendedProp('opportunity', data.opportunity);
                    } else {
                        // Add new event
                        calendar.addEvent({
                            id: data.id,
                            title: data.title,
                            start: data.start,
                            end: data.end,
                            description: data.description,
                            color: data.color,
                            participants: data.participants,
                            opportunity: data.opportunity
                        });
                    }
                    calendar.refetchEvents(); // Refresh events
                    closeModal();
                } else {
                    alert('Error al guardar la actividad: ' + JSON.stringify(data));
                }
            })
            .catch(error => {
                console.error('Error saving event:', error);
                alert('Error al guardar la actividad.');
            });
        }

        function deleteEvent() {
            if (!currentEvent || !confirm('¿Estás seguro de que quieres eliminar esta actividad?')) {
                return;
            }

            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

            fetch(`/app/api/actividades/${currentEvent.id}/`, {
                method: 'DELETE',
                headers: {
                    'X-CSRFToken': csrfToken
                }
            })
            .then(response => {
                if (response.ok) {
                    currentEvent.remove(); // Remove from calendar
                    closeModal();
                } else {
                    alert('Error al eliminar la actividad.');
                }
            })
            .catch(error => {
                console.error('Error deleting event:', error);
                alert('Error al eliminar la actividad.');
            });
        }

        function updateEventDates(event) {
            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
            const eventData = {
                id: event.id,
                title: event.title,
                start: moment(event.start).format('YYYY-MM-DDTHH:mm'),
                end: moment(event.end).format('YYYY-MM-DDTHH:mm'),
                description: event.extendedProps.description,
                color: event.backgroundColor,
                participants: event.extendedProps.participants ? event.extendedProps.participants.map(p => p.id) : [],
                opportunity: event.extendedProps.opportunity ? event.extendedProps.opportunity.id : null
            };

            fetch(`/app/api/actividades/${event.id}/`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify(eventData)
            })
            .then(response => response.json())
            .then(data => {
                if (!data.id) {
                    alert('Error al actualizar la actividad.');
                    event.revert(); // Revert the event's dates if update fails
                }
            })
            .catch(error => {
                console.error('Error updating event dates:', error);
                alert('Error al actualizar la actividad.');
                event.revert(); // Revert the event's dates if update fails
            });
        }
    </script>
{% endblock %}
