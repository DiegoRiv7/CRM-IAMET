{% extends 'base.html' %}
{% load static %}

{% block title %}Generando Cotización{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-lg mx-auto bg-white rounded-lg shadow-lg p-8 text-center">
        <!-- Header -->
        <div class="mb-6">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg id="main-icon" class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <h3 id="main-title" class="text-xl font-bold text-gray-800 mb-2">Generando tu cotización...</h3>
            <p id="main-description" class="text-gray-600 text-sm">Este proceso puede tomar unos segundos</p>
        </div>

        <!-- Progress Bar -->
        <div class="mb-6">
            <div class="w-full bg-gray-200 rounded-full h-2 mb-4">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- Single Status Step -->
        <div class="mb-6">
            <div id="main-step" class="flex items-center justify-center p-4 rounded-lg bg-blue-50 border border-blue-200">
                <div class="flex-shrink-0 mr-4">
                    <div class="w-8 h-8 border-3 border-blue-500 rounded-full animate-spin border-t-transparent"></div>
                </div>
                <span class="text-blue-700 font-semibold text-lg">Generando PDF...</span>
            </div>
        </div>

        <!-- Status Message -->
        <p id="status-message" class="text-gray-600 text-sm">
            Iniciando proceso...
        </p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const statusMessage = document.getElementById('status-message');
    
    // Función para iniciar descarga
    function startDownload() {
        console.log('🚀 Iniciando descarga automática del PDF...');
        
        // Crear enlace invisible para descarga
        const link = document.createElement('a');
        link.href = '{{ pdf_download_url }}';
        link.download = ''; // Permite que el servidor defina el nombre
        link.style.display = 'none';
        
        // Agregar al DOM y hacer clic
        document.body.appendChild(link);
        link.click();
        
        // Limpiar
        document.body.removeChild(link);
        
        // Actualizar mensaje
        statusMessage.textContent = 'PDF descargado. Redirigiendo a cotizaciones por oportunidades...';
        
        console.log('✅ Descarga iniciada. Redirigiendo en 2 segundos...');
    }
    
    // Función para redirigir a cotizaciones por oportunidades
    function redirect() {
        console.log('🔄 Redirigiendo a cotizaciones por oportunidades...');
        window.location.href = '{% url "cotizaciones_por_oportunidad" oportunidad.id %}';
    }
    
    // Secuencia automática más rápida
    const progressBar = document.getElementById('progress-bar');
    
    // Iniciar inmediatamente al cargar
    progressBar.style.width = '100%';
    statusMessage.textContent = 'Generando y descargando PDF...';
    
    // Descargar casi inmediatamente
    setTimeout(function() {
        startDownload();
        
        // Redirigir más rápido
        setTimeout(function() {
            redirect();
        }, 1500);
        
    }, 200); // Solo 200ms de espera
});
</script>

{% endblock %}
