{% extends 'base.html' %}
{% load static %}

{% block title %}Descargando Cotización{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6 text-center">
        <h3 class="text-lg font-semibold mb-4 text-gray-800">Descargando PDF...</h3>
        <div class="mb-4">
            <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        </div>
        <p id="status-message" class="text-gray-600 mb-4">
            Preparando descarga...
        </p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const statusMessage = document.getElementById('status-message');
    
    // Función para iniciar descarga
    function startDownload() {
        console.log('🚀 Iniciando descarga automática del PDF...');
        
        // Crear enlace invisible para descarga
        const link = document.createElement('a');
        link.href = '{{ pdf_download_url }}';
        link.download = ''; // Permite que el servidor defina el nombre
        link.style.display = 'none';
        
        // Agregar al DOM y hacer clic
        document.body.appendChild(link);
        link.click();
        
        // Limpiar
        document.body.removeChild(link);
        
        // Actualizar mensaje
        statusMessage.textContent = 'PDF descargado. Redirigiendo a cotizaciones por oportunidades...';
        
        console.log('✅ Descarga iniciada. Redirigiendo en 2 segundos...');
    }
    
    // Función para redirigir a cotizaciones por oportunidades
    function redirect() {
        console.log('🔄 Redirigiendo a cotizaciones por oportunidades...');
        window.location.href = '/app/todos/{{ oportunidad.id }}/cotizaciones/';
    }
    
    // Secuencia automática
    setTimeout(function() {
        startDownload();
        
        // Redirigir después de 2 segundos
        setTimeout(function() {
            redirect();
        }, 2000);
        
    }, 500); // Esperar medio segundo antes de iniciar
});
</script>

{% endblock %}
