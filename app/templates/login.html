<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nethive - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-gray: #8E8E93;
            --apple-background: #000000;
            --apple-background-secondary: #1D1D1F;
            --apple-label: #FFFFFF;
            --apple-label-secondary: #EBEBF5;
            --apple-label-tertiary: #EBEBF599;
            --apple-separator: #38383A;
            --apple-font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Inter', system-ui, sans-serif;
        }
        body {
            font-family: var(--apple-font-family);
            background: var(--apple-background);
            color: var(--apple-label);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .apple-bg {
            position: fixed; 
            inset: 0; 
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(ellipse at top left, rgba(0, 122, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(0, 122, 255, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, var(--apple-background) 0%, var(--apple-background-secondary) 100%);
        }
        .login-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: appleFadeIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .page-title {
            font-family: var(--apple-font-family);
            font-size: 4rem;
            font-weight: 600;
            color: var(--apple-label);
            letter-spacing: -0.025em;
            margin-bottom: 2rem;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 300px;
        }
        .login-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--apple-separator);
            border-radius: 8px;
            color: var(--apple-label);
            font-family: var(--apple-font-family);
            font-size: 1rem;
            padding: 12px 16px;
            width: 100%;
            transition: all 0.3s;
            text-align: center;
            margin-bottom: 1rem;
        }
        .login-field:focus {
            outline: none;
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.3);
        }
        .login-button {
            background: var(--apple-blue);
            color: var(--apple-label);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            width: auto;
        }
        .login-button:hover {
            filter: brightness(1.1);
        }
        .error-message {
            color: #FF453A;
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
        }
        @keyframes appleFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Light Theme Styles - Original Summer Pink */
        .light-theme {
            --apple-background: linear-gradient(135deg, #FFF5F8 0%, #FFE8EF 30%, #FFD1DC 60%, #FFC0CB 100%);
            --apple-background-secondary: rgba(255, 240, 245, 0.8);
            --apple-separator: rgba(255, 107, 157, 0.25);
            --apple-blue: #FF6B9D;
            --apple-label: #2D1B2E;
            --apple-label-secondary: #4A2B4D;
            --apple-label-tertiary: #6B4C6D;
        }

        .light-theme body {
            background: linear-gradient(135deg, #FFF5F8 0%, #FFE8EF 30%, #FFD1DC 60%, #FFC0CB 100%);
            background-attachment: fixed;
            color: var(--apple-label);
        }

        .light-theme .apple-bg {
            background: 
                radial-gradient(ellipse at top left, rgba(255, 107, 157, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(255, 192, 203, 0.06) 0%, transparent 50%),
                linear-gradient(135deg, #FFF5F8 0%, #FFE8EF 30%, #FFD1DC 60%, #FFC0CB 100%);
        }

        .light-theme .page-title {
            color: #000000 !important;
            text-shadow: none;
        }

        .light-theme .login-field {
            background: rgba(255, 240, 245, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 107, 157, 0.3);
            color: var(--apple-label);
            box-shadow: 
                0 4px 16px rgba(255, 107, 157, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .light-theme .login-field:focus {
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.3);
        }

        .light-theme .login-field::placeholder {
            color: var(--apple-label-secondary);
        }

        .light-theme .login-button {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF91A4 100%);
            box-shadow: 
                0 6px 20px rgba(255, 107, 157, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .light-theme .login-button:hover {
            background: linear-gradient(135deg, #E55A87 0%, #FF6B9D 100%);
            filter: none;
        }
    </style>
</head>
<body>
    <div class="apple-bg"></div>
    <div class="login-container">
        <h1 class="page-title">Nethive</h1>
        <form method="post" class="login-form">
            {% csrf_token %}
            <input type="text" name="username" id="id_username" class="login-field" placeholder="Usuario" required value="{{ form.username.value|default:'' }}">
            <input type="password" name="password" id="id_password" class="login-field" placeholder="Contraseña" required>
            <button type="submit" class="login-button">Iniciar Sesión</button>
            {% if form.errors %}
                <p class="error-message">Credenciales incorrectas. Inténtalo de nuevo.</p>
            {% endif %}
        </form>
    </div>

    <script>
        // Apply saved theme preference on login page
        (function() {
            try {
                const saved = localStorage.getItem('designPreferences');
                if (saved) {
                    const preferences = JSON.parse(saved);
                    const isDarkMode = preferences.isDarkMode !== undefined ? preferences.isDarkMode : true;
                    
                    if (!isDarkMode) {
                        document.documentElement.classList.add('light-theme');
                    }
                }
            } catch (error) {
                // If there's an error, just use default dark mode
                console.log('Using default dark theme on login');
            }
        })();
    </script>
</body>
</html>
