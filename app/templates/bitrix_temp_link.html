<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso a la Aplicación Django</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c; /* Fondo oscuro */
            color: #e2e8f0; /* Texto claro */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
        }
        .container {
            background-color: #2d3748; /* Fondo de contenedor más oscuro */
            border: 1px solid #4a5568; /* Borde de contenedor */
            border-radius: 0.75rem; /* rounded-xl */
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 400px;
        }
        .btn-primary {
            background-color: #4299e1; /* Azul Tailwind */
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem; /* rounded-lg */
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s ease;
            display: inline-block;
            margin-top: 1.5rem;
        }
        .btn-primary:hover {
            background-color: #3182ce; /* Azul más oscuro al pasar el ratón */
        }
        h1 {
            font-size: 1.5rem; /* text-2xl */
            font-weight: 700; /* font-bold */
            margin-bottom: 1rem;
            color: #f7fafc;
        }
        p {
            font-size: 1rem; /* text-base */
            color: #cbd5e0;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Acceso a la Aplicación</h1>
        <p>Haz clic en el botón de abajo para ir a la página de inicio de tu aplicación Django.</p>
        <a href="/home/" class="btn-primary">Ir a la Aplicación</a>
    </div>
</body>
</html>
