<!DOCTYPE html>
<html>
<head>
    <title>Cargando Cotizador...</title>
    <script src="//api.bitrix24.com/api/v1/"></script>
</head>
<body>
    <p>Por favor, espere mientras cargamos el cotizador...</p>
    <script>
        BX24.init(function(){
            BX24.callMethod('crm.deal.get', {
                id: BX24.placement.info().options.ID
            }, function(result){
                if(result.data()){
                    var deal = result.data();
                    if(deal.COMPANY_ID){
                        window.location.href = '/app/cliente/' + deal.COMPANY_ID + '/crear-cotizacion/';
                    } else {
                        document.body.innerHTML = '<h1>Error: El trato no está asociado a ninguna compañía.</h1>';
                    }
                } else {
                    document.body.innerHTML = '<h1>Error: No se pudo obtener la información del trato.</h1><p>' + result.error().ex.error_description + '</p>';
                }
            });
        });
    </script>
</body>
</html>
