<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Administración de Ventas
        {% endblock %}
    </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/oportunidad_detail.css' %}">
    
    <!-- Intro.js for Tutorial -->
    <script src="https://unpkg.com/intro.js/intro.js"></script>
    <link href="https://unpkg.com/intro.js/introjs.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(120deg, #232946 0%, #1a202c 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(ellipse at 60% 40%, rgba(99,102,241,0.18) 0%, rgba(20,58,86,0.10) 60%, transparent 100%),
                        radial-gradient(ellipse at 20% 80%, rgba(16,185,129,0.10) 0%, transparent 80%),
                        radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.10) 0%, transparent 80%);
            pointer-events: none;
        }
        /* Estilos generales para el contenido principal */
        .main-content {
            padding-top: 2rem; /* Menos espacio arriba, ya no hay barra fija */
            padding-bottom: 2rem;
        }
        
        /* Glass effect utility for all cards/tables */
        .glass-card {
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-table {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
            overflow: hidden;
        }
        .drop-shadow-glow {
            text-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1, 0 0 2px #fff;
        }
        @media (max-width: 640px) {
            .glass-card, .glass-table {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            table th, table td {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: none; }
        }
        .animate-fade-in {
            animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        
        /* Custom Intro.js styling */
        .introjs-overlay {
            background-color: rgba(0, 0, 0, 0.8) !important;
        }
        .introjs-tooltip {
            background: rgba(30, 41, 59, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 12px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(12px) !important;
        }
        .introjs-tooltiptext {
            color: #e2e8f0 !important;
            font-family: 'Inter', sans-serif !important;
        }
        .introjs-button {
            background: #6366f1 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 16px !important;
            color: white !important;
            font-weight: 500 !important;
            transition: all 0.2s !important;
        }
        .introjs-button:hover {
            background: #4f46e5 !important;
            transform: translateY(-1px) !important;
        }
        .introjs-skipbutton {
            background: rgba(107, 114, 128, 0.8) !important;
        }
        .introjs-skipbutton:hover {
            background: rgba(75, 85, 99, 0.9) !important;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes pulse-light {
            0% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,1); }
            100% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
        }
        .animate-pulse-light {
            animation: pulse-light 2s infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s infinite ease-in-out;
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in {
            animation: slide-in 0.5s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Contenido Principal -->
    <div class="flex-grow container mx-auto px-4 py-8 main-content">
        {% block content %}
        {% endblock %}
    </div>
    {% include 'floating_menu.html' %}
    <!-- Pie de Página (Opcional) -->
    <footer class="bg-gray-800 text-gray-400 text-center p-4 mt-8">
        <div class="container mx-auto">
            <p>&copy; 2025 Gestión de Ventas. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="{% static 'js/nethive_assistant.js' %}"></script>
    <!-- Nethive Proactive Animated Bot -->
    <div id="nethive-proactive-bot" class="hidden fixed bottom-10 right-10 flex items-center space-x-4 z-[9998] transition-all duration-500 ease-in-out transform translate-x-full opacity-0">
        <!-- Avatar -->
        <div id="proactive-avatar-container" class="transform transition-transform duration-500 hover:scale-110">
            <!-- Mini avatar will be injected here -->
        </div>
        <!-- Speech Bubble -->
        <div class="relative bg-gradient-to-br from-slate-700 to-slate-800 rounded-2xl rounded-bl-none shadow-2xl border border-cyan-500/20 p-5 max-w-xs">
            <p id="proactive-message" class="text-slate-200 text-sm"></p>
            <div class="flex justify-end space-x-3 mt-4">
                <button id="proactive-no" class="px-3 py-1 rounded-lg bg-slate-600/70 hover:bg-slate-600 text-white text-xs font-medium transition-colors">No, gracias</button>
                <button id="proactive-yes" class="px-3 py-1 rounded-lg bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 text-white text-xs font-bold transition-all transform hover:scale-105">Sí</button>
            </div>
            <!-- Bubble arrow -->
            <div class="absolute left-0 bottom-0 w-0 h-0 border-l-[15px] border-l-transparent border-b-[15px] border-b-slate-700 transform -translate-x-2/3"></div>
        </div>
    </div>
</body>
