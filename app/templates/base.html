    <!-- THEME-SWITCHING SCRIPT to prevent flash of incorrect theme -->
    <script type="text/javascript">
        (function() {
            try {
                const saved = localStorage.getItem('designPreferences');
                if (saved) {
                    const preferences = JSON.parse(saved);
                    // Check for the light mode flag. If isDarkMode is false, apply light-theme.
                    const isDarkMode = preferences.isDarkMode !== undefined ? preferences.isDarkMode : true;
                    if (!isDarkMode) {
                        document.documentElement.classList.add('light-theme');
                    }
                }
            } catch (error) {
                // If something goes wrong, do nothing and let the default theme apply.
                console.log('Could not apply theme from localStorage.');
            }
        })();
    </script>

    <script src="https://unpkg.com/intro.js/intro.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            position: relative;
        }
        
        /* Estilos generales para el contenido principal */
        .main-content {
            padding-top: 2rem; /* Menos espacio arriba, ya no hay barra fija */
            padding-bottom: 2rem;
        }
        
        /* Glass effect utility for all cards/tables */
        .glass-card {
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-table {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
            overflow: hidden;
        }
        .drop-shadow-glow {
            text-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1, 0 0 2px #fff;
        }
        @media (max-width: 640px) {
            .glass-card, .glass-table {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            table th, table td {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: none; }
        }
        .animate-fade-in {
            animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        
        /* Custom Intro.js styling */
        .introjs-overlay {
            background-color: rgba(0, 0, 0, 0.8) !important;
        }
        .introjs-tooltip {
            background: rgba(30, 41, 59, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 12px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(12px) !important;
        }
        .introjs-tooltiptext {
            color: #e2e8f0 !important;
            font-family: 'Inter', sans-serif !important;
        }
        .introjs-button {
            background: #6366f1 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 16px !important;
            color: white !important;
            font-weight: 500 !important;
            transition: all 0.2s !important;
        }
        .introjs-button:hover {
            background: #4f46e5 !important;
            transform: translateY(-1px) !important;
        }
        .introjs-skipbutton {
            background: rgba(107, 114, 128, 0.8) !important;
        }
        .introjs-skipbutton:hover {
            background: rgba(75, 85, 99, 0.9) !important;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes pulse-light {
            0% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,1); }
            100% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
        }
        .animate-pulse-light {
            animation: pulse-light 2s infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s infinite ease-in-out;
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in {
            animation: slide-in 0.5s ease-out;
        }

        /* Light Theme Responsive Glass Effects */
        .light-theme .glass-card {
            background: rgba(235, 245, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(29, 53, 87, 0.15);
            box-shadow: 
                0 8px 32px rgba(0, 122, 255, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        @media (max-width: 768px) {
            .light-theme .glass-card {
                background: rgba(235, 245, 255, 0.8);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
            }
        }

        .light-theme .glass-table {
            background: rgba(235, 245, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(29, 53, 87, 0.1);
            box-shadow: 
                0 8px 32px rgba(0, 122, 255, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        /* Form responsiveness */
        @media (max-width: 768px) {
            .form-container {
                padding: 1rem;
            }
            
            .form-group {
                margin-bottom: 1rem;
            }
            
            input, select, textarea {
                width: 100%;
                padding: 0.75rem;
                font-size: 16px; /* Prevents zoom on iOS */
            }
            
            button {
                width: 100%;
                padding: 0.875rem;
                font-size: 1rem;
            }
        }
        
        /* Button responsiveness */
        @media (max-width: 768px) {
            .btn-group {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
        
        /* Modal responsiveness */
        @media (max-width: 768px) {
            .modal-dialog {
                margin: 1rem;
                max-width: calc(100% - 2rem);
            }
            
            .modal-content {
                border-radius: 1rem;
            }
        }
        
        /* Navigation responsiveness */
        @media (max-width: 768px) {
            .nav-tabs {
                flex-wrap: wrap;
                border: none;
            }
            
            .nav-tabs .nav-link {
                flex: 1;
                text-align: center;
                border-radius: 0.5rem;
                margin: 0.25rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col" {% if is_supervisor or user.is_superuser %}data-user-is-supervisor="true"{% endif %}>

        {% block content %}
        {% endblock %}

    <!-- Contenedor principal del bot Koti -->
    {% include 'nethive_bot.html' %}
    
    <!-- Script principal de Nethive -->
    <script src="{% static 'js/nethive_bot.js' %}" onerror="console.error('❌ Failed to load nethive_bot.js')"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Script de diagnóstico simple -->
    <script src="{% static 'js/debug_simple.js' %}" onerror="console.error('❌ Failed to load debug_simple.js')"></script>
    
    <!-- Sistema de debug avanzado -->
    <script src="{% static 'js/debug_system.js' %}" onerror="console.error('❌ Failed to load debug_system.js')"></script>
    
    <!-- Verificación de carga de scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔧 DOM loaded, checking bot functions...');
            console.log('showNethiveAssistant exists:', typeof window.showNethiveAssistant === 'function');
            console.log('closeNethiveAssistant exists:', typeof window.closeNethiveAssistant === 'function');
            
            // Verificar elementos del bot
            const modal = document.getElementById('nethive-assistant-modal');
            const container = document.getElementById('nethive-bot-container');
            console.log('Bot modal found:', !!modal);
            console.log('Bot container found:', !!container);
            
            if (!modal || !container) {
                console.error('❌ Bot elements missing from DOM');
            }
        });
    </script>
    
    <!-- Configuración simplificada -->
    <script>
        // Variables de configuración global
        window.KOTI_CONFIG = {
            geminiApiKey: 'AIzaSyCliVaBtT0hju3OQR-FTUONRYIfhLAaXUA',
            proactiveEnabled: true,
            opportunityWatchEnabled: true,
            debugMode: true
        };
        
        // Responsive utilities
        window.ResponsiveUtils = {
            isMobile: () => window.innerWidth <= 768,
            isTablet: () => window.innerWidth > 768 && window.innerWidth <= 1024,
            isDesktop: () => window.innerWidth > 1024,
            isCurvedMonitor: () => window.innerWidth > 2560 || (window.innerWidth > 1920 && window.screen.width / window.screen.height > 2),
            isUltraWide: () => window.innerWidth > 2560,
            
            // Add responsive classes to body
            updateBodyClasses: () => {
                const body = document.body;
                body.classList.remove('is-mobile', 'is-tablet', 'is-desktop', 'is-curved', 'is-ultrawide');
                
                if (window.ResponsiveUtils.isMobile()) body.classList.add('is-mobile');
                else if (window.ResponsiveUtils.isTablet()) body.classList.add('is-tablet');
                else if (window.ResponsiveUtils.isDesktop()) body.classList.add('is-desktop');
                
                if (window.ResponsiveUtils.isCurvedMonitor()) body.classList.add('is-curved');
                if (window.ResponsiveUtils.isUltraWide()) body.classList.add('is-ultrawide');
            }
        };
        
        // Update classes on load and resize
        window.ResponsiveUtils.updateBodyClasses();
        
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                window.ResponsiveUtils.updateBodyClasses();
            }, 150);
        });

        console.log('🤖 Configuración de Koti cargada');
        console.log('📱 Utilidades responsivas cargadas');
        
        // Test button para debuggar el bot
        if (window.location.search.includes('debug=bot')) {
            const testBtn = document.createElement('button');
            testBtn.textContent = '🤖 TEST BOT';
            testBtn.style.cssText = 'position:fixed;top:10px;right:10px;z-index:9999;padding:10px;background:#007AFF;color:white;border:none;border-radius:8px;font-weight:bold;';
            testBtn.onclick = function() {
                console.log('🔧 Test button clicked');
                if (typeof window.showNethiveAssistant === 'function') {
                    window.showNethiveAssistant();
                } else {
                    console.error('Function not available');
                    // Manual fallback
                    const modal = document.getElementById('nethive-assistant-modal');
                    const container = document.getElementById('nethive-bot-container');
                    if (modal && container) {
                        container.classList.remove('hidden');
                        modal.classList.remove('hidden');
                        console.log('✅ Manual bot open attempted');
                    }
                }
            };
            document.body.appendChild(testBtn);
        }
    </script>
</body>
</html>
