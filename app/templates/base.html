<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Administración de Ventas
        {% endblock %}
    </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/oportunidad_detail.css' %}">
    
    <!-- Intro.js for Tutorial -->
    <script src="https://unpkg.com/intro.js/intro.js"></script>
    <link href="https://unpkg.com/intro.js/introjs.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(120deg, #232946 0%, #1a202c 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(ellipse at 60% 40%, rgba(99,102,241,0.18) 0%, rgba(20,58,86,0.10) 60%, transparent 100%),
                        radial-gradient(ellipse at 20% 80%, rgba(16,185,129,0.10) 0%, transparent 80%),
                        radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.10) 0%, transparent 80%);
            pointer-events: none;
        }
        /* Estilos generales para el contenido principal */
        .main-content {
            padding-top: 2rem; /* Menos espacio arriba, ya no hay barra fija */
            padding-bottom: 2rem;
        }
        
        /* Glass effect utility for all cards/tables */
        .glass-card {
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-table {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
            overflow: hidden;
        }
        .drop-shadow-glow {
            text-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1, 0 0 2px #fff;
        }
        @media (max-width: 640px) {
            .glass-card, .glass-table {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            table th, table td {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: none; }
        }
        .animate-fade-in {
            animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        
        /* Custom Intro.js styling */
        .introjs-overlay {
            background-color: rgba(0, 0, 0, 0.8) !important;
        }
        .introjs-tooltip {
            background: rgba(30, 41, 59, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 12px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(12px) !important;
        }
        .introjs-tooltiptext {
            color: #e2e8f0 !important;
            font-family: 'Inter', sans-serif !important;
        }
        .introjs-button {
            background: #6366f1 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 16px !important;
            color: white !important;
            font-weight: 500 !important;
            transition: all 0.2s !important;
        }
        .introjs-button:hover {
            background: #4f46e5 !important;
            transform: translateY(-1px) !important;
        }
        .introjs-skipbutton {
            background: rgba(107, 114, 128, 0.8) !important;
        }
        .introjs-skipbutton:hover {
            background: rgba(75, 85, 99, 0.9) !important;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes pulse-light {
            0% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,1); }
            100% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
        }
        .animate-pulse-light {
            animation: pulse-light 2s infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s infinite ease-in-out;
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in {
            animation: slide-in 0.5s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col" {% if is_supervisor or user.is_superuser %}data-user-is-supervisor="true"{% endif %}>
    <!-- Contenido Principal -->
    <div class="flex-grow container mx-auto px-4 py-8 main-content">
        {% block content %}
        {% endblock %}
    </div>
    {% include 'floating_menu.html' %}
    <!-- Pie de Página (Opcional) -->
    <footer class="bg-gray-800 text-gray-400 text-center p-4 mt-8">
        <div class="container mx-auto">
            <p>&copy; 2025 Gestión de Ventas. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Nethive Assistant Script -->
    <script>
        // Función para cerrar modal de sincronización Bitrix (disponible globalmente)
        window.closeBitrixSyncModal = function() {
            const modal = document.getElementById('bitrix-sync-modal');
            if (modal) {
                modal.remove();
            }
        };

        // Función para ejecutar sincronización de Bitrix (solo para supervisores)
        window.executeBitrixSync = async function() {
            // Verificar que solo supervisores puedan ejecutar sincronización
            const isSupervisor = document.querySelector('[data-user-is-supervisor="true"]') !== null;
            if (!isSupervisor) {
                alert('Solo los supervisores pueden ejecutar la sincronización con Bitrix24');
                return;
            }
            
            // Mostrar modal de carga
            const syncModal = document.createElement('div');
            syncModal.id = 'bitrix-sync-modal';
            syncModal.innerHTML = `
                <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div class="bg-slate-800 rounded-lg p-6 max-w-md w-full mx-4">
                        <div class="text-center">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                            <h3 class="text-lg font-bold text-white mb-2">Sincronizando con Bitrix24</h3>
                            <p class="text-gray-300 text-sm" id="sync-status">Iniciando sincronización...</p>
                            <div class="mt-4 space-y-2" id="sync-progress">
                                <div class="text-xs text-gray-400">⏳ Usuarios de Bitrix</div>
                                <div class="text-xs text-gray-400">⏳ Empresas/Clientes</div>
                                <div class="text-xs text-gray-400">⏳ Contactos</div>
                                <div class="text-xs text-gray-400">⏳ Oportunidades</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(syncModal);
            
            try {
                // Llamar al endpoint de sincronización sin token CSRF
                console.log('🔄 Iniciando petición de sincronización...');
                const response = await fetch('/app/api/sync-bitrix-manual/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                console.log('📡 Respuesta recibida:', response.status, response.statusText);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ Error de respuesta:', errorText);
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('✅ Datos de respuesta:', data);
                
                if (data.success) {
                    syncModal.innerHTML = `
                        <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div class="bg-slate-800 rounded-lg p-6 max-w-md w-full mx-4">
                                <div class="text-center">
                                    <div class="text-green-500 text-4xl mb-2">✅</div>
                                    <h3 class="text-lg font-bold text-white mb-2">Sincronización Completada</h3>
                                    <p class="text-green-300 text-sm mb-4">Datos sincronizados exitosamente</p>
                                    
                                    <div class="bg-slate-700 rounded-lg p-3 mb-4">
                                        <div class="text-gray-300">Usuarios: <span class="text-white">${data.stats.usuarios}</span></div>
                                        <div class="text-gray-300">Clientes: <span class="text-white">${data.stats.clientes}</span></div>
                                        <div class="text-gray-300">Oportunidades: <span class="text-white">${data.stats.oportunidades}</span></div>
                                    </div>
                                </div>

                                <button onclick="window.closeBitrixSyncModal()" 
                                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded">
                                    Cerrar
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    syncModal.innerHTML = `
                        <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div class="bg-slate-800 rounded-lg p-6 max-w-md w-full mx-4">
                                <div class="text-center">
                                    <div class="text-red-500 text-4xl mb-2">❌</div>
                                    <h3 class="text-lg font-bold text-white mb-2">Error en Sincronización</h3>
                                    <p class="text-red-300 text-sm mb-4">${data.error}</p>
                                    <button onclick="window.closeBitrixSyncModal()" 
                                            class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded">
                                        Cerrar
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('❌ Error en sincronización:', error);
                syncModal.innerHTML = `
                    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                        <div class="bg-slate-800 rounded-lg p-6 max-w-md w-full mx-4">
                            <div class="text-center">
                                <div class="text-red-500 text-4xl mb-2">❌</div>
                                <h3 class="text-lg font-bold text-white mb-2">Error de Conexión</h3>
                                <p class="text-red-300 text-sm mb-4">No se pudo conectar con el servidor</p>
                                <button onclick="window.closeBitrixSyncModal()" 
                                        class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded">
                                    Cerrar
                                </button>
                            </div>
                        </div>
                    `;
                }
        };

        document.addEventListener('DOMContentLoaded', () => {
            console.log("Nethive Assistant script loaded and DOM is ready.");
            
            // Limpiar cualquier modal de sincronización existente al cargar la página
            const existingModal = document.getElementById('bitrix-sync-modal');
            if (existingModal) {
                existingModal.remove();
            }

            // Global state for proactive features
            window.nethiveState = {
                clickCount: parseInt(sessionStorage.getItem('nethiveClickCount') || '0'),
                hasShownForClicks: sessionStorage.getItem('hasShownForClicks') === 'true',
                userDismissedHelp: false,
                dismissalReason: null,
                criticalErrorsCount: 0,
                currentContext: null,
                lastHelpOffered: null,
                // New opportunity detection state
                lastOpportunityCheck: parseInt(sessionStorage.getItem('lastOpportunityCheck') || Date.now()),
                isWatchingOpportunities: false,
                opportunityWatchInterval: null
            };

            // Initialize all bot functionalities
            initNethiveAssistant();
            initProactiveLogic();
        });

        // --- Main Assistant Logic ---

        function initNethiveAssistant() {
            console.log("Nethive Assistant initialized successfully!");
            // Any additional initialization logic can go here
        }

        const nethivePersonality = {
            moods: ['happy', 'excited', 'thoughtful', 'helpful', 'playful', 'sad', 'worried', 'proud', 'focused', 'celebrating'],
            currentMood: 'happy',
            expressions: {
                happy: { 
                    eyes: '⚫⚫', 
                    mouth: '︶', 
                    color: '#4ade80',
                    glow: '#4ade80',
                    animation: 'pulse-gentle',
                    description: 'Contento y listo para ayudar'
                },
                excited: { 
                    eyes: '✨✨', 
                    mouth: '◡', 
                    color: '#f59e0b',
                    glow: '#f59e0b',
                    animation: 'bounce-excited',
                    description: 'Emocionado de ayudarte'
                },
                sad: { 
                    eyes: '💧💧', 
                    mouth: '︵', 
                    color: '#3b82f6',
                    glow: '#3b82f6',
                    animation: 'sway-sad',
                    description: 'Preocupado por los errores'
                },
                proud: { 
                    eyes: '⭐⭐', 
                    mouth: '◠', 
                    color: '#fbbf24',
                    glow: '#fbbf24',
                    animation: 'glow-proud',
                    description: '¡Orgulloso de haber ayudado!'
                },
                worried: { 
                    eyes: '😰😰', 
                    mouth: '~', 
                    color: '#f97316',
                    glow: '#f97316',
                    animation: 'shake-worried',
                    description: 'Detectando problemas'
                },
                thoughtful: { 
                    eyes: '🤔🤔', 
                    mouth: '−', 
                    color: '#8b5cf6',
                    glow: '#8b5cf6',
                    animation: 'think-pulse',
                    description: 'Analizando la situación'
                },
                helpful: { 
                    eyes: '👀👀', 
                    mouth: '◠', 
                    color: '#06b6d4',
                    glow: '#06b6d4',
                    animation: 'ready-bounce',
                    description: 'Listo para resolver problemas'
                },
                focused: { 
                    eyes: '👁️👁️', 
                    mouth: '━', 
                    color: '#10b981',
                    glow: '#10b981',
                    animation: 'focus-glow',
                    description: 'Concentrado en tu tarea'
                },
                celebrating: { 
                    eyes: '🎉🎉', 
                    mouth: '◉', 
                    color: '#ec4899',
                    glow: '#ec4899',
                    animation: 'celebrate-dance',
                    description: '¡Misión cumplida!'
                },
                playful: { 
                    eyes: '😊😊', 
                    mouth: '‿', 
                    color: '#ec4899',
                    glow: '#ec4899',
                    animation: 'wiggle-playful',
                    description: 'En modo juguetón'
                }
            }
        };

        function updateNethiveMood(mood, reason = '') {
            nethivePersonality.currentMood = mood;
            
            // Update all avatar instances (mini, full, field resolver, etc.)
            const avatars = document.querySelectorAll('[class*="nethive-avatar"], [class*="nethive-mini-avatar"]');
            const expression = nethivePersonality.expressions[mood];
            
            if (!expression) return;
            
            avatars.forEach(avatar => {
                const face = avatar.querySelector('.nethive-face');
                const body = avatar.querySelector('.nethive-body, .nethive-mini-avatar');
                const eyes = avatar.querySelector('.nethive-eyes');
                const mouth = avatar.querySelector('.nethive-mouth');
                
                if (face) {
                    face.style.borderColor = expression.color;
                    face.style.boxShadow = `0 0 15px ${expression.glow}40, inset 0 0 10px ${expression.glow}20`;
                }
                
                if (body) {
                    body.style.background = `linear-gradient(145deg, ${expression.color}30, ${expression.color}15)`;
                    body.style.boxShadow = `0 0 20px ${expression.glow}30, inset 0 0 15px ${expression.glow}20`;
                }
                
                if (eyes) {
                    eyes.innerHTML = `
                        <div class="nethive-eye w-4 h-4 bg-white rounded-full" style="box-shadow: 0 0 8px ${expression.glow};">${expression.eyes.charAt(0)}</div>
                        <div class="nethive-eye w-4 h-4 bg-white rounded-full" style="box-shadow: 0 0 8px ${expression.glow};">${expression.eyes.charAt(1) || expression.eyes.charAt(0)}</div>
                    `;
                }
                
                if (mouth) {
                    mouth.textContent = expression.mouth;
                    mouth.style.color = expression.color;
                }
                
                // Apply animation class
                avatar.className = avatar.className.replace(/animate-\S+/g, '');
                if (expression.animation) {
                    avatar.classList.add('animate-' + expression.animation);
                }
            });
            
            // Update mini avatars
            const miniAvatars = document.querySelectorAll('.nethive-mini-avatar');
            miniAvatars.forEach(miniAvatar => {
                miniAvatar.style.background = `linear-gradient(145deg, ${expression.color}40, ${expression.color}20)`;
                miniAvatar.style.boxShadow = `0 0 10px ${expression.glow}30`;
                
                const content = miniAvatar.querySelector('div[class*="relative"]');
                if (content) {
                    content.style.color = expression.color;
                    content.textContent = expression.eyes.charAt(0);
                }
            });
            
            // Log mood change for debugging
            console.log(`🤖 Nethive mood: ${mood} (${expression.description}) ${reason ? '- ' + reason : ''}`);
        }

        function createNethiveAvatar() {
            const { currentMood, expressions } = nethivePersonality;
            const expression = expressions[currentMood];
            return `
                <div class="nethive-avatar-main relative w-24 h-24 md:w-32 md:h-32 flex items-center justify-center animate-float">
                    <div class="nethive-body absolute w-full h-full rounded-full transition-all duration-500" style="background: linear-gradient(145deg, ${expression.color}20, ${expression.color}10); box-shadow: inset 0 0 15px ${expression.color}40, 0 0 20px ${expression.color}30;"></div>
                    <div class="nethive-head absolute w-3/4 h-3/4 rounded-full bg-gray-700 border-2 border-gray-600 flex items-center justify-center transition-all duration-500" style="transform: translateY(-30%); background: radial-gradient(circle at 50% 50%, #374151, #1f2937);">
                        <div class="nethive-face relative w-3/4 h-3/4 rounded-full border-2 border-gray-500 flex flex-col items-center justify-center transition-all duration-500" style="border-color: ${expression.color}; background: #111827;">
                            <div class="nethive-eyes flex space-x-3">
                                <div class="nethive-eye w-4 h-4 bg-white rounded-full animate-pulse-light" style="box-shadow: 0 0 8px ${expression.color};"></div>
                                <div class="nethive-eye w-4 h-4 bg-white rounded-full animate-pulse-light" style="box-shadow: 0 0 8px ${expression.color};"></div>
                            </div>
                            <div class="nethive-mouth mt-2 text-white text-xl font-bold transition-all duration-500" style="color: ${expression.color};">${expression.mouth}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function createMiniNethiveAvatar() {
            const { currentMood, expressions } = nethivePersonality;
            const expression = expressions[currentMood];
            return `
                <div class="nethive-mini-avatar w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 relative overflow-hidden" style="background: linear-gradient(145deg, ${expression.color}40, ${expression.color}20); box-shadow: 0 0 10px ${expression.color}30;">
                    <div class="absolute inset-0 bg-gray-800 opacity-70 rounded-full"></div>
                    <div class="relative text-white text-lg font-bold" style="color: ${expression.color};">${expression.eyes ? expression.eyes.substring(0,1) : 'N'}</div>
                </div>
            `;
        }

        function getNethiveGreeting() {
            const currentPath = window.location.pathname;
            const timeOnPage = Date.now() - window.nethiveContextualIntelligence.pageLoadTime;
            const hasErrors = window.nethiveState.formErrors.size > 0;
            
            let greeting = "Hola soy Nethive, tu asistente virtual. ";
            
            if (hasErrors) {
                greeting += "Veo que hay algunos campos que necesitan atención. ";
            } else if (timeOnPage > 120000) { // More than 2 minutes
                greeting += "He estado observando tu sesión. ";
            }
            
            if (currentPath.includes('crear_cotizacion')) {
                greeting += "¿Te ayudo con la cotización?";
            } else if (currentPath.includes('dashboard')) {
                greeting += "¿Necesitas ayuda interpretando tus métricas de ventas?";
            } else if (currentPath.includes('todos')) {
                greeting += "¿Te ayudo a gestionar tus oportunidades?";
            } else if (currentPath.includes('cotizaciones')) {
                greeting += "¿Te ayudo a organizar tus cotizaciones?";
            } else {
                greeting += "¿En qué puedo ayudarte hoy?";
            }
            
            return greeting;
        }

        function getNethiveQuestionsForCurrentPage(currentPath) {
            // Dashboard principal
            if (currentPath.includes('dashboard')) {
                return [
                    {
                        question: "¿Cómo interpretar las métricas de ventas?",
                        answer: "📊 <strong>Guía del Dashboard:</strong><br><br>• <strong>Ventas por mes:</strong> Muestra el progreso mensual de tus oportunidades cerradas.<br>• <strong>Por producto:</strong> Analiza qué productos tienen mejor rendimiento.<br>• <strong>Probabilidad promedio:</strong> Indica qué tan cerca estás de cerrar tus oportunidades.<br>• <strong>Filtros:</strong> Usa los filtros de fecha para análisis específicos.",
                        category: "Análisis"
                    },
                    {
                        question: "¿Cómo puedo mejorar mis métricas?",
                        answer: "🎯 <strong>Tips para mejorar:</strong><br><br>• <strong>Actualiza probabilidades:</strong> Mantén actualizadas las probabilidades de tus oportunidades.<br>• <strong>Fechas de cierre:</strong> Asegúrate de tener fechas realistas.<br>• <strong>Seguimiento:</strong> Revisa regularmente tus oportunidades en curso.",
                        category: "Optimización"
                    }
                ];
            }
            
            // Lista de oportunidades
            if (currentPath.includes('todos')) {
                return [
                    {
                        question: "¿Cómo gestiono mis oportunidades de venta?",
                        answer: "💼 <strong>Gestión de Oportunidades:</strong><br><br>• <strong>Crear nueva:</strong> Botón 'Agregar Oportunidad' para crear una nueva.<br>• <strong>Editar:</strong> Haz clic en cualquier oportunidad para editarla.<br>• <strong>Probabilidades:</strong> Actualiza el % de probabilidad según tu progreso.<br>• <strong>Estados:</strong> Cambia entre 'En proceso', 'Ganada', 'Perdida'.",
                        category: "Gestión",
                        action: { text: "Crear Nueva Oportunidad", url: "/app/ingresar-venta/" }
                    },
                    {
                        question: "¿Qué significan los colores y estados?",
                        answer: "🎨 <strong>Código de colores:</strong><br><br>• <strong>Verde:</strong> Oportunidades con alta probabilidad (>70%).<br>• <strong>Amarillo:</strong> Probabilidad media (30-70%).<br>• <strong>Rojo:</strong> Baja probabilidad (<30%) o vencidas.<br>• <strong>Estado:</strong> 'En proceso' = activa, 'Ganada' = cerrada exitosamente.",
                        category: "Interpretación"
                    },
                    {
                        question: "¿Cómo crear una cotización rápidamente?",
                        answer: "⚡ <strong>Crear cotización rápida:</strong><br><br>• <strong>Desde oportunidad:</strong> Haz clic en cualquier oportunidad y selecciona 'Crear Cotización'.<br>• <strong>Datos automáticos:</strong> El sistema pre-llenará el cliente y la oportunidad.<br>• <strong>Plantillas:</strong> Usa las plantillas Bajanet o Iamet según el tipo de cliente.",
                        category: "Cotización"
                    }
                ];

        function initProactiveLogic() {

        function handleProactiveYes() {
            const context = window.nethiveState.currentContext;
            const lastHelp = window.nethiveState.lastHelpOffered;
            
            window.hideProactiveBot();
            updateNethiveMood('excited', 'Usuario aceptó ayuda');
            
            if (context && context.type === 'quotation-assistance') {

            } else if (context && context.type === 'field-specific') {
                // Field-specific help should go to advanced chat
                setTimeout(() => showAdvancedNethiveChat(), 500);
            } else if (context && context.type === 'zone-stuck') {
                // Zone-specific help should go to advanced chat  
                setTimeout(() => showAdvancedNethiveChat(), 500);
            } else {
                // Any other proactive help goes to advanced chat
                setTimeout(() => showAdvancedNethiveChat(), 500);

            // Set dismissal flag - won't show help again unless critical error

        function setupZoneDetection() {
            let lastClickTime = 0;
            let clicksInSameArea = 0;
            let lastClickArea = null;

            document.body.addEventListener('click', (e) => {
                // Ignore bot elements and menu
                if (e.target.closest('#nethive-proactive-bot') || 
                    e.target.closest('#assistant-btn') || 
                    e.target.closest('#nethive-assistant-modal') ||
                    e.target.closest('#floating-menu-container')) return;

                // Track action for contextual intelligence
                window.nethiveContextualIntelligence.trackUserAction('click', e.target);

                const currentTime = Date.now();
                const clickArea = identifyClickArea(e.target);
                
                // Track zone-specific clicks
                if (clickArea) {
                    const zoneCount = window.nethiveState.zoneClicks.get(clickArea) || 0;
                    window.nethiveState.zoneClicks.set(clickArea, zoneCount + 1);
                    
                    // Check if user is clicking repeatedly in same area
                    if (clickArea === lastClickArea && (currentTime - lastClickTime) < 3000) {
                        clicksInSameArea++;
                        if (clicksInSameArea >= 3) {
                            handleUserStuckInArea(clickArea, e.target);
                            clicksInSameArea = 0; // Reset after showing help
                        }
                    } else {
                        clicksInSameArea = 1;
                    }
                    
                    lastClickArea = clickArea;
                    lastClickTime = currentTime;
                }

                // Check for element-specific confusion
                if (e.target === window.nethiveState.lastClickedElement) {
                    window.nethiveState.consecutiveClicksOnElement++;
                    if (window.nethiveState.consecutiveClicksOnElement >= 2) {
                        handleElementConfusion(e.target);
                        window.nethiveState.consecutiveClicksOnElement = 0;
                    }
                } else {
                    window.nethiveState.lastClickedElement = e.target;
                    window.nethiveState.consecutiveClicksOnElement = 1;
                }
            }, true);

            // Also track other important events
            document.body.addEventListener('focus', (e) => {
                if (e.target.matches('input, select, textarea')) {
                    window.nethiveContextualIntelligence.trackUserAction('focus', e.target);
                    window.nethiveContextualIntelligence.currentFocus = e.target;
                }
            }, true);

            document.body.addEventListener('submit', (e) => {
                window.nethiveContextualIntelligence.trackUserAction('submit', e.target);
            }, true);
        }

        function identifyClickArea(element) {
            // Identify semantic areas of the page
            if (element.closest('form')) return 'form-area';
            if (element.closest('table')) return 'table-area';
            if (element.closest('[class*="dashboard"]')) return 'dashboard-area';
            if (element.closest('[class*="nav"], [class*="menu"]')) return 'navigation-area';
            if (element.closest('button[type="submit"]')) return 'submit-area';
            if (element.closest('input, select, textarea')) return 'input-area';
            if (element.closest('[class*="card"], [class*="panel"]')) return 'content-area';
            return 'general-area';
        }

        function handleUserStuckInArea(area, element) {
            const currentPath = window.location.pathname;
            let message = '';
            let context = { type: 'zone-stuck', area, element, path: currentPath };
            
            switch (area) {
                case 'form-area':
                    if (currentPath.includes('crear_cotizacion')) {
                        message = '¿Necesitas ayuda llenando la cotización? Puedo guiarte paso a paso y llenar los campos por ti.';
                    } else if (currentPath.includes('ingresar-venta')) {
                        message = '¿Tienes problemas creando la oportunidad? Te ayudo con los campos y los lleno automáticamente.';
                    } else {
                        message = '¿Necesitas ayuda con este formulario? Puedo explicarte cada campo y llenarlo por ti.';
                    }
                    break;
                case 'table-area':
                    message = '¿Buscas algo específico en esta tabla? Puedo ayudarte a encontrarlo, filtrar datos o explicar las columnas.';
                    break;
                case 'dashboard-area':
                    message = '¿Necesitas ayuda interpretando estas métricas? Puedo explicarte qué significan y cómo mejorar tus números.';
                    break;
                case 'input-area':
                    const fieldLabel = getFieldLabel(element);
                    message = `¿Tienes dudas sobre "${fieldLabel}"? Te explico qué va aquí y puedo llenarlo automáticamente.`;

                    break;

            }
            
            window.showProactiveBot(message, 'field-help', context);

        function handleElementConfusion(element) {

                if (buttonText) {

        function setupFormValidation() {
            // Monitor form field changes for intelligent validation
            document.addEventListener('input', (e) => {
                if (e.target.matches('input, select, textarea')) {
                    validateFieldProactively(e.target);
                }
            });

            document.addEventListener('blur', (e) => {
                if (e.target.matches('input, select, textarea')) {
                    setTimeout(() => validateFieldProactively(e.target, true), 500);
                }
            });
        }

        function validateFieldProactively(field, onBlur = false) {
            const fieldName = field.name || field.id;
            const value = field.value.trim();
            const fieldLabel = getFieldLabel(field);
            const currentPath = window.location.pathname;
            const isQuotationForm = currentPath.includes('crear_cotizacion') || currentPath.includes('editar_cotizacion');
            
            let errorMessage = '';
            let isError = false;
            let errorSeverity = 'medium';

            // Enhanced validation for quotation forms
            if (isQuotationForm) {
                // Price/Amount field validation (critical for quotations)
                if (fieldName && (fieldName.toLowerCase().includes('precio') || fieldName.toLowerCase().includes('monto') || fieldName.toLowerCase().includes('amount'))) {
                    if (value && !/^[\d.,]+$/.test(value)) {
                        // User typed letters in a price field - this is a critical error
                        errorMessage = `¡Ups! "${fieldLabel}" solo acepta números. Escribiste "${value}" pero debería ser algo como "1500.00"`;
                        isError = true;
                        errorSeverity = 'critical';
                        updateNethiveMood('sad', 'Usuario puso letras en campo de precio');
                    } else if (value && parseFloat(value.replace(',', '.')) <= 0) {
                        errorMessage = `El precio en "${fieldLabel}" debe ser mayor a cero.`;
                        isError = true;
                        errorSeverity = 'high';
                        updateNethiveMood('worried', 'Precio inválido (cero o negativo)');
                    } else if (value && parseFloat(value.replace(',', '.')) > 1000000) {
                        errorMessage = `¿Estás seguro del precio en "${fieldLabel}"? Parece muy alto: $${value}`;
                        isError = true;
                        errorSeverity = 'medium';
                        updateNethiveMood('thoughtful', 'Precio muy alto, verificando');
                    }
                }
                
                // Quantity field validation
                if (fieldName && (fieldName.toLowerCase().includes('cantidad') || fieldName.toLowerCase().includes('qty'))) {
                    if (value && !/^[\d.]+$/.test(value)) {
                        errorMessage = `"${fieldLabel}" debe ser un número. Por ejemplo: 1, 5, 10.5`;
                        isError = true;
                        errorSeverity = 'high';
                        updateNethiveMood('worried', 'Cantidad con caracteres inválidos');
                    }
                }
                
                // Client/Company field validation
                if (fieldName && (fieldName.toLowerCase().includes('cliente') || fieldName.toLowerCase().includes('empresa'))) {
                    if (value && value.length < 2) {
                        errorMessage = `El nombre del cliente parece muy corto. ¿Está completo?`;
                        isError = true;
                        errorSeverity = 'medium';
                        updateNethiveMood('thoughtful', 'Nombre de cliente muy corto');
                    }
                }
            }
            
            // Common validation patterns (always apply)
            if (field.type === 'email' && value && !isValidEmail(value)) {
                errorMessage = `El formato del email en "${fieldLabel}" no es válido. Debe ser como: usuario@dominio.com`;
                isError = true;
                errorSeverity = 'high';
                updateNethiveMood('worried', 'Email con formato incorrecto');
            } else if (field.type === 'number' && value && isNaN(parseFloat(value))) {
                errorMessage = `"${fieldLabel}" debe ser un número válido.`;
                isError = true;
                errorSeverity = 'high';
                updateNethiveMood('sad', 'Campo numérico con letras');
            } else if (field.hasAttribute('required') && !value && onBlur) {
                errorMessage = `El campo "${fieldLabel}" es obligatorio.`;
                isError = true;
                errorSeverity = 'high';
                updateNethiveMood('worried', 'Campo obligatorio vacío');
            }

            if (isError) {
                // Track this error with severity
                window.nethiveState.formErrors.set(fieldName, { message: errorMessage, severity: errorSeverity, field: field });
                
                // Show proactive help based on severity
                if (errorSeverity === 'critical' && isQuotationForm) {
                    // For critical errors in quotation forms, offer full assistance
                    setTimeout(() => {
                        showQuotationErrorAssistance(field, errorMessage, fieldLabel);
                    }, 500);
                } else {
                    // Regular field error handling
                    setTimeout(() => {
                        if (field === document.activeElement || onBlur) {
                            showFieldError(field, errorMessage);
                        }
                    }, 1000);
                }
            } else {
                // Clear error if field is now valid
                window.nethiveState.formErrors.delete(fieldName);
                // Show happy mood when fixing errors
                if (window.nethiveState.formErrors.size === 0) {
                    updateNethiveMood('happy', 'Todos los campos están correctos');
                }
            }

                window.showProactiveBot(

        function setupScrollDetection() {
            let scrollTimer;
            let lastScrollPosition = 0;
            let scrollStuckCount = 0;

            window.addEventListener('scroll', () => {
                const currentScroll = window.pageYOffset;
                
                clearTimeout(scrollTimer);
                scrollTimer = setTimeout(() => {
                    if (Math.abs(currentScroll - lastScrollPosition) < 50) {
                        scrollStuckCount++;
                        if (scrollStuckCount >= 3 && !window.nethiveState.hasShownForScroll) {
                            window.showProactiveBot('¿Buscas algo específico? Puedo ayudarte a navegar por la página.');
                            window.nethiveState.hasShownForScroll = true;

        // --- Advanced User Action Execution System ---

        window.executeUserCommand = function(command, context = null) {
            const lowerCommand = command.toLowerCase();
            const currentPath = window.location.pathname;
            
            // Set mood to focused when user gives a command
            updateNethiveMood('focused', 'Ejecutando comando del usuario');
            
            // Navigation commands
            if (lowerCommand.includes('ir a') || lowerCommand.includes('navegar a')) {
                return handleNavigationCommand(lowerCommand);
            }
            
            // Form filling commands
            if (lowerCommand.includes('llenar') || lowerCommand.includes('completar')) {
                return handleFormFillCommand(lowerCommand, context);
            }
            
            // Data entry commands
            if (lowerCommand.includes('escribir') || lowerCommand.includes('poner')) {
                return handleDataEntryCommand(lowerCommand, context);
            }
            
            // Action commands
            if (lowerCommand.includes('click') || lowerCommand.includes('presionar')) {
                return handleClickCommand(lowerCommand);
            }
            
            // Search commands
            if (lowerCommand.includes('buscar') || lowerCommand.includes('encontrar')) {
                return handleSearchCommand(lowerCommand);
            }
            
            // Default: show suggestion
            return `No pude ejecutar "${command}". ¿Puedes ser más específico? Por ejemplo: "llenar campo cliente con Empresa ABC" o "ir a dashboard"`;
        }

        function handleNavigationCommand(command) {
            const destinations = {
                'dashboard': '/app/dashboard/',
                'oportunidades': '/app/todos/',
                'cotizaciones': '/app/cotizaciones/',
                'crear cotizacion': '/app/crear-cotizacion/',
                'reportes': '/app/reporte-usuarios/',
                'admin': '/admin/',
                'home': '/app/home/'
            };
            
            for (const [keyword, url] of Object.entries(destinations)) {
                if (command.includes(keyword)) {
                    updateNethiveMood('helpful', `Llevándote a ${keyword}`);
                    setTimeout(() => {
                        window.location.href = url;
                    }, 500);
                    return `Navegando a ${keyword}...`;
                }
            }
            
            updateNethiveMood('worried', 'No reconozco ese destino');
            return 'No reconozco ese destino. Opciones: dashboard, oportunidades, cotizaciones, crear cotización, reportes, admin, home';
        }

        function handleFormFillCommand(command, context) {
            // Extract field name and value from command
            const fillPatterns = [
                /llenar (?:campo )?([a-záéíóúñ\s]+) con (.+)/i,
                /completar (?:campo )?([a-záéíóúñ\s]+) con (.+)/i,
                /(?:campo )?([a-záéíóúñ\s]+) = (.+)/i
            ];
            
            for (const pattern of fillPatterns) {
                const match = command.match(pattern);
                if (match) {
                    const fieldName = match[1].trim();
                    const value = match[2].trim();
                    updateNethiveMood('thoughtful', `Llenando campo ${fieldName}`);
                    
                    const result = fillFieldByName(fieldName, value);
                    if (result.includes('exitosamente')) {
                        updateNethiveMood('proud', `¡Campo ${fieldName} completado!`);
                    } else if (result.includes('No encontré')) {
                        updateNethiveMood('worried', `No pude encontrar el campo ${fieldName}`);
                    }
                    return result;
                }
            }
            
            updateNethiveMood('worried', 'No entiendo el comando');
            return 'No pude entender qué campo llenar. Ejemplo: "llenar campo cliente con Empresa ABC"';
        }

        function handleDataEntryCommand(command, context) {
            // Similar to form fill but more general
            return handleFormFillCommand(command.replace(/escribir|poner/, 'llenar'), context);
        }

        function handleClickCommand(command) {
            // Extract button/element to click
            const clickPatterns = [
                /(?:click|presionar) (?:en )?(?:el )?(?:botón )?([a-záéíóúñ\s]+)/i,
                /pulsar (?:el )?(?:botón )?([a-záéíóúñ\s]+)/i
            ];
            
            for (const pattern of clickPatterns) {
                const match = command.match(pattern);
                if (match) {
                    const buttonText = match[1].trim();
                    return clickButtonByText(buttonText);
                }
            }
            
            return 'No pude identificar qué elemento hacer click. Ejemplo: "click en botón guardar"';
        }

        function handleSearchCommand(command) {
            const searchPatterns = [
                /(?:buscar|encontrar) ([a-záéíóúñ\s]+)/i
            ];
            
            for (const pattern of searchPatterns) {
                const match = command.match(pattern);
                if (match) {
                    const searchTerm = match[1].trim();
                    return performSearch(searchTerm);
                }
            }
            
            return 'No pude entender qué buscar. Ejemplo: "buscar cliente Empresa ABC"';
        }

        function fillFieldByName(fieldName, value) {
            const possibleSelectors = [
                `input[name*="${fieldName.toLowerCase()}"]`,
                `select[name*="${fieldName.toLowerCase()}"]`,
                `textarea[name*="${fieldName.toLowerCase()}"]`,
                `input[id*="${fieldName.toLowerCase()}"]`,
                `select[id*="${fieldName.toLowerCase()}"]`,
                `textarea[id*="${fieldName.toLowerCase()}"]`
            ];
            
            for (const selector of possibleSelectors) {
                const field = document.querySelector(selector);
                if (field) {
                    field.value = value;
                    field.dispatchEvent(new Event('input', { bubbles: true }));
                    field.dispatchEvent(new Event('change', { bubbles: true }));
                    updateNethiveMood('proud', `¡Campo ${fieldName} completado!`);
                    showFieldSuccess(field, `Campo "${fieldName}" llenado con: ${value}`);
                    return `✅ Campo "${fieldName}" completado con "${value}"`;
                }
            }
            
            updateNethiveMood('worried', `No pude encontrar el campo ${fieldName}`);
            return `❌ No pude encontrar el campo "${fieldName}". Verifica el nombre del campo.`;
        }

        function clickButtonByText(buttonText) {
            const buttons = document.querySelectorAll('button, input[type="button"], input[type="submit"], a');
            
            for (const button of buttons) {
                const text = button.textContent || button.value || '';
                if (text.toLowerCase().includes(buttonText.toLowerCase())) {
                    button.click();
                    return `✅ Click realizado en "${text.trim()}"`;
                }
            }
            
            return `❌ No pude encontrar el botón "${buttonText}"`;
        }

        function performSearch(searchTerm) {
            // Look for search inputs
            const searchFields = document.querySelectorAll('input[type="search"], input[placeholder*="buscar"], input[placeholder*="search"]');
            
            if (searchFields.length > 0) {
                const searchField = searchFields[0];
                searchField.value = searchTerm;
                searchField.dispatchEvent(new Event('input', { bubbles: true }));
                
                // Try to find and click search button
                const searchButton = document.querySelector('button[type="submit"], button:contains("Buscar")') || 
                                   searchField.closest('form')?.querySelector('button[type="submit"]');
                
                if (searchButton) {
                    searchButton.click();
                }
                
                return `✅ Buscando: "${searchTerm}"`;
            }
            
            return `❌ No encontré campo de búsqueda en esta página`;
        }

        function initializeChatSystem() {
            window.chatState = {
                messages: [],
                extractedData: {},
                currentStep: 'greeting',
                isProcessing: false
            };
            
            // Add initial message to display
            setTimeout(() => {
                document.querySelector('#chat-messages .animate-fade-in').style.opacity = '1';
            }, 300);
            
            // Handle Enter key in textarea
            const chatInput = document.getElementById('chat-input');
            if (chatInput) {
                chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendChatMessage();
                    }
                });
            }
        }

        window.closeAdvancedChat = function() {
            const chat = document.getElementById('nethive-advanced-chat');
            if (chat) {
                chat.style.opacity = '0';
                chat.style.transform = 'scale(0.95)';
                setTimeout(() => chat.remove(), 300);
            }
            updateNethiveMood('happy', 'Chat cerrado');
        }

        window.insertQuickMessage = function(message) {
            const input = document.getElementById('chat-input');
            if (input) {
                input.value = message;
                input.focus();
            }
        }

        window.sendChatMessage = function() {
            const input = document.getElementById('chat-input');
            if (!input || window.chatState.isProcessing) return;
            
            const message = input.value.trim();
            if (!message) return;
            
            // Clear input
            input.value = '';
            window.chatState.isProcessing = true;
            
            // Add user message to chat
            addChatMessage(message, 'user');
            
            // Process message with AI
            setTimeout(() => processUserMessage(message), 1000);
        }

        function addChatMessage(message, sender = 'bot', isTyping = false) {
            const messagesContainer = document.getElementById('chat-messages');
            if (!messagesContainer) return;
            
            const messageClass = sender === 'user' ? 'ml-auto bg-gradient-to-r from-cyan-600 to-blue-600 text-white' : 'bg-slate-700/60 text-white';
            const alignClass = sender === 'user' ? 'justify-end' : 'justify-start';
            
            const messageHTML = `
                <div class="flex ${alignClass} animate-fade-in" style="opacity: 0;">
                    ${sender === 'bot' ? `<div class="scale-50 mr-3">${createNethiveAvatar()}</div>` : ''}
                    <div class="${messageClass} backdrop-blur-sm rounded-2xl ${sender === 'user' ? 'rounded-tr-sm' : 'rounded-tl-sm'} p-4 max-w-md">
                        ${isTyping ? '<div class="typing-indicator">●●●</div>' : `<p class="text-sm">${message}</p>`}
                    </div>
                </div>
            `;
            
            messagesContainer.insertAdjacentHTML('beforeend', messageHTML);
            
            // Animate in
            setTimeout(() => {
                const newMessage = messagesContainer.lastElementChild;
                if (newMessage) newMessage.style.opacity = '1';
            }, 100);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function processUserMessage(message) {
            updateNethiveMood('thoughtful', 'Procesando mensaje con IA');
            
            // Add typing indicator
            addChatMessage('', 'bot', true);
            
            try {
                // Use Gemini AI to process the message
                const response = await processWithGeminiAI(message, window.chatState.extractedData);
                
                // Remove typing indicator
                const messages = document.getElementById('chat-messages');
                if (messages.lastElementChild) {
                    messages.lastElementChild.remove();
                }
                
                // Update extracted data with AI response
                if (response.extractedData) {
                    Object.assign(window.chatState.extractedData, response.extractedData);
                }
                
                addChatMessage(response.message, 'bot');
                
                // Update mood based on response
                if (response.mood) {
                    updateNethiveMood(response.mood, response.moodReason);
                }
                
                // Check if we have enough data to create opportunity
                if (response.canCreateOpportunity) {
                    setTimeout(() => {
                        showOpportunityCreationSummary();
                    }, 2000);
                }
                
            } catch (error) {
                console.error('Error processing with Gemini:', error);
                
                // Fallback to local processing
                const messages = document.getElementById('chat-messages');
                if (messages.lastElementChild) {
                    messages.lastElementChild.remove();
                }
                
                addChatMessage('Disculpa, hubo un problema con mi conexión. ¿Puedes repetir tu mensaje? 😅', 'bot');
                updateNethiveMood('worried', 'Error de conexión con IA');
            }
            
            window.chatState.isProcessing = false;
        }

        function extractOpportunityData(message) {
            const lowerMessage = message.toLowerCase();
            const extractedData = {};
            
            // Extract company/client names (after words like "para", "de", "con", "empresa")
            const clientPatterns = [
                /(?:para|de|con|empresa|cliente)\s+([A-ZÁÉÍÓÚÑ][a-záéíóúñ\s]+(?:SA|S\.A\.|SRL|S\.R\.L\.|LTDA|S\.C\.|SC)?)/gi,
                /(?:empresa|compañía|cliente|negocio)\s+([A-ZÁÉÍÓÚÑ][a-záéíóúñ\s]+)/gi,
                /"([^"]+)"/g // Text in quotes
            ];
            
            for (const pattern of clientPatterns) {
                const matches = message.match(pattern);
                if (matches) {
                    const clientName = matches[0].replace(/(para|de|con|empresa|cliente)\s+/i, '').trim();
                    if (clientName.length > 2) {
                        extractedData.cliente = clientName;
                        break;
                    }
                }
            }
            
            // Extract monetary amounts
            const moneyPatterns = [
                /\$?(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)\s*(?:pesos|MXN|USD|dólares?|dolares?)?/gi,
                /(?:por|de|cuesta|vale|monto|precio|valor)\s*\$?(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)/gi
            ];
            
            for (const pattern of moneyPatterns) {
                const match = lowerMessage.match(pattern);
                if (match) {
                    const amount = match[0].replace(/[^\d.,]/g, '').replace(',', '');
                    if (parseFloat(amount) > 0) {
                        extractedData.monto = parseFloat(amount);
                        break;
                    }
                }
            }
            
            // Extract service/product types
            const servicePatterns = {
                'hosting': ['hosting', 'servidor', 'servidores', 'alojamiento', 'cloud'],
                'desarrollo': ['desarrollo', 'programación', 'software', 'aplicación', 'app', 'web', 'website'],
                'telecomunicaciones': ['telecomunicaciones', 'telecom', 'internet', 'fibra', 'conectividad', 'red', 'redes'],
                'consultoria': ['consultoría', 'consultoria', 'asesoría', 'asesoramiento', 'capacitación'],
                'soporte': ['soporte', 'mantenimiento', 'support', 'técnico', 'reparación']
            };
            
            for (const [category, keywords] of Object.entries(servicePatterns)) {
                for (const keyword of keywords) {
                    if (lowerMessage.includes(keyword)) {
                        extractedData.area = category;
                        extractedData.producto = keyword;
                        break;
                    }
                }
                if (extractedData.area) break;
            }
            
            // Extract opportunity title/description
            const titlePatterns = [
                /(?:oportunidad|proyecto|venta|cotización)\s+(?:de|para)\s+([^.!?]+)/gi,
                /(?:necesito|quiero|busco)\s+([^.!?]+)/gi
            ];
            
            for (const pattern of titlePatterns) {
                const match = message.match(pattern);
                if (match) {
                    extractedData.titulo = match[0].trim();
                    break;
                }
            }
            
            // Extract probability indicators
            const probabilities = {
                'seguro': 90,
                'muy probable': 80,
                'probable': 70,
                'posible': 50,
                'poco probable': 30,
                'difícil': 20
            };
            
            for (const [phrase, prob] of Object.entries(probabilities)) {
                if (lowerMessage.includes(phrase)) {
                    extractedData.probabilidad = prob;
                    break;
                }
            }
            
            return extractedData;
        }

        // ==================== GEMINI AI INTEGRATION ====================
        // Función para procesar con Gemini AI
        async function processWithGeminiAI(userMessage, currentData) {
            // Gemini API key configured
            const API_KEY = 'AIzaSyCliVaBtT0hju3OQR-FTUONRYIfhLAaXUA';
            
            console.log('🤖 Using Gemini AI for processing message...');
            
            // Construct the prompt for Gemini
            const prompt = buildGeminiPrompt(userMessage, currentData);
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 500,
                            topP: 0.8,
                            topK: 10
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`Gemini API error: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;

                // Parse the structured response from Gemini
                return parseGeminiResponse(aiResponse);
            } catch (error) {
                console.error('Error processing with Gemini:', error);
                return generateChatResponse(userMessage, currentData);
            }
        }

        function parseGeminiResponse(aiResponse) {
            try {
                // Clean the response to extract JSON
                let cleanResponse = aiResponse.trim();
                
                // Remove markdown code blocks if present
                if (cleanResponse.startsWith('```json')) {
                    cleanResponse = cleanResponse.replace(/```json\n?/, '').replace(/```$/, '');
                } else if (cleanResponse.startsWith('```')) {
                    cleanResponse = cleanResponse.replace(/```\n?/, '').replace(/```$/, '');
                }

                const parsed = JSON.parse(cleanResponse);

                // Validate and provide defaults
                return {
                    extractedData: parsed.extractedData || {},
                    message: parsed.message || '¡Órale! No entendí bien ese mensaje. ¿Me puedes explicar qué cotización necesitas hacer?',
                    mood: parsed.mood || 'thoughtful',
                    moodReason: parsed.moodReason || 'Procesando información de cotización',
                    canFillForm: parsed.canFillForm || false,
                    nextStep: parsed.nextStep || null
                };
            } catch (error) {
                console.error('Error parsing Gemini response:', error);
                console.log('Raw response:', aiResponse);
                
                // Fallback to basic parsing  
                return {
                    extractedData: {},
                    message: aiResponse.length > 0 ? `¡Órale! ${aiResponse}` : '¡Qué onda! ¿En qué cotización te puedo ayudar? 😄',
                    mood: 'helpful',
                    moodReason: 'Listo para ayudar con cotizaciones',
                    canFillForm: false,
                    nextStep: 'Dime qué producto necesitas cotizar'
                };
            }
        }
