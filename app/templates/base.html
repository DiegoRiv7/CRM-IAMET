<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Administración de Ventas
        {% endblock %}
    </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/oportunidad_detail.css' %}">
    
    <!-- Intro.js for Tutorial -->
    <script src="https://unpkg.com/intro.js/intro.js"></script>
    <link href="https://unpkg.com/intro.js/introjs.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            position: relative;
        }
        
        /* Estilos generales para el contenido principal */
        .main-content {
            padding-top: 2rem; /* Menos espacio arriba, ya no hay barra fija */
            padding-bottom: 2rem;
        }
        
        /* Glass effect utility for all cards/tables */
        .glass-card {
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-table {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
            overflow: hidden;
        }
        .drop-shadow-glow {
            text-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1, 0 0 2px #fff;
        }
        @media (max-width: 640px) {
            .glass-card, .glass-table {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            table th, table td {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: none; }
        }
        .animate-fade-in {
            animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        
        /* Custom Intro.js styling */
        .introjs-overlay {
            background-color: rgba(0, 0, 0, 0.8) !important;
        }
        .introjs-tooltip {
            background: rgba(30, 41, 59, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 12px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(12px) !important;
        }
        .introjs-tooltiptext {
            color: #e2e8f0 !important;
            font-family: 'Inter', sans-serif !important;
        }
        .introjs-button {
            background: #6366f1 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 16px !important;
            color: white !important;
            font-weight: 500 !important;
            transition: all 0.2s !important;
        }
        .introjs-button:hover {
            background: #4f46e5 !important;
            transform: translateY(-1px) !important;
        }
        .introjs-skipbutton {
            background: rgba(107, 114, 128, 0.8) !important;
        }
        .introjs-skipbutton:hover {
            background: rgba(75, 85, 99, 0.9) !important;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes pulse-light {
            0% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,1); }
            100% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
        }
        .animate-pulse-light {
            animation: pulse-light 2s infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s infinite ease-in-out;
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in {
            animation: slide-in 0.5s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col" {% if is_supervisor or user.is_superuser %}data-user-is-supervisor="true"{% endif %}>
    <!-- Contenido Principal -->
    <div class="flex-grow container mx-auto px-4 py-8 main-content">
        {% block content %}
        {% endblock %}
    </div>
    {% include 'dock.html' %}
    <!-- Pie de Página (Opcional) -->
    <footer class="bg-gray-800 text-gray-400 text-center p-4 mt-8">
        <div class="container mx-auto">
            <p>&copy; 2025 Gestión de Ventas. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- ==================== KOTI BOT - SISTEMA HÍBRIDO ==================== -->
    <!-- Contenedor principal del bot Koti -->
    {% include 'nethive_bot.html' %}
    
    <!-- Script principal de Nethive -->
    <script src="{% static 'js/nethive_bot.js' %}"></script>
    
    <!-- Script de diagnóstico simple -->
    <script src="{% static 'js/debug_simple.js' %}"></script>
    
    <!-- Configuración simplificada -->
    <script>
        // Variables de configuración global
        window.KOTI_CONFIG = {
            geminiApiKey: 'AIzaSyCliVaBtT0hju3OQR-FTUONRYIfhLAaXUA',
            proactiveEnabled: true,
            opportunityWatchEnabled: true,
            debugMode: true
        };

        console.log('🤖 Configuración de Koti cargada');
    </script>
</body>
</html>
