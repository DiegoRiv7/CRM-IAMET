<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Administración de Ventas
        {% endblock %}
    </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/oportunidad_detail.css' %}">
    
    <!-- Intro.js for Tutorial -->
    <script src="https://unpkg.com/intro.js/intro.js"></script>
    <link href="https://unpkg.com/intro.js/introjs.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(120deg, #232946 0%, #1a202c 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(ellipse at 60% 40%, rgba(99,102,241,0.18) 0%, rgba(20,58,86,0.10) 60%, transparent 100%),
                        radial-gradient(ellipse at 20% 80%, rgba(16,185,129,0.10) 0%, transparent 80%),
                        radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.10) 0%, transparent 80%);
            pointer-events: none;
        }
        /* Estilos generales para el contenido principal */
        .main-content {
            padding-top: 2rem; /* Menos espacio arriba, ya no hay barra fija */
            padding-bottom: 2rem;
        }
        
        /* Glass effect utility for all cards/tables */
        .glass-card {
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-table {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
            overflow: hidden;
        }
        .drop-shadow-glow {
            text-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1, 0 0 2px #fff;
        }
        @media (max-width: 640px) {
            .glass-card, .glass-table {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            table th, table td {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: none; }
        }
        .animate-fade-in {
            animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        
        /* Custom Intro.js styling */
        .introjs-overlay {
            background-color: rgba(0, 0, 0, 0.8) !important;
        }
        .introjs-tooltip {
            background: rgba(30, 41, 59, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 12px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(12px) !important;
        }
        .introjs-tooltiptext {
            color: #e2e8f0 !important;
            font-family: 'Inter', sans-serif !important;
        }
        .introjs-button {
            background: #6366f1 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 16px !important;
            color: white !important;
            font-weight: 500 !important;
            transition: all 0.2s !important;
        }
        .introjs-button:hover {
            background: #4f46e5 !important;
            transform: translateY(-1px) !important;
        }
        .introjs-skipbutton {
            background: rgba(107, 114, 128, 0.8) !important;
        }
        .introjs-skipbutton:hover {
            background: rgba(75, 85, 99, 0.9) !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Contenido Principal -->
    <div class="flex-grow container mx-auto px-4 py-8 main-content">
        {% block content %}
        {% endblock %}
    </div>
    {% include 'floating_menu.html' %}
    <!-- Pie de Página (Opcional) -->
    <footer class="bg-gray-800 text-gray-400 text-center p-4 mt-8">
        <div class="container mx-auto">
            <p>&copy; 2025 Gestión de Ventas. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Tutorial Script -->
    <script>
        // Function to show tutorial scenario selection menu
        function showTutorialMenu() {
            // Create the tutorial selection modal
            const tutorialMenuHTML = `
                <div id="tutorial-menu-modal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[9999]">
                    <div class="bg-gray-800 rounded-xl shadow-2xl p-8 w-full max-w-md border border-gray-600">
                        <h2 class="text-2xl font-bold text-white mb-6 text-center">🎯 Selecciona tu Escenario</h2>
                        <p class="text-gray-300 text-center mb-6">¿Qué tipo de tutorial necesitas?</p>
                        <div class="space-y-3">
                            <button onclick="startScenarioTutorial(1)" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-lg transition duration-300 text-left">
                                <div class="flex items-center">
                                    <span class="text-2xl mr-3">💼</span>
                                    <div>
                                        <div class="font-bold">Cotización con Oportunidad Recién Hecha</div>
                                        <div class="text-sm text-blue-200">Para oportunidades nuevas de Bitrix24</div>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startScenarioTutorial(2)" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 px-6 rounded-lg transition duration-300 text-left">
                                <div class="flex items-center">
                                    <span class="text-2xl mr-3">🔗</span>
                                    <div>
                                        <div class="font-bold">Ligar Oportunidad a Negociación Pasada</div>
                                        <div class="text-sm text-green-200">Conectar con oportunidades existentes</div>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startScenarioTutorial(3)" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-4 px-6 rounded-lg transition duration-300 text-left">
                                <div class="flex items-center">
                                    <span class="text-2xl mr-3">📄</span>
                                    <div>
                                        <div class="font-bold">Crear Cotización Sin Negociación</div>
                                        <div class="text-sm text-purple-200">Cotización independiente directa</div>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startHelpBot()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 px-6 rounded-lg transition duration-300 text-left">
                                <div class="flex items-center">
                                    <span class="text-2xl mr-3">🤖</span>
                                    <div>
                                        <div class="font-bold">Asistente Virtual</div>
                                        <div class="text-sm text-indigo-200">Resuelve dudas específicas de esta página</div>

                                </div>
                            </button>
                        </div>
                        <button onclick="closeTutorialMenu()" class="w-full mt-4 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-300">
                            Cancelar
                        </button>
                    </div>
                </div>
            `;
            
            // Add the modal to the page
            document.body.insertAdjacentHTML('beforeend', tutorialMenuHTML);
        }

        function closeTutorialMenu() {
            const modal = document.getElementById('tutorial-menu-modal');
            if (modal) {
                modal.remove();
            }
        }

        function startScenarioTutorial(scenario) {
            closeTutorialMenu();
            
            let steps = [];
            
            switch(scenario) {
                case 1:
                    // Escenario 1: Cotización con Oportunidad Recién Hecha
                    steps = [
                        {
                            element: 'body',
                            intro: "🎯 <strong>Escenario 1:</strong> Crear cotización para una oportunidad recién hecha<br><br>📱 <strong>Situación:</strong> Acabas de recibir una notificación de Bitrix24 - hay una nueva oportunidad esperando tu atención. Necesitas crear una cotización rápidamente para cerrar la venta.<br><br>✨ Te mostraremos el flujo completo paso a paso.",
                            position: 'top'
                        },
                        {
                            element: '#floating-menu-container',
                            intro: "🎮 <strong>Paso 1:</strong> Tu menú principal flotante<br><br>Desde cualquier página tienes acceso directo. Este es tu centro de control para toda la aplicación.<br><br>💡 <strong>Tip:</strong> Puedes arrastrarlo a cualquier parte de la pantalla.",
                            position: 'left'
                        },
                        {
                            element: 'body',
                            intro: "🎯 <strong>Paso 2:</strong> Navegación inicial<br><br>Haz clic en <strong>'Oportunidades'</strong> en el menú flotante para ver todas tus oportunidades de venta activas.<br><br>📊 Aquí verás tanto las oportunidades que se sincronizaron desde Bitrix24 como las creadas localmente.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🎯 <strong>Paso 3:</strong> Crear la cotización<br><br>Una vez en la página de oportunidades:<br>• Busca tu oportunidad nueva (aparece al principio)<br>• Haz clic en el botón verde <strong>'+ Crear Cotización'</strong><br><br>⚡ Esto te llevará directamente al formulario de cotización con algunos datos prellenados.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🏢 <strong>Paso 4:</strong> La magia de la selección de cliente<br><br>Al seleccionar el cliente, automáticamente aparecerán:<br>• ✅ Las últimas 10 oportunidades de ese cliente<br>• ✅ La nueva oportunidad de Bitrix24 estará disponible<br>• ✅ Podrás vincularla directamente<br><br>🔥 <strong>¡Este es el paso clave!</strong> La sincronización automática te ahorra tiempo.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "📦 <strong>Paso 5:</strong> Agregar productos<br><br>Tienes varias opciones:<br>• 🖱️ Fila por fila manualmente<br>• 📊 Pegar desde Excel (más rápido)<br>• 💰 Aplicar descuentos específicos<br>• ➖ Eliminar productos que no necesites<br><br>💡 Los totales se calculan automáticamente en tiempo real.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🏢 <strong>Paso 6:</strong> Seleccionar institución<br><br>Elige entre:<br>• 🔹 <strong>BAJANET</strong> - Para cotizaciones de Baja California<br>• 🔸 <strong>IAMET</strong> - Para cotizaciones corporativas<br><br>⚠️ Esto define el formato del PDF y la información que aparece.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🎉 <strong>¡Final exitoso!</strong><br><br>Al hacer clic en 'Crear Cotización':<br>• 📄 Se genera un PDF profesional automáticamente<br>• 🔄 Se sincroniza con Bitrix24<br>• 💾 Se guarda en el historial del cliente<br>• 📩 Queda lista para enviar<br><br>⏱️ <strong>Tiempo total: 2-3 minutos máximo</strong>",
                            position: 'top'
                        }
                    ];
                    break;
                    
                case 2:
                    // Escenario 2: Ligar Oportunidad a Negociación Pasada
                    steps = [
                        {
                            element: 'body',
                            intro: "🔗 <strong>Escenario 2:</strong> Ligar oportunidad a una negociación pasada<br><br>🤝 <strong>Situación:</strong> Tienes un cliente recurrente con quien ya has trabajado. Quieres crear una nueva cotización pero vincularla a una oportunidad específica que ya existía antes.<br><br>💡 Este escenario es perfecto para mantener la trazabilidad de negociaciones largas.",
                            position: 'top'
                        },
                        {
                            element: '#floating-menu-container',
                            intro: "🎮 <strong>Paso 1:</strong> Tu punto de partida<br><br>Desde el menú puedes ir tanto a 'Oportunidades' como a 'Cotizaciones' para investigar el historial.<br><br>🕵️ <strong>Tip:</strong> Siempre revisa primero qué tiene el cliente.",
                            position: 'left'
                        },
                        {
                            element: 'body',
                            intro: "📊 <strong>Paso 2:</strong> Investigación del cliente<br><br>Opciones para revisar el historial:<br>• 🔍 <strong>Oportunidades</strong> → Ver todas las oportunidades activas e históricas<br>• 📄 <strong>Cotizaciones</strong> → Ver cotizaciones pasadas del cliente<br>• 🔄 Ambas están sincronizadas con Bitrix24",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🎯 <strong>Paso 3:</strong> Crear la nueva cotización<br><br>Una vez identificada la oportunidad que quieres vincular:<br>• Ve a <strong>'Oportunidades'</strong><br>• Haz clic en <strong>'+ Crear Cotización'</strong><br><br>🚀 No importa que la oportunidad sea antigua - el sistema la mostrará.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🔮 <strong>Paso 4:</strong> La magia del historial<br><br>Al seleccionar el cliente:<br>• 📋 Aparecen las últimas 10 oportunidades<br>• 📅 Incluye oportunidades de meses pasados<br>• 🏷️ Cada oportunidad mantiene su contexto original<br><br>💎 <strong>Ventaja:</strong> Nunca pierdes el seguimiento de negociaciones largas.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🔗 <strong>Paso 5:</strong> Vinculación inteligente<br><br>Al seleccionar la oportunidad pasada:<br>• 🔄 Se mantiene el contexto histórico<br>• 📊 Se preservan los datos originales (área, producto, probabilidad)<br>• 📈 Se actualiza el seguimiento en Bitrix24<br><br>✨ La nueva cotización queda ligada a la negociación original.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🎯 <strong>Resultado final:</strong><br><br>📈 <strong>Beneficios únicos:</strong><br>• 🕒 Historial completo de la relación comercial<br>• 📊 Trazabilidad total en Bitrix24<br>• 💼 Contexto preservado para el equipo<br>• 🔄 Sincronización automática<br><br>🏆 <strong>Perfecto para clientes recurrentes y negociaciones complejas</strong>",
                            position: 'top'
                        }
                    ];
                    break;
                    
                case 3:
                    // Escenario 3: Crear Cotización Sin Negociación
                    steps = [
                        {
                            element: 'body',
                            intro: "📄 <strong>Escenario 3:</strong> Crear cotización independiente<br><br>⚡ <strong>Situación:</strong> Te llega una consulta directa por teléfono, email o WhatsApp. Necesitas una cotización profesional RÁPIDO, sin complicaciones de Bitrix24.<br><br>🎯 <strong>Meta:</strong> PDF profesional en menos de 2 minutos.",
                            position: 'top'
                        },
                        {
                            element: '#floating-menu-container',
                            intro: "🚀 <strong>Paso 1:</strong> Acceso directo<br><br>Desde el menú flotante, ve directamente a <strong>'Oportunidades'</strong> → Botón verde <strong>'+ Crear Cotización'</strong>.<br><br>💡 <strong>Atajo:</strong> Es el camino más rápido sin pasar por navegación compleja.",
                            position: 'left'
                        },
                        {
                            element: 'body',
                            intro: "⚡ <strong>Paso 2:</strong> Setup ultra-rápido<br><br><strong>Proceso en 5 pasos:</strong><br>1️⃣ Título descriptivo<br>2️⃣ Selecciona cliente (o crea nuevo)<br>3️⃣ <strong>OMITE</strong> el campo 'Oportunidad' (déjalo vacío)<br>4️⃣ Productos<br>5️⃣ Institución y ¡listo!<br><br>🔥 <strong>Clave:</strong> Al dejar vacío el campo oportunidad, funciona independiente.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "➕ <strong>Paso 3:</strong> Cliente nuevo al instante<br><br>Si el cliente no existe:<br>• Haz clic en el botón <strong>'+'</strong> junto al selector<br>• Rellena nombre de empresa, contacto y email<br>• ✅ Se guarda automáticamente<br>• 🔄 Aparece inmediatamente en la lista<br><br>⏱️ <strong>Tiempo:</strong> 30 segundos máximo.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "📦 <strong>Paso 4:</strong> Productos súper flexibles<br><br><strong>3 métodos según tu situación:</strong><br>• 🖱️ <strong>Manual:</strong> Producto por producto (ideal para pocos items)<br>• 📊 <strong>Excel:</strong> Copiar-pegar directo (perfecto para listas grandes)<br>• 🎨 <strong>Mixto:</strong> Combinar ambos métodos<br><br>💡 Todos los cálculos son automáticos.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🎨 <strong>Paso 5:</strong> Personalización final<br><br><strong>Últimos detalles:</strong><br>• 💰 IVA (8% o 16%)<br>• 💵 Moneda (MXN o USD)<br>• 🏢 Institución (BAJANET/IAMET)<br>• 📝 Notas opcionales<br><br>⚠️ <strong>Importante:</strong> La institución define el diseño del PDF.",
                            position: 'top'
                        },
                        {
                            element: 'body',
                            intro: "🎉 <strong>¡Resultado inmediato!</strong><br><br><strong>Lo que obtienes:</strong><br>• 📄 PDF profesional de alta calidad<br>• 📧 Listo para enviar por email<br>• 💾 Guardado en historial del cliente<br>• 📱 Disponible desde cualquier dispositivo<br><br>✨ <strong>Sin Bitrix24, sin complicaciones, solo resultados</strong>",
                            position: 'top'
                        }
                    ];
                    break;
            }
            
            // Start the scenario tutorial
            introJs().setOptions({
                steps: steps,
                showProgress: true,
                showBullets: false,
                exitOnOverlayClick: false,
                exitOnEsc: true,
                nextLabel: 'Siguiente →',
                prevLabel: '← Anterior', 
                skipLabel: 'Saltar Tutorial',
                doneLabel: '¡Perfecto! ✨'
            }).start();
        }

        function startContextualTutorial() {
            closeTutorialMenu();
            startTutorial(); // Call the original contextual tutorial function
        }

        // New Help Bot System
        function startHelpBot() {
            closeTutorialMenu();
            showHelpBot();
        }

        function showHelpBot() {
            // Get current page context
            const currentPath = window.location.pathname;
            let pageQuestions = getQuestionsForCurrentPage(currentPath);
            
            // Create the help bot modal
            const helpBotHTML = `
                <div id="help-bot-modal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[9999]">
                    <div class="bg-gray-800 rounded-xl shadow-2xl w-full max-w-lg border border-gray-600 max-h-[80vh] overflow-hidden">
                        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-4">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center">
                                    <span class="text-3xl mr-3">🤖</span>
                                    <div>
                                        <h2 class="text-xl font-bold text-white">Asistente Virtual Nethive</h2>
                                        <p class="text-indigo-100 text-sm">¿En qué puedo ayudarte?</p>
                                    </div>
                                </div>
                                <button onclick="closeHelpBot()" class="text-white hover:text-gray-300 text-2xl font-bold">&times;</button>
                            </div>
                        </div>
                        <div id="bot-content" class="p-6 max-h-96 overflow-y-auto">
                            <div id="bot-questions">
                                <p class="text-gray-300 mb-4">Selecciona una pregunta sobre esta página:</p>
                                <div class="space-y-2">
                                    ${pageQuestions.map((q, index) => `
                                        <button onclick="showBotAnswer(${index})" class="w-full text-left bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-lg transition duration-200 text-sm">
                                            <div class="flex items-start">
                                                <span class="text-blue-400 mr-2 flex-shrink-0">❓</span>
                                                <span>${q.question}</span>
                                            </div>
                                        </button>
                                    `).join('')}
                                </div>
                                <button onclick="showBotAnswer(-1)" class="w-full mt-4 bg-purple-600 hover:bg-purple-700 text-white p-3 rounded-lg transition duration-200 text-sm">
                                    <div class="flex items-center justify-center">
                                        <span class="text-xl mr-2">💡</span>
                                        <span>¿Tienes otra pregunta?</span>
                                    </div>
                                </button>
                            </div>
                            <div id="bot-answer" class="hidden">
                                <div id="answer-content"></div>
                                <div class="mt-4 pt-4 border-t border-gray-600">
                                    <button onclick="goBackToQuestions()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition duration-200 text-sm">
                                        ← Volver a preguntas
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Store questions globally for access
            window.currentBotQuestions = pageQuestions;
            
            // Add the modal to the page
            document.body.insertAdjacentHTML('beforeend', helpBotHTML);
        }

        function getQuestionsForCurrentPage(currentPath) {
            let questions = [];
            
            if (currentPath.includes('todos') || currentPath.includes('oportunidades')) {
                // Oportunidades page questions
                questions = [
                    {
                        question: "¿Cómo busco una oportunidad específica?",
                        answer: "🔍 <strong>Para buscar oportunidades:</strong><br><br>• Usa el campo de búsqueda en la parte superior<br>• Escribe el nombre de la oportunidad<br>• La búsqueda es en tiempo real<br>• También puedes usar los filtros avanzados haciendo clic en 'Mostrar Filtros'<br><br>💡 <strong>Tip:</strong> Los filtros te permiten buscar por área, producto, cliente, etc."
                    },
                    {
                        question: "¿Qué significan los colores en la probabilidad de cierre?",
                        answer: "🎯 <strong>Colores de probabilidad:</strong><br><br>🔴 <strong>Rojo (0-50%):</strong> Probabilidad baja<br>🟡 <strong>Amarillo (51-69%):</strong> Probabilidad media<br>🟢 <strong>Verde (70-100%):</strong> Probabilidad alta<br><br>💡 <strong>Tip:</strong> Haz clic en cualquier barra para cambiar la probabilidad rápidamente."
                    },
                    {
                        question: "¿Cómo creo una cotización desde una oportunidad?",
                        answer: "💼 <strong>Para crear una cotización:</strong><br><br>1. Haz clic en el botón verde <strong>'+ Crear Cotización'</strong><br>2. Te llevará al formulario de cotización<br>3. Selecciona el cliente (las oportunidades aparecerán automáticamente)<br>4. Elige la oportunidad que quieres vincular<br>5. Agrega productos y genera la cotización<br><br>⚡ ¡Es así de simple!"
                    },
                    {
                        question: "¿De dónde vienen las oportunidades que veo aquí?",
                        answer: "🔄 <strong>Origen de las oportunidades:</strong><br><br>• 📥 <strong>Bitrix24:</strong> Se sincronizan automáticamente en tiempo real<br>• 🆕 <strong>Creadas localmente:</strong> Usando el botón '+' en cotizaciones<br>• 🔄 <strong>Actualizaciones:</strong> Cualquier cambio en Bitrix24 se refleja aquí inmediatamente<br><br>✨ Todo está siempre sincronizado."
                    },

        function startTutorial() {
            // Configure tutorial steps based on current page
            let steps = [];
            
            // Get current page URL to determine context
            const currentPath = window.location.pathname;
            
            if (currentPath === '/' || currentPath.includes('home')) {
                // Home page tutorial
                steps = [
                    {
                        element: '#floating-menu-container',
                        intro: "¡Bienvenido a Nethive! 🎉 Este es tu menú principal. Desde aquí puedes acceder a todas las funciones de la plataforma.",
                        position: 'left'
                    },
                    {
                        element: 'body',
                        intro: "Te mostraremos las funciones principales paso a paso. ¡Empecemos! 🚀"
                    }
                ];
            } else if (currentPath.includes('todos') || currentPath.includes('oportunidades')) {
                // Opportunities page tutorial - use data attributes if available
                const elementsWithIntro = document.querySelectorAll('[data-intro]');
                if (elementsWithIntro.length > 0) {
                    // Use the data attributes from the page
                    steps = [];
                    elementsWithIntro.forEach((element, index) => {
                        steps.push({
                            element: element,
                            intro: element.getAttribute('data-intro'),
                            position: element.getAttribute('data-position') || 'auto'
                        });
                    });
                    // Add menu step at the beginning
                    steps.unshift({
                        element: '#floating-menu-container',
                        intro: "🎯 Desde el menú puedes navegar a cualquier sección de Nethive.",
                        position: 'left'
                    });

                    // Fallback tutorial

                    ];
                }
            } else if (currentPath.includes('crear_cotizacion')) {
                // Quote creation tutorial - use data attributes if available
                const elementsWithIntro = document.querySelectorAll('[data-intro]');
                if (elementsWithIntro.length > 0) {

        // Add event listener when DOM is loaded

            // Wait a bit for the floating menu to be ready
            setTimeout(function() {
