<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PNG Favicons para diferentes tamaños -->

    <!-- Apple Touch Icon -->

    <!-- Android Chrome Icons -->

    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/android-chrome-512x512.png' %}">

    <!-- Inline SVG favicon como último recurso -->

    <!-- Meta tags para mejor presentación -->
    <meta name="description"
        content="Sistema de Gestión de Ventas - Administra oportunidades, clientes y cotizaciones de manera eficiente">
    <meta name="keywords" content="ventas, CRM, cotizaciones, oportunidades, clientes, Bitrix24">
    <meta name="author" content="Sistema de Gestión de Ventas">
    <meta name="robots" content="noindex, nofollow">

    <!-- Open Graph para redes sociales -->
    <meta property="og:title" content="{% block og_title %}Sistema de Gestión de Ventas{% endblock %}">
    <meta property="og:description"
        content="Administra tus ventas, clientes y oportunidades de negocio de manera eficiente">
    <meta property="og:type" content="website">
    <meta property="og:image" content="{% static 'images/android-chrome-512x512.png' %}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% block twitter_title %}Sistema de Gestión de Ventas{% endblock %}">
    <meta name="twitter:description" content="Administra tus ventas, clientes y oportunidades de negocio">

    <!-- PWA Support -->
    <link rel="manifest" href="{% static 'manifest.json' %}">

    <meta name="theme-color" content="#007AFF">
    <script>
        (function () {
            try {
                const theme = localStorage.getItem('theme') || 'dark';
                const html = document.documentElement;

                html.classList.remove('dark-theme', 'light-theme', 'pink-theme', 'white-theme', 'coffee-theme', 'perla-theme');
                html.removeAttribute('data-theme');

                if (theme === 'pink' || theme === 'white' || theme === 'coffee' || theme === 'perla') {
                    html.classList.add('light-theme');
                } else {
                    html.classList.add('dark-theme');
                }

                if (theme !== 'dark') {
                    html.setAttribute('data-theme', theme);
                }
            } catch (e) {
                console.error('Error applying theme from localStorage', e);
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestión Ventas">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <!-- jQuery for global use -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/personalizacion.css' %}">
    <link rel="stylesheet" href="{% static 'css/oportunidad_detail.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    <!-- Intro.js for Tutorial -->
    <script src="https://unpkg.com/intro.js/intro.js"></script>
    <link href="https://unpkg.com/intro.js/introjs.css" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen flex flex-col" {% if is_supervisor or user.is_superuser %}data-user-is-supervisor="true"{% endif %}>
    <!-- Contenido Principal -->
    <div class="flex-grow container mx-auto px-4 py-8 main-content">
        {% block content %}
        {% endblock %}
    </div>

    <!-- ═══ SPOTLIGHT SEARCH (doble espacio / ⌘K) ═══ -->
    <div id="spotlight-modal" class="spotlight-modal">
        <div class="spotlight-backdrop" onclick="closeSpotlight()"></div>
        <div class="spotlight-container">
            <div class="spotlight-search-box">
                <div class="spotlight-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="spotlight-input"
                    placeholder="Buscar oportunidades, clientes, cotizaciones, tareas..." autocomplete="off"
                    spellcheck="false" />
                <div class="spotlight-shortcut">⌘K</div>
            </div>
            <div class="spotlight-results" id="spotlight-results">
                <div class="spotlight-empty">
                    <div class="spotlight-empty-icon">🔍</div>
                    <div class="spotlight-empty-text">Busca por nombre, cliente o número (#181)</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ ASISTENTE IA DE AYUDA (botón AYUDA en Dynamic Island) ═══ -->
    <div id="ayuda-modal" class="spotlight-modal">
        <div class="spotlight-backdrop" onclick="closeAyudaChat()"></div>
        <div class="spotlight-container" style="max-width:520px;display:flex;flex-direction:column;max-height:75vh;">
            <div
                style="padding:18px 22px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div
                        style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#007AFF,#5856D6);display:flex;align-items:center;justify-content:center;">
                        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M12 2a10 10 0 0110 10c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2z" />
                            <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                            <circle cx="9" cy="9" r="1" fill="#fff" />
                            <circle cx="15" cy="9" r="1" fill="#fff" />
                        </svg>
                    </div>
                    <div>
                        <div style="font-size:0.95rem;font-weight:700;letter-spacing:-0.01em;">Asistente IAMET</div>
                        <div
                            style="font-size:0.65rem;font-weight:500;color:#34C759;display:flex;align-items:center;gap:4px;">
                            <span
                                style="width:6px;height:6px;background:#34C759;border-radius:50%;display:inline-block;"></span>
                            En línea
                        </div>
                    </div>
                </div>
                <button onclick="closeAyudaChat()"
                    style="background:rgba(255,255,255,0.08);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:inherit;font-size:1rem;transition:background 0.15s;"
                    onmouseover="this.style.background='rgba(255,255,255,0.15)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.08)'">✕</button>
            </div>
            <div id="aiChatMessages"
                style="flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch;">
            </div>
            <div style="padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;">
                <div style="display:flex;gap:8px;align-items:center;">
                    <input type="text" id="ayuda-input" placeholder="Escribe tu pregunta..." autocomplete="off"
                        spellcheck="false"
                        style="flex:1;border:none;outline:none;font-size:0.92rem;font-weight:500;background:rgba(255,255,255,0.06);color:#fff;padding:11px 16px;border-radius:22px;font-family:inherit;" />
                    <button onclick="aiChatSend()"
                        style="width:38px;height:38px;border-radius:50%;background:#007AFF;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform 0.1s;"
                        onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">
                        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24">
                            <path d="M22 2L11 13" />
                            <path d="M22 2L15 22l-4-9-9-4 20-7z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/base.js' %}"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
