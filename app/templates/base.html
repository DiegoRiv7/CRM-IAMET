<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Administración de Ventas
        {% endblock %}
    </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(120deg, #232946 0%, #1a202c 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(ellipse at 60% 40%, rgba(99,102,241,0.18) 0%, rgba(20,58,86,0.10) 60%, transparent 100%),
                        radial-gradient(ellipse at 20% 80%, rgba(16,185,129,0.10) 0%, transparent 80%),
                        radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.10) 0%, transparent 80%);
            pointer-events: none;
        }
        /* Estilos generales para el contenido principal */
        .main-content {
            padding-top: 2rem; /* Menos espacio arriba, ya no hay barra fija */
            padding-bottom: 2rem;
        }
        /* --- Dock Styles (copiados de bienvenida.html) --- */
        .dock-icon {
            width: var(--dock-icon-size, 36px);
            height: var(--dock-icon-size, 36px);
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease-in-out;
        }
        #dock {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s ease-in-out;
            width: 90%;
            max-width: 90%;
            height: 64px;
        }
        #dock:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }
        #dock:hover .dock-icon {
            opacity: 1;
        }
        #dock nav ul {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #dock nav li a {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.2s ease-out, background-color 0.2s ease-out;
            position: relative;
            padding: var(--dock-item-padding, 0.5rem);
            border-radius: 0.75rem;
            background-color: transparent;
            margin: 0 0.5rem;
        }
        #dock nav li a:hover .dock-icon {
            transform: scale(1.8);
        }
        #dock nav li a span {
            opacity: 0;
            position: absolute;
            bottom: var(--dock-text-bottom, -25px);
            white-space: nowrap;
            transition: opacity 0.2s ease-out;
            pointer-events: none;
            background-color: rgba(0, 0, 0, 0.85);
            padding: 0.25rem 0.5rem;
            border-radius: 0.3rem;
            font-size: 0.7rem;
            z-index: 1001;
        }
        #dock nav li a:hover {
            color: #e2e8f0;
            background-color: rgba(255, 255, 255, 0.15);
        }
        #dock nav li a:hover span {
            opacity: 1;
        }
        /* Glass effect utility for all cards/tables */
        .glass-card {
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-table {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
            overflow: hidden;
        }
        .drop-shadow-glow {
            text-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1, 0 0 2px #fff;
        }
        @media (max-width: 640px) {
            .glass-card, .glass-table {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            table th, table td {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: none; }
        }
        .animate-fade-in {
            animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Contenido Principal -->
    <div class="flex-grow container mx-auto px-4 py-8 main-content">
        {% block content %}
        {% endblock %}
    </div>
    {% if not hide_dock %}
        {% include 'dock.html' %}
    {% endif %}
    <script>
        function adjustDockIconSizes() {
            const dock = document.getElementById('dock');
            if (!dock) return;
            const navItems = dock.querySelectorAll('nav li');
            const itemCount = navItems.length;
            const minIconSize = 28;
            const maxIconSize = 48;
            const maxItemsForMaxSize = 6;
            const minItemsForMinSize = 12;
            let calculatedSize;
            if (itemCount <= maxItemsForMaxSize) {
                calculatedSize = maxIconSize;
            } else if (itemCount >= minItemsForMinSize) {
                calculatedSize = minIconSize;
            } else {
                const range = minItemsForMinSize - maxItemsForMaxSize;
                const position = itemCount - maxItemsForMaxSize;
                const sizeDiff = maxIconSize - minIconSize;
                calculatedSize = maxIconSize - (sizeDiff * (position / range));
            }
            document.documentElement.style.setProperty('--dock-icon-size', `${calculatedSize}px`);
            document.documentElement.style.setProperty('--dock-item-padding', `${calculatedSize / 6}px`);
            document.documentElement.style.setProperty('--dock-text-bottom', `-${calculatedSize / 2}px`);
        }
        window.addEventListener('DOMContentLoaded', adjustDockIconSizes);
        window.addEventListener('resize', adjustDockIconSizes);
    </script>
    <!-- Pie de Página (Opcional) -->
    <footer class="bg-gray-800 text-gray-400 text-center p-4 mt-8">
        <div class="container mx-auto">
            <p>&copy; 2025 Gestión de Ventas. Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
</html>
