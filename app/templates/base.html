<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Administración de Ventas
        {% endblock %}
    </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/oportunidad_detail.css' %}">
    
    <!-- Intro.js for Tutorial -->
    <script src="https://unpkg.com/intro.js/intro.js"></script>
    <link href="https://unpkg.com/intro.js/introjs.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(120deg, #232946 0%, #1a202c 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(ellipse at 60% 40%, rgba(99,102,241,0.18) 0%, rgba(20,58,86,0.10) 60%, transparent 100%),
                        radial-gradient(ellipse at 20% 80%, rgba(16,185,129,0.10) 0%, transparent 80%),
                        radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.10) 0%, transparent 80%);
            pointer-events: none;
        }
        /* Estilos generales para el contenido principal */
        .main-content {
            padding-top: 2rem; /* Menos espacio arriba, ya no hay barra fija */
            padding-bottom: 2rem;
        }
        
        /* Glass effect utility for all cards/tables */
        .glass-card {
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-table {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
            overflow: hidden;
        }
        .drop-shadow-glow {
            text-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1, 0 0 2px #fff;
        }
        @media (max-width: 640px) {
            .glass-card, .glass-table {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            table th, table td {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: none; }
        }
        .animate-fade-in {
            animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        
        /* Custom Intro.js styling */
        .introjs-overlay {
            background-color: rgba(0, 0, 0, 0.8) !important;
        }
        .introjs-tooltip {
            background: rgba(30, 41, 59, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 12px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(12px) !important;
        }
        .introjs-tooltiptext {
            color: #e2e8f0 !important;
            font-family: 'Inter', sans-serif !important;
        }
        .introjs-button {
            background: #6366f1 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 16px !important;
            color: white !important;
            font-weight: 500 !important;
            transition: all 0.2s !important;
        }
        .introjs-button:hover {
            background: #4f46e5 !important;
            transform: translateY(-1px) !important;
        }
        .introjs-skipbutton {
            background: rgba(107, 114, 128, 0.8) !important;
        }
        .introjs-skipbutton:hover {
            background: rgba(75, 85, 99, 0.9) !important;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes pulse-light {
            0% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,1); }
            100% { box-shadow: 0 0 8px rgba(255,255,255,0.7); }
        }
        .animate-pulse-light {
            animation: pulse-light 2s infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s infinite ease-in-out;
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-in {
            animation: slide-in 0.5s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Contenido Principal -->
    <div class="flex-grow container mx-auto px-4 py-8 main-content">
        {% block content %}
        {% endblock %}
    </div>
    {% include 'floating_menu.html' %}
    <!-- Pie de Página (Opcional) -->
    <footer class="bg-gray-800 text-gray-400 text-center p-4 mt-8">
        <div class="container mx-auto">
            <p>&copy; 2025 Gestión de Ventas. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Nethive Virtual Assistant Script -->
    <script>
        // Nethive's personality and emotional states
        const nethivePersonality = {
            moods: ['happy', 'excited', 'thoughtful', 'helpful', 'playful'],
            currentMood: 'happy',
            userName: '',
            visitCount: 0,
            lastVisit: null,
            favoriteFeature: null,
            expressions: {
                happy: { eyes: '⚫⚫', mouth: '︶', color: '#4ade80' },
                excited: { eyes: '✨✨', mouth: '◡', color: '#f59e0b' },
                thoughtful: { eyes: '🤔🤔', mouth: '−', color: '#8b5cf6' },
                helpful: { eyes: '👀👀', mouth: '◠', color: '#06b6d4' },
                playful: { eyes: '😊😊', mouth: '‿', color: '#ec4899' }
            }
        };

        // Initialize Nethive's memory
        function initNethiveMemory() {
            const saved = localStorage.getItem('nethive-memory');
            if (saved) {
                const memory = JSON.parse(saved);
                nethivePersonality.visitCount = memory.visitCount || 0;
                nethivePersonality.lastVisit = memory.lastVisit;
                nethivePersonality.userName = memory.userName || '';
                nethivePersonality.favoriteFeature = memory.favoriteFeature;
            }
            nethivePersonality.visitCount++;
            saveNethiveMemory();
        }

        function saveNethiveMemory() {
            localStorage.setItem('nethive-memory', JSON.stringify({
                visitCount: nethivePersonality.visitCount,
                lastVisit: new Date().toISOString(),
                userName: nethivePersonality.userName,
                favoriteFeature: nethivePersonality.favoriteFeature
            }));
        }

        function getNethiveGreeting() {
            const hour = new Date().getHours();
            const { visitCount, userName, lastVisit } = nethivePersonality;
            
            let personalizedGreeting = '';
            let timeGreeting = '';
            
            if (hour < 12) timeGreeting = '¡Buenos días!';
            else if (hour < 18) timeGreeting = '¡Buenas tardes!';
            else timeGreeting = '¡Buenas noches!';

            if (visitCount === 1) {
                personalizedGreeting = `${timeGreeting} ¡Es un placer conocerte! 😊`;
            } else if (visitCount < 5) {
                personalizedGreeting = `${timeGreeting} ¡Qué alegría verte de nuevo! Esta es tu visita #${visitCount} ✨`;
            } else {
                personalizedGreeting = `${timeGreeting}${userName ? ` ${userName}` : ''}! ¿En qué puedo ayudarte hoy?`;
            }
            
            return `Hola soy Nethive, tu asistente virtual. ${personalizedGreeting}`;
        }

        function updateNethiveMood(mood) {
            nethivePersonality.currentMood = mood;
            const avatar = document.getElementById('nethive-avatar');
            const expression = nethivePersonality.expressions[mood];
            
            if (avatar) {
                const face = avatar.querySelector('.nethive-face');
                const body = avatar.querySelector('.nethive-body');
                
                if (face) {
                    face.style.borderColor = expression.color;
                }
                if (body) {
                    body.style.background = `linear-gradient(145deg, ${expression.color}20, ${expression.color}10)`;
                }
                
                // Update facial expression
                setTimeout(() => {
                    const eyes = avatar.querySelectorAll('.nethive-eye');
                    eyes.forEach(eye => {
                        eye.style.transform = 'scale(1.1)';
                        setTimeout(() => eye.style.transform = 'scale(1)', 200);
                    });
                }, 100);
            }
        }

        // Nethive Virtual Assistant - Main function with 3D avatar
                  // Helper function to create the main Nethive 3D avatar
          function createNethiveAvatar() {
              const { currentMood, expressions } = nethivePersonality;
              const expression = expressions[currentMood];

              return `
                  <div class="nethive-avatar-main relative w-24 h-24 md:w-32 md:h-32 flex items-center justify-center animate-float">
                      <!-- Body -->
                      <div class="nethive-body absolute w-full h-full rounded-full transition-all duration-500"
                           style="background: linear-gradient(145deg, ${expression.color}20, ${expression.color}10);
                                  box-shadow: inset 0 0 15px ${expression.color}40, 0 0 20px ${expression.color}30;">
                      </div>
                      <!-- Head (slightly above body) -->
                      <div class="nethive-head absolute w-3/4 h-3/4 rounded-full bg-gray-700 border-2 border-gray-600 flex items-center justify-center transition-all duration-500"
                           style="transform: translateY(-30%); background: radial-gradient(circle at 50% 50%, #374151, #1f2937);">
                          <!-- Face -->
                          <div class="nethive-face relative w-3/4 h-3/4 rounded-full border-2 border-gray-500 flex flex-col items-center justify-center transition-all duration-500"
                               style="border-color: ${expression.color}; background: #111827;">
                              <!-- Eyes -->
                              <div class="nethive-eyes flex space-x-3">
                                  <div class="nethive-eye w-4 h-4 bg-white rounded-full animate-pulse-light" style="box-shadow: 0 0 8px ${expression.color};"></div>
                                  <div class="nethive-eye w-4 h-4 bg-white rounded-full animate-pulse-light" style="box-shadow: 0 0 8px ${expression.color};"></div>
                              </div>
                              <!-- Mouth -->
                              <div class="nethive-mouth mt-2 text-white text-xl font-bold transition-all duration-500"
                                   style="color: ${expression.color};">${expression.mouth}</div>
                          </div>
                      </div>
                  </div>
              `;
          }

          // Helper function to create a mini Nethive avatar for chat messages
          function createMiniNethiveAvatar() {
              const { currentMood, expressions } = nethivePersonality;
              const expression = expressions[currentMood];

              return `
                  <div class="nethive-mini-avatar w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 relative overflow-hidden"
                       style="background: linear-gradient(145deg, ${expression.color}40, ${expression.color}20);
                              box-shadow: 0 0 10px ${expression.color}30;">
                      <div class="absolute inset-0 bg-gray-800 opacity-70 rounded-full"></div>
                      <div class="relative text-white text-lg font-bold" style="color: ${expression.color};">
                          ${expression.eyes ? expression.eyes.substring(0,1) : 'N'}
                      </div>
                  </div>
              `;
          }

           function showNethiveAssistant() {
            initNethiveMemory();
            updateNethiveMood('excited');
            
            // Get current page context and questions
            const currentPath = window.location.pathname;
            let pageQuestions = getNethiveQuestionsForCurrentPage(currentPath);
            let pageContext = getNethivePageContext(currentPath);
            
            // Create the Nethive assistant modal with 3D avatar
            const assistantHTML = `
                <div id="nethive-assistant-modal" class="fixed inset-0 bg-black bg-opacity-85 flex items-center justify-center z-[9999]">
                    <div class="bg-gradient-to-br from-slate-800 via-slate-900 to-gray-900 rounded-3xl shadow-2xl w-full max-w-4xl border border-cyan-500/30 max-h-[90vh] overflow-hidden animate-scale-in relative">
                        
                        <!-- Ambient lighting effects -->
                        <div class="absolute inset-0 bg-gradient-radial from-cyan-500/10 via-transparent to-purple-500/10 animate-pulse-slow pointer-events-none"></div>
                        
                        <!-- Header with enhanced branding -->
                        <div class="bg-gradient-to-r from-cyan-600 via-blue-600 to-purple-600 p-6 relative overflow-hidden">
                            <div class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23ffffff" fill-opacity="0.05"%3E%3Ccircle cx="30" cy="30" r="2"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')] opacity-30"></div>
                            
                            <div class="relative flex items-center justify-between">
                                <div class="flex items-center space-x-6">
                                    <!-- 3D Nethive Avatar -->
                                    <div id="nethive-avatar" class="relative">
                                        ${createNethiveAvatar()}
                                    </div>
                                    <div>
                                        <div class="flex items-center space-x-2">
                                            <h2 class="text-3xl font-bold text-white tracking-wide">Nethive</h2>
                                            
                                        </div>
                                        <p class="text-cyan-100 text-sm font-medium">Tu Asistente Virtual Inteligente</p>
                                        <div id="nethive-status" class="text-xs text-cyan-200 opacity-80 mt-1">En línea • Listo para ayudar</div>
                                    </div>
                                </div>
                                <button onclick="closeNethiveAssistant()" class="text-white/80 hover:text-white text-4xl font-bold transition-all duration-300 hover:rotate-90 hover:scale-110">&times;</button>
                            </div>
                        </div>
                        
                        <!-- Enhanced Chat Content -->
                        <div id="nethive-content" class="p-8 max-h-[500px] overflow-y-auto bg-gradient-to-b from-slate-800/50 to-slate-900/80 backdrop-blur-sm">
                            <div id="nethive-chat">
                                <div class="flex items-start mb-8 animate-slide-in">
                                    <!-- Mini avatar for chat -->
                                    <div class="flex-shrink-0 mr-4">
                                        ${createMiniNethiveAvatar()}
                                    </div>
                                    <div class="bg-gradient-to-br from-cyan-900/60 to-blue-900/60 rounded-2xl rounded-tl-none p-6 max-w-md border border-cyan-500/30 backdrop-blur-sm">
                                        <div id="nethive-message" class="text-cyan-50 text-sm leading-relaxed">
                                            ${getNethiveGreeting()}
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Enhanced Questions with better UX -->
                                <div id="nethive-questions" class="space-y-4 mt-6">
                                    <div class="text-center mb-6">
                                        <h3 class="text-cyan-300 font-semibold mb-2">¿Qué te gustaría saber?</h3>
                                        <div class="w-16 h-0.5 bg-gradient-to-r from-transparent via-cyan-400 to-transparent mx-auto"></div>
                                    </div>
                                    
                                    ${pageQuestions.map((q, index) => `
                                        <button onclick="showNethiveAnswer(${index})" class="w-full text-left bg-gradient-to-r from-slate-700/60 to-slate-600/60 hover:from-cyan-600/80 hover:to-blue-600/80 text-white p-5 rounded-2xl transition-all duration-500 transform hover:scale-[1.02] group border border-slate-600/30 hover:border-cyan-400/50 backdrop-blur-sm">
                                            <div class="flex items-start">
                                                <div class="bg-gradient-to-br from-cyan-400 to-blue-500 w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mr-4 group-hover:scale-110 transition-transform">
                                                    <span class="text-white text-sm font-bold">?</span>
                                                </div>
                                                <div class="flex-1">
                                                    <span class="font-medium text-slate-200 group-hover:text-white block mb-1">${q.question}</span>
                                                    <div class="text-slate-400 group-hover:text-cyan-200 text-xs">
                                                        <span class="inline-flex items-center">
                                                            <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full mr-2 opacity-60"></span>
                                                            ${q.category || 'Pregunta general'}
                                                        </span>
                                                    </div>
                                                </div>
                                                <div class="text-slate-500 group-hover:text-cyan-300 transition-colors">
                                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                                    </svg>
                                                </div>
                                            </div>
                                        </button>
                                    `).join('')}
                                    
                                    <!-- Enhanced more help option -->
                                    <button onclick="showNethiveMoreHelp()" class="w-full mt-6 bg-gradient-to-r from-purple-600/80 to-pink-600/80 hover:from-purple-600 hover:to-pink-600 text-white p-5 rounded-2xl transition-all duration-500 transform hover:scale-[1.02] border border-purple-500/30 hover:border-purple-400/50 backdrop-blur-sm">
                                        <div class="flex items-center justify-center">
                                            <div class="bg-white/20 w-10 h-10 rounded-full flex items-center justify-center mr-4">
                                                <span class="text-2xl">💡</span>
                                            </div>
                                            <div class="text-left">
                                                <span class="font-bold block">¿Necesitas más ayuda?</span>
                                                <div class="text-purple-200 text-sm">Opciones adicionales de soporte</div>
                                            </div>
                                            <div class="ml-auto">
                                                <svg class="w-6 h-6 text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                                                </svg>
                                            </div>
                                        </div>
                                    </button>
                                </div>
                                
                                <!-- Answer area (hidden initially) -->
                                <div id="nethive-answer" class="hidden">
                                    <div id="answer-content"></div>
                                    <div class="mt-6 pt-4 border-t border-gray-600">
                                        <button onclick="backToNethiveQuestions()" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white px-6 py-3 rounded-lg transition-all duration-200 transform hover:scale-105">
                                            ← Volver a preguntas
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Store questions globally for access
            window.currentNethiveQuestions = pageQuestions;
            
            // Add the modal to the page
            document.body.insertAdjacentHTML('beforeend', assistantHTML);
            
            // Add custom animations
            addNethiveAnimations();
        }

        function closeNethiveAssistant() {
            const modal = document.getElementById('nethive-assistant-modal');
            if (modal) {
                modal.remove();
            }
        }

        // Nethive functions
        function getNethivePageContext(currentPath) {
            if (currentPath.includes('todos') || currentPath.includes('oportunidades')) {
                return {
                    welcome: "Veo que estás en la página de **Oportunidades**. Aquí puedes gestionar todas tus oportunidades de venta sincronizadas con Bitrix24."
                };
            } else if (currentPath.includes('crear_cotizacion')) {
                return {
                    welcome: "Estás en el **formulario de cotización**. Te ayudo a crear cotizaciones profesionales paso a paso."
                };
            } else if (currentPath.includes('cotizacion')) {
                return {
                    welcome: "Estás viendo las **cotizaciones por cliente**. Aquí encuentras todo el historial de cotizaciones organizadas."
                };
            } else if (currentPath.includes('dashboard')) {
                return {
                    welcome: "Estás en el **Dashboard**. Aquí puedes ver un resumen de tus ventas y oportunidades."
                };
            } else if (currentPath.includes('reporte-usuarios')) {
                return {
                    welcome: "Estás en el **Reporte de Usuarios**. Aquí puedes ver el rendimiento de cada vendedor."
                };
            } else if (currentPath.includes('reporte-clientes')) {
                return {
                    welcome: "Estás en el **Reporte de Ventas por Cliente**. Aquí puedes analizar las ventas por cada cliente."
                };
            } else if (currentPath.includes('perfil-usuario')) {
                return {
                    welcome: "Estás viendo el **Perfil de Usuario**. Aquí puedes revisar el detalle de un vendedor específico."
                };
            } else if (currentPath.includes('ingresar-venta')) {
                return {
                    welcome: "Estás en la página para **Ingresar una Nueva Venta**. Te guiaré en el proceso."
                };
            } else if (currentPath.includes('editar-venta')) {
                return {
                    welcome: "Estás en la página para **Editar una Oportunidad de Venta**. Puedes actualizar los detalles aquí."
                };
            } else if (currentPath.includes('incrementa')) {
                return {
                    welcome: "Bienvenido a la sección **Incrementa**. Aquí podrás gestionar las cotizaciones de tu sistema anterior."
                };
            } else {
                return {
                    welcome: "Te ayudo a navegar y usar **el cotizador** de manera eficiente. Esta es tu plataforma de gestión de ventas integrada con Bitrix24."
                };
            }
        }

        function getNethiveQuestionsForCurrentPage(currentPath) {
            let questions = [];
            
            if (currentPath.includes('todos') || currentPath.includes('oportunidades')) {
                // Oportunidades page questions - más guiadas
                questions = [
                    {
                        question: "¿Cómo creo una cotización desde una oportunidad?",
                        answer: "🎯 <strong>Crear cotización desde oportunidad:</strong><br><br><strong>Pasos:</strong><br>1️⃣ Haz clic en el <strong>nombre de la oportunidad</strong> en la tabla.<br>2️⃣ En la vista de detalle de la oportunidad, haz clic en el botón <strong>'Crear Nueva Cotización'</strong>.<br>3️⃣ El cliente y la oportunidad se seleccionarán automáticamente en el formulario de cotización.<br>4️⃣ Agrega los productos y genera el PDF.<br><br>💡 <strong>Ventaja:</strong> La cotización se vincula automáticamente con Bitrix24 y se precargan los datos principales.",
                        category: "Flujo principal"
                    },
                    {
                        question: "¿Puedo crear una oportunidad nueva aquí?",
                        answer: "➕ <strong>Crear oportunidades:</strong><br><br><strong>Método recomendado:</strong><br>1️⃣ Ve a la sección de <strong>Cotizaciones</strong>.<br>2️⃣ Haz clic en <strong>'Crear Cotización'</strong>.<br>3️⃣ Si el cliente no existe, créalo con el botón '+'.<br>4️⃣ Usa el botón '+' junto al campo de oportunidad para crear una nueva.<br>5️⃣ Se creará en Bitrix24 automáticamente y aparecerá aquí al instante.<br><br><strong>Datos requeridos:</strong><br>• Cliente<br>• Nombre de oportunidad<br>• Área y producto<br>• Probabilidad inicial<br>• Monto estimado<br><br>🔄 La nueva oportunidad se sincroniza inmediatamente.",
                        category: "Creación"
                    },
                    {
                        question: "¿De dónde vienen estas oportunidades?",
                        answer: "🔄 <strong>Sincronización con Bitrix24:</strong><br><br><strong>Fuentes:</strong><br>• 📥 <strong>Bitrix24:</strong> Se sincronizan automáticamente en tiempo real.<br>• 🔔 <strong>Webhooks:</strong> Cualquier cambio en Bitrix24 aparece al instante.<br><br><strong>¿Qué se sincroniza?</strong><br>• Nombre de oportunidad<br>• Cliente asociado<br>• Área y producto<br>• Probabilidad de cierre<br>• Monto estimado<br><br>✨ Todo es automático, sin intervención manual.",

        function addNethiveAnimations() {
            // Add custom CSS animations for Nethive
            if (!document.getElementById('nethive-animations')) {
                const style = document.createElement('style');
                style.id = 'nethive-animations';
                style.textContent = `
                    @keyframes scale-in {
                        0% { transform: scale(0.8) translateY(20px); opacity: 0; }
                        100% { transform: scale(1) translateY(0); opacity: 1; }
                    }
                    @keyframes bounce-slow {
                        0%, 100% { transform: translateY(0); }
                        50% { transform: translateY(-5px); }
                    }
                    @keyframes fade-in {
                        0% { opacity: 0; transform: translateY(10px); }
                        100% { opacity: 1; transform: translateY(0); }
                    }
                    .animate-scale-in {
                        animation: scale-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
                    }
                    .animate-bounce-slow {
                        animation: bounce-slow 2s ease-in-out infinite;
                    }
                    .animate-fade-in {
                        animation: fade-in 0.3s ease-out;
                    }
                `;
                document.head.appendChild(style);
            }
        }
