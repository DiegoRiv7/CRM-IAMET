<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Administración de Ventas
        {% endblock %}
    </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/oportunidad_detail.css' %}">
    
    <!-- Intro.js for Tutorial -->
    <script src="https://unpkg.com/intro.js/intro.js"></script>
    <link href="https://unpkg.com/intro.js/introjs.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(120deg, #232946 0%, #1a202c 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(ellipse at 60% 40%, rgba(99,102,241,0.18) 0%, rgba(20,58,86,0.10) 60%, transparent 100%),
                        radial-gradient(ellipse at 20% 80%, rgba(16,185,129,0.10) 0%, transparent 80%),
                        radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.10) 0%, transparent 80%);
            pointer-events: none;
        }
        /* Estilos generales para el contenido principal */
        .main-content {
            padding-top: 2rem; /* Menos espacio arriba, ya no hay barra fija */
            padding-bottom: 2rem;
        }
        
        /* Glass effect utility for all cards/tables */
        .glass-card {
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-table {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
            overflow: hidden;
        }
        .drop-shadow-glow {
            text-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1, 0 0 2px #fff;
        }
        @media (max-width: 640px) {
            .glass-card, .glass-table {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            table th, table td {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: none; }
        }
        .animate-fade-in {
            animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        
        /* Custom Intro.js styling */
        .introjs-overlay {
            background-color: rgba(0, 0, 0, 0.8) !important;
        }
        .introjs-tooltip {
            background: rgba(30, 41, 59, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 12px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(12px) !important;
        }
        .introjs-tooltiptext {
            color: #e2e8f0 !important;
            font-family: 'Inter', sans-serif !important;
        }
        .introjs-button {
            background: #6366f1 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 16px !important;
            color: white !important;
            font-weight: 500 !important;
            transition: all 0.2s !important;
        }
        .introjs-button:hover {
            background: #4f46e5 !important;
            transform: translateY(-1px) !important;
        }
        .introjs-skipbutton {
            background: rgba(107, 114, 128, 0.8) !important;
        }
        .introjs-skipbutton:hover {
            background: rgba(75, 85, 99, 0.9) !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Contenido Principal -->
    <div class="flex-grow container mx-auto px-4 py-8 main-content">
        {% block content %}
        {% endblock %}
    </div>
    {% include 'floating_menu.html' %}
    <!-- Pie de Página (Opcional) -->
    <footer class="bg-gray-800 text-gray-400 text-center p-4 mt-8">
        <div class="container mx-auto">
            <p>&copy; 2025 Gestión de Ventas. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Nethive Virtual Assistant Script -->
    <script>
        // Nethive Virtual Assistant - Main function
        function showNethiveAssistant() {
            // Get current page context and questions
            const currentPath = window.location.pathname;
            let pageQuestions = getNethiveQuestionsForCurrentPage(currentPath);
            let pageContext = getNethivePageContext(currentPath);
            
            // Create the Nethive assistant modal with animation
            const assistantHTML = `
                <div id="nethive-assistant-modal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[9999]">
                    <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl shadow-2xl w-full max-w-2xl border border-blue-500/30 max-h-[85vh] overflow-hidden animate-scale-in">
                        <!-- Header with Nethive branding -->
                        <div class="bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 p-6 relative overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-r from-blue-400/20 to-purple-400/20 animate-pulse"></div>
                            <div class="relative flex items-center justify-between">
                                <div class="flex items-center">
                                    <div class="relative">
                                        <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center animate-bounce-slow">
                                            <span class="text-2xl">🤖</span>
                                        </div>
                                        <div class="absolute -top-1 -right-1 w-4 h-4 bg-green-400 rounded-full animate-ping"></div>
                                    </div>
                                    <div class="ml-4">
                                        <h2 class="text-2xl font-bold text-white">Nethive</h2>
                                        <p class="text-blue-100 text-sm">Tu Asistente Virtual</p>
                                    </div>
                                </div>
                                <button onclick="closeNethiveAssistant()" class="text-white hover:text-gray-300 text-3xl font-bold transition-colors">&times;</button>
                            </div>
                        </div>
                        
                        <!-- Chat Content -->
                        <div id="nethive-content" class="p-6 max-h-96 overflow-y-auto bg-gray-800">
                            <!-- Welcome Message -->
                            <div id="nethive-chat">
                                <div class="flex items-start mb-6 animate-fade-in">
                                    <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full flex items-center justify-center flex-shrink-0">
                                        <span class="text-white text-lg">🤖</span>
                                    </div>
                                    <div class="ml-3 bg-gray-700 rounded-2xl rounded-tl-none p-4 max-w-md">
                                        <p class="text-white text-sm">
                                            <strong>¡Hola! Soy Nethive, tu asistente virtual.</strong><br><br>
                                            ${pageContext.welcome}<br><br>
                                            Selecciona una pregunta para empezar:
                                        </p>
                                    </div>
                                </div>
                                
                                <!-- Questions -->
                                <div id="nethive-questions" class="space-y-3">
                                    ${pageQuestions.map((q, index) => `
                                        <button onclick="showNethiveAnswer(${index})" class="w-full text-left bg-gradient-to-r from-gray-700 to-gray-600 hover:from-blue-600 hover:to-purple-600 text-white p-4 rounded-xl transition-all duration-300 transform hover:scale-105 group">
                                            <div class="flex items-start">
                                                <span class="text-blue-400 group-hover:text-blue-200 mr-3 flex-shrink-0 text-xl">❓</span>
                                                <div>
                                                    <span class="font-medium">${q.question}</span>
                                                    <div class="text-gray-400 group-hover:text-gray-200 text-xs mt-1">${q.category || 'Pregunta general'}</div>
                                                </div>
                                            </div>
                                        </button>
                                    `).join('')}
                                    
                                    <!-- More help option -->
                                    <button onclick="showNethiveMoreHelp()" class="w-full mt-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white p-4 rounded-xl transition-all duration-300 transform hover:scale-105">
                                        <div class="flex items-center justify-center">
                                            <span class="text-2xl mr-3">💡</span>
                                            <div>
                                                <span class="font-bold">¿Necesitas más ayuda?</span>
                                                <div class="text-purple-200 text-sm">Otras opciones de soporte</div>
                                            </div>
                                        </div>
                                    </button>
                                </div>
                                
                                <!-- Answer area (hidden initially) -->
                                <div id="nethive-answer" class="hidden">
                                    <div id="answer-content"></div>
                                    <div class="mt-6 pt-4 border-t border-gray-600">
                                        <button onclick="backToNethiveQuestions()" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white px-6 py-3 rounded-lg transition-all duration-200 transform hover:scale-105">
                                            ← Volver a preguntas
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Store questions globally for access
            window.currentNethiveQuestions = pageQuestions;
            
            // Add the modal to the page
            document.body.insertAdjacentHTML('beforeend', assistantHTML);
            
            // Add custom animations
            addNethiveAnimations();
        }

        function closeNethiveAssistant() {
            const modal = document.getElementById('nethive-assistant-modal');
            if (modal) {
                modal.remove();
            }
        }

        // Nethive functions
        function getNethivePageContext(currentPath) {
            if (currentPath.includes('todos') || currentPath.includes('oportunidades')) {
                return {
                    welcome: "Veo que estás en la página de **Oportunidades**. Aquí puedes gestionar todas tus oportunidades de venta sincronizadas con Bitrix24."
                };
            } else if (currentPath.includes('crear_cotizacion')) {
                return {
                    welcome: "Estás en el **formulario de cotización**. Te ayudo a crear cotizaciones profesionales paso a paso."
                };
            } else if (currentPath.includes('cotizacion')) {
                return {
                    welcome: "Estás viendo las **cotizaciones por cliente**. Aquí encuentras todo el historial de cotizaciones organizadas."
                };
            } else {
                return {
                    welcome: "Te ayudo a navegar y usar **Nethive** de manera eficiente. Esta es tu plataforma de gestión de ventas integrada con Bitrix24."
                };
            }
        }

        function getNethiveQuestionsForCurrentPage(currentPath) {
            let questions = [];
            
            if (currentPath.includes('todos') || currentPath.includes('oportunidades')) {
                // Oportunidades page questions - más guiadas
                questions = [
                    {
                        question: "¿Cómo creo una cotización desde una oportunidad?",
                        answer: "🎯 <strong>Crear cotización desde oportunidad:</strong><br><br><strong>Pasos:</strong><br>1️⃣ Busca tu oportunidad en la lista<br>2️⃣ Haz clic en el botón verde <strong>'+ Crear Cotización'</strong><br>3️⃣ Selecciona el cliente (las oportunidades aparecerán automáticamente)<br>4️⃣ Elige la oportunidad específica<br>5️⃣ Agrega productos y genera<br><br>💡 <strong>Ventaja:</strong> La cotización se vincula automáticamente con Bitrix24.",
                        category: "Flujo principal"
                    },
                    {
                        question: "¿Qué significan los colores de probabilidad?",
                        answer: "🎯 <strong>Sistema de colores:</strong><br><br>🔴 <strong>Rojo (0-50%):</strong> Probabilidad baja - Oportunidad en etapa temprana<br>🟡 <strong>Amarillo (51-69%):</strong> Probabilidad media - En negociación<br>🟢 <strong>Verde (70-100%):</strong> Probabilidad alta - Muy cerca de cerrarse<br><br>✨ <strong>Tip:</strong> Haz clic en cualquier barra para cambiar la probabilidad rápidamente.",
                        category: "Visualización"
                    },
                    {
                        question: "¿Cómo busco una oportunidad específica?",
                        answer: "🔍 <strong>Búsqueda de oportunidades:</strong><br><br><strong>Método rápido:</strong><br>• Usa el campo de búsqueda en la parte superior<br>• Escribe el nombre de la oportunidad<br>• Búsqueda en tiempo real<br><br><strong>Búsqueda avanzada:</strong><br>• Haz clic en 'Mostrar Filtros'<br>• Filtra por área, producto, cliente, probabilidad<br>• Combina múltiples filtros<br><br>💡 Los filtros se mantienen mientras navegas.",
                        category: "Navegación"
                    },
                    {
                        question: "¿De dónde vienen estas oportunidades?",
                        answer: "🔄 <strong>Sincronización con Bitrix24:</strong><br><br><strong>Fuentes:</strong><br>• 📥 <strong>Bitrix24:</strong> Se sincronizan automáticamente en tiempo real<br>• 🆕 <strong>Locales:</strong> Creadas usando el botón '+' en cotizaciones<br>• 🔔 <strong>Webhooks:</strong> Cualquier cambio en Bitrix24 aparece al instante<br><br><strong>¿Qué se sincroniza?</strong><br>• Nombre de oportunidad<br>• Cliente asociado<br>• Área y producto<br>• Probabilidad de cierre<br>• Monto estimado<br><br>✨ Todo es automático, sin intervención manual.",
                        category: "Integración"
                    },
                    {
                        question: "¿Puedo crear una oportunidad nueva aquí?",
                        answer: "➕ <strong>Crear oportunidades:</strong><br><br><strong>Método recomendado:</strong><br>1️⃣ Ve a crear cotización<br>2️⃣ Si no existe el cliente, créalo con el botón '+'<br>3️⃣ Usa el botón '+' junto al campo de oportunidad<br>4️⃣ Se creará en Bitrix24 automáticamente<br>5️⃣ Aparecerá aquí al instante<br><br><strong>Datos requeridos:</strong><br>• Cliente<br>• Nombre de oportunidad<br>• Área y producto<br>• Probabilidad inicial<br>• Monto estimado<br><br>🔄 La nueva oportunidad se sincroniza inmediatamente.",
                        category: "Creación"
                    }
                ];
            } else if (currentPath.includes('crear_cotizacion')) {
                // Create quotation page questions - más guiadas
                questions = [
                    {
                        question: "¿Cómo empiezo a crear una cotización?",
                        answer: "🚀 <strong>Guía paso a paso:</strong><br><br><strong>1️⃣ Título:</strong> Pon un nombre descriptivo<br><strong>2️⃣ Cliente:</strong> Selecciona o crea cliente con el botón '+'<br><strong>3️⃣ Oportunidad:</strong> Opcional - aparecen las últimas 10 del cliente<br><strong>4️⃣ Productos:</strong> Usa 'Agregar Fila' o 'Pegar Excel'<br><strong>5️⃣ Institución:</strong> BAJANET o IAMET<br><strong>6️⃣ Generar:</strong> Haz clic en 'Crear Cotización'<br><br>⏱️ <strong>Tiempo estimado:</strong> 2-3 minutos<br>📄 <strong>Resultado:</strong> PDF profesional automático",
                        category: "Flujo completo"
                    },
                    {
                        question: "¿Cómo funciona la selección de cliente y oportunidades?",
                        answer: "🔮 <strong>Magia de la sincronización:</strong><br><br><strong>Al seleccionar cliente:</strong><br>• 📋 Aparecen automáticamente sus últimas 10 oportunidades<br>• 📅 Incluye oportunidades de meses pasados<br>• 🔄 Datos sincronizados con Bitrix24<br>• ⚡ Actualización en tiempo real<br><br><strong>¿Qué pasa si selecciono una oportunidad?</strong><br>• Se vincula la cotización con esa negociación<br>• Se mantiene el contexto histórico<br>• Se actualiza el seguimiento en Bitrix24<br><br><strong>¿Y si no selecciono oportunidad?</strong><br>• Cotización independiente<br>• Perfecta para consultas directas<br>• Sin complicaciones de Bitrix24",
                        category: "Vinculación"
                    },
                    {
                        question: "¿Cómo agrego productos rápidamente?",
                        answer: "📦 <strong>Métodos para agregar productos:</strong><br><br><strong>🖱️ Método manual:</strong><br>• Haz clic en 'Agregar Fila'<br>• Ideal para pocos productos<br>• Control total de cada campo<br><br><strong>📊 Método Excel (recomendado):</strong><br>• Haz clic en 'Pegar Datos de Excel'<br>• Copia de Excel: Marca, No. Parte, Cantidad, Descripción, Precio Lista, Desc, Unitario, Total<br>• Pega en el área de texto<br>• Procesa automáticamente múltiples filas<br><br><strong>🎨 Método mixto:</strong><br>• Combina ambos métodos<br>• Excel para productos base + manual para ajustes<br><br>💡 Todos los cálculos son automáticos.",
                        category: "Productos"
                    },
                    {
                        question: "¿Cuándo debo elegir BAJANET o IAMET?",
                        answer: "🏢 <strong>Diferencias entre instituciones:</strong><br><br>🔹 <strong>BAJANET:</strong><br>• Para cotizaciones de Baja California<br>• Diseño optimizado para impresión<br>• Colores grises (ahorra tinta)<br>• Logo y contacto: 664 380 8965, baja-net.com<br><br>🔸 <strong>IAMET:</strong><br>• Para cotizaciones corporativas<br>• Colores azules y verdes<br>• Logo y contacto: +52 664 380 8935, iamet.mx<br><br><strong>¿Qué cambia?</strong><br>• Solo el diseño del PDF<br>• Logos y datos de contacto<br>• Colores del documento<br><br>⚠️ <strong>Importante:</strong> Elige según el cliente o región.",
                        category: "Configuración"
                    },
                    {
                        question: "¿Qué pasa después de crear la cotización?",
                        answer: "🎉 <strong>Proceso automático al generar:</strong><br><br><strong>📄 PDF profesional:</strong><br>• Se genera automáticamente<br>• Se descarga al navegador<br>• Diseño según institución elegida<br>• Incluye todos los cálculos<br><br><strong>💾 Almacenamiento:</strong><br>• Se guarda en el historial del cliente<br>• Disponible desde 'Cotizaciones'<br>• Se puede volver a descargar<br><br><strong>🔄 Sincronización:</strong><br>• Si está vinculada a oportunidad, se actualiza Bitrix24<br>• Se agrega etiqueta 'Nethive'<br>• Se preserva el contexto de negociación<br><br><strong>📧 Uso:</strong><br>• PDF listo para enviar por email<br>• Formato profesional<br>• Incluye términos y condiciones",
                        category: "Resultados"
                    }
                ];
            } else if (currentPath.includes('cotizacion')) {
                // Quotations page questions - más guiadas
                questions = [
                    {
                        question: "¿Cómo navego por las cotizaciones?",
                        answer: "🗂️ <strong>Navegación por cotizaciones:</strong><br><br><strong>Vista principal:</strong><br>• Clientes organizados alfabéticamente<br>• Solo aparecen clientes con cotizaciones<br>• Botón 'Ver Cotizaciones' para cada cliente<br><br><strong>Vista por cliente:</strong><br>• Historial completo de cotizaciones<br>• Ordenado por fecha (más reciente primero)<br>• Opción de descargar PDF de cada una<br>• Información de oportunidad vinculada<br><br><strong>Búsqueda rápida:</strong><br>• Usa Ctrl+F para buscar cliente específico<br>• Los nombres están organizados claramente<br><br>💡 <strong>Tip:</strong> Si no ves un cliente, significa que no tiene cotizaciones aún.",
                        category: "Navegación"
                    },
                    {
                        question: "¿Puedo modificar una cotización existente?",
                        answer: "📝 <strong>Modificación de cotizaciones:</strong><br><br><strong>❌ No se pueden editar directamente</strong><br><br><strong>¿Por qué?</strong><br>• Mantiene integridad del historial<br>• Evita confusiones en negociaciones<br>• Preserva trazabilidad para auditorías<br>• Cada versión queda registrada<br><br><strong>✅ Alternativas:</strong><br>• <strong>Nueva cotización:</strong> Crea una nueva para el mismo cliente<br>• <strong>Duplicar:</strong> Si está disponible, copia los productos<br>• <strong>Vincular:</strong> Asocia con la misma oportunidad para mantener contexto<br><br><strong>🔄 Flujo recomendado:</strong><br>1️⃣ Ve a Oportunidades<br>2️⃣ Crea nueva cotización<br>3️⃣ Selecciona mismo cliente y oportunidad<br>4️⃣ Modifica productos según necesites<br><br>📊 Así mantienes un historial claro de la negociación.",
                        category: "Edición"
                    },
                    {
                        question: "¿Dónde están los PDFs de mis cotizaciones?",
                        answer: "📄 <strong>Ubicación y acceso a PDFs:</strong><br><br><strong>🔄 Descarga automática:</strong><br>• Se descargan automáticamente al crear cotización<br>• Van a tu carpeta de 'Descargas'<br>• Nombre formato: 'Cotización_[Cliente]_[ID].pdf'<br><br><strong>💾 Servidor (permanente):</strong><br>• Se almacenan en el servidor<br>• Accesibles desde historial del cliente<br>• Se pueden volver a descargar<br><br><strong>📱 Acceso móvil:</strong><br>• Disponibles desde cualquier dispositivo<br>• Mismo sistema de navegación<br>• Se adapta a pantalla del dispositivo<br><br><strong>🔍 ¿No encuentras el PDF?</strong><br>• Revisa carpeta de Descargas<br>• Vuelve a descargarlo desde el historial<br>• Verifica que la cotización se creó correctamente<br><br>💡 <strong>Tip:</strong> Organiza tus descargas por carpetas de clientes.",
                        category: "Archivos"
                    },
                    {
                        question: "¿Por qué algunos clientes aparecen sin cotizaciones?",
                        answer: "🤔 <strong>Clientes sin cotizaciones:</strong><br><br><strong>En la página principal de cotizaciones:</strong><br>• ✅ Solo aparecen clientes CON cotizaciones<br>• ❌ Los clientes sin cotizaciones NO aparecen<br>• 📊 Es normal y correcto<br><br><strong>Posibles razones si esperabas ver un cliente:</strong><br>• Son clientes nuevos sin cotizaciones aún<br>• Solo tienen oportunidades, pero no cotizaciones generadas<br>• Las cotizaciones fueron creadas antes del sistema actual<br>• Hay un error tipográfico en el nombre<br><br><strong>✅ Soluciones:</strong><br>• <strong>Cliente nuevo:</strong> Crea su primera cotización<br>• <strong>Verificar nombre:</strong> Busca variaciones del nombre<br>• <strong>Crear historial:</strong> Genera una cotización para empezar su registro<br><br><strong>🔄 Una vez que crees la primera cotización:</strong><br>• El cliente aparecerá en la lista principal<br>• Se mantendrá su historial completo<br>• Podrás acceder a todas sus cotizaciones futuras",
                        category: "Resolución de problemas"
                    }
                ];
            } else {
                // General/Home page questions - más guiadas
                questions = [
                    {
                        question: "¿Cómo empiezo a usar Nethive?",
                        answer: "🚀 <strong>Primeros pasos con Nethive:</strong><br><br><strong>1️⃣ Familiarízate con el menú:</strong><br>• 🎮 Menú flotante siempre disponible<br>• Se puede arrastrar a cualquier posición<br>• Acceso directo a todas las funciones<br><br><strong>2️⃣ Flujo típico de trabajo:</strong><br>• <strong>Oportunidades</strong> → Ver leads de Bitrix24<br>• <strong>Crear cotización</strong> → Generar propuestas<br>• <strong>Cotizaciones</strong> → Revisar historial<br><br><strong>3️⃣ Casos de uso comunes:</strong><br>• Nueva oportunidad de Bitrix24 → Cotización rápida<br>• Cliente recurrente → Revisar historial → Nueva cotización<br>• Consulta directa → Cotización sin oportunidad<br><br><strong>💡 Comienza con:</strong> Ve a 'Oportunidades' para ver tus leads actuales.",
                        category: "Primeros pasos"
                    },

        function addNethiveAnimations() {
            // Add custom CSS animations for Nethive
            if (!document.getElementById('nethive-animations')) {
                const style = document.createElement('style');
                style.id = 'nethive-animations';
                style.textContent = `
                    @keyframes scale-in {
                        0% { transform: scale(0.8) translateY(20px); opacity: 0; }
                        100% { transform: scale(1) translateY(0); opacity: 1; }
                    }
                    @keyframes bounce-slow {
                        0%, 100% { transform: translateY(0); }
                        50% { transform: translateY(-5px); }
                    }
                    @keyframes fade-in {
                        0% { opacity: 0; transform: translateY(10px); }
                        100% { opacity: 1; transform: translateY(0); }
                    }
                    .animate-scale-in {
                        animation: scale-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
                    }
                    .animate-bounce-slow {
                        animation: bounce-slow 2s ease-in-out infinite;
                    }
                    .animate-fade-in {
                        animation: fade-in 0.3s ease-out;
                    }
                `;
                document.head.appendChild(style);
            }
        }
