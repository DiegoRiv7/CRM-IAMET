    <!-- THEME-SWITCHING SCRIPT to prevent flash of incorrect theme - Optimized version -->
    <script type="text/javascript">
        // Guard theme initialization until DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            try {
                // Check for theme in localStorage first
                const savedTheme = localStorage.getItem('theme');
                
                // Apply theme to documentElement (html) immediately
                if (savedTheme === 'pink') {
                    // Apply pink theme inline immediately
                    document.documentElement.setAttribute('data-theme', 'pink');
                    document.documentElement.classList.add('light-theme');
                    
                    // Set inline styles for immediate effect
                    document.documentElement.style.setProperty('--apple-background', '#ffebf0');
                    document.documentElement.style.setProperty('--apple-label', '#2d1b2e');
                    document.documentElement.style.setProperty('--apple-blue', '#ff6b9d');
                    if (document.body) {
                        document.body.style.background = 'linear-gradient(135deg, #FFF5F8 0%, #FFE8EF 30%, #FFD1DC 60%, #FFC0CB 100%)';
                        document.body.style.backgroundAttachment = 'fixed';
                    }
                } else if (savedTheme === 'white') {
                    // Apply white theme inline immediately
                    document.documentElement.classList.add('light-theme', 'white-theme');
                    
                    // Set inline styles for immediate effect
                    document.documentElement.style.setProperty('--apple-background', '#ffffff');
                    document.documentElement.style.setProperty('--apple-label', '#212529');
                    document.documentElement.style.setProperty('--apple-blue', '#007bff');
                    if (document.body) {
                        document.body.style.background = '#ffffff';
                        document.body.style.backgroundAttachment = 'fixed';
                    }
                } else if (savedTheme === 'coffee') {
                    // Apply coffee theme inline immediately
                    document.documentElement.classList.add('light-theme', 'coffee-theme');
                    
                    // Set inline styles for immediate effect
                    document.documentElement.style.setProperty('--apple-background', '#f5e6d3');
                    document.documentElement.style.setProperty('--apple-label', '#4a3020');
                    document.documentElement.style.setProperty('--apple-blue', '#8b6239');
                    if (document.body) {
                        document.body.style.background = '#f5e6d3';
                        document.body.style.backgroundAttachment = 'fixed';
                    }
                } else {
                    // Default to dark theme
                    document.documentElement.classList.add('dark-theme');
                    if (document.body) {
                        document.body.classList.add('dark-theme');
                    }
                    
                    // Set inline styles for immediate effect
                    document.documentElement.style.setProperty('--apple-background', '#000000');
                    document.documentElement.style.setProperty('--apple-label', '#FFFFFF');
                    document.documentElement.style.setProperty('--apple-blue', '#007AFF');
                    if (document.body) {
                        document.body.style.background = '#000000';
                    }
                    
                    // Save default if not set
                    if (!savedTheme) {
                        localStorage.setItem('theme', 'dark');
                    }
                }
                
                // Hide body initially to prevent flash
                if (document.body) {
                    document.body.style.opacity = '0';
                    
                    // Show body after a short delay to ensure theme is applied
                    setTimeout(function() {
                        document.body.style.transition = 'opacity 0.3s ease-in-out';
                        document.body.style.opacity = '1';
                    }, 50);
                }
                
            } catch (error) {
                console.error('Theme initialization error:', error);
                // Ensure body is visible even if theme fails
                if (document.body) {
                    document.body.style.opacity = '1';
                }
            }
        });
    </script>

    <!-- Responsive utilities (solo las que necesitamos) -->
    <script>
        // Responsive utilities básicas
        window.ResponsiveUtils = {
            isMobile: () => window.innerWidth <= 768,
            isTablet: () => window.innerWidth > 768 && window.innerWidth <= 1024,
            isDesktop: () => window.innerWidth > 1024,
            
            // Add responsive classes to body
            updateBodyClasses: () => {
                const body = document.body;
                body.classList.remove('is-mobile', 'is-tablet', 'is-desktop');
                
                if (window.ResponsiveUtils.isMobile()) body.classList.add('is-mobile');
                else if (window.ResponsiveUtils.isTablet()) body.classList.add('is-tablet');
                else if (window.ResponsiveUtils.isDesktop()) body.classList.add('is-desktop');
            }
        };
        
        // Update classes on load and resize
        window.ResponsiveUtils.updateBodyClasses();
        
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                window.ResponsiveUtils.updateBodyClasses();
            }, 150);
        });
    </script>

            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
            /* FORZAR MODO OSCURO SIEMPRE */
            color: #ffffff !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .spotlight-item-subtitle {
            font-size: 13px;
            /* FORZAR MODO OSCURO SIEMPRE */
            color: #98989D !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .spotlight-loading {
            padding: 20px;
            text-align: center;
            /* FORZAR MODO OSCURO SIEMPRE */
            color: #98989D !important;
        }
        
        .spotlight-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(142, 142, 147, 0.3);
            border-top-color: #007AFF;
            border-radius: 50%;
            animation: spotlight-spin 1s linear infinite;
            margin: 0 auto 8px;
        }
        
        @keyframes spotlight-spin {
            to { transform: rotate(360deg); }
        }
    </style>
    
    <script>
        // Spotlight Search Functionality
        let spotlightTimeout = null;
        let selectedIndex = -1;
        let currentResults = [];
        
        // Double spacebar detection
        let lastSpaceTime = 0;
        let spaceDoubleTapTimeout = null;
        
        // Function to check if user is currently typing in an input
        function isUserTyping() {
            const activeElement = document.activeElement;
            if (!activeElement) return false;
            
            const typingElements = ['input', 'textarea', 'select'];
            const isTypingElement = typingElements.includes(activeElement.tagName.toLowerCase());
            const isContentEditable = activeElement.contentEditable === 'true';
            
            return isTypingElement || isContentEditable;
        }
        
        // Open spotlight with keyboard shortcut or double spacebar
        document.addEventListener('keydown', function(e) {
            // Cmd+K on Mac, Ctrl+K on Windows/Linux
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                openSpotlight();
                return;
            }
            
            // Double spacebar detection (only when not typing)
            if (e.key === ' ' && e.code === 'Space') {
                if (isUserTyping()) {
                    // Reset double tap if user is typing
                    lastSpaceTime = 0;
                    return;
                }
                
                // Siempre prevenir el scroll cuando no estamos escribiendo
                e.preventDefault();
                
                const currentTime = Date.now();
                const timeDiff = currentTime - lastSpaceTime;
                
                // Double tap detected (within 400ms)
                if (timeDiff < 400 && timeDiff > 50) {
                    openSpotlight();
                    lastSpaceTime = 0; // Reset
                    return;
                }
                
                lastSpaceTime = currentTime;
                
                // Clear double tap after timeout
                if (spaceDoubleTapTimeout) {
                    clearTimeout(spaceDoubleTapTimeout);
                }
                spaceDoubleTapTimeout = setTimeout(() => {
                    lastSpaceTime = 0;
                }, 400);
            }
            
            // Escape to close
            if (e.key === 'Escape') {
                closeSpotlight();
            }
            
            // Arrow navigation in spotlight
            const modal = document.getElementById('spotlight-modal');
            if (modal.classList.contains('active')) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    navigateSpotlight(1);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    navigateSpotlight(-1);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    selectSpotlightItem();
                }
            }
        });
        
        function openSpotlight() {
            const modal = document.getElementById('spotlight-modal');
            const input = document.getElementById('spotlight-input');
            
            modal.classList.add('active');
            setTimeout(() => {
                input.focus();
            }, 100);
            
            // Reset state
            selectedIndex = -1;
            currentResults = [];
            showEmptyState();
        }
        
        function closeSpotlight() {
            const modal = document.getElementById('spotlight-modal');
            const input = document.getElementById('spotlight-input');
            
            modal.classList.remove('active');
            input.value = '';
            
            // Clear timeout
            if (spotlightTimeout) {
                clearTimeout(spotlightTimeout);
                spotlightTimeout = null;
            }
        }
        
        function showEmptyState() {
            const resultsContainer = document.getElementById('spotlight-results');
            resultsContainer.innerHTML = `
                <div class="spotlight-empty">
                    <div class="spotlight-empty-icon">🔍</div>
                    <div class="spotlight-empty-text">Busca por nombre, cliente o número (#181)</div>
                </div>
            `;
        }
        
        function showLoadingState() {
            const resultsContainer = document.getElementById('spotlight-results');
            resultsContainer.innerHTML = `
                <div class="spotlight-loading">
                    <div class="spotlight-spinner"></div>
                    <div>Buscando...</div>
                </div>
            `;
        }
        
        function performSearch(query) {
            if (!query || query.length < 2) {
                showEmptyState();
                return;
            }
            
            showLoadingState();
            
            // Get CSRF token
            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value || 
                            document.querySelector('meta[name=csrf-token]')?.getAttribute('content') || '';
            
            fetch(`/app/api/spotlight-search/?q=${encodeURIComponent(query)}`, {
                method: 'GET',
                headers: {
                    'X-CSRFToken': csrfToken,
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                displayResults(data.results || []);
                currentResults = data.results || [];
                selectedIndex = -1;
            })
            .catch(error => {
                console.error('Spotlight search error:', error);
                showEmptyState();
            });
        }
        
        function displayResults(results) {
            const resultsContainer = document.getElementById('spotlight-results');
            
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="spotlight-empty">
                        <div class="spotlight-empty-icon">❌</div>
                        <div class="spotlight-empty-text">No se encontraron resultados</div>
                    </div>
                `;
                return;
            }
            
            resultsContainer.innerHTML = results.map((result, index) => `
                <div class="spotlight-item" data-index="${index}" onclick="selectResult(${index})">
                    <div class="spotlight-item-icon ${result.type}">
                        ${result.type === 'cotizacion' ? '📄' : '⭐'}
                    </div>
                    <div class="spotlight-item-content">
                        <div class="spotlight-item-title">${result.title}</div>
                        <div class="spotlight-item-subtitle">${result.subtitle}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function navigateSpotlight(direction) {
            if (currentResults.length === 0) return;
            
            // Remove previous selection
            const items = document.querySelectorAll('.spotlight-item');
            items.forEach(item => item.classList.remove('selected'));
            
            // Update selection
            selectedIndex += direction;
            if (selectedIndex < 0) selectedIndex = currentResults.length - 1;
            if (selectedIndex >= currentResults.length) selectedIndex = 0;
            
            // Add new selection
            if (items[selectedIndex]) {
                items[selectedIndex].classList.add('selected');
                items[selectedIndex].scrollIntoView({ block: 'nearest' });
            }
        }
        
        function selectSpotlightItem() {
            if (selectedIndex >= 0 && selectedIndex < currentResults.length) {
                selectResult(selectedIndex);
            }
        }
        
        function selectResult(index) {
            const result = currentResults[index];
            if (!result) return;
            
            closeSpotlight();
            
            // Navigate based on type
            if (result.type === 'cotizacion') {
                // For quotations, go to quotations page
                window.location.href = result.url;
            } else if (result.type === 'oportunidad') {
                // For opportunities, go to create quotation with preloaded data
                window.location.href = result.url;
            }
        }
        
        // Search input handler
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('spotlight-input');
            if (input) {
                input.addEventListener('input', function(e) {
                    const query = e.target.value.trim();
                    
                    // Clear existing timeout
                    if (spotlightTimeout) {
                        clearTimeout(spotlightTimeout);
                    }
                    
                    // Debounce search
                    spotlightTimeout = setTimeout(() => {
                        performSearch(query);
                    }, 300);
                });
            }
        });
        
        // Global theme function to ensure consistency across all pages
        function applyTheme(theme) {
            console.log('applyTheme called with:', theme);
            
            // First, clear all theme classes and attributes
            document.documentElement.classList.remove('dark-theme', 'light-theme', 'pink-theme', 'white-theme', 'coffee-theme');
            document.documentElement.removeAttribute('data-theme');
            document.body.classList.remove('dark-theme', 'light-theme', 'pink-theme', 'white-theme', 'coffee-theme');
            document.body.removeAttribute('data-theme');
            
            // Apply the specific theme
            if (theme === 'dark') {
                // Para el tema oscuro
                document.documentElement.classList.add('dark-theme');
                document.body.classList.add('dark-theme');
                
                // Restaurar variables CSS originales para tema oscuro
                document.documentElement.style.setProperty('--apple-background', '#000000');
                document.documentElement.style.setProperty('--apple-background-secondary', '#1D1D1F');
                document.documentElement.style.setProperty('--apple-background-tertiary', '#2C2C2E');
                document.documentElement.style.setProperty('--apple-background-quaternary', '#3A3A3C');
                document.documentElement.style.setProperty('--apple-label', '#FFFFFF');
                document.documentElement.style.setProperty('--apple-label-secondary', '#EBEBF5');
                document.documentElement.style.setProperty('--apple-label-tertiary', '#EBEBF599');
                document.documentElement.style.setProperty('--apple-label-quaternary', '#EBEBF54D');
                document.documentElement.style.setProperty('--apple-blue', '#007AFF');
                document.documentElement.style.setProperty('--apple-blue-light', '#4DA8FF');
                document.documentElement.style.setProperty('--apple-blue-dark', '#0056CC');
                document.documentElement.style.setProperty('--apple-separator', '#38383A');
                
                document.body.style.background = '#000000';
                
            } else if (theme === 'pink') {
                // Para el tema rosa
                document.documentElement.classList.add('light-theme');
                document.documentElement.setAttribute('data-theme', 'pink');
                document.body.setAttribute('data-theme', 'pink');
                document.body.classList.add('pink-theme');
                
                // Aplicar colores específicos del tema rosa
                document.documentElement.style.setProperty('--apple-background', '#ffebf0');
                document.documentElement.style.setProperty('--apple-background-secondary', '#fff5f8');
                document.documentElement.style.setProperty('--apple-background-tertiary', '#ffe0e6');
                document.documentElement.style.setProperty('--apple-background-quaternary', '#ffd1dc');
                document.documentElement.style.setProperty('--apple-label', '#2d1b2e');
                document.documentElement.style.setProperty('--apple-label-secondary', '#5d2f47');
                document.documentElement.style.setProperty('--apple-label-tertiary', '#8b4d6b');
                document.documentElement.style.setProperty('--apple-label-quaternary', '#b96d8f');
                document.documentElement.style.setProperty('--apple-blue', '#ff6b9d');
                document.documentElement.style.setProperty('--apple-blue-light', '#ff8fab');
                document.documentElement.style.setProperty('--apple-blue-dark', '#e6396b');
                document.documentElement.style.setProperty('--apple-separator', 'rgba(229, 90, 135, 0.2)');
                
                // Aplicar fondo gradiente
                document.body.style.background = 'linear-gradient(135deg, #FFF5F8 0%, #FFE8EF 30%, #FFD1DC 60%, #FFC0CB 100%)';
                document.body.style.backgroundAttachment = 'fixed';
                
            } else if (theme === 'light') {
                // Para el tema claro
                document.documentElement.classList.add('light-theme');
                document.body.classList.add('light-theme');
                
                // Restaurar variables CSS para tema claro
                document.documentElement.style.setProperty('--apple-background', '#ffffff');
                document.documentElement.style.setProperty('--apple-background-secondary', '#f8f9fa');
                document.documentElement.style.setProperty('--apple-background-tertiary', '#f1f3f5');
                document.documentElement.style.setProperty('--apple-background-quaternary', '#e9ecef');
                document.documentElement.style.setProperty('--apple-label', '#212529');
                document.documentElement.style.setProperty('--apple-label-secondary', '#343a40');
                document.documentElement.style.setProperty('--apple-label-tertiary', '#495057');
                document.documentElement.style.setProperty('--apple-blue', '#007bff');
                document.documentElement.style.setProperty('--apple-blue-light', '#4da8ff');
                document.documentElement.style.setProperty('--apple-blue-dark', '#0056b3');
                document.documentElement.style.setProperty('--apple-separator', 'rgba(0, 0, 0, 0.1)');
                
                document.body.style.background = '#ffffff';
                document.body.style.backgroundAttachment = 'fixed';
                
            } else if (theme === 'blue') {
                // Para el tema azul
                document.documentElement.classList.add('light-theme');
                document.body.classList.add('light-theme');
                
                // Aplicar colores específicos del tema azul
                document.documentElement.style.setProperty('--apple-background', '#f0f7ff');
                document.documentElement.style.setProperty('--apple-background-secondary', '#f5faff');
                document.documentElement.style.setProperty('--apple-background-tertiary', '#e6f3ff');
                document.documentElement.style.setProperty('--apple-background-quaternary', '#e1f0ff');
                document.documentElement.style.setProperty('--apple-label', '#0056b3');
                document.documentElement.style.setProperty('--apple-label-secondary', '#004085');
                document.documentElement.style.setProperty('--apple-label-tertiary', '#003366');
                document.documentElement.style.setProperty('--apple-blue', '#0056b3');
                document.documentElement.style.setProperty('--apple-blue-light', '#007bff');
                document.documentElement.style.setProperty('--apple-blue-dark', '#003d82');
                document.documentElement.style.setProperty('--apple-separator', 'rgba(0, 86, 179, 0.1)');
                
                document.body.style.background = '#f0f7ff';
                document.body.style.backgroundAttachment = 'fixed';
                
            } else if (theme === 'white') {
                // Para el tema blanco
                document.documentElement.classList.add('light-theme', 'white-theme');
                document.body.classList.add('light-theme', 'white-theme');
                
                // Aplicar colores específicos del tema blanco
                document.documentElement.style.setProperty('--apple-background', '#ffffff');
                document.documentElement.style.setProperty('--apple-background-secondary', '#f8f9fa');
                document.documentElement.style.setProperty('--apple-background-tertiary', '#f1f3f5');
                document.documentElement.style.setProperty('--apple-background-quaternary', '#e9ecef');
                document.documentElement.style.setProperty('--apple-label', '#212529');
                document.documentElement.style.setProperty('--apple-label-secondary', '#343a40');
                document.documentElement.style.setProperty('--apple-label-tertiary', '#495057');
                document.documentElement.style.setProperty('--apple-blue', '#007bff');
                document.documentElement.style.setProperty('--apple-blue-light', '#4da8ff');
                document.documentElement.style.setProperty('--apple-blue-dark', '#0056b3');
                document.documentElement.style.setProperty('--apple-separator', 'rgba(0, 0, 0, 0.1)');
                
                document.body.style.background = '#ffffff';
                document.body.style.backgroundAttachment = 'fixed';
                
            } else if (theme === 'coffee') {
                // Para el tema café
                document.documentElement.classList.add('light-theme', 'coffee-theme');
                document.body.classList.add('light-theme', 'coffee-theme');
                
                // Aplicar colores específicos del tema café
                document.documentElement.style.setProperty('--apple-background', '#f5e6d3');
                document.documentElement.style.setProperty('--apple-background-secondary', '#f0dcc7');
                document.documentElement.style.setProperty('--apple-background-tertiary', '#ebd4bb');
                document.documentElement.style.setProperty('--apple-background-quaternary', '#e6cca8');
                document.documentElement.style.setProperty('--apple-label', '#4a3020');
                document.documentElement.style.setProperty('--apple-label-secondary', '#5d3d2a');
                document.documentElement.style.setProperty('--apple-label-tertiary', '#7a5038');
                document.documentElement.style.setProperty('--apple-blue', '#8b6239');
                document.documentElement.style.setProperty('--apple-blue-light', '#a0724a');
                document.documentElement.style.setProperty('--apple-blue-dark', '#6b4a30');
                document.documentElement.style.setProperty('--apple-separator', 'rgba(139, 69, 19, 0.1)');
                
                document.body.style.background = '#f5e6d3';
                document.body.style.backgroundAttachment = 'fixed';
            }
            
            // Save theme preference with enhanced preservation mechanism
            // First remove any existing values to avoid conflicts
            localStorage.removeItem('theme');
            localStorage.removeItem('preservedTheme');
            
            // Save the new theme
            localStorage.setItem('theme', theme);
            localStorage.setItem('preservedTheme', theme);
            
            // Force the writing to localStorage
            try {
                // Force a storage event to ensure it's saved
                window.dispatchEvent(new StorageEvent('storage', {
                    key: 'theme',
                    newValue: theme,
                    oldValue: null,
                    storageArea: localStorage
                }));
            } catch (e) {
                console.log('Could not dispatch storage event:', e);
            }
            
            console.log('Theme saved to localStorage with enhanced mechanism:', theme);
            
            // Verify that the theme was saved correctly
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme !== theme) {
                console.error('Theme was not saved correctly! Expected:', theme, 'Got:', savedTheme);
                // Try to save again with enhanced mechanism
                localStorage.removeItem('theme');
                localStorage.removeItem('preservedTheme');
                localStorage.setItem('theme', theme);
                localStorage.setItem('preservedTheme', theme);
                console.log('Retrying to save theme with enhanced mechanism:', theme);
            }
            
            // Forzar un repaint para asegurar que los estilos se apliquen completamente
            setTimeout(() => {
                document.body.style.display = 'none';
                document.body.offsetHeight; // Force reflow
                document.body.style.display = '';
                console.log('Forced repaint after theme change');
            }, 50);
        }
        
        // Apply saved theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Check for preserved theme first (in case of page reload)
            const preservedTheme = localStorage.getItem('preservedTheme');
            if (preservedTheme) {
                console.log('Using preserved theme:', preservedTheme);
                applyTheme(preservedTheme);
                localStorage.removeItem('preservedTheme'); // Clean up after use
                return;
            }
            
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                console.log('Using saved theme:', savedTheme);
                // Apply theme regardless of value (including "auto")
                applyTheme(savedTheme);
            } else {
                console.log('No saved theme found, using default theme');
                // Apply default dark theme
                applyTheme('dark');
            }
        });
    </script>
</body>
</html>
