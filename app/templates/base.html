<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Administración de Ventas
        {% endblock %}
    </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/oportunidad_detail.css' %}">
    
    <!-- Intro.js for Tutorial -->
    <script src="https://unpkg.com/intro.js/intro.js"></script>
    <link href="https://unpkg.com/intro.js/introjs.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(120deg, #232946 0%, #1a202c 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 80px;
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(ellipse at 60% 40%, rgba(99,102,241,0.18) 0%, rgba(20,58,86,0.10) 60%, transparent 100%),
                        radial-gradient(ellipse at 20% 80%, rgba(16,185,129,0.10) 0%, transparent 80%),
                        radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.10) 0%, transparent 80%);
            pointer-events: none;
        }
        /* Estilos generales para el contenido principal */
        .main-content {
            padding-top: 2rem; /* Menos espacio arriba, ya no hay barra fija */
            padding-bottom: 2rem;
        }
        
        /* Glass effect utility for all cards/tables */
        .glass-card {
            background: rgba(30, 41, 59, 0.55);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .glass-table {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px 0 rgba(31, 38, 135, 0.10);
            overflow: hidden;
        }
        .drop-shadow-glow {
            text-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1, 0 0 2px #fff;
        }
        @media (max-width: 640px) {
            .glass-card, .glass-table {
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            table th, table td {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: none; }
        }
        .animate-fade-in {
            animation: fade-in 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        
        /* Custom Intro.js styling */
        .introjs-overlay {
            background-color: rgba(0, 0, 0, 0.8) !important;
        }
        .introjs-tooltip {
            background: rgba(30, 41, 59, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 12px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(12px) !important;
        }
        .introjs-tooltiptext {
            color: #e2e8f0 !important;
            font-family: 'Inter', sans-serif !important;
        }
        .introjs-button {
            background: #6366f1 !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 16px !important;
            color: white !important;
            font-weight: 500 !important;
            transition: all 0.2s !important;
        }
        .introjs-button:hover {
            background: #4f46e5 !important;
            transform: translateY(-1px) !important;
        }
        .introjs-skipbutton {
            background: rgba(107, 114, 128, 0.8) !important;
        }
        .introjs-skipbutton:hover {
            background: rgba(75, 85, 99, 0.9) !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Contenido Principal -->
    <div class="flex-grow container mx-auto px-4 py-8 main-content">

    {% include 'floating_menu.html' %}

            <p>&copy; 2025 Gestión de Ventas. Todos los derechos reservados.</p>

    <!-- Tutorial Script -->
    <script>
        // Function to show tutorial scenario selection menu

                        <p class="text-gray-300 text-center mb-6">¿Qué tipo de tutorial necesitas?</p>
                        <div class="space-y-3">
                            <button onclick="startScenarioTutorial(1)" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-lg transition duration-300 text-left">
                                <div class="flex items-center">
                                    <span class="text-2xl mr-3">💼</span>
                                    <div>
                                        <div class="font-bold">Cotización con Oportunidad Recién Hecha</div>
                                        <div class="text-sm text-blue-200">Para oportunidades nuevas de Bitrix24</div>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startScenarioTutorial(2)" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 px-6 rounded-lg transition duration-300 text-left">
                                <div class="flex items-center">
                                    <span class="text-2xl mr-3">🔗</span>
                                    <div>
                                        <div class="font-bold">Ligar Oportunidad a Negociación Pasada</div>
                                        <div class="text-sm text-green-200">Conectar con oportunidades existentes</div>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startScenarioTutorial(3)" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-4 px-6 rounded-lg transition duration-300 text-left">
                                <div class="flex items-center">
                                    <span class="text-2xl mr-3">📄</span>
                                    <div>
                                        <div class="font-bold">Crear Cotización Sin Negociación</div>
                                        <div class="text-sm text-purple-200">Cotización independiente directa</div>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startHelpBot()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 px-6 rounded-lg transition duration-300 text-left">
                                <div class="flex items-center">
                                    <span class="text-2xl mr-3">🤖</span>

                                        <div class="font-bold">Asistente Virtual</div>

                        </button>

                </div>
            `;
            
            // Add the modal to the page
            document.body.insertAdjacentHTML('beforeend', tutorialMenuHTML);

        function closeTutorialMenu() {
            const modal = document.getElementById('tutorial-menu-modal');
            if (modal) {
                modal.remove();
            }
        }

        function startScenarioTutorial(scenario) {

                        {

        // Interactive Tutorial System
        let currentInteractiveTutorial = null;
        let currentStepIndex = 0;
        let tutorialSteps = [];
        let clickListenerAdded = false;

        function startInteractiveTutorial(steps) {
            tutorialSteps = steps;
            currentStepIndex = 0;
            
            // Filter steps based on current path if needed
            const currentPath = window.location.pathname;
            tutorialSteps = tutorialSteps.filter(step => {
                if (step.showOnlyOnPath) {
                    return currentPath.includes(step.showOnlyOnPath);
                }
                return true;
            });
            
            if (tutorialSteps.length === 0) {
                alert('No hay pasos disponibles para esta página del tutorial.');
                return;
            }
            
            showInteractiveStep(currentStepIndex);
        }

        function showInteractiveStep(stepIndex) {
            if (stepIndex >= tutorialSteps.length) {
                // Tutorial completed
                if (currentInteractiveTutorial) {
                    currentInteractiveTutorial.exit();
                    currentInteractiveTutorial = null;
                }
                alert('🎉 ¡Tutorial completado! Has aprendido el flujo completo.');
                return;
            }
            
            const step = tutorialSteps[stepIndex];
            
            // Check if we need to wait for a specific path
            const currentPath = window.location.pathname;
            if (step.showOnlyOnPath && !currentPath.includes(step.showOnlyOnPath)) {
                // Wait for navigation, check again in 500ms
                setTimeout(() => showInteractiveStep(stepIndex), 500);
                return;
            }
            
            // Check if element exists
            const element = step.element === 'body' ? document.body : document.querySelector(step.element);
            if (!element && step.element !== 'body') {
                // Element not found, wait a bit and try again
                setTimeout(() => showInteractiveStep(stepIndex), 500);
                return;
            }
            
            // Create custom intro.js step
            const introStep = {
                element: element,
                intro: step.intro,
                position: step.position || 'auto'
            };
            
            // Start intro.js with custom options
            if (currentInteractiveTutorial) {
                currentInteractiveTutorial.exit();
            }
            
            currentInteractiveTutorial = introJs();
            
            // Configure intro.js
            currentInteractiveTutorial.setOptions({
                steps: [introStep],
                showProgress: false,
                showBullets: false,
                exitOnOverlayClick: false,
                exitOnEsc: true,
                nextLabel: step.waitForClick ? '⏳ Esperando click...' : 'Siguiente →',
                prevLabel: '← Anterior',
                skipLabel: 'Salir del Tutorial',
                doneLabel: step.waitForClick ? '⏳ Esperando click...' : 'Siguiente →',
                disableInteraction: step.disableInteraction !== false
            });
            
            // Handle different step types
            if (step.waitForClick) {
                setupClickWaiting(step);
            } else {
                // Normal step, allow manual progression
                currentInteractiveTutorial.onbeforechange(function(targetElement) {
                    return true;
                });
                
                currentInteractiveTutorial.onexit(function() {
                    // Tutorial was manually exited
                    currentInteractiveTutorial = null;
                });
                
                currentInteractiveTutorial.oncomplete(function() {
                    // Move to next step
                    currentStepIndex++;
                    setTimeout(() => showInteractiveStep(currentStepIndex), 100);
                });
            }
            
            // Highlight the element if needed
            if (step.highlightClick && element) {
                highlightElement(element);
            }
            
            // Start this step
            currentInteractiveTutorial.start();
        }

        function setupClickWaiting(step) {
            const targetElement = document.querySelector(step.waitForClick);
            
            if (!targetElement) {
                // Element not found, treat as regular step
                currentInteractiveTutorial.oncomplete(function() {
                    currentStepIndex++;
                    setTimeout(() => showInteractiveStep(currentStepIndex), 100);
                });
                return;
            }
            
            // Disable the next/done buttons until click
            disableTutorialButtons();
            
            // Add click listener
            const clickHandler = function(event) {
                // Valid click detected!
                targetElement.removeEventListener('click', clickHandler);
                removeHighlight();
                
                // Re-enable tutorial buttons
                enableTutorialButtons();
                
                // Check if this click will navigate away
                if (step.navigatesTo) {
                    // Exit current tutorial and wait for navigation
                    if (currentInteractiveTutorial) {
                        currentInteractiveTutorial.exit();
                        currentInteractiveTutorial = null;
                    }
                    
                    // Wait for navigation, then continue
                    setTimeout(() => {
                        currentStepIndex++;
                        showInteractiveStep(currentStepIndex);
                    }, 1000);
                } else {
                    // Move to next step immediately
                    if (currentInteractiveTutorial) {
                        currentInteractiveTutorial.exit();
                        currentInteractiveTutorial = null;
                    }
                    
                    currentStepIndex++;
                    setTimeout(() => showInteractiveStep(currentStepIndex), 300);
                }
            };
            
            targetElement.addEventListener('click', clickHandler);
            
            // Handle tutorial exit
            currentInteractiveTutorial.onexit(function() {
                targetElement.removeEventListener('click', clickHandler);
                removeHighlight();
                currentInteractiveTutorial = null;
            });
        }

                        position: 'left'
                    });
                } else {
                    // Fallback tutorial
                    steps = [
                        {
                            element: '#floating-menu-container',
                            intro: "Desde el menú puedes navegar a cualquier sección de Nethive.",
                            position: 'left'
                        },
                        {
                            element: 'body',
                            intro: "📊 Esta es la sección de Oportunidades, donde puedes ver y gestionar todas tus oportunidades de venta."
                        }
                    ];
                }
            } else if (currentPath.includes('crear_cotizacion')) {
                // Quote creation tutorial - use data attributes if available
                const elementsWithIntro = document.querySelectorAll('[data-intro]');
                if (elementsWithIntro.length > 0) {
                    steps = [];
                    elementsWithIntro.forEach((element, index) => {
                        steps.push({
                            element: element,
                            intro: element.getAttribute('data-intro'),
                            position: element.getAttribute('data-position') || 'auto'
                        });
                    });
                } else {
                    // Fallback tutorial
                    steps = [
                        {
                            element: 'body',
                            intro: "💼 Esta es la sección de Cotizaciones, donde puedes crear cotizaciones profesionales para tus clientes."
                        },
                        {
                            element: 'form',
                            intro: "📋 Completa los datos del cliente y los productos para generar una cotización automáticamente."
                        }
                    ];
                }
            } else if (currentPath.includes('cotizacion')) {
                // Quotations list tutorial - use data attributes if available  
                const elementsWithIntro = document.querySelectorAll('[data-intro]');
                if (elementsWithIntro.length > 0) {
                    steps = [];
                    elementsWithIntro.forEach((element, index) => {
                        steps.push({
                            element: element,
                            intro: element.getAttribute('data-intro'),
                            position: element.getAttribute('data-position') || 'auto'
                        });
                    });
                    // Add menu step at the beginning
                    steps.unshift({
                        element: '#floating-menu-container',
                        intro: "📋 Desde el menú puedes navegar entre cotizaciones y oportunidades.",
                        position: 'left'
                    });
                } else {
                    // Fallback tutorial
                    steps = [
                        {
                            element: '#floating-menu-container',
                            intro: "Desde el menú puedes navegar a cualquier sección de Nethive.",
                            position: 'left'
                        },
                        {
                            element: 'body',
                            intro: "📄 Esta es la sección de Cotizaciones, donde puedes ver todas las cotizaciones organizadas por cliente."
                        }
                    ];
                }
            } else {
                // General tutorial
                steps = [
                    {
                        element: '#floating-menu-container',
                        intro: "🎯 Menú Principal: Tu centro de control para navegar por Nethive.",
                        position: 'left'
                    },
                    {
                        element: 'body',
                        intro: "🚀 Nethive es tu plataforma integral para gestión de ventas. Te ayudamos a manejar oportunidades, cotizaciones y más."
                    }
                ];
            }
            
            // Start the tutorial
            introJs().setOptions({
                steps: steps,
                showProgress: true,
                showBullets: false,
                exitOnOverlayClick: false,
                exitOnEsc: true,
                nextLabel: 'Siguiente →',
                prevLabel: '← Anterior', 
                skipLabel: 'Saltar',
                doneLabel: '¡Terminado! ✨'
            }).start();
        }
        
        // Add event listener when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            // Wait a bit for the floating menu to be ready
            setTimeout(function() {
                const tutorialBtn = document.getElementById('tutorial-btn');
                if (tutorialBtn) {
                    tutorialBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        showTutorialMenu();
                    });
                }
            }, 1000);
        });
    </script>
