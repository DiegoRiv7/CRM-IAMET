{% load static %}
<style>
    /* 1. BASE DOCK STYLES */
    .macos-dock {
        position: fixed;
        display: flex;
        align-items: center;
        padding: 8px;
        background: rgba(29, 29, 31, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        z-index: 1500;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .macos-dock.dock-ready {
        opacity: 1;
        visibility: visible;
    }

    /* 2. THEME OVERRIDES */
    /* Light/Pink Theme */
    [data-theme="pink"] .macos-dock,
    .light-theme .macos-dock {
        background: linear-gradient(135deg, rgba(255, 240, 245, 0.9) 0%, rgba(255, 232, 239, 0.85) 100%) !important;
        border: 1px solid rgba(255, 107, 157, 0.3) !important;
        box-shadow: 0 8px 32px rgba(255, 107, 157, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9) !important;
    }

    /* Perla Theme */
    [data-theme="perla"] .macos-dock {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(250, 250, 250, 0.9) 100%) !important;
        border: 1px solid rgba(200, 200, 200, 0.3) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.9) !important;
    }

    /* 3. DOCK ITEM STYLES */
    .dock-item {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        margin: 4px;
        transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        border-radius: 12px;
    }

    .dock-icon {
        width: 28px;
        height: 28px;
        color: #EBEBF5;
        transition: all 0.2s ease;
    }

    .light-theme .dock-icon,
    [data-theme="pink"] .dock-icon,
    [data-theme="perla"] .dock-icon {
        color: #2D1B2E !important;
    }

    .dock-item:hover {
        transform: scale(1.2) translateY(-2px);
        background: rgba(255, 255, 255, 0.1);
    }
    
    .light-theme .dock-item:hover {
        background: rgba(0, 0, 0, 0.05);
    }

    .dock-separator {
        background: rgba(255, 255, 255, 0.15);
        margin: 8px;
    }

    /* 4. TOOLTIPS */
    .tooltip {
        position: absolute;
        padding: 5px 10px;
        background: rgba(0, 0, 0, 0.8);
        color: #FFF;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s ease;
        pointer-events: none;
        z-index: 1600;
        backdrop-filter: blur(8px);
    }

    .dock-item:hover .tooltip {
        opacity: 1;
        visibility: visible;
    }

    /* 5. DOCK POSITION VARIANTS */
    .macos-dock.pos-left { left: 12px; top: 50%; transform: translateY(-50%); flex-direction: column; }
    .macos-dock.pos-right { right: 12px; top: 50%; transform: translateY(-50%); flex-direction: column; }
    .macos-dock.pos-top { top: 12px; left: 50%; transform: translateX(-50%); flex-direction: row; }
    .macos-dock.pos-bottom { bottom: 12px; left: 50%; transform: translateX(-50%); flex-direction: row; }

    .macos-dock.pos-left .dock-separator, .macos-dock.pos-right .dock-separator { width: 30px; height: 1px; }
    .macos-dock.pos-top .dock-separator, .macos-dock.pos-bottom .dock-separator { width: 1px; height: 30px; }

    /* Tooltip positioning based on dock position */
    .macos-dock.pos-left .tooltip { left: 100%; top: 50%; transform: translateY(-50%) translateX(10px); }
    .macos-dock.pos-right .tooltip { right: 100%; top: 50%; transform: translateY(-50%) translateX(-10px); }
    .macos-dock.pos-top .tooltip { top: 100%; left: 50%; transform: translateX(-50%) translateY(10px); }
    .macos-dock.pos-bottom .tooltip { bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-10px); }

    /* 6. COMPONENTS */
    .design-panel, .position-controls {
        position: fixed; display: flex; padding: 6px; background: rgba(29, 29, 31, 0.9);
        backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px; opacity: 0; visibility: hidden; z-index: 1400; gap: 5px;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .design-panel.active, .position-controls.active { opacity: 1; visibility: visible; transform: scale(1); }

    .design-control, .position-arrow {
        width: 36px; height: 36px; border-radius: 10px; background: rgba(255, 255, 255, 0.1);
        display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
    }
    .design-control:hover, .position-arrow:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
    .design-control.active, .position-arrow.active { background: #007AFF; box-shadow: 0 0 15px rgba(0,122,255,0.4); }

    /* 7. NOTIFICATIONS */
    .notifications-modal {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
        z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s;
    }
    .notifications-modal.show { opacity: 1; display: flex; }
    .notifications-content {
        background: #1C1C1E; width: 90vw; max-width: 800px; height: 70vh;
        border-radius: 20px; display: flex; flex-direction: column; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
    }
    .notification-item {
        padding: 15px; margin-bottom: 8px; background: rgba(255,255,255,0.03);
        border-radius: 12px; cursor: pointer; border: 1px solid transparent;
    }
    .notification-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
    .notification-item.unread { border-left: 4px solid #007AFF; }
    
    .notification-badge {
        position: absolute; top: 0; right: 0; background: #FF3B30; color: white;
        border-radius: 50%; min-width: 16px; height: 16px; display: none;
        align-items: center; justify-content: center; font-size: 10px; font-weight: bold;
        border: 2px solid rgba(29, 29, 31, 1);
    }

    /* 8. NIGHT SHIFT */
    .night-shift-filter { position: fixed; inset: 0; pointer-events: none; z-index: 2001; opacity: 0; transition: opacity 0.6s; mix-blend-mode: multiply; }
    .night-shift-filter.active { opacity: 1; background: rgba(255, 140, 0, 0.15); }

    /* 9. RESPONSIVE */
    @media (max-width: 768px) {
        .macos-dock { 
            bottom: 15px !important; left: 50% !important; transform: translateX(-50%) !important; 
            flex-direction: row !important; width: 95vw !important; border-radius: 18px !important;
            padding: 5px !important; flex-wrap: wrap; justify-content: center;
        }
        .dock-item { width: 42px; height: 42px; }
        .dock-icon { width: 24px; height: 24px; }
        .dock-separator { display: none; }
    }
</style>

<!-- CSRF Helper -->
<script>
    window.getCookie = function(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    };
</script>

<!-- NOTIFICATIONS MODAL -->
<div class="notifications-modal" id="notificationsModal">
    <div class="notifications-content">
        <div class="notifications-header">
            <h3 style="color: white; margin: 0;">Notificaciones</h3>
            <div>
                <button id="markAllReadBtn" style="background:#007AFF; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer;">Leídas</button>
                <button id="closeNotifications" style="background:transparent; color:white; border:none; font-size:24px; cursor:pointer; margin-left:10px;">&times;</button>
            </div>
        </div>
        <div class="notifications-list" id="notificationsList" style="flex:1; overflow-y:auto; padding:20px; color:white;">
            <!-- Notifs dynamic -->
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    const state = {
        pos: localStorage.getItem('dockPosition') || 'bottom',
        night: localStorage.getItem('nightShift') === 'true',
        theme: localStorage.getItem('theme') || 'dark'
    };

    const els = {
        dock: document.getElementById('main-dock'),
        design: document.getElementById('design-panel'),
        posPanel: document.getElementById('position-controls'),
        nightFilter: document.getElementById('night-shift-filter'),
        notifModal: document.getElementById('notificationsModal'),
        notifList: document.getElementById('notificationsList'),
        badge: document.getElementById('notification-badge')
    };

    function init() {
        applyPos(state.pos);
        applyNight(state.night);
        applyTheme(state.theme);
        setupListeners();
        fetchNotifs();
        setInterval(fetchNotifs, 60000);
    }

    function applyPos(pos) {
        state.pos = pos;
        localStorage.setItem('dockPosition', pos);
        els.dock.className = `macos-dock dock-ready pos-${pos}`;
        document.querySelectorAll('.position-arrow').forEach(a => {
            a.classList.toggle('active', a.dataset.position === pos);
        });
    }

    function applyNight(on) {
        state.night = on;
        localStorage.setItem('nightShift', on);
        els.nightFilter.classList.toggle('active', on);
        document.getElementById('night-shift-toggle').classList.toggle('active', on);
    }

    function applyTheme(theme) {
        state.theme = theme;
        localStorage.setItem('theme', theme);
        document.documentElement.setAttribute('data-theme', theme);
        document.body.classList.toggle('light-theme', theme === 'light');
    }

    function setupListeners() {
        // Design Panel
        document.getElementById('design-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const rect = e.currentTarget.getBoundingClientRect();
            els.design.style.top = `${rect.top - 50}px`;
            els.design.style.left = `${rect.left}px`;
            els.design.classList.toggle('active');
            els.posPanel.classList.remove('active');
        });

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            applyTheme(state.theme === 'dark' ? 'light' : 'dark');
        });

        // Night Shift
        document.getElementById('night-shift-toggle').addEventListener('click', () => {
            applyNight(!state.night);
        });

        // Position Panel
        document.getElementById('position-toggle').addEventListener('click', (e) => {
            els.posPanel.classList.toggle('active');
            const rect = els.design.getBoundingClientRect();
            els.posPanel.style.top = `${rect.top}px`;
            els.posPanel.style.left = `${rect.right + 10}px`;
        });

        // Change Position
        document.querySelectorAll('.position-arrow').forEach(a => {
            a.addEventListener('click', () => {
                applyPos(a.dataset.position);
                els.posPanel.classList.remove('active');
                els.design.classList.remove('active');
            });
        });

        // Notifications
        document.getElementById('notifications-btn').addEventListener('click', (e) => {
            e.preventDefault();
            els.notifModal.classList.add('show');
            fetchNotifs();
        });

        document.getElementById('closeNotifications').addEventListener('click', () => {
            els.notifModal.classList.remove('show');
        });

        document.getElementById('markAllReadBtn').addEventListener('click', markAllRead);

        window.addEventListener('click', (e) => {
            if (e.target === els.notifModal) els.notifModal.classList.remove('show');
        });
    }

    async function fetchNotifs() {
        try {
            const res = await fetch('/app/api/obtener-notificaciones/');
            if (res.ok) {
                const data = await res.json();
                renderNotifs(data.notifications || []);
                updateBadge(data.unread_count || 0);
            }
        } catch (err) { console.error('Notif error:', err); }
    }

    function renderNotifs(notifs) {
        if (!els.notifList) return;
        if (notifs.length === 0) {
            els.notifList.innerHTML = '<div style="text-align:center; opacity:0.6;">Sin notificaciones nuevas</div>';
            return;
        }
        els.notifList.innerHTML = notifs.map(n => `
            <div class="notification-item ${n.leida ? '' : 'unread'}" onclick="window.location.href='${n.url || '#'}'">
                <div style="font-weight:600;">${n.titulo}</div>
                <div style="font-size:13px; margin:4px 0; opacity:0.8;">${n.mensaje}</div>
                <div style="font-size:11px; opacity:0.4;">${n.fecha}</div>
            </div>
        `).join('');
    }

    function updateBadge(count) {
        if (!els.badge) return;
        els.badge.textContent = count;
        els.badge.style.display = count > 0 ? 'flex' : 'none';
    }

    async function markAllRead() {
        try {
            await fetch('/app/api/marcar-todas-notificaciones-leidas/', {
                method: 'POST',
                headers: { 'X-CSRFToken': window.getCookie('csrftoken') }
            });
            fetchNotifs();
        } catch (err) { console.error('Mark read error:', err); }
    }

    init();
})();
</script>
