<aside id="dock">
    <nav>
        <ul>

                <a href="{% url 'home' %}" class="group">

                </a>
            </li>
            <li>
                <a href="{% url 'dashboard' %}" class="group">
                    <!-- Dashboard -->
                    <svg class="dock-icon" viewBox="0 0 24 24">
                        <line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>

            </li>
            <li>
                <a href="{% url 'todos' %}" class="group">

                    <svg class="dock-icon" viewBox="0 0 24 24">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>

            <li>

                    <svg class="dock-icon" viewBox="0 0 24 24">

                <a href="{% url 'user_logout' %}" class="group">

                    </svg>
                    <span class="text-white">Cerrar Sesión</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>
<style>
    #dock {
        position: fixed;
        bottom: clamp(10px, 2vh, 30px); /* Keeps smart vertical positioning */
        left: 50%;
        transform: translateX(-50%);

        /* Back to wide, but controlled */
        width: 90%;
        max-width: 1400px; /* Prevents extreme stretching on ultrawide monitors */

        background-color: rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 0.5rem 1.5rem;
        border-radius: 2rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: flex-end;
        z-index: 1000;
        transition: all 0.3s ease-in-out;
        height: 65px;
        border: 2.5px solid transparent;
    }

    #dock:hover {
        background-color: rgba(0, 0, 0, 0.7);
        border-color: #143a56;
        box-shadow: 0 4px 32px 0 rgba(20,58,86,0.35), 0 1.5px 8px 0 rgba(0,0,0,0.10);
    }

    #dock nav,
    #dock nav ul {
        width: 100%; /* Make nav and ul fill the dock container */
        display: flex;
        justify-content: space-evenly; /* Distribute icons evenly */
        align-items: flex-end;
        list-style: none;
        padding: 0;
        margin: 0;
    }

    #dock .dock-icon {
        width: var(--dock-icon-size, 60px);
        height: var(--dock-icon-size, 60px);
        fill: none;
        stroke: #ffffff;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease-in-out;
    }

    #dock:hover .dock-icon {
        opacity: 1;
    }

    #dock nav li a:hover .dock-icon {
        transform: scale(2.0);
    }

    #dock nav li a {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: white;
        text-decoration: none;
        font-size: 0.75rem;
        transition: color 0.2s ease-out, background-color 0.2s ease-out;
        position: relative;
        padding: var(--dock-item-padding, 0.1rem);
        border-radius: 0.75rem;
        background-color: transparent;
        margin: 0; /* Margin is now handled by justify-content */
    }

    #dock nav li a span {
        opacity: 0;
        position: absolute;
        bottom: var(--dock-text-bottom, -20px);
        white-space: nowrap;
        transition: opacity 0.2s ease-out;
        pointer-events: none;
        background-color: rgba(0, 0, 0, 0.85);
        padding: 0.25rem 0.5rem;
        border-radius: 0.3rem;
        font-size: 0.7rem;
        z-index: 1001;
    }

    #dock nav li a:hover span {
        opacity: 1;
    }

    #dock nav li a:active {
        background-color: rgba(56, 189, 248, 0.18);
        color: #38bdf8;
        box-shadow: 0 1px 4px 0 rgba(56,189,248,0.18);
        transform: translateY(-2px) scale(0.98);
    }

    /* Mobile Optimization */
    @media (max-width: 768px) {
        #dock {
            height: 55px;
            padding: 0.4rem 0.5rem;
            border-radius: 1.5rem;
            width: 95%;
        }

        #dock nav ul {
            justify-content: space-around; /* A bit more space for mobile */
        }

        #dock .dock-icon {
            width: var(--dock-icon-size, 44px);
            height: var(--dock-icon-size, 44px);
        }

        #dock nav li a:hover .dock-icon {
            transform: scale(1.6);
        }
    }
</style>
