{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-100 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Generador de Avatares</h1>
            <p class="text-gray-600">Crea tu avatar personalizado con IA</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <!-- Contenedor del avatar generado -->
            <div class="p-6">
                <div class="avatar-container mx-auto">
                    <img id="avatar-image" src="https://placehold.co/512x512/e2e8f0/94a3b8?text=Selecciona+un+animal" 
                         alt="Avatar generado" class="w-full h-full object-cover rounded-full">
                </div>
                
                <div class="mt-6">
                    <label for="animal-select" class="block text-sm font-medium text-gray-700 mb-2">
                        Selecciona un animal
                    </label>
                    <select id="animal-select" class="select-styled w-full">
                        <option value="dinosaur">Dinosaurio (T-Rex)</option>
                        <option value="fox">Zorro</option>
                        <option value="owl">Búho</option>
                        <option value="panda">Panda</option>
                        <option value="wolf">Lobo</option>
                    </select>
                </div>

                <button id="generate-button" 
                        class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                    <svg id="loading-spinner" class="animate-spin -ml-1 mr-2 h-5 w-5 text-white hidden" 
                         xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="button-text">Generar Avatar</span>
                </button>

                <p id="error-message" class="mt-4 text-red-500 text-sm text-center"></p>
                
                <div class="mt-6 flex justify-center">
                    <button id="save-button" 
                            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition duration-200 hidden">
                        Usar este avatar
                    </button>
                </div>
            </div>
        </div>
        
        <div class="mt-8 text-center">
            <a href="{% url 'perfil_usuario' user.id %}" class="text-blue-600 hover:text-blue-800">
                ← Volver al perfil
            </a>
        </div>
    </div>
</div>

<style>
    .avatar-container {
        width: 256px;
        height: 256px;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid #e2e8f0;
        background-color: #f8fafc;
        margin: 0 auto;
        transition: all 0.3s ease;
    }
    
    .avatar-container:hover {
        transform: scale(1.02);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }
    
    .select-styled {
        @apply block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500;
    }
    
    #save-button {
        transition: all 0.3s ease;
    }
    
    #save-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const generateBtn = document.getElementById('generate-button');
    const saveBtn = document.getElementById('save-button');
    const animalSelect = document.getElementById('animal-select');
    const avatarImage = document.getElementById('avatar-image');
    const loadingSpinner = document.getElementById('loading-spinner');
    const buttonText = document.getElementById('button-text');
    const errorMessage = document.getElementById('error-message');
    
    // Generar avatar al hacer clic en el botón
    generateBtn.addEventListener('click', async function() {
        const animal = animalSelect.value;
        
        // Mostrar estado de carga
        generateBtn.disabled = true;
        loadingSpinner.classList.remove('hidden');
        buttonText.textContent = 'Generando...';
        errorMessage.textContent = '';
        
        try {
            const response = await fetch('{% url "avatar_generator" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFTTOKEN': '{{ csrf_token }}'
                },
                body: JSON.stringify({ animal: animal })
            });
            
            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error);
            }
            
            // Mostrar la imagen generada
            avatarImage.src = data.image_url;
            saveBtn.classList.remove('hidden');
            
        } catch (error) {
            console.error('Error al generar el avatar:', error);
            errorMessage.textContent = 'Error al generar el avatar. Por favor, inténtalo de nuevo.';
        } finally {
            // Restaurar estado del botón
            generateBtn.disabled = false;
            loadingSpinner.classList.add('hidden');
            buttonText.textContent = 'Generar Avatar';
        }
    });
    
    // Guardar el avatar seleccionado
    saveBtn.addEventListener('click', function() {
        // Aquí puedes agregar la lógica para guardar el avatar en el perfil del usuario
        // Por ahora, simplemente redirigimos al perfil
        window.location.href = '{% url "perfil_usuario" user.id %}';
    });
    
    // Efecto hover en la imagen de avatar
    avatarImage.addEventListener('mouseover', function() {
        if (avatarImage.src.includes('placehold.co')) return;
        avatarImage.style.transform = 'scale(1.05)';
    });
    
    avatarImage.addEventListener('mouseout', function() {
        avatarImage.style.transform = 'scale(1)';
    });
});
</script>
{% endblock %}
