// Función para buscar productos en el popup
function buscarProductosEnPopup(query) {
    const tipoProducto = detectarTipoProducto(currentFieldId);
    const filtros = obtenerFiltrosActuales();
    
    // Si no hay query pero sí hay filtros aplicados, permitir búsqueda
    const hayFiltros = Object.keys(filtros).some(key => filtros[key] && filtros[key] !== '');
    
    if (!query || query.length < 2) {
        if (!hayFiltros) {
            // Si no hay query ni filtros, mostrar mensaje
            mostrarMensajeResultados('🔍 Escriba para buscar o use los filtros...');
            return;
        }
    }
    
    mostrarMensajeResultados('🔄 Buscando en catálogo...');
    
    // Llamada real al backend para obtener productos del catálogo
    buscarProductosRealesEnCatalogo(query || '', tipoProducto, filtros);
}

// Función para obtener filtros actuales del popup
function obtenerFiltrosActuales() {
    const filtros = {};
    
    // Filtros base
    const precioMax = document.getElementById('filter-precio-max')?.value;
    if (precioMax) filtros.precioMax = parseFloat(precioMax);
    
    const marca = document.getElementById('filter-marca')?.value;
    if (marca) filtros.marca = marca;
    
    // Filtros específicos según tipo
    const categoria = document.getElementById('filter-categoria')?.value;
    if (categoria) filtros.categoria = categoria;
    
    const color = document.getElementById('filter-color')?.value;
    if (color) filtros.color = color;
    
    const uso = document.getElementById('filter-uso')?.value;
    if (uso) filtros.uso = uso;
    
    const tipo = document.getElementById('filter-tipo')?.value;
    if (tipo) filtros.tipo = tipo;
    
    const longitud = document.getElementById('filter-longitud')?.value;
    if (longitud) filtros.longitud = longitud;
    
    const puertos = document.getElementById('filter-puertos')?.value;
    if (puertos) filtros.puertos = puertos;
    
    return filtros;
}

// Función para aplicar filtros automáticamente
function aplicarFiltrosAutomatico() {
    const query = document.getElementById('search-input-popup')?.value || '';
    if (query.length >= 2) {
        buscarProductosEnPopup(query);
    }
}

// Función para limpiar filtros del popup
function limpiarFiltrosPopup() {
    const selects = document.querySelectorAll('#search-filters select');
    const inputs = document.querySelectorAll('#search-filters input');
    
    selects.forEach(select => select.value = '');
    inputs.forEach(input => input.value = '');
    
    // Reejecutar búsqueda si hay texto
    const query = document.getElementById('search-input-popup')?.value || '';
    if (query.length >= 2) {
        buscarProductosEnPopup(query);
    }
}

// Función para mostrar mensaje en resultados
function mostrarMensajeResultados(mensaje) {
    const resultsContainer = document.getElementById('popup-search-results');
    if (resultsContainer) {
        resultsContainer.innerHTML = `
            <div style="padding: 20px; text-align: center; color: #6b7280;">
                ${mensaje}
            </div>
        `;
    }
}

// Función para mostrar resultados del popup
function mostrarResultadosPopup(productos) {
    const resultsContainer = document.getElementById('popup-search-results');
    if (!resultsContainer) return;
    
    if (productos.length === 0) {
        mostrarMensajeResultados('❌ No se encontraron productos con los criterios especificados.');
        return;
    }
    
    const categoria = obtenerCategoriaClienteActual();
    const tipoProducto = detectarTipoProducto(currentFieldId); // Obtener tipo de producto
    
    const resultadosHTML = productos.map(producto => {
        const precioCliente = calcularPrecioSegunCategoria(producto.costo_unitario, categoria);
        
        return `
            <div class="search-result-item" onclick="seleccionarProductoDesdePopup('${producto.numero_parte}', '${producto.descripcion}', ${producto.precio_lista}, ${producto.costo_unitario})">
                <div class="search-result-info">
                    <div class="search-result-part">${producto.numero_parte}</div>
                    <div class="search-result-description">${producto.descripcion}</div>
                    <div class="search-result-details">
                        ${producto.marca ? `Marca: ${producto.marca}` : ''} 
                        ${extraerCaracteristicasInteligentes(producto.descripcion, tipoProducto)}
                    </div>
                </div>
                <div class="search-result-price">
                    <div class="search-result-list-price">Proveedor: $${producto.costo_unitario.toFixed(2)}</div>
                    <div class="search-result-client-price">Cliente ${categoria}: $${precioCliente.toFixed(2)}</div>
                </div>
            </div>
        `;
    }).join('');
    
    resultsContainer.innerHTML = resultadosHTML;
}

// Función para seleccionar producto desde el popup
function seleccionarProductoDesdePopup(numeroParte, descripcion, precioLista, costoUnitario) {
    if (!currentFieldId) return;

    // Store the selected product in localStorage
    const tipoProducto = detectarTipoProducto(currentFieldId);
    let recentProducts = JSON.parse(localStorage.getItem(`recentProducts_${tipoProducto}`)) || [];
    
    // Add the new product to the beginning of the list
    recentProducts.unshift(numeroParte);
    
    // Remove duplicates and keep only the last 3
    recentProducts = [...new Set(recentProducts)].slice(0, 3);
    
    localStorage.setItem(`recentProducts_${tipoProducto}`, JSON.stringify(recentProducts));

    console.log(`✅ Producto seleccionado y guardado en recientes: ${numeroParte}`);

    // Actualizar el campo correspondiente
    const targetField = document.getElementById(currentFieldId);
    if (targetField) {
        targetField.value = numeroParte;
        
        // Disparar evento para que el sistema actualice otros campos relacionados
        const event = new Event('input', { bubbles: true });
        targetField.dispatchEvent(event);
        
        // Si hay función de autocomplete específica, llamarla
        if (window.onVolumetriaInput) {
            window.onVolumetriaInput(currentFieldId);
        }
    }
    
    console.log(`✅ Producto seleccionado: ${numeroParte} - ${descripcion}`);
    
    // Cerrar popup
    cerrarPopupBusquedaActual();
}

// Función para buscar productos reales en el catálogo de la base de datos
function buscarProductosRealesEnCatalogo(query, tipoProducto, filtros) {
    console.log(`🔍 Buscando productos reales en el catálogo para: ${tipoProducto}`);
    console.log('Query:', query);
    console.log('Filtros:', filtros);
    
    // Preparar parámetros para la llamada AJAX
    const params = new URLSearchParams({
        q: query || '',
        tipo: tipoProducto,
        filtros: JSON.stringify(filtros)
    });
    
    // Llamada AJAX al endpoint del catálogo
    fetch(`/app/api/buscar-productos-catalogo/?${params}`, {
        method: 'GET',
        headers: {
            'X-Requested-With': 'XMLHttpRequest',
            'Content-Type': 'application/json',
        },
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
    })
    .then(data => {
        console.log('📦 Productos recibidos del backend:', data);
        
        if (data.success && data.productos) {
            // Aplicar motor de búsqueda inteligente a los productos reales
            let productosReales = data.productos;
            productosReales = aplicarMotorBusquedaInteligente(productosReales, filtros, tipoProducto);
            
            console.log(`✅ Mostrando ${productosReales.length} productos después del filtrado inteligente`);
            mostrarResultadosPopup(productosReales);
        } else {
            console.log('❌ No se encontraron productos o error en la respuesta');
            mostrarMensajeResultados('❌ No se encontraron productos en el catálogo.');
        }
    })
    .catch(error => {
        console.error('❌ Error al buscar productos en el catálogo:', error);
        
        // Fallback: usar productos de ejemplo si falla la llamada
        console.log('🔄 Usando productos de ejemplo como fallback...');
        const productos = simularBusquedaProductos(query, tipoProducto, filtros);
        mostrarResultadosPopup(productos);
    });
}

// Motor de búsqueda inteligente que analiza descripciones
function aplicarMotorBusquedaInteligente(productos, filtros, tipoProducto) {
    console.log(`🤖 Aplicando motor de búsqueda inteligente para ${tipoProducto}`);
    console.log(`📋 Total productos inicial: ${productos.length}`);
    
    // Aplicar filtro de marca (directo)
    if (filtros.marca) {
        const antes = productos.length;
        productos = productos.filter(p => p.marca && p.marca.toLowerCase() === filtros.marca.toLowerCase());
        console.log(`🏷️ Filtro marca "${filtros.marca}": ${antes} → ${productos.length} productos`);
    }
    
    // Aplicar filtro de precio máximo (directo)
    if (filtros.precioMax) {
        const antes = productos.length;
        productos = productos.filter(p => p.precio_lista <= filtros.precioMax);
        console.log(`💰 Filtro precio ≤$${filtros.precioMax}: ${antes} → ${productos.length} productos`);
    }
    
    // Aplicar filtros inteligentes basados en descripción
    if (filtros.categoria) {
        const antes = productos.length;
        productos = productos.filter(p => detectarCategoriaEnDescripcion(p.descripcion, filtros.categoria));
        console.log(`📏 Filtro categoría "${filtros.categoria}" (análisis IA): ${antes} → ${productos.length} productos`);
    }
    
    if (filtros.color) {
        const antes = productos.length;
        productos = productos.filter(p => detectarColorEnDescripcion(p.descripcion, filtros.color));
        console.log(`🎨 Filtro color "${filtros.color}" (análisis IA): ${antes} → ${productos.length} productos`);
    }
    
    // Filtros específicos por tipo de producto
    if (tipoProducto === 'cable' && filtros.uso) {
        productos = productos.filter(p => detectarUsoEnDescripcion(p.descripcion, filtros.uso));
    }
    
    if ((tipoProducto === 'jack' || tipoProducto === 'faceplate') && filtros.tipo) {
        productos = productos.filter(p => detectarTipoEnDescripcion(p.descripcion, filtros.tipo, tipoProducto));
    }
    
    if (tipoProducto === 'patchcord' && filtros.longitud) {
        productos = productos.filter(p => detectarLongitudEnDescripcion(p.descripcion, filtros.longitud));
    }
    
    if (tipoProducto === 'faceplate' && filtros.puertos) {
        productos = productos.filter(p => detectarPuertosEnDescripcion(p.descripcion, filtros.puertos));
    }
    
    return productos;
}

// Función para detectar categoría en la descripción (MEJORADA para Cat 6A)
function detectarCategoriaEnDescripcion(descripcion, categoriaFiltro) {
    const desc = descripcion.toLowerCase();
    
    console.log(`🔍 Analizando categoría "${categoriaFiltro}" en: "${descripcion}"`);
    
    switch (categoriaFiltro) {
        case '5e':
            const es5e = desc.includes('cat 5e') || 
                        desc.includes('category 5e') || 
                        desc.includes('categoría 5e') ||
                        desc.includes('cat5e') ||
                        desc.includes('5e') ||
                        /\bcat\s*5e\b/.test(desc) ||
                        /\bcategory\s*5e\b/.test(desc);
            console.log(`   ✅ Es Cat 5e: ${es5e}`);
            return es5e;
            
        case '6':
            // Cat 6 pero NO 6A
            const esCat6 = (desc.includes('cat 6') || 
                           desc.includes('category 6') ||
                           desc.includes('categoría 6') ||
                           desc.includes('cat6') ||
                           /\bcat\s*6\b/.test(desc) ||
                           /\bcategory\s*6\b/.test(desc)) && 
                          !desc.includes('6a') && 
                          !desc.includes('6-a') &&
                          !desc.includes('cat6a') &&
                          !desc.includes('category6a');
            console.log(`   ✅ Es Cat 6 (no 6A): ${esCat6}`);
            return esCat6;
            
        case '6A':
        case '6a':
            // Patrones MUY amplios para detectar Cat 6A - incluye todas las variaciones posibles
            const esCat6A = desc.includes('cat 6a') || 
                           desc.includes('category 6a') || 
                           desc.includes('categoría 6a') ||
                           desc.includes('cat6a') ||
                           desc.includes('6a') ||

                           desc.includes('category 6') ||
                           desc.includes('categoría 6') ||
                           /\bcat\s*6a?\b/i.test(desc) ||
                           /\bcategory\s*6a?\b/i.test(desc) ||
                           /\bcategoría\s*6a?\b/i.test(desc) ||
                           /\b6a?\b/.test(desc) ||
                           desc.includes('augmented') ||
                           desc.includes('enhanced category 6') ||

                           desc.includes('clase 6') ||
                           desc.includes('class 6');
            console.log(`   🎯 Es Cat 6A: ${esCat6A} (Texto: "${desc.substring(0, 100)}...")`);

        default:

}

// Función para detectar color en la descripción
function detectarColorEnDescripcion(descripcion, colorFiltro) {
    const desc = descripcion.toLowerCase();
    const colorMap = {
        'azul': ['blue', 'azul'],
        'blanco': ['white', 'blanco'],
        'negro': ['black', 'negro'],
        'rojo': ['red', 'rojo'],
        'amarillo': ['yellow', 'amarillo'],
        'verde': ['green', 'verde'],
        'gris': ['gray', 'grey', 'gris'],
        'marfil': ['ivory', 'marfil', 'beige'],
        'beige': ['beige', 'marfil', 'ivory']
    };
    
    const coloresABuscar = colorMap[colorFiltro.toLowerCase()] || [colorFiltro.toLowerCase()];
    return coloresABuscar.some(color => desc.includes(color));
}

// Función para detectar uso de cable en la descripción
function detectarUsoEnDescripcion(descripcion, usoFiltro) {
    const desc = descripcion.toLowerCase();
    
    switch (usoFiltro) {
        case 'interior':
            return desc.includes('interior') || desc.includes('indoor') || desc.includes('office') || desc.includes('oficina') || desc.includes('general purpose') || desc.includes('standard') || desc.includes('edificio');
        case 'exterior':
            return desc.includes('exterior') || desc.includes('outdoor') || desc.includes('external') || desc.includes('uv');
        case 'plenum':
            return desc.includes('plenum') || desc.includes('cmp') || desc.includes('fire retardant');
        case 'riser':
            return desc.includes('riser') || desc.includes('cmr') || desc.includes('vertical');
        default:
            return true;
    }
}

// Función para detectar tipo en la descripción
function detectarTipoEnDescripcion(descripcion, tipoFiltro, tipoProducto) {
    const desc = descripcion.toLowerCase();
    
    if (tipoProducto === 'jack') {
        switch (tipoFiltro) {
            case 'keystone':
                return desc.includes('keystone') || (!desc.includes('blindado') && !desc.includes('shielded'));
            case 'blindado':
                return desc.includes('blindado') || desc.includes('shielded') || desc.includes('ftp');
            case 'RJ45':
                return desc.includes('rj45') || desc.includes('rj-45');
            default:
                return true;
        }
    }
    
    if (tipoProducto === 'faceplate') {
        switch (tipoFiltro) {
            case 'standard':
                return desc.includes('standard') || (!desc.includes('angled') && !desc.includes('angulado') && !desc.includes('low profile') && !desc.includes('flush'));
            case 'angulado':
                return desc.includes('angled') || desc.includes('angulado') || desc.includes('low profile');
            case 'plano':
                return desc.includes('plano') || desc.includes('flat') || desc.includes('flush');
            case 'flush':
                return desc.includes('flush') || desc.includes('flat');
            default:
                return true;
        }
    }
    
    return true;
}

// Función para detectar longitud en la descripción
function detectarLongitudEnDescripcion(descripcion, longitudFiltro) {
    const desc = descripcion.toLowerCase();
    const longitud = longitudFiltro.toString();
    
    // Buscar la longitud específica seguida de unidades
    return desc.includes(`${longitud} ft`) || 
           desc.includes(`${longitud} feet`) || 
           desc.includes(`${longitud} foot`) ||
           desc.includes(`${longitud}ft`) ||
           desc.includes(`${longitud}feet`);
}

// Función para detectar número de puertos en la descripción
function detectarPuertosEnDescripcion(descripcion, puertosFiltro) {
    const desc = descripcion.toLowerCase();
    const puertos = puertosFiltro.toString();
    
    // Mapeo de números a palabras
    const numeroMap = {
        '1': ['1', 'single', 'solo', 'one'],
        '2': ['2', 'dual', 'double', 'two'],
        '4': ['4', 'quad', 'four'],
        '6': ['6', 'six'],
        '8': ['8', 'eight']
    };
    
    const numerosABuscar = numeroMap[puertos] || [puertos];
    return numerosABuscar.some(num => {
        return desc.includes(`${num}-port`) || 
               desc.includes(`${num} port`) ||
               desc.includes(`${num}port`) ||
               desc.includes(num + ' ');
    });
}

// Función para extraer características inteligentemente de la descripción
function extraerCaracteristicasInteligentes(descripcion, tipoProducto) {
    const desc = descripcion.toLowerCase();
    const caracteristicas = [];
    
    // Detectar categoría (mejorado para Cat 6A)
    if (desc.includes('cat 6a') || desc.includes('category 6a') || desc.includes('6a') || 
        desc.includes('cat6a') || desc.includes('augmented') || /\b6a\b/.test(desc)) {
        caracteristicas.push('Cat 6A');
    } else if (desc.includes('cat 5e') || desc.includes('category 5e') || desc.includes('5e') || 
               desc.includes('cat5e') || /\bcat\s*5e\b/.test(desc)) {
        caracteristicas.push('Cat 5e');
    } else if ((desc.includes('cat 6') || desc.includes('category 6') || /\bcat\s*6\b/.test(desc)) && 
               !desc.includes('6a') && !desc.includes('6-a')) {
        caracteristicas.push('Cat 6');
    }
    
    // Detectar colores
    const colores = {
        'blue': 'Azul', 'azul': 'Azul',
        'white': 'Blanco', 'blanco': 'Blanco',
        'black': 'Negro', 'negro': 'Negro',
        'red': 'Rojo', 'rojo': 'Rojo',
        'yellow': 'Amarillo', 'amarillo': 'Amarillo',
        'green': 'Verde', 'verde': 'Verde',
        'gray': 'Gris', 'grey': 'Gris', 'gris': 'Gris',
        'ivory': 'Marfil', 'marfil': 'Marfil'
    };
    
    for (const [key, value] of Object.entries(colores)) {
        if (desc.includes(key)) {
            caracteristicas.push(value);
            break;
        }
    }
    
    // Características específicas por tipo
    if (tipoProducto === 'cable') {
        if (desc.includes('exterior') || desc.includes('outdoor')) {
            caracteristicas.push('Exterior');
        } else if (desc.includes('plenum')) {
            caracteristicas.push('Plenum');
        } else if (desc.includes('riser')) {
            caracteristicas.push('Riser');
        } else if (desc.includes('interior') || desc.includes('indoor')) {
            caracteristicas.push('Interior');
        }
    }
    
    if (tipoProducto === 'jack') {
        if (desc.includes('keystone')) {
            caracteristicas.push('Keystone');
        }
        if (desc.includes('blindado') || desc.includes('shielded')) {
            caracteristicas.push('Blindado');
        }
    }
    
    if (tipoProducto === 'patchcord') {
        // Detectar longitud
        const longitudes = ['1', '3', '5', '7', '10', '15', '25'];
        for (const long of longitudes) {
            if (desc.includes(`${long} ft`) || desc.includes(`${long} feet`) || desc.includes(`${long}ft`)) {
                caracteristicas.push(`${long} pies`);
                break;
            }
        }
    }
    
    if (tipoProducto === 'faceplate') {
        // Detectar número de puertos
        const puertos = ['1', '2', '4', '6', '8'];
        for (const puerto of puertos) {
            if (desc.includes(`${puerto}-port`) || desc.includes(`${puerto} port`)) {
                caracteristicas.push(`${puerto} puerto${puerto !== '1' ? 's' : ''}`);
                break;
            }
        }
        
        if (desc.includes('angled') || desc.includes('angulado')) {
            caracteristicas.push('Angulado');
        }
    }
    
    return caracteristicas.length > 0 ? `| ${caracteristicas.join(' | ')}` : '';
}

// Función principal para buscar productos con filtros
async function buscarProductosConFiltros(query, tipoProducto, filtros) {
    const resultsContainer = document.getElementById('popup-results');
    const resultsCount = document.getElementById('results-count');
    
    if (!resultsContainer) return;
    
    // Mostrar loading
    resultsContainer.innerHTML = '<div class="loading-message">🔄 Buscando productos...</div>';
    
    try {
        // Construir parámetros de búsqueda
        const params = new URLSearchParams();
        if (query.trim()) params.append('q', query);
        params.append('limit', '20');
        
        // Agregar filtros a la URL
        Object.entries(filtros).forEach(([key, value]) => {
            if (value) params.append(key, value);
        });
        
        // Realizar búsqueda
        const response = await fetch(`/app/api/buscar-productos-catalogo/?${params}`);
        const data = await response.json();
        
        console.log('📦 Respuesta completa del backend:', data);
        
        // Extraer productos del objeto de respuesta
        const productos = data.productos || [];
        
        // Filtrar por tipo de producto si es necesario
        const productosFiltrados = filtrarPorTipoProducto(productos, tipoProducto, filtros);
        
        // Mostrar resultados
        mostrarResultadosEnPopup(productosFiltrados);
        
        // Actualizar contador
        if (resultsCount) {
            resultsCount.textContent = `${productosFiltrados.length} productos encontrados`;
        }
        
    } catch (error) {
        console.error('❌ Error buscando productos:', error);
        resultsContainer.innerHTML = '<div class="error-message">❌ Error al buscar productos. Intenta de nuevo.</div>';
    }
}

// Función para filtrar productos por tipo específico (simplificada - backend hace el trabajo pesado)
function filtrarPorTipoProducto(productos, tipoProducto, filtros) {
    console.log(`🔍 Filtrado frontend: ${productos.length} productos recibidos`);
    
    return productos.filter(producto => {
        // Log para debugging
        if (filtros.categoria) {
            console.log(`📋 Producto: ${producto.numero_parte} | Categoría BD: "${producto.categoria}" | Filtro: "${filtros.categoria}"`);
        }
        
        // Filtro adicional por precio máximo (si se especifica)
        if (filtros.precioMax && producto.precio_lista > filtros.precioMax) {
            console.log(`💰 Producto ${producto.numero_parte} excluido por precio: ${producto.precio_lista} > ${filtros.precioMax}`);
            return false;
        }
        
        // El backend ya filtró por categoría y tipo, solo aplicamos filtros adicionales aquí
        return true;
    });
}

// Función para mostrar resultados en el popup
function mostrarResultadosEnPopup(productos) {
    const resultsContainer = document.getElementById('popup-results');
    if (!resultsContainer) return;
    
    if (productos.length === 0) {
        resultsContainer.innerHTML = `
            <div class="no-results">
                <p>🔍 No se encontraron productos con los criterios especificados</p>
                <p class="hint">Intenta con menos filtros o términos de búsqueda diferentes</p>
            </div>
        `;
        return;
    }
    
    const categoriaCliente = obtenerCategoriaClienteActual();
    
    let html = '';
    productos.forEach(producto => {
        const costoUnitario = parseFloat(producto.precio_proveedor) || 0;
        const precioLista = calcularPrecioSegunCategoria(costoUnitario, categoriaCliente);
        
        html += `
            <div class="product-result-item" onclick="seleccionarProductoDelPopup('${producto.numero_parte}', '${producto.descripcion?.replace(/'/g, "\\'")}', ${costoUnitario}, ${precioLista})">
                <div class="product-header">
                    <div class="product-part-number">${producto.numero_parte}</div>
                    <div class="product-price">$${precioLista.toFixed(2)}</div>
                </div>
                <div class="product-description">${producto.descripcion}</div>
                <div class="product-details">
                    <span class="product-cost">Costo: $${costoUnitario.toFixed(2)}</span>
                    <span class="product-margin">Utilidad: ${categoriaCliente === 'A' ? '15%' : categoriaCliente === 'B' ? '20%' : '25%'}</span>
                    ${producto.marca ? `<span class="product-brand">${producto.marca}</span>` : ''}
                </div>
            </div>
        `;
    });
    
    resultsContainer.innerHTML = html;
}

// Función auxiliar para calcular total cliente
function calcularTotalCliente(datos) {
    if (!datos.cantidadNodos) return 15420.85; // Valor por defecto para demo
    
    const totalMetrosCable = datos.distancia * datos.cantidadNodos;
    const cantidadCable = Math.ceil(totalMetrosCable / 305);
    const cantidadFaceplates = datos.cantidadNodos;
    const cantidadJacksUsuario = datos.cantidadNodos; // 1 por nodo
    const cantidadJacksPatchpanel = datos.cantidadNodos; // 1 por nodo
    const cantidadPatchcordsUsuario = datos.cantidadNodos; // 1 por nodo (color usuario)
    const cantidadPatchcordsPatchpanel = datos.cantidadNodos; // 1 por nodo (color patchpanel)
    
    const productos = [
        { precioLista: 285.50, descuentoCliente: 15, cantidad: cantidadCable },
        { precioLista: 45.25, descuentoCliente: 20, cantidad: cantidadFaceplates },
        { precioLista: 12.75, descuentoCliente: 25, cantidad: cantidadJacksUsuario },
        { precioLista: 12.75, descuentoCliente: 25, cantidad: cantidadJacksPatchpanel },
        { precioLista: 18.90, descuentoCliente: 18, cantidad: cantidadPatchcordsUsuario },
        { precioLista: 18.90, descuentoCliente: 18, cantidad: cantidadPatchcordsPatchpanel }
    ];
    
    let total = 0;
    productos.forEach(producto => {
        const precioUnitario = producto.precioLista * (1 - producto.descuentoCliente / 100);
        total += precioUnitario * producto.cantidad;
    });
    
    return total;
}

    const cantidadFaceplates = datos.cantidadNodos;
    const cantidadJacksUsuario = datos.cantidadNodos; // 1 por nodo
    const cantidadJacksPatchpanel = datos.cantidadNodos; // 1 por nodo
    const cantidadPatchcordsUsuario = datos.cantidadNodos; // 1 por nodo (color usuario)
    const cantidadPatchcordsPatchpanel = datos.cantidadNodos; // 1 por nodo (color patchpanel)
    
    const productos = [
        { precioLista: 285.50, descuentoProveedor: 20, cantidad: cantidadCable },
        { precioLista: 45.25, descuentoProveedor: 20, cantidad: cantidadFaceplates },

// Función para obtener resumen financiero de todas las tablas
function obtenerResumenFinanciero() {
    console.log('💰 Calculando resumen financiero de todas las tablas');
    
    let totalCliente = 0;
    let totalCosto = 0;
    
    // Función auxiliar para sumar totales de una tabla
    function sumarTotalesTabla(tableId) {
        const tabla = document.getElementById(tableId);
        if (!tabla) return { cliente: 0, costo: 0 };
        
        let clienteTabla = 0;
        let costoTabla = 0;
        
        const filas = tabla.querySelectorAll('.excel-row:not(.excel-totals-row)');
        filas.forEach(fila => {
            const celdas = fila.children;
            if (celdas.length >= 10) {
                // Obtener total cliente y total costo de cada fila
                const totalClienteFila = parseFloat(celdas[6]?.textContent.replace(/[^\d.-]/g, '')) || 0;
                const totalCostoFila = parseFloat(celdas[9]?.textContent.replace(/[^\d.-]/g, '')) || 0;
                
                clienteTabla += totalClienteFila;
                costoTabla += totalCostoFila;
            }
        });
        
        return { cliente: clienteTabla, costo: costoTabla };
    }
    
    // Sumar tabla principal
    const tablaPrincipal = sumarTotalesTabla('excel-table');
    totalCliente += tablaPrincipal.cliente;
    totalCosto += tablaPrincipal.costo;
    
    // Sumar infraestructura si está visible
    const seccionInfraestructura = document.getElementById('seccion-infraestructura');
    if (seccionInfraestructura && seccionInfraestructura.style.display !== 'none') {
        const tablaInfraestructura = sumarTotalesTabla('excel-table-infraestructura');
        totalCliente += tablaInfraestructura.cliente;
        totalCosto += tablaInfraestructura.costo;
    }
    
    // Sumar gastos de instalación si está visible
    const seccionGastos = document.getElementById('seccion-gastos-instalacion');
    if (seccionGastos && seccionGastos.style.display !== 'none') {
        const tablaGastos = document.getElementById('excel-table-gastos');
        if (tablaGastos) {
            const filasGastos = tablaGastos.querySelectorAll('.excel-row:not(.excel-totals-row)');
            filasGastos.forEach(fila => {
                const celdas = fila.children;
                if (celdas.length >= 5) {
                    const totalGasto = parseFloat(celdas[4]?.textContent.replace(/[^\d.-]/g, '')) || 0;
                    totalCliente += totalGasto; // Los gastos se agregan al precio final
                }
            });
        }
    }
    
    // Sumar mano de obra si está visible
    const seccionManoObra = document.getElementById('seccion-mano-obra');
    if (seccionManoObra && seccionManoObra.style.display !== 'none') {
        const tablaManoObra = document.getElementById('excel-table-mano-obra');
        if (tablaManoObra) {
            const filasManoObra = tablaManoObra.querySelectorAll('.excel-row:not(.excel-totals-row)');
            filasManoObra.forEach(fila => {
                const celdas = fila.children;
                if (celdas.length >= 5) {
                    const costoTotal = parseFloat(celdas[4]?.textContent.replace(/[^\d.-]/g, '')) || 0;
                    totalCliente += costoTotal; // La mano de obra se agrega al precio final
                }
            });
        }
    }
    
    const ganancia = totalCliente - totalCosto;
    const margen = totalCosto > 0 ? (ganancia / totalCosto) * 100 : 0;
    
    const resumen = {
        totalCliente: totalCliente,
        totalCosto: totalCosto,
        ganancia: ganancia,
        margen: margen
    };
    
    console.log('💰 Resumen financiero calculado:', resumen);
    return resumen;
}

    `;

// Función para eliminar una fila
function eliminarFila(indice) {
    const tabla = document.getElementById('tabla-items');
    const filas = tabla.children;
    
    // No permitir eliminar si solo hay una fila de producto (más la de totales)
    if (filas.length <= 2) {
        alert('Debe mantener al menos un producto en la tabla');
        return;
    }
    
    // Encontrar la fila por el data-fila o por índice
    for (let i = 0; i < filas.length - 1; i++) { // Excluir fila de totales
        const fila = filas[i];
        if (fila.getAttribute('data-fila') == indice || i == indice) {
            fila.remove();
            break;
        }
    }
    
    // Reindexar las filas restantes
    reindexarFilas();
    
    // Recalcular totales
    recalcularTotales();
}

// Función para reindexar las filas después de eliminar
function reindexarFilas() {
    const tabla = document.getElementById('tabla-items');
    const filas = tabla.children;
    
    for (let i = 0; i < filas.length - 1; i++) { // Excluir fila de totales
        const fila = filas[i];
        fila.setAttribute('data-fila', i);
        
        // Actualizar los eventos onblur con el nuevo índice
        const celdas = fila.children;
        if (celdas[1].hasAttribute('onblur')) celdas[1].setAttribute('onblur', `manejarCambioTabla(this, ${i}, 1)`);
        if (celdas[3].hasAttribute('onblur')) celdas[3].setAttribute('onblur', `manejarCambioTabla(this, ${i}, 3)`);
        if (celdas[4].hasAttribute('onblur')) celdas[4].setAttribute('onblur', `manejarCambioTabla(this, ${i}, 4)`);
        if (celdas[7].hasAttribute('onblur')) celdas[7].setAttribute('onblur', `manejarCambioTabla(this, ${i}, 7)`);
        
        // Actualizar botón de eliminar
        const botonEliminar = celdas[11].querySelector('.delete-btn');
        if (botonEliminar) {
            botonEliminar.setAttribute('onclick', `eliminarFila(${i})`);
        }
    }
}

// Función para manejar cambios en celdas editables con formateo automático
function manejarCambioTabla(elemento, fila, columna) {
    const tipoElemento = elemento.getAttribute('data-tipo');
    let valorTexto = elemento.textContent.trim();
    
    // Aplicar formato automático según el tipo
    if (tipoElemento === 'porcentaje') {
        // Extraer solo números y punto decimal
        const numeroSolo = valorTexto.replace(/[^0-9.-]/g, '');
        const valor = parseFloat(numeroSolo) || 0;
        elemento.textContent = valor + '%';
    } else if (tipoElemento === 'precio') {
        // Extraer solo números y punto decimal
        const numeroSolo = valorTexto.replace(/[^0-9.-]/g, '');
        const valor = parseFloat(numeroSolo) || 0;
        elemento.textContent = formatearMoneda(valor);
    }
    
    const valor = parseFloat(elemento.textContent.replace(/[^0-9.-]+/g, '')) || 0;
    const tabla = document.getElementById('tabla-items');
    const filaElemento = tabla.children[fila];
    
    // Recalcular la fila con la nueva estructura
    const cantidad = parseFloat(filaElemento.children[1].textContent) || 0;
    const precioLista = parseFloat(filaElemento.children[3].textContent.replace(/[^0-9.-]+/g, '')) || 0;
    const descuentoCliente = parseFloat(filaElemento.children[4].textContent.replace('%', '')) || 0;
    const descuentoProveedor = parseFloat(filaElemento.children[7].textContent.replace('%', '')) || 0;
    
    const precioUnitario = precioLista * (1 - descuentoCliente / 100);
    const totalCliente = precioUnitario * cantidad;
    const costoUnitario = precioLista * (1 - descuentoProveedor / 100);
    const totalCosto = costoUnitario * cantidad;
    const ganancia = totalCliente - totalCosto;
    
    // Actualizar valores calculados
    filaElemento.children[5].textContent = formatearPesos(precioUnitario); // Precio Unitario
    filaElemento.children[6].textContent = formatearPesos(totalCliente);   // Total Cliente
    filaElemento.children[8].textContent = formatearPesos(costoUnitario);  // Costo Unitario
    filaElemento.children[9].textContent = formatearPesos(totalCosto);     // Total Costo
    filaElemento.children[10].textContent = formatearPesos(ganancia);      // Ganancia
    
    // Recalcular totales
    recalcularTotales();
}

let volumetriaConfig = { cantidadNodos: 1 };
let monedaActual = 'USD'; // Moneda por defecto

// Función para recalcular totales de la tabla y actualizar el resumen
function recalcularTotales() {
    const tabla = document.getElementById('tabla-items');
    let totalCliente = 0;
    let totalCosto = 0;
    
    if (!tabla) return;

    // Sumar todas las filas (excepto la última que es de totales)
    for (let i = 0; i < tabla.children.length - 1; i++) {
        const fila = tabla.children[i];
        const totalClienteFila = parseFloat(fila.children[6].textContent.replace(/[^0-9.-]+/g, '')) || 0;
        const totalCostoFila = parseFloat(fila.children[9].textContent.replace(/[^0-9.-]+/g, '')) || 0;
        
        totalCliente += totalClienteFila;
        totalCosto += totalCostoFila;
    }
    
    const gananciaTotalFila = totalCliente - totalCosto;
    
    // Actualizar fila de totales
    const filaTotales = tabla.children[tabla.children.length - 1];
    if (filaTotales && filaTotales.children.length > 10) {
        filaTotales.children[5].textContent = formatearMoneda(totalCliente);
        filaTotales.children[9].textContent = formatearMoneda(totalCosto);
        filaTotales.children[10].textContent = formatearMoneda(gananciaTotalFila);
    }
    
    // Actualizar el resumen completo
    actualizarResumen(totalCliente, totalCosto);
    
    // Actualizar total en el pie de página del nuevo workspace
    updateFooterTotal(totalCliente);
}

// Función para actualizar el resumen con nuevos totales
function actualizarResumen(totalCliente, totalCosto) {
    const cantidadNodos = volumetriaConfig.cantidadNodos || 1;
    const gananciaTotal = totalCliente - totalCosto;
    const margenUtilidad = totalCosto > 0 ? (gananciaTotal / totalCosto) * 100 : 0;
    const costoPorNodo = totalCosto / cantidadNodos;
    const precioPorNodo = totalCliente / cantidadNodos;
    const utilidadPorNodo = gananciaTotal / cantidadNodos;

    // Actualizar Costos
    document.getElementById('subtotal-display').textContent = formatearMoneda(totalCliente);
    const ivaSelect = document.getElementById('iva-select');
    const porcentajeIva = parseFloat(ivaSelect.value) / 100;
    const montoIvaCalculado = totalCliente * porcentajeIva;
    document.getElementById('monto-iva').textContent = formatearMoneda(montoIvaCalculado);
    document.getElementById('total-cliente').textContent = formatearMoneda(totalCliente + montoIvaCalculado);

    // Actualizar Rentabilidad
    document.getElementById('ganancia-display').textContent = formatearMoneda(gananciaTotal);
    document.getElementById('margen-utilidad-display').textContent = `${margenUtilidad.toFixed(1)}%`;
    document.getElementById('costo-nodo-display').textContent = formatearMoneda(costoPorNodo);
    document.getElementById('precio-nodo-display').textContent = formatearMoneda(precioPorNodo);
    document.getElementById('utilidad-nodo-display').textContent = formatearMoneda(utilidadPorNodo);

    // Actualizar Estado del Proyecto
    const estadoDisplay = document.getElementById('estado-proyecto-display');
    let estadoClase = 'bg-red-600 text-white';
    let estadoTexto = 'Revisar';
    if (margenUtilidad >= 30) {
        estadoClase = 'bg-green-600 text-white';
        estadoTexto = 'Excelente';
    } else if (margenUtilidad >= 15) {
        estadoClase = 'bg-yellow-600 text-white';
        estadoTexto = 'Aceptable';
    }
    estadoDisplay.className = `px-3 py-1 rounded-lg text-sm font-medium ${estadoClase}`;
    estadoDisplay.textContent = estadoTexto;
}

// Función para crear cotización automática desde volumetría
function crearCotizacionAutomatica(datosVolumetria) {
    console.log('DEBUG: Iniciando creación automática de cotización desde volumetría');
    console.log('DEBUG: Datos de volumetría:', datosVolumetria);
    
    if (!datosVolumetria.oportunidadId) {
        console.log('WARNING: No hay oportunidad ID, no se puede crear cotización automática');
        return;
    }
    
    // Extraer datos de la tabla para la cotización
    const items = obtenerItemsTabla();
    if (!items || items.length === 0) {
        console.log('ERROR: No hay items en la tabla para crear cotización');
        return;
    }
    
    // Transformar items de volumetría a formato de cotización
    const itemsCotizacion = items.map(item => {
        return {
            numero_parte: item.numero_parte || '',
            descripcion: item.descripcion || '',
            cantidad: parseInt(item.cantidad) || 1,
            precio_cliente: parseFloat(item.precio_cliente) || 0,
            descuento_cliente: parseFloat(item.descuento_cliente) || 0,
            total: parseFloat(item.precio_final_cliente) || 0
        };
    });
    
    // Preparar datos para la cotización
    const datosCotizacion = {
        // Información básica
        nombreVolumetria: datosVolumetria.nombreVolumetria || 'Volumetría',
        titulo_cotizacion: `Cotización - ${datosVolumetria.nombreVolumetria || 'Volumetría'}`,
        cliente_id: datosVolumetria.clienteId,
        oportunidadId: datosVolumetria.oportunidadId,  // Corregido: usar oportunidadId como espera la vista
        usuarioFinal: datosVolumetria.usuarioFinal,
        
        // Items de la cotización (sin costos internos)
        items: itemsCotizacion,
        
        // Metadatos
        generada_desde_volumetria: true,
        volumetria_nombre: datosVolumetria.nombreVolumetria,
        
        // Usar moneda actual de la volumetría
        moneda: monedaActual || 'USD'
    };
    
    console.log('DEBUG: Datos de cotización preparados:', datosCotizacion);
    
    // Enviar petición para crear cotización automática
    fetch('/app/api/crear-cotizacion-desde-volumetria/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify(datosCotizacion)
    })
    .then(response => response.json())
    .then(data => {
        console.log('DEBUG: Respuesta de creación de cotización:', data);
        
        if (data.success) {
            console.log('SUCCESS: Cotización creada automáticamente:', data.cotizacion_nombre);
            
            // Mostrar notificación de éxito
            if (typeof Swal !== 'undefined') {
                const bitrixStatus = data.bitrix_comentario ? 
                    '<p style="color: #32D74B;">✅ PDF adjuntado en Bitrix24</p>' : 
                    '<p style="color: #FF9500;">⚠️ No se pudo adjuntar en Bitrix24</p>';
                    
                Swal.fire({
                    title: '¡Cotización Creada!',
                    html: `
                        <p>Se ha generado automáticamente la cotización:</p>
                        <strong>${data.cotizacion_nombre}</strong>
                        <br><br>
                        <p>Total: $${data.total_cotizacion?.toFixed(2) || '0.00'} ${datosCotizacion.moneda}</p>
                        <br>
                        ${bitrixStatus}
                    `,
                    icon: 'success',
                    confirmButtonText: 'Perfecto',
                    confirmButtonColor: '#007aff'
                });
            }
        } else {
            console.error('ERROR: Error creando cotización automática:', data.error);
            
            if (typeof Swal !== 'undefined') {
                Swal.fire({
                    title: 'Error en Cotización',
                    text: `No se pudo crear la cotización automática: ${data.error}`,
                    icon: 'warning',
                    confirmButtonText: 'Entendido',
                    confirmButtonColor: '#ff9500'
                });
            }
        }
    })
    .catch(error => {
        console.error('ERROR: Excepción creando cotización automática:', error);
        
        if (typeof Swal !== 'undefined') {
            Swal.fire({
                title: 'Error de Conexión',
                text: 'No se pudo conectar con el servidor para crear la cotización automática',
                icon: 'error',
                confirmButtonText: 'Entendido',
                confirmButtonColor: '#ff3b30'
            });
        }
    });
}

// Variable global para almacenar datos de clientes con categorías
let clientesDataGlobal = [];

function populateClientSelectGeneral() {
    const clientSelect = document.getElementById('cliente-general');
    if (!clientSelect) return;
    
    fetch('/app/api/clients-for-user/')
        .then(response => response.json())
        .then(data => {
            // Almacenar datos de clientes globalmente para usar en cálculos
            clientesDataGlobal = data;
            
            clientSelect.innerHTML = '<option value="">-- Seleccione un cliente --</option>';
            data.forEach(client => {
                const option = document.createElement('option');
                option.value = client.id;
                option.textContent = `${client.nombre_empresa} (Categoría ${client.categoria} - ${client.porcentaje_utilidad}% utilidad)`;
                option.setAttribute('data-categoria', client.categoria);
                option.setAttribute('data-porcentaje', client.porcentaje_utilidad);
                clientSelect.appendChild(option);
            });
        })
        .catch(error => console.error('Error loading clients:', error));
}

function setupOpportunityChangeListenerGeneral() {
    const clientSelect = document.getElementById('cliente-general');
    const opportunitySelect = document.getElementById('oportunidad-general');
    
    if (!clientSelect || !opportunitySelect) return;
    
    // Event listener para cambios en la selección de cliente
    clientSelect.addEventListener('change', function() {
        const clienteId = this.value;
        
        opportunitySelect.innerHTML = '<option value="">-- Seleccione una oportunidad --</option>';
        
        if (!clienteId) return;
        
        // Cargar oportunidades del cliente
        fetch(`/app/api/get-opportunities-by-client/${clienteId}/`)
            .then(response => response.json())
            .then(data => {
                data.forEach(opportunity => {
                    const option = document.createElement('option');
                    option.value = opportunity.id;
                    option.textContent = opportunity.oportunidad;
                    opportunitySelect.appendChild(option);
                });
            })
            .catch(error => console.error('Error loading opportunities:', error));
        
        // Recalcular todas las filas con el nuevo porcentaje de utilidad del cliente
        console.log('🔄 Cliente cambiado, recalculando filas con nuevo porcentaje de utilidad...');
        setTimeout(() => {
            const table = document.getElementById('excel-table-general');
            if (table) {
                const rows = table.querySelectorAll('.excel-row');
                rows.forEach((row, index) => {
                    recalcularFilaExcelGeneral(index);
                });
                console.log(`✅ ${rows.length} filas recalculadas con nueva categoría de cliente`);
            }
        }, 200);
    });
    
    // NUEVO: Event listener para auto-detectar cliente cuando se selecciona oportunidad
    opportunitySelect.addEventListener('change', function() {
        const oportunidadId = this.value;
        
        if (!oportunidadId) return;
        
        console.log('🔍 Oportunidad seleccionada, auto-detectando cliente...');
        
        // Obtener datos del cliente de la oportunidad seleccionada
        fetch(`/app/api/get-client-by-opportunity/${oportunidadId}/`)
            .then(response => response.json())
            .then(clienteData => {
                if (clienteData.error) {
                    console.error('Error:', clienteData.error);
                    return;
                }
                
                // Auto-seleccionar el cliente
                clientSelect.value = clienteData.id;
                
                // Actualizar datos globales del cliente
                const clienteExistente = clientesDataGlobal.find(c => c.id === clienteData.id);
                if (clienteExistente) {
                    clienteExistente.categoria = clienteData.categoria;
                    clienteExistente.porcentaje_utilidad = clienteData.porcentaje_utilidad;
                }
                
                console.log(`✅ Cliente auto-detectado: ${clienteData.nombre_empresa} (Categoría ${clienteData.categoria} - ${clienteData.porcentaje_utilidad}% utilidad)`);
                
                // Recalcular todas las filas con el nuevo cliente
                setTimeout(() => {
                    const table = document.getElementById('excel-table-general');
                    if (table) {
                        const rows = table.querySelectorAll('.excel-row');
                        rows.forEach((row, index) => {
                            recalcularFilaExcelGeneral(index);
                        });
                        console.log(`🔄 ${rows.length} filas recalculadas con cliente auto-detectado`);
                    }
                }, 200);
            })
            .catch(error => {
                console.error('Error auto-detectando cliente:', error);
            });
    });
}

function eliminarElemento(elementId) {
    const element = document.getElementById(elementId);

function calcularLineaEquipamiento(counter) {
    const cantidad = parseFloat(document.querySelector(`input[name="equipamiento_cantidad_${counter}"]`).value) || 0;
    const precio = parseFloat(document.querySelector(`input[name="equipamiento_precio_${counter}"]`).value) || 0;
    const descuento = parseFloat(document.querySelector(`input[name="equipamiento_descuento_${counter}"]`).value) || 0;
    
    const precioConDescuento = precio * (1 - descuento / 100);
    const total = cantidad * precioConDescuento;
    
    document.getElementById(`equipamiento_precio_unitario_${counter}`).value = precioConDescuento.toFixed(2);
    document.getElementById(`equipamiento_total_${counter}`).value = total.toFixed(2);
    
    calcularTotales();
}

}

function calcularTotales() {
    let totalEquipamiento = 0;
    let totalManoObra = 0;
    let totalCostos = 0;
    let gananciaTotal = 0;
    
    // Sumar equipamiento
    for (let i = 1; i <= equipamientoCounter; i++) {
        const element = document.getElementById(`equipamiento_total_${i}`);
        if (element) {
            totalEquipamiento += parseFloat(element.value) || 0;
            
            // Calcular ganancia del equipamiento
            const cantidad = parseFloat(document.querySelector(`input[name="equipamiento_cantidad_${i}"]`)?.value) || 0;
            const precio = parseFloat(document.querySelector(`input[name="equipamiento_precio_${i}"]`)?.value) || 0;
            const gananciaPorc = parseFloat(document.querySelector(`input[name="equipamiento_ganancia_${i}"]`)?.value) || 0;
            const descuento = parseFloat(document.querySelector(`input[name="equipamiento_descuento_${i}"]`)?.value) || 0;
            
            const precioConDescuento = precio * (1 - descuento / 100);
            const costoReal = precioConDescuento * (1 - gananciaPorc / 100);
            const gananciaMaterial = (precioConDescuento - costoReal) * cantidad;
            
            gananciaTotal += gananciaMaterial;
        }
    }
    
    // Sumar mano de obra
    for (let i = 1; i <= manoObraCounter; i++) {
        const element = document.getElementById(`mano_obra_total_${i}`);
        if (element) {
            totalManoObra += parseFloat(element.value) || 0;
        }
    }
    
    // Sumar costos operativos
    for (let i = 1; i <= costosOperativosCounter; i++) {
        const element = document.getElementById(`costo_total_${i}`);
        if (element) {
            totalCostos += parseFloat(element.value) || 0;
        }
    }
    
    const subtotal = totalEquipamiento + totalManoObra + totalCostos;
    const iva = subtotal * 0.08; // 8% IVA
    const total = subtotal + iva;
    
    // Actualizar campos
    document.getElementById('precio-lista-total').value = totalEquipamiento.toFixed(2);
    document.getElementById('sub-total').value = subtotal.toFixed(2);
    document.getElementById('iva-total').value = iva.toFixed(2);
    document.getElementById('precio-bajanet').value = (totalEquipamiento - gananciaTotal).toFixed(2);
    document.getElementById('ganancia-material').value = gananciaTotal.toFixed(2);
    document.getElementById('total-final').value = total.toFixed(2);
}

/**

 */
async function buscarProductoEnCatalogo(numeroParte) {
    if (!numeroParte || numeroParte.trim() === '') {
        return null;
    }
    
    try {
        const response = await fetch('/app/api/buscar-producto-catalogo/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                numero_parte: numeroParte.trim()
            })
        });
        
        const data = await response.json();
        
        if (data.success && data.producto) {
            return data.producto;
        }
        
        return null;
    } catch (error) {
        console.error('Error buscando producto:', error);
        return null;
    }
}

// Adaptado del sistema de cotizaciones automáticas
let searchTimeouts = {}; // Para debounce
const productosCache = {}; // Cache para productos

// Función para obtener sugerencias de productos de volumetría
async function getVolumetriaProductos(query = '') {
    console.log('⚙️ Configurando autocompletado para:', campoId);
    const campo = document.getElementById(campoId);
    if (!campo) {
        console.error('❌ Campo no encontrado:', campoId);
        return;
    }
    console.log('✅ Campo encontrado:', campo);
    
    // Crear elementos del autocompletado
    const contenedor = document.createElement('div');
    contenedor.className = 'autocomplete-container';
    contenedor.style.position = 'relative';
    contenedor.style.display = 'inline-block';
    contenedor.style.width = '100%';
    
    const dropdown = document.createElement('div');
    dropdown.className = 'autocomplete-dropdown';
    dropdown.style.display = 'none';
    
    // Insertar contenedor alrededor del campo
    campo.parentNode.insertBefore(contenedor, campo);
    contenedor.appendChild(campo);
    contenedor.appendChild(dropdown);
    
    let timeout;
    let selectedIndex = -1;
    
    // Función para obtener sugerencias
    async function obtenerSugerencias(query) {
        if (query.length < 2) return [];
        
        try {
            console.log('🔍 Buscando sugerencias para:', query);
            const url = `/app/api/sugerencias-productos/?q=${encodeURIComponent(query)}&limit=8`;
            console.log('📡 URL de solicitud:', url);
            
            const response = await fetch(url);
            console.log('🌐 Respuesta HTTP status:', response.status);
            
            const data = await response.json();
            console.log('📦 Respuesta completa del servidor:', JSON.stringify(data, null, 2));
            
            if (data.success && data.sugerencias) {
                console.log(`✅ ${data.sugerencias.length} sugerencias encontradas`);
                return data.sugerencias;
            } else {
                console.log('❌ No hay sugerencias o error:', data);
                return [];
            }
        } catch (error) {
            console.error('💥 Error obteniendo sugerencias:', error);
            return [];
        }
    }
    
    // Función para mostrar sugerencias
    function mostrarSugerencias(sugerencias) {
        console.log('📋 mostrarSugerencias llamada con:', sugerencias?.length || 0, 'elementos');
        if (sugerencias.length === 0) {
            console.log('❌ No hay sugerencias, ocultando dropdown');
            dropdown.style.display = 'none';
            return;
        }
        
        console.log('✅ Mostrando', sugerencias.length, 'sugerencias en dropdown');
        dropdown.innerHTML = '';
        dropdown.style.display = 'block';
        selectedIndex = -1;
        
        sugerencias.forEach((producto, index) => {
            const item = document.createElement('div');
            item.className = 'autocomplete-item';
            item.innerHTML = `
                <div class="autocomplete-item-content">
                    <div class="autocomplete-parte">${producto.numero_parte}</div>
                    <div class="autocomplete-desc">${producto.descripcion}</div>
                    <div class="autocomplete-meta">
                        <span class="autocomplete-marca">${producto.marca}</span>
                        ${producto.categoria ? `<span class="autocomplete-categoria">${producto.categoria}</span>` : ''}
                        <span class="autocomplete-precio">$${producto.precio_proveedor.toFixed(2)}</span>
                    </div>
                </div>
            `;
            
            item.addEventListener('click', () => seleccionarProducto(producto));
            item.addEventListener('mouseenter', () => {
                selectedIndex = index;
                actualizarSeleccion();
            });
            
            dropdown.appendChild(item);
        });
    }
    
    // Función para seleccionar un producto
    function seleccionarProducto(producto) {
        campo.value = producto.numero_parte;
        
        // Actualizar campos relacionados
        if (descripcionId) {
            const campoDescripcion = document.getElementById(descripcionId);
            if (campoDescripcion) {
                campoDescripcion.value = producto.descripcion;
            }
        }
        
        if (precioId) {
            const campoPrecio = document.getElementById(precioId);
            if (campoPrecio) {
                campoPrecio.value = producto.precio_proveedor || '0.00';
            }
        }
        
        // Estilo visual de éxito
        campo.style.borderColor = '#10B981';
        campo.title = `Producto: ${producto.descripcion}`;
        
        dropdown.style.display = 'none';
        selectedIndex = -1;
    }
    
    // Función para actualizar la selección visual
    function actualizarSeleccion() {
        const items = dropdown.querySelectorAll('.autocomplete-item');
        items.forEach((item, index) => {
            item.classList.toggle('selected', index === selectedIndex);
        });
    }
    
    // Evento de input para buscar sugerencias
    campo.addEventListener('input', function() {
        const query = this.value.trim();
        console.log('⌨️ Usuario escribió en', campoId + ':', query);
        
        clearTimeout(timeout);
        
        if (query.length < 2) {
            console.log('🔤 Texto muy corto, ocultando dropdown');
            dropdown.style.display = 'none';
            campo.style.borderColor = '';
            campo.title = '';
            return;
        }
        
        console.log('⏱️ Esperando 300ms antes de buscar para:', query);
        timeout = setTimeout(async () => {
            console.log('🚀 EJECUTANDO búsqueda para:', query);
            const sugerencias = await obtenerSugerencias(query);
            console.log('🎯 RESULTADO sugerencias:', sugerencias?.length || 0, 'elementos');
            mostrarSugerencias(sugerencias);
        }, 300);
    });
    
    // Navegación con teclado
    campo.addEventListener('keydown', function(e) {
        const items = dropdown.querySelectorAll('.autocomplete-item');
        
        if (items.length === 0) return;
        
        switch(e.key) {
            case 'ArrowDown':
                e.preventDefault();
                selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                actualizarSeleccion();
                break;
                
            case 'ArrowUp':
                e.preventDefault();
                selectedIndex = Math.max(selectedIndex - 1, -1);
                actualizarSeleccion();
                break;
                
            case 'Enter':
                if (selectedIndex >= 0) {
                    e.preventDefault();
                    const productoData = obtenerDatosProductoDeItem(items[selectedIndex]);
                    if (productoData) {
                        seleccionarProducto(productoData);
                    }
                }
                break;
                
            case 'Escape':
                dropdown.style.display = 'none';
                selectedIndex = -1;
                break;
        }
    });
    
    // Cerrar dropdown cuando se hace clic fuera
    document.addEventListener('click', function(e) {
        if (!contenedor.contains(e.target)) {
            dropdown.style.display = 'none';
            selectedIndex = -1;
        }
    });
    
    // Función auxiliar para obtener datos del producto desde el item del DOM
    function obtenerDatosProductoDeItem(item) {
        const parteEl = item.querySelector('.autocomplete-parte');
        const descEl = item.querySelector('.autocomplete-desc');
        const marcaEl = item.querySelector('.autocomplete-marca');
        const categoriaEl = item.querySelector('.autocomplete-categoria');
        const precioEl = item.querySelector('.autocomplete-precio');
        
        if (!parteEl || !descEl) return null;
        
        return {
            numero_parte: parteEl.textContent,
            descripcion: descEl.textContent,
            marca: marcaEl ? marcaEl.textContent : '',
            categoria: categoriaEl ? categoriaEl.textContent : '',
            precio_proveedor: precioEl ? parseFloat(precioEl.textContent.replace('$', '')) : 0
        };
    }
}

/**
 * Función auxiliar para obtener el token CSRF
 */
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Función para obtener sugerencias de productos de volumetría
async function getVolumetriaProductos(query = '') {
    const cacheKey = `volumetria_${query}`;
    
    // Verificar caché primero
    if (productosCache[cacheKey]) {
        console.log(`Using cached results for ${cacheKey}`);
        return productosCache[cacheKey];
    }
    
    try {
        const url = `/app/api/sugerencias-productos/?q=${encodeURIComponent(query)}&limit=10`;
        console.log(`🔍 Fetching from API: ${url}`);
        
        const response = await fetch(url);
        console.log(`🌐 API response status: ${response.status}`);
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        const data = await response.json();
        console.log('📦 Raw API response:', data);
        
        if (data.success && data.sugerencias) {
            // Formatear productos para compatibilidad
            const productos = data.sugerencias.map(producto => ({
                noParte: producto.numero_parte,
                descripcion: producto.descripcion,
                precio: producto.precio_proveedor || producto.precio_lista || 0
            }));
            
            console.log(`✅ Formatted ${productos.length} products for volumetria`);
            
            // Guardar en caché
            productosCache[cacheKey] = productos;
            
            return productos;
        } else {
            console.log('❌ No success or no sugerencias:', data);
            return [];
        }
    } catch (error) {
        console.error('💥 Error al obtener productos:', error);
        throw error;
    }
}

// Función de navegación con teclado
function onVolumetriaKeydown(event, fieldId) {
    const suggestionsContainer = document.getElementById(`suggestions_${fieldId}`);
    const suggestions = suggestionsContainer.querySelectorAll('.autocomplete-suggestion');
    
    if (suggestions.length === 0) return;
    
    let selectedIndex = Array.from(suggestions).findIndex(s => s.classList.contains('selected'));
    
    if (event.key === 'ArrowDown') {
        event.preventDefault();
        if (selectedIndex >= 0) suggestions[selectedIndex].classList.remove('selected');
        selectedIndex = (selectedIndex + 1) % suggestions.length;
        suggestions[selectedIndex].classList.add('selected');
        suggestions[selectedIndex].style.backgroundColor = 'var(--apple-background-tertiary)';
    } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        if (selectedIndex >= 0) {
            suggestions[selectedIndex].classList.remove('selected');
            suggestions[selectedIndex].style.backgroundColor = '';
        }
        selectedIndex = selectedIndex <= 0 ? suggestions.length - 1 : selectedIndex - 1;
        suggestions[selectedIndex].classList.add('selected');
        suggestions[selectedIndex].style.backgroundColor = 'var(--apple-background-tertiary)';
    } else if (event.key === 'Enter' && selectedIndex >= 0) {
        event.preventDefault();
        suggestions[selectedIndex].click();
    } else if (event.key === 'Escape') {
        suggestionsContainer.style.display = 'none';
    }
}

// Función para recalcular una fila cuando se edita
function recalcularFilaExcel(rowIndex) {
    console.log(`🧮 Recalculando fila Excel ${rowIndex}`);
    
    const row = document.querySelector(`[data-row="${rowIndex}"]`);
    if (!row) return;

    // Verificar si se cambió el número de parte para auto-completar
    const numeroParteCell = row.querySelector('[data-field="noParte"]');
    if (numeroParteCell && numeroParteCell.textContent.trim()) {
        const numeroParte = numeroParteCell.textContent.trim();
        
        // Solo buscar si no se ha marcado como ya procesado
        if (!numeroParteCell.hasAttribute('data-processed')) {
            console.log(`🔍 Buscando producto: ${numeroParte}`);
            buscarYCompletarProducto(rowIndex, numeroParte);
            numeroParteCell.setAttribute('data-processed', 'true');
            return; // Salir aquí, la función buscarYCompletarProducto se encargará del recálculo
        }
    }
    
    // Obtener valores de la fila para cálculos normales
    const cantidad = parseFloat(row.querySelector('[data-field="cantidad"]').textContent) || 0;
    const precioLista = parseCurrency(row.querySelector('[data-field="precioLista"]').textContent) || 0;
    const descuentoCliente = parseFloat(row.querySelector('[data-field="descuentoCliente"]').textContent.replace('%', '')) || 0;
    const descuentoProveedor = parseFloat(row.querySelector('[data-field="descuentoProveedor"]').textContent.replace('%', '')) || 0;
    
    // Calcular valores
    const precioUnitario = precioLista * (1 - descuentoCliente / 100);
    const totalCliente = precioUnitario * cantidad;
    const costoUnitario = precioLista * (1 - descuentoProveedor / 100);
    const totalCosto = costoUnitario * cantidad;
    const ganancia = totalCliente - totalCosto;
    
    // Actualizar celdas calculadas
    const cells = row.children;
    cells[5].textContent = formatearMoneda(precioUnitario); // P. Unitario
    cells[6].textContent = formatearMoneda(totalCliente);   // Total Cliente
    cells[8].textContent = formatearMoneda(costoUnitario);  // Costo Unitario
    cells[9].textContent = formatearMoneda(totalCosto);     // Total Costo
    cells[10].textContent = formatearMoneda(ganancia);      // Ganancia
    
    // Recalcular totales
    recalcularTotalesExcel();
}

// Función para buscar producto en catálogo y completar datos automáticamente
function buscarYCompletarProducto(rowIndex, numeroParte) {
    console.log(`🔍 Buscando producto en catálogo: ${numeroParte}`);
    
    const row = document.querySelector(`[data-row="${rowIndex}"]`);
    if (!row) return;
    
    // Mostrar indicador de carga en la fila
    const descripcionCell = row.querySelector('[data-field="descripcion"]');
    if (descripcionCell) {
        descripcionCell.textContent = '🔍 Buscando...';
        descripcionCell.style.fontStyle = 'italic';
        descripcionCell.style.opacity = '0.7';
    }
    
    // Hacer llamada AJAX al endpoint
    fetch(`/app/api/buscar-producto-por-numero-parte/?numero_parte=${encodeURIComponent(numeroParte)}`, {
        method: 'GET',
        headers: {
            'X-Requested-With': 'XMLHttpRequest',
            'Content-Type': 'application/json',
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success && data.found) {
            const producto = data.producto;
            console.log('✅ Producto encontrado:', producto);
            
            // Completar campos automáticamente
            const descripcionCell = row.querySelector('[data-field="descripcion"]');
            const precioListaCell = row.querySelector('[data-field="precioLista"]');
            const descuentoProveedorCell = row.querySelector('[data-field="descuentoProveedor"]');
            
            if (descripcionCell) {
                descripcionCell.textContent = producto.descripcion;
                descripcionCell.style.fontStyle = 'normal';
                descripcionCell.style.opacity = '1';
            }
            
            if (precioListaCell) {
                precioListaCell.textContent = formatearMoneda(producto.precio_unitario);
            }
            
            // Calcular descuento del proveedor basado en precios
            if (descuentoProveedorCell && producto.precio_unitario > 0) {
                const descuentoProveedor = ((producto.precio_unitario - producto.precio_proveedor) / producto.precio_unitario * 100);
                descuentoProveedorCell.textContent = descuentoProveedor.toFixed(2) + '%';
            }
            
            console.log(`✅ Datos completados automáticamente para ${numeroParte}`);
            
            // Recalcular la fila después de completar los datos
            setTimeout(() => {
                recalcularFilaExcel(rowIndex);
            }, 100);
            
        } else {
            console.log(`❌ Producto no encontrado: ${numeroParte}`);
            
            // Resetear indicador de carga
            if (descripcionCell) {
                descripcionCell.textContent = 'Producto no encontrado en catálogo';
                descripcionCell.style.fontStyle = 'italic';
                descripcionCell.style.opacity = '0.6';
                descripcionCell.style.color = '#ff6b6b';
            }
        }
    })
    .catch(error => {
        console.error('❌ Error buscando producto:', error);
        
        // Mostrar error en la descripción
        if (descripcionCell) {
            descripcionCell.textContent = 'Error buscando producto';
            descripcionCell.style.fontStyle = 'italic';
            descripcionCell.style.opacity = '0.6';
            descripcionCell.style.color = '#ff6b6b';
        }
    });
}

// Función para agregar listeners de auto-completado a celdas de número de parte
function agregarListenersAutoCompletado() {
    console.log('🔧 Agregando listeners para auto-completado');

    const numeroParteCells = document.querySelectorAll('[data-field="noParte"]');

// Función para agregar listeners de pegado tipo Excel
function agregarListenersPegadoExcel() {
    console.log('📋 Agregando listeners de pegado tipo Excel');
    
    // Buscar todas las celdas editables, EXCEPTO las de totales
    const celdasEditables = document.querySelectorAll('[contenteditable="true"]:not(.excel-totals-row [contenteditable])');
    
    celdasEditables.forEach(celda => {
        // Verificar que no esté en fila de totales
        const enFilaTotales = celda.closest('.excel-totals-row');
        if (enFilaTotales) return;
        
        // Remover listeners existentes
        celda.removeEventListener('paste', manejarPegadoExcel);
        celda.removeEventListener('input', manejarCambiosCelda);
        
        // Agregar listeners
        celda.addEventListener('paste', manejarPegadoExcel);
        celda.addEventListener('input', manejarCambiosCelda);
    });
}

// Función para manejar pegado tipo Excel
function manejarPegadoExcel(event) {
    event.preventDefault();
    console.log('📋 Detectado pegado tipo Excel');
    
    const clipboardData = event.clipboardData || window.clipboardData;
    const data = clipboardData.getData('text/plain');
    
    if (!data) return;
    
    // Dividir datos por filas y columnas (formato Excel)
    const filas = data.split('\n').map(fila => fila.split('\t'));
    console.log('📊 Datos de pegado parseados:', filas);
    
    const celdaInicial = event.target;
    const filaInicial = parseInt(celdaInicial.getAttribute('data-row'));
    const columnaInicial = obtenerIndiceColumna(celdaInicial);
    
    console.log('📍 Posición inicial:', { fila: filaInicial, columna: columnaInicial });
    
    // Pegar datos en la tabla
    filas.forEach((filaDatos, indiceFilaRelativo) => {
        const filaDestino = filaInicial + indiceFilaRelativo;
        
        // Crear nueva fila si no existe
        if (indiceFilaRelativo > 0) {
            asegurarFilaExiste(filaDestino);
        }
        
        filaDatos.forEach((valorCelda, indiceColumnaRelativo) => {
            const columnaDestino = columnaInicial + indiceColumnaRelativo;
            const celdaDestino = obtenerCeldaPorPosicion(filaDestino, columnaDestino);
            
            if (celdaDestino && celdaDestino.hasAttribute('contenteditable')) {
                celdaDestino.textContent = valorCelda.trim();
                console.log(`📝 Pegado en [${filaDestino}, ${columnaDestino}]: ${valorCelda}`);
                
                // Recalcular fila después del pegado
                setTimeout(() => {
                    recalcularFilaExcel(filaDestino);
                }, 50);
            }
        });
    });
    
    console.log('✅ Pegado tipo Excel completado');
}

// Función para obtener índice de columna de una celda
function obtenerIndiceColumna(celda) {
    const fila = celda.parentNode;
    const celdas = Array.from(fila.children);
    return celdas.indexOf(celda);
}

// Función para obtener celda por posición
function obtenerCeldaPorPosicion(fila, columna) {
    const filaElement = document.querySelector(`[data-row="${fila}"]`);
    if (!filaElement) return null;
    
    const celdas = filaElement.children;
    return celdas[columna] || null;
}

// Función para asegurar que existe una fila
function asegurarFilaExiste(indiceFilaRequerido) {
    const filaExistente = document.querySelector(`[data-row="${indiceFilaRequerido}"]`);
    if (filaExistente) return;
    
    // Crear nuevas filas hasta llegar al índice requerido
    const tbody = document.getElementById('excel-tbody-general') || document.getElementById('excel-tbody-nodos');
    if (!tbody) return;
    
    const filasActuales = tbody.querySelectorAll('.excel-row').length;
    
    for (let i = filasActuales; i <= indiceFilaRequerido; i++) {
        // Usar la función de agregar fila apropiada
        if (document.getElementById('excel-tbody-general')) {
            agregarFilaExcelGeneral();
        } else {
            agregarFilaExcel();
        }
        console.log(`➕ Fila ${i} creada automáticamente para pegado`);
    }
}

// Función para manejar cambios en celdas y recalcular automáticamente
function manejarCambiosCelda(event) {
    const celda = event.target;
    const fila = parseInt(celda.getAttribute('data-row'));
    const campo = celda.getAttribute('data-field');
    
    // Solo recalcular para campos que afectan cálculos
    const camposCalculables = ['cantidad', 'precioLista', 'descuentoCliente', 'descuentoProveedor', 'costoUnitario'];
    
    if (camposCalculables.includes(campo)) {
        console.log(`🧮 Recalculando por cambio en ${campo} fila ${fila}`);
        
        // Delayed recalc para permitir que el cambio se complete
        setTimeout(() => {
            if (document.getElementById('excel-tbody-general')) {
                recalcularFilaExcelGeneral(fila);
            } else {
                recalcularFilaExcel(fila);
            }
        }, 100);
    }
}

// Función para recalcular totales de la tabla Excel
function recalcularTotalesExcel() {
    const table = document.getElementById('excel-table-nodos');
    if (!table) return;
    
    let totalCliente = 0;
    let totalCosto = 0;
    
    // Sumar todos los totales de las filas
    const rows = table.querySelectorAll('.excel-row');
    rows.forEach(row => {
        const totalClienteCell = row.children[6];
        const totalCostoCell = row.children[9];
        
        totalCliente += parseCurrency(totalClienteCell.textContent) || 0;
        totalCosto += parseCurrency(totalCostoCell.textContent) || 0;
    });
    
    const gananciaTotal = totalCliente - totalCosto;
    
    // Actualizar fila de totales
    const totalsRow = table.querySelector('.excel-totals-row');
    if (totalsRow) {
        totalsRow.children[6].textContent = formatearMoneda(totalCliente);   // Total Cliente
        totalsRow.children[9].textContent = formatearMoneda(totalCosto);     // Total Costo
        totalsRow.children[10].textContent = formatearMoneda(gananciaTotal); // Ganancia
    }
    
    // Actualizar resumen consolidado
    setTimeout(() => {
        actualizarResumenConsolidado();
    }, 100);
}

// Función para eliminar una fila Excel
function eliminarFilaExcel(rowIndex) {
    const row = document.querySelector(`[data-row="${rowIndex}"]`);
    if (row) {

        row.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';

// Función para encontrar la primera fila vacía
function encontrarPrimeraFilaVacia() {
    const filas = document.querySelectorAll('.excel-row');
    
    for (let i = 0; i < filas.length; i++) {
        const noParte = filas[i].querySelector('[data-field="noParte"]');
        if (noParte && noParte.textContent.trim() === '') {
            return i;
        }
    }
    
    return null; // No hay filas vacías
}

// Función para llenar una fila con un producto
function llenarFilaConProducto(rowIndex, producto) {
    const row = document.querySelector(`[data-row="${rowIndex}"]`);
    if (!row) {
        console.error(`❌ No se encontró fila ${rowIndex}`);
        return;
    }
    
    // Llenar campos
    const campos = {
        'noParte': producto.noParte,
        'cantidad': producto.cantidad,
        'descripcion': producto.descripcion,
        'precioLista': `$${producto.precioLista.toFixed(2)}`,
        'marca': producto.marca
    };
    
    Object.entries(campos).forEach(([field, value]) => {
        const celda = row.querySelector(`[data-field="${field}"]`);
        if (celda) {
            celda.textContent = value;
            
            // Animación de llenado
            celda.style.background = 'rgba(76, 175, 80, 0.3)';
            celda.style.transition = 'all 0.3s ease';
            
            setTimeout(() => {
                celda.style.background = '';
            }, 500);
        }
    });
    
    // Recalcular la fila
    setTimeout(() => {
        if (typeof recalcularFilaExcelGeneral === 'function') {
            recalcularFilaExcelGeneral(rowIndex);
        }
    }, 100);
}
