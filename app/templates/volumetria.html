{% extends "base.html" %}
{% load static %}

{% block title %}{{ page_title }} - Sistema de Gestión de Ventas{% endblock %}

{% block content %}
<style>
    html, body {
    margin: 0;
    padding: 0;
    position: relative !important; /* Cambiar a posicionamiento relativo */
    width: 100% !important;
    height: 100% !important;
    overflow: auto !important; /* Permitir scroll normal */
}

/* Summer Pink Light Theme Overrides for Volumetría - v2 */

/* Summer Pink Light Theme Overrides for Volumetría - v2 */
    .light-theme .apple-bg {
        background: linear-gradient(135deg, #FFF5F8 0%, #FFE8EF 100%);
    }
    .light-theme .apple-glass-card, .light-theme .apple-card {
        background: rgba(255, 240, 245, 0.9) !important;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(229, 90, 135, 0.25) !important;
        box-shadow: 0 8px 32px rgba(229, 90, 135, 0.15);
    }
    .light-theme .apple-card:hover {
        background: rgba(255, 232, 239, 0.95) !important;
        border-color: rgba(229, 90, 135, 0.5) !important;
    }
    .light-theme .apple-text-primary, .light-theme h1, .light-theme h2, .light-theme h3, .light-theme h4 {
        color: #2D1B2E !important;
    }
    .light-theme .bg-gradient-to-r.from-blue-400.to-blue-600,
    .light-theme .bg-gradient-to-r.from-green-500.to-green-600,
    .light-theme .bg-gradient-to-r.from-blue-500.to-blue-600 {
        background-image: linear-gradient(to right, #FF6B9D, #E55A87) !important;
        color: transparent !important; /* Required for bg-clip-text */
        -webkit-background-clip: text;
        background-clip: text;
    }
    .light-theme .text-blue-500 {
        color: #FF6B9D !important;
    }
    .light-theme .apple-text-secondary {
        color: #6B4C6D !important;
    }
    .light-theme .apple-btn-primary {
        background: #FF6B9D !important;
        color: white !important;
    }
    .light-theme .apple-btn-primary:hover {
        background: #E55A87 !important;
    }
    .light-theme .apple-btn-secondary {
        background: rgba(255, 107, 157, 0.1) !important;
        color: #E55A87 !important;
        border: 1px solid rgba(255, 107, 157, 0.2) !important;
    }
    .light-theme .apple-btn-secondary:hover {
        background: rgba(255, 107, 157, 0.2) !important;
    }
    .light-theme input, .light-theme select, .light-theme textarea {
        background-color: rgba(255, 255, 255, 0.8) !important;
        border-color: rgba(229, 90, 135, 0.4) !important;
        color: #2D1B2E !important;
    }
    .light-theme input::placeholder {
        color: #6B4C6D99 !important;
    }
    .light-theme .border-gray-200.dark\:border-gray-700 {
        border-color: rgba(229, 90, 135, 0.2) !important;
    }
    
    /* Estilos simplificados para las tarjetas */
    .volumetria-card {
        border: 2px solid rgba(99, 102, 241, 0.2);
        border-radius: 12px;
        transition: border-color 0.2s ease;
    }
    .volumetria-card:hover {
        border-color: rgba(99, 102, 241, 0.4);
    }
    
    /* ============================= */
    /* ESTILOS PARA AUTOCOMPLETADO   */
    /* ============================= */
    .autocomplete-container {
        position: relative;
        width: 100%;
    }
    
    .autocomplete-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--apple-background-secondary);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.5rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        max-height: 300px;
        overflow-y: auto;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        opacity: 0;
        transform: translateY(-10px);
        animation: dropdownFadeIn 0.2s ease forwards;
    }
    
    .autocomplete-item {
        padding: 0.75rem;
        cursor: pointer;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.2s ease;
    }
    
    .autocomplete-item:last-child {
        border-bottom: none;
    }
    
    .autocomplete-item:hover,
    .autocomplete-item.selected {
        background: rgba(0, 122, 255, 0.1);
        border-left: 3px solid var(--apple-blue);
    }
    
    .autocomplete-item-content {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
    }
    
    .autocomplete-parte {
        font-weight: 600;
        color: var(--apple-blue);
        font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
        font-size: 0.9rem;
    }
    
    .autocomplete-desc {
        color: var(--apple-label);
        font-size: 0.85rem;
        line-height: 1.3;
    }
    
    .autocomplete-meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.25rem;
    }
    
    .autocomplete-marca {
        background: linear-gradient(135deg, #34D399, #10B981);
        color: white;
        padding: 0.15rem 0.4rem;
        border-radius: 0.25rem;
        font-size: 0.7rem;
        font-weight: 500;
    }
    
    .autocomplete-categoria {
        background: linear-gradient(135deg, #F59E0B, #D97706);
        color: white;
        padding: 0.15rem 0.4rem;
        border-radius: 0.25rem;
        font-size: 0.7rem;
        font-weight: 500;
    }
    
    .autocomplete-precio {
        background: linear-gradient(135deg, #EF4444, #DC2626);
        color: white;
        padding: 0.15rem 0.4rem;
        border-radius: 0.25rem;
        font-size: 0.7rem;
        font-weight: 600;
        margin-left: auto;
    }
    
    /* Estilos Apple para dropdown de sugerencias */
    .autocomplete-suggestions {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: rgba(30, 30, 30, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        max-height: 280px;
        overflow-y: auto;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        animation: dropdownFadeIn 0.2s ease-out forwards;
    }

    .autocomplete-suggestions::-webkit-scrollbar {
        width: 4px;
    }
    
    .autocomplete-suggestions::-webkit-scrollbar-track {
        background: transparent;
    }
    
    .autocomplete-suggestions::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
    }
    
    .autocomplete-suggestions::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
    }
    
    @keyframes dropdownFadeIn {
        from {
            opacity: 0;
            transform: translateY(-8px) scale(0.96);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    /* ============================= */
    /* ESTILOS TABLA EXCEL           */
    /* ============================= */
    .excel-container {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .excel-btn-primary {
        background: #217346;
        color: white;
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        transition: background-color 0.2s;
    }

    .excel-btn-primary:hover {
        background: #1e6440;
    }

    .excel-btn-secondary {
        background: #f3f3f3;
        color: #333;
        padding: 8px 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        transition: background-color 0.2s;
    }

    .excel-btn-secondary:hover {
        background: #e9e9e9;
    }

    .excel-table-wrapper {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.05);
        overflow-x: auto;
        overflow-y: visible;
        border: none;
        margin: 20px 0;
        min-width: 0;
    }

    .excel-table {
        border-collapse: separate;
        border-spacing: 0;
        font-size: 13px;
        line-height: 1.5;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Inter', 'Helvetica', Arial, sans-serif;
        width: 100%;
        min-width: 1100px; /* Reducido para mejor ajuste */
        table-layout: auto; /* Permite mejor distribución de columnas */
    }

    .excel-th-group {
        background: #f8fafc;
        color: #334155;
        padding: 20px 12px;
        text-align: center;
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        border-bottom: 2px solid #e2e8f0;
        border-right: 1px solid #e2e8f0;
        position: relative;
    }

    .excel-client-header {
        background: #3b82f6;
        color: #ffffff;
    }

    .excel-cost-header {
        background: #10b981;
        color: #ffffff;
    }

    .excel-th {
        background: #ffffff;
        color: #475569;
        padding: 12px 8px;
        text-align: center;
        font-weight: 500;
        font-size: 11px;
        letter-spacing: 0.25px;
        border-bottom: 1px solid #e2e8f0;
        border-right: 1px solid #e2e8f0;
        white-space: nowrap;
        text-transform: uppercase;
    }

    .excel-description {
        min-width: 250px;
    }

    .excel-cell {
        padding: 12px 10px;
        border-right: 1px solid #e2e8f0;
        border-bottom: 1px solid #f1f5f9;
        background: #ffffff;
        color: #334155;
        position: relative;
        transition: all 0.15s ease;
        cursor: text;
        outline: none;
        font-weight: 400;
        min-height: 44px;
        vertical-align: middle;
        font-size: 13px;
    }

    .excel-cell:hover {
        background: #f8fafc;
        border-color: #94a3b8;
        box-shadow: inset 0 0 0 1px #0ea5e9, 0 0 0 1px rgba(14, 165, 233, 0.3);
        transform: scale(1.01);
        z-index: 3;
    }

    .excel-cell:focus {
        outline: none;
        background: #2d2d2d;
        color: #ffffff;
        border-color: #0ea5e9;
        box-shadow: inset 0 0 0 2px #0ea5e9, 0 0 0 3px rgba(14, 165, 233, 0.2);
        transform: scale(1.01);
        z-index: 4;
    }

    .excel-cell-text {
        text-align: left;
        font-family: 'SF Mono', 'Monaco', 'Consolas', 'Roboto Mono', monospace;
        font-size: 13px;
        font-weight: 400;
    }

    .excel-cell-number {
        text-align: center;
        min-width: 60px;
        max-width: 80px;
        font-family: 'SF Mono', 'Monaco', 'Consolas', 'Roboto Mono', monospace;
        font-weight: 600;
    }

    .excel-cell-currency {
        text-align: right;
        min-width: 75px;
        max-width: 95px;
        font-family: 'SF Mono', 'Monaco', 'Consolas', 'Roboto Mono', monospace;
        font-weight: 600;
        color: #34d399;
    }

    .excel-cell-percent {
        text-align: center;
        min-width: 60px;
        max-width: 75px;
        font-family: 'SF Mono', 'Monaco', 'Consolas', 'Roboto Mono', monospace;
        font-weight: 600;
        color: #fbbf24;
    }

    .excel-cell-description {
        min-width: 200px;
        max-width: 300px;
        word-wrap: break-word;
        text-align: left;
        font-weight: 400;
        white-space: normal;
    }
    
    /* Container para autocompletado en celdas */
    .excel-cell[data-field="noParte"] {
        position: relative;
    }
    
    /* ============================= */
    /* PANEL LATERAL INTERACTIVO     */
    /* ============================= */
    
    .volumetria-panel-trigger {
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 40px;
        height: 200px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px 0 0 20px;
        cursor: pointer;
        z-index: 999;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.7;
    }
    
    .volumetria-panel-trigger:hover {
        width: 50px;
        opacity: 1;
        transform: translateY(-50%) translateX(-5px);
        box-shadow: -8px 0 30px rgba(0, 0, 0, 0.4);
    }
    
    .volumetria-panel-trigger::before {
        content: "📦";
        font-size: 20px;
        animation: bounce 2s infinite;
    }
    
    .volumetria-sidebar {
        position: fixed;
        right: -350px;
        top: 0;
        width: 350px;
        height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 1000;
        transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
        overflow-y: auto;
        padding: 20px;
    }
    
    .volumetria-sidebar.active {
        right: 0;
    }
    
    .sidebar-header {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .sidebar-header h3 {
        color: #ffffff;
        font-size: 1.4rem;
        font-weight: 700;
        margin: 0;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
    .sidebar-header p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
        margin-top: 5px;
    }
    
    .category-section {
        margin-bottom: 30px;
    }
    
    .category-title {
        color: #ffffff;
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .category-items {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
    }
    
    .item-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 15px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
    }
    
    .item-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        transition: left 0.5s;
    }
    
    .item-card:hover {
        transform: translateY(-2px);
        border-color: rgba(102, 126, 234, 0.5);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        background: rgba(255, 255, 255, 0.08);
    }
    
    .item-card:hover::before {
        left: 100%;
    }
    
    .item-icon {
        font-size: 2.5rem;
        margin-bottom: 10px;
        display: block;
        text-align: center;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        transition: transform 0.3s ease;
    }
    
    .item-card:hover .item-icon {
        transform: scale(1.1) rotateY(15deg);
        animation: iconPulse 1s ease-in-out;
    }
    
    .item-name {
        color: #ffffff;
        font-weight: 600;
        font-size: 0.95rem;
        text-align: center;
        margin-bottom: 5px;
    }
    
    .item-description {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.8rem;
        text-align: center;
        line-height: 1.3;
    }
    
    .close-sidebar {
        position: absolute;
        top: 15px;
        right: 15px;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #ffffff;
        font-size: 1.5rem;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .close-sidebar:hover {
        background: rgba(255, 69, 58, 0.8);
        transform: rotate(90deg);
    }
    
    /* Animaciones */
    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-10px); }
        60% { transform: translateY(-5px); }
    }
    
    @keyframes iconPulse {
        0% { transform: scale(1.1) rotateY(15deg); }
        50% { transform: scale(1.2) rotateY(0deg); }
        100% { transform: scale(1.1) rotateY(15deg); }
    }
    
    /* Overlay cuando el sidebar está activo */
    .volumetria-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 998;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
    }
    
    .volumetria-overlay.active {
        opacity: 1;
        visibility: visible;
    }

    .excel-calculated {
        background: #f0f9ff !important;
        color: #0369a1 !important;
        cursor: text; /* Cursor de texto normal */
        font-weight: 600;
        font-style: normal;
        border: 1px solid #bfdbfe !important;
        user-select: text; /* Permitir selección de texto */
    }

    .excel-calculated:hover {
        background: #1e293b !important;
        transform: none !important;
        border-color: #334155 !important;
        box-shadow: none !important;
    }

    .excel-total-client {
        color: #10b981 !important;
        font-weight: 700;
    }

    .excel-total-cost {
        color: #ef4444 !important;
        font-weight: 700;
    }

    .excel-profit {
        color: #3b82f6 !important;
        font-weight: 700;
    }

    .excel-totals-row {
        background: #111827;
    }

    .excel-totals-row .excel-cell {
        background: #111827 !important;
        color: #f9fafb !important;
        font-weight: 700;
        border-top: 3px solid #0ea5e9;
        border-bottom: 2px solid #0ea5e9;
    }

    .excel-totals-label {
        text-align: right;
        font-weight: bold;
        color: #495057;
    }

    .excel-delete-btn {
        background: none;
        border: none;
        color: #6b7280; /* Gray-500 más discreto */
        font-size: 18px;
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.5; /* Más sutil por defecto */
    }

    .excel-delete-btn:hover {
        background: rgba(239, 68, 68, 0.1); /* Solo se muestra rojo al hover */
        color: #ef4444;
        opacity: 1;
        transform: scale(1.05);
    }

    .excel-delete-btn:active {
        transform: scale(0.95);
        background: rgba(239, 68, 68, 0.2);
    }

    .excel-row:nth-child(even) {
        background: #f8fafc;
    }

    .excel-row:nth-child(even) .excel-cell {
        background: #f8fafc;
        border-color: #e2e8f0;
    }

    .excel-row:hover {
        background: #f1f5f9;
    }

    .excel-row:hover .excel-cell {
        background: #f1f5f9 !important;
        border-color: #cbd5e1;
    }

    .excel-row:hover .excel-calculated {
        background: #e0f2fe !important;
    }

    /* Excel Toolbar Styles */
    .excel-toolbar {
        background: linear-gradient(135deg, #374151, #1f2937);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    .excel-btn-primary {
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: white;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 2px 4px rgba(14, 165, 233, 0.3);
    }

    .excel-btn-primary:hover {
        background: linear-gradient(135deg, #0284c7, #0369a1);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(14, 165, 233, 0.4);
    }

    /* Responsive */
    @media (max-width: 1200px) {
        .excel-cell-description {
            min-width: 220px;
        }
        .excel-cell {
            padding: 10px 8px;
        }
    }

    @media (max-width: 768px) {
        .excel-table-wrapper {
            font-size: 11px;
        }
        
        .excel-cell {
            padding: 8px 6px;
            min-height: 36px;
        }
        
        .excel-cell-description {
            min-width: 180px;
        }

        .excel-toolbar {
            padding: 12px;
        }

        .excel-btn-primary {
            padding: 6px 12px;
            font-size: 12px;
        }
    }

    /* Estilos para Popup de Búsqueda Avanzada */
    .search-popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 10000;
        display: none;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
    }

    .search-popup-overlay.active {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .search-popup {
        background: #1f2937;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        width: 90%;
        max-width: 800px;

// Función para precargar datos de oportunidad desde la sesión
function precargarDatosOportunidad() {
    console.log('DEBUG: Verificando datos de oportunidad en sesión...');
    
    // Verificar si hay datos de oportunidad en la sesión
    fetch('/app/api/get-session-data/', {
        method: 'GET',
        headers: {
            'X-Requested-With': 'XMLHttpRequest',
        },
    })
    .then(response => response.json())
    .then(data => {
        console.log('DEBUG: Datos de sesión recibidos:', data);
        
        if (data.volumetria_oportunidad_data) {
            const oportunidadData = data.volumetria_oportunidad_data;
            console.log('DEBUG: Auto-llenando formulario con datos de oportunidad:', oportunidadData);
            console.log('DEBUG: ID de cliente a seleccionar:', oportunidadData.cliente_id);
            console.log('DEBUG: ID de oportunidad a seleccionar:', oportunidadData.oportunidad_id);
            console.log('DEBUG: Nombre de oportunidad:', oportunidadData.oportunidad_nombre);
            
            // Auto-llenar cliente después de un breve delay para asegurar que las opciones estén cargadas
            setTimeout(() => {
                const clienteSelect = document.getElementById('cliente-volumetria');
                if (clienteSelect && oportunidadData.cliente_id) {
                    console.log('DEBUG: Intentando seleccionar cliente:', oportunidadData.cliente_id);
                    console.log('DEBUG: Opciones disponibles:', Array.from(clienteSelect.options).map(opt => ({value: opt.value, text: opt.text})));
                    
                    clienteSelect.value = oportunidadData.cliente_id;
                    
                    // Forzar actualización visual del select (múltiples métodos)
                    clienteSelect.dispatchEvent(new Event('change', { bubbles: true }));
                    
                    // Método adicional: forzar re-renderizado
                    setTimeout(() => {
                        clienteSelect.style.display = 'none';
                        clienteSelect.offsetHeight; // Trigger reflow
                        clienteSelect.style.display = '';
                    }, 10);
                    
                    // Verificar si se seleccionó correctamente
                    if (clienteSelect.value == oportunidadData.cliente_id) {
                        console.log('DEBUG: Cliente auto-seleccionado exitosamente:', oportunidadData.cliente_id);
                        
                        // Actualizar el texto mostrado del select (solución para problema visual)
                        const selectedOption = clienteSelect.options[clienteSelect.selectedIndex];
                        if (selectedOption) {
                            console.log('DEBUG: Texto del cliente seleccionado:', selectedOption.text);
                        }
                        
                        // Cargar oportunidades del cliente y auto-seleccionar la oportunidad específica
                        cargarOportunidadesPorCliente(oportunidadData.cliente_id, oportunidadData.oportunidad_id);
                    } else {
                        console.log('ERROR: No se pudo seleccionar el cliente. Valor esperado:', oportunidadData.cliente_id, 'Valor actual:', clienteSelect.value);
                    }
                }
            }, 500);
            
            
            // Auto-llenar nombre de volumetría (opcional - usar nombre de oportunidad como base)
            const nombreInput = document.getElementById('nombre-volumetria');
            if (nombreInput && oportunidadData.oportunidad_nombre) {
                nombreInput.value = `Volumetría - ${oportunidadData.oportunidad_nombre}`;
                console.log('DEBUG: Nombre de volumetría auto-llenado');
            }
        }
    })
    .catch(error => {
        console.error('Error obteniendo datos de sesión:', error);
    });
}

// Función para cargar oportunidades por cliente
function cargarOportunidadesPorCliente(clienteId, oportunidadIdToSelect = null) {
    const oportunidadSelect = document.getElementById('oportunidad-volumetria');
    if (!oportunidadSelect || !clienteId) return;
    
    console.log('DEBUG: Cargando oportunidades para cliente:', clienteId);
    if (oportunidadIdToSelect) {
        console.log('DEBUG: Se auto-seleccionará oportunidad:', oportunidadIdToSelect);
    }
    
    fetch(`/app/api/get-opportunities-by-client/${clienteId}/`)
        .then(response => response.json())
        .then(oportunidades => {
            console.log('DEBUG: Oportunidades cargadas:', oportunidades);
            oportunidadSelect.innerHTML = '<option value="">-- Seleccione una oportunidad --</option>';
            
            oportunidades.forEach(oportunidad => {
                const option = document.createElement('option');
                option.value = oportunidad.id;
                option.textContent = oportunidad.oportunidad;
                oportunidadSelect.appendChild(option);
            });
            
            // Si se especificó una oportunidad para seleccionar automáticamente
            if (oportunidadIdToSelect) {
                setTimeout(() => {
                    console.log('DEBUG: Intentando seleccionar oportunidad:', oportunidadIdToSelect);
                    console.log('DEBUG: Tipo de oportunidadIdToSelect:', typeof oportunidadIdToSelect);
                    console.log('DEBUG: Opciones de oportunidades disponibles:', Array.from(oportunidadSelect.options).map(opt => ({value: opt.value, text: opt.text, tipo: typeof opt.value})));
                    
                    // Intentar selección directa
                    oportunidadSelect.value = oportunidadIdToSelect;
                    
                    // Si no funciona, intentar conversión a string
                    if (oportunidadSelect.value != oportunidadIdToSelect) {
                        console.log('DEBUG: Intentando conversión a string...');
                        oportunidadSelect.value = String(oportunidadIdToSelect);
                    }
                    
                    // Si aún no funciona, buscar manualmente
                    if (oportunidadSelect.value != oportunidadIdToSelect && oportunidadSelect.value != String(oportunidadIdToSelect)) {
                        console.log('DEBUG: Buscando opción manualmente...');
                        for (let i = 0; i < oportunidadSelect.options.length; i++) {
                            const option = oportunidadSelect.options[i];
                            if (option.value == oportunidadIdToSelect || option.value == String(oportunidadIdToSelect)) {
                                oportunidadSelect.selectedIndex = i;
                                console.log('DEBUG: Opción encontrada y seleccionada en índice:', i);
                                break;
                            }
                        }
                    }
                    
                    // Verificar resultado final
                    if (oportunidadSelect.value == oportunidadIdToSelect || oportunidadSelect.value == String(oportunidadIdToSelect)) {
                        console.log('DEBUG: ✅ Oportunidad seleccionada exitosamente');
                        const selectedOption = oportunidadSelect.options[oportunidadSelect.selectedIndex];
                        if (selectedOption) {
                            console.log('DEBUG: Texto de la oportunidad seleccionada:', selectedOption.text);
                        }
                    } else {
                        console.log('ERROR: ❌ No se pudo seleccionar la oportunidad:', oportunidadIdToSelect);
                        console.log('ERROR: Valor actual del select:', oportunidadSelect.value);
                    }
                }, 200);
            }
        })
        .catch(error => {
            console.error('Error cargando oportunidades:', error);
        });
}

// Función para configurar listener de cambio de cliente
function setupOpportunityChangeListener() {
    const clientSelect = document.getElementById('cliente-volumetria');
    const oportunidadSelect = document.getElementById('oportunidad-volumetria');
    
    if (!clientSelect || !oportunidadSelect) return;
    
    clientSelect.addEventListener('change', function() {
        const clienteId = this.value;
        oportunidadSelect.innerHTML = '<option value="">-- Seleccione una oportunidad --</option>';
        
        if (!clienteId) return;
        
        // Fetch opportunities for the selected client
        cargarOportunidadesPorCliente(clienteId);
    });
}

// Función para configurar eventos del resumen de cableado
function setupResumenCableado() {
    const cantidadNodosInput = document.getElementById('cantidad-nodos');
    if (cantidadNodosInput) {
        cantidadNodosInput.addEventListener('input', actualizarResumenCableado);
        // Actualizar una vez al cargar
        actualizarResumenCableado();
    }
}

// Función para actualizar el resumen de cableado dinámicamente
function actualizarResumenCableado() {
    const cantidadNodos = parseInt(document.getElementById('cantidad-nodos').value) || 0;
    
    if (cantidadNodos > 0) {
        const totalFaceplates = cantidadNodos * 1;
        const totalJacks = cantidadNodos * 2; 
        const totalPatchcords = cantidadNodos * 2;
        
        document.getElementById('total-faceplates').textContent = `${totalFaceplates} (1 x ${cantidadNodos})`;
        document.getElementById('total-jacks').textContent = `${totalJacks} (2 x ${cantidadNodos})`;
        document.getElementById('total-patchcords').textContent = `${totalPatchcords} (2 x ${cantidadNodos})`;
        document.getElementById('total-cable').textContent = 'Metros especificados arriba';
    } else {
        document.getElementById('total-faceplates').textContent = '1 x nodos';
        document.getElementById('total-jacks').textContent = '2 x nodos';
        document.getElementById('total-patchcords').textContent = '2 x nodos';
        document.getElementById('total-cable').textContent = 'Metros especificados';
    }
}

// Función para cerrar el formulario
function cerrarFormulario() {
    const formulario = document.getElementById('formulario-nodos') || document.getElementById('formulario-general');
    if (formulario) {
        formulario.remove();
    }
    
    // Mostrar contenido principal de nuevo
    const mainContent = document.querySelector('.main-content');
    if (mainContent) {
        mainContent.style.display = 'block';
    }
}

// Función para procesar el formulario de nodos en volumetría general
function procesarFormularioNodosGeneral() {
    console.log('🚀 Procesando formulario de nodos en volumetría general...');
    
    try {
        // Recopilar datos del formulario (solo datos técnicos, sin información del proyecto)
        const cantidadNodos = parseInt(document.getElementById('cantidad-nodos-general')?.value) || 1;
        const metrosCable = parseFloat(document.getElementById('metros-cable-general')?.value) || 100;
        
        // Números de parte
        const numerosParte = {
            cable: [document.getElementById('cable-numero-parte-general')?.value?.trim() || ''],
            jack: [document.getElementById('jack-numero-parte-general')?.value?.trim() || ''],
            patchcord: [document.getElementById('patchcord-numero-parte-general')?.value?.trim() || ''],
            faceplate: [document.getElementById('faceplate-numero-parte-general')?.value?.trim() || '']
        };

        const cantidades = {
            cable: [document.getElementById('metros-cable-general')?.value || 100],
            jack: [],
            patchcord: [],
            faceplate: []
        };

        // Collect extra products
        ['cable', 'jack', 'patchcord', 'faceplate'].forEach(tipo => {
            const container = document.getElementById(`extra-productos-${tipo}`);
            if (container) {
                for (let i = 0; i < container.children.length; i++) {
                    const numeroParteInput = document.getElementById(`${tipo}-numero-parte-extra-${i}`);
                    const cantidadInput = document.getElementById(`${tipo}-cantidad-extra-${i}`);
                    
                    if (numeroParteInput && numeroParteInput.value) {
                        numerosParte[tipo].push(numeroParteInput.value.trim());
                        if (cantidadInput && cantidadInput.value) {
                            cantidades[tipo].push(cantidadInput.value);
                        } else {
                            cantidades[tipo].push(1);
                        }
                    }
                }
            }
        });
        
        console.log('📊 Datos recopilados:', {
            cantidadNodos,
            metrosCable,
            numerosParte,
            cantidades
        });
        
        // Cerrar formulario y mostrar animación
        console.log('--- Before closing modal and showing animation ---');
        logElementDimensions('html', document.documentElement);
        logElementDimensions('body', document.body);
        logElementDimensions('tabla-volumetria', document.getElementById('tabla-volumetria'));
        logElementDimensions('main-workspace', document.getElementById('main-workspace'));
        logElementDimensions('tables-container', document.getElementById('tables-container'));

        cerrarCuestionario(); // Cerrar el modal
        mostrarAnimacionCarga();
        
        // Preparar datos para generar volumetría (solo datos técnicos)
        const datosVolumetria = {
            nombreVolumetria: 'Volumetría Nodos de Red',
            clienteId: '',
            usuarioFinal: '',
            oportunidadId: '',
            categoria: 'Nodos de Red',
            color: 'Azul',
            distancia: metrosCable,
            cantidadNodos,
            numerosParte,
            cantidades
        };
        
        // Generar volumetría después de un delay para la animación
        setTimeout(() => {
            // Usar la misma lógica que el formulario original de nodos
            generarVolumetriaParaGeneral(datosVolumetria);
        }, 2000);
        
    } catch (error) {
        console.error('❌ Error en procesarFormularioNodosGeneral:', error);
        alert('Error al procesar volumetría. Ver consola para detalles.');
    }
}

// Función para generar volumetría específicamente para la tabla General
function generarVolumetriaParaGeneral(datos) {
    cerrarAnimacionCarga();

    // Forzar un reflow para corregir posibles problemas de layout
    setTimeout(() => {
        const workspace = document.getElementById('tabla-volumetria');
        if (workspace) {
            workspace.style.display = 'block';
            workspace.style.visibility = 'visible';
            workspace.style.position = 'relative'; // Cambiar de fixed a relative
            workspace.style.top = 'auto';
            workspace.style.left = 'auto';
            workspace.style.width = '100%';
            workspace.style.height = 'auto';
            workspace.offsetHeight; // Forzar reflow
        }
        
        // Restaurar scroll y body
        document.body.style.overflow = 'auto';
        document.body.style.position = 'relative';
        document.documentElement.style.overflow = 'auto';
        window.scrollTo(0, 0);
    }, 50);

    console.log('--- After reflow and animation closed ---');
    logElementDimensions('html', document.documentElement);
    logElementDimensions('body', document.body);
    logElementDimensions('tabla-volumetria', document.getElementById('tabla-volumetria'));
    logElementDimensions('main-workspace', document.getElementById('main-workspace'));
    logElementDimensions('tables-container', document.getElementById('tables-container'));
    // Asegurarse de que el workspace principal de volumetría esté visible
    const workspace = document.getElementById('tabla-volumetria');
    if (workspace) {
        workspace.style.display = 'block';
        console.log('📊 Workspace de volumetría principal visible.');
    } else {
        // Si por alguna razón el workspace no existe, crearlo (esto no debería pasar si el flujo es correcto)
        console.warn('⚠️ Workspace de volumetría principal no encontrado, recreando...');
        mostrarVolumetriaGeneralDirecta(); // This function creates the workspace
        // After this, the workspace should exist and be visible.
    }

    // Obtener información completa de productos del catálogo
    obtenerDatosProductosCatalogo(datos.numerosParte).then(productosCompletos => {
        console.log('📦 Productos completos del catálogo:', productosCompletos);
        
        // Calcular cantidad de cable
        const cableProducto = productosCompletos.cable;
        let longitudBobina = 305; // Default
        if (cableProducto && cableProducto.descripcion) {
            const match = cableProducto.descripcion.match(/(\d+)\s*m/i);
            if (match && match[1]) {
                longitudBobina = parseInt(match[1]);
            }
        }
        
        const totalMetrosCable = datos.distancia; // Usar directamente la distancia total
        const cantidadCable = Math.ceil(totalMetrosCable / longitudBobina);
        
        console.log(`📏 Cálculo de cable: ${totalMetrosCable}m requeridos / ${longitudBobina}m por bobina = ${cantidadCable} bobinas`);

        const cantidadFaceplates = datos.cantidadNodos;
        const cantidadJacksUsuario = datos.cantidadNodos; // 1 por nodo
        const cantidadJacksPatchpanel = datos.cantidadNodos; // 1 por nodo
        const cantidadPatchcordsUsuario = datos.cantidadNodos; // 1 por nodo (color usuario)
        const cantidadPatchcordsPatchpanel = datos.cantidadNodos; // 1 por nodo (color patchpanel)
        
        // Asegurarse de que la tabla principal (excel-table-general) exista
        let mainExcelTable = document.getElementById('tabla-principal-precios');
        if (!mainExcelTable) {
            console.log('🚀 La tabla principal no existe, agregándola...');
            agregarTablaPrincipal(); // This function adds the HTML for the table
            mainExcelTable = document.getElementById('tabla-principal-precios'); // Get reference after creation
        } else {
            console.log('🔄 La tabla principal ya existe, limpiando su contenido...');
            const tbody = document.getElementById('excel-tbody-general');
            if (tbody) {
                // Keep the totals row, remove others
                const totalsRow = tbody.querySelector('.excel-totals-row');
                tbody.innerHTML = ''; // Clear all
                if (totalsRow) {
                    tbody.appendChild(totalsRow); // Add totals row back
                }
            }
        }
        
        // Poblar la tabla con los productos de nodos
        poblarTablaGeneralConNodos({
            cantidadCable,
            cantidadFaceplates,
            cantidadJacksUsuario,
            cantidadJacksPatchpanel,
            cantidadPatchcordsUsuario,
            cantidadPatchcordsPatchpanel,
            productosCompletos,
            numerosParte: datos.numerosParte
        });
        
        console.log('✅ Volumetría generada exitosamente');
        
        // Mostrar mensaje de éxito al usuario y forzar visibilidad
        setTimeout(() => {
            const workspace = document.getElementById('tabla-volumetria');
            const tablesContainer = document.getElementById('dynamic-tables-container');
            const tabla = document.getElementById('tabla-principal-precios');
            
            console.log('🔍 Estados después de generar:', {
                workspace: workspace ? 'exists' : 'missing',
                tablesContainer: tablesContainer ? 'exists' : 'missing', 
                tabla: tabla ? 'exists' : 'missing'
            });
            
            if (workspace) {
                // Limpiar completamente todos los estilos inline y aplicar los correctos
                workspace.style.cssText = '';
                
                // Aplicar estilos correctos con !important para sobrescribir cualquier CSS problemático
                workspace.style.display = 'block !important';
                workspace.style.visibility = 'visible !important';
                workspace.style.opacity = '1 !important';
                workspace.style.position = 'static !important';
                workspace.style.top = 'auto !important';
                workspace.style.left = 'auto !important';
                workspace.style.width = '100% !important';
                workspace.style.height = 'auto !important';
                workspace.style.transform = 'none !important';
                workspace.style.zIndex = 'auto !important';
                
                // Forzar reflow
                workspace.offsetHeight;
                console.log('✅ Workspace completamente limpiado y forzado a layout estático');
            }
            
            if (tablesContainer) {
                tablesContainer.style.display = 'block';
                tablesContainer.style.visibility = 'visible';
                tablesContainer.style.opacity = '1';
                console.log('✅ Tables container forzado a visible');
            }
            
            if (tabla) {
                tabla.style.display = 'block';
                tabla.style.visibility = 'visible';
                tabla.style.opacity = '1';
                console.log('✅ Tabla principal forzada a visible');
                tabla.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                console.error('❌ Tabla principal no encontrada después de generar');
            }
        }, 500);
        
    }).catch(error => {
        console.error('❌ Error obteniendo productos del catálogo:', error);
        // Fallback: If there's an error fetching products, still try to show the table with basic data
        const datosBasicos = {
            ...datos,
            categoria: 'General', // Forzar categoría General
            cantidadCable: Math.ceil((datos.distancia * datos.cantidadNodos) / 305),
            cantidadFaceplates: datos.cantidadNodos,
            cantidadJacksUsuario: datos.cantidadNodos,
            cantidadJacksPatchpanel: datos.cantidadNodos,
            cantidadPatchcordsUsuario: datos.cantidadNodos,
            cantidadPatchcordsPatchpanel: datos.cantidadNodos
        };
        
        let mainExcelTable = document.getElementById('tabla-principal-precios');
        if (!mainExcelTable) {
            console.log('🚀 La tabla principal no existe (fallback), agregándola...');
            agregarTablaPrincipal();
            mainExcelTable = document.getElementById('tabla-principal-precios');
        } else {
            console.log('🔄 La tabla principal ya existe (fallback), limpiando su contenido...');
            const tbody = document.getElementById('excel-tbody-general');
            if (tbody) {
                const totalsRow = tbody.querySelector('.excel-totals-row');
                tbody.innerHTML = '';
                if (totalsRow) {
                    tbody.appendChild(totalsRow);
                }
            }
        }
        
        poblarTablaGeneralConNodos(datosBasicos);
    });
}

                    <td class="excel-cell excel-cell-percent editable" contenteditable="true" data-field="descuentoCliente" data-row="${index}" onblur="recalcularFilaExcelGeneral(${index})">0.00%</td>
                    <td class="excel-cell excel-cell-currency excel-calculated" data-field="precioUnitario" data-row="${index}">$0.00</td>
                    <td class="excel-cell excel-cell-currency excel-calculated excel-total-client" data-field="totalCliente" data-row="${index}">$0.00</td>
                    <td class="excel-cell excel-cell-percent editable" contenteditable="true" data-field="descuentoProveedor" data-row="${index}" onblur="recalcularFilaExcelGeneral(${index})">0.00%</td>
                    <td class="excel-cell excel-cell-currency editable" contenteditable="true" data-field="costoUnitario" data-row="${index}" onblur="recalcularFilaExcelGeneral(${index})">$0.00</td>
                    <td class="excel-cell excel-cell-currency excel-calculated excel-total-cost" data-field="totalCosto" data-row="${index}">$0.00</td>
                    <td class="excel-cell excel-cell-currency excel-calculated excel-profit" data-field="ganancia" data-row="${index}">$0.00</td>
                    <td class="excel-cell excel-cell-action">
                        <button onclick="eliminarFilaExcelGeneral(${index})" class="delete-btn">×</button>
                    </td>
                `;
                
                // Insertar antes de la fila de totales
                const filaTotales = tbody.querySelector('.excel-totals-row');
                if (filaTotales) {
                    tbody.insertBefore(nuevaFila, filaTotales);
                } else {
                    tbody.appendChild(nuevaFila);
                }
                
                fila = nuevaFila;
            }
            
            // Llenar datos del producto en la fila
            if (fila) {
                const celdaNoParte = fila.querySelector('[data-field="noParte"]');
                const celdaCantidad = fila.querySelector('[data-field="cantidad"]');
                const celdaDescripcion = fila.querySelector('[data-field="descripcion"]');
                const celdaPrecioLista = fila.querySelector('[data-field="precioLista"]');
                const celdaCostoUnitario = fila.querySelector('[data-field="costoUnitario"]');
                
                if (celdaNoParte) celdaNoParte.textContent = producto.noParte;
                if (celdaCantidad) celdaCantidad.textContent = producto.cantidad;
                if (celdaDescripcion) celdaDescripcion.textContent = producto.descripcion;
                if (celdaPrecioLista) celdaPrecioLista.textContent = `$${producto.precioLista.toFixed(2)}`;
                if (celdaCostoUnitario) celdaCostoUnitario.textContent = `$${producto.costoUnitario.toFixed(2)}`;
                
                // Recalcular la fila para actualizar totales
                setTimeout(() => {
                    if (typeof recalcularFilaExcelGeneral === 'function') {
                        recalcularFilaExcelGeneral(index);
                    } else if (typeof recalcularFilaGeneral === 'function') {
                        recalcularFilaGeneral(index);
                    }
                }, 100);
            }
        });
        
        // Recalcular totales generales después de poblar
        setTimeout(() => {
            if (typeof recalcularTotalesGeneral === 'function') {
                recalcularTotalesGeneral();
            }
            console.log('✅ Tabla General poblada exitosamente con productos de nodos de red');
        }, 500);
        
    } catch (error) {
        console.error('❌ Error poblando tabla General con nodos:', error);
    }
}

        const numerosParte = {

            patchcord: document.getElementById('patchcord-numero-parte')?.value?.trim() || '',

        };
        
        console.log('🔧 Números de parte capturados ANTES de cerrar formulario:', numerosParte);
    
        console.log('📊 Datos recopilados:', {
            nombreVolumetria,
            clienteId,
            usuarioFinal,
            oportunidadId,
            categoria,
            color,
            distancia,
            cantidadNodos
        });
        
        // Validaciones mínimas - solo datos críticos
        if (!nombreVolumetria || nombreVolumetria === 'Volumetría Sin Título') {
            console.log('⚠️ Usando nombre por defecto');
        }
        
        if (!clienteId) {
            console.log('⚠️ No se seleccionó cliente, continuando de todas formas');
        }
        
        console.log('✅ Procesando volumetría con datos disponibles');
        
        // Obtener datos de infraestructura (opcional)
        const datosInfraestructura = obtenerDatosInfraestructura();
        console.log('🏗️ Datos de infraestructura:', datosInfraestructura ? 'Incluidos' : 'No incluidos (opcional)');
        
        cerrarFormulario();
        mostrarAnimacionCarga();
        
        // Simular procesamiento
        setTimeout(() => {
            const datosVolumetria = {
                // Información del proyecto
                nombreVolumetria,
                clienteId,
                usuarioFinal,
                oportunidadId,
                // Configuración técnica
                categoria,
                color,
                distancia,
                cantidadNodos,
                // 🔧 NÚMEROS DE PARTE CAPTURADOS
                numerosParte: numerosParte
            };
            
            // Agregar datos de infraestructura solo si están disponibles
            if (datosInfraestructura) {
                datosVolumetria.infraestructura = datosInfraestructura;
            }
            
            generarVolumetria(datosVolumetria);
        }, 2000);
        
    } catch (error) {
        console.error('❌ Error en procesarFormularioNodos:', error);
        console.log('📍 Error en línea:', error.stack);
        
        // Proceder con datos mínimos
        try {
            cerrarFormulario();
            mostrarAnimacionCarga();
            
            setTimeout(() => {
                generarVolumetria({

                });
            }, 2000);
        } catch (fallbackError) {
            console.error('❌ Error crítico:', fallbackError);
            alert('Error al procesar volumetría. Ver consola para detalles.');
        }
    }
}

// Función para obtener datos completos de productos del catálogo
async function obtenerDatosProductosCatalogo(numerosParte) {
    console.log('📋 Obteniendo datos completos del catálogo para:', numerosParte);
    
    const productosCompletos = {};
    
    // Procesar cada producto
    for (const [tipo, rawNumeroParte] of Object.entries(numerosParte)) {
        // Asegurarse de que numeroParte sea una cadena. Si es un array, tomar el primer elemento.
        const numeroParte = Array.isArray(rawNumeroParte) ? rawNumeroParte[0] : rawNumeroParte;

        if (!numeroParte || typeof numeroParte !== 'string') { // Añadir comprobación de tipo aquí
            console.log(`⚠️ No hay número de parte válido para ${tipo}, usando datos por defecto`);
            productosCompletos[tipo] = {
                numero_parte: '',
                descripcion: `${tipo.charAt(0).toUpperCase() + tipo.slice(1)} sin especificar`,
                precio_lista: 0,
                precio_proveedor: 0,
                marca: 'N/A',
                categoria: tipo
            };
            continue;
        }
        
        try {
            console.log(`🔍 Buscando información de ${tipo}: ${numeroParte}`);
            
            // Buscar producto específico en la API
            const response = await fetch(`/app/api/sugerencias-productos/?q=${encodeURIComponent(numeroParte)}&limit=1`);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            console.log(`📦 Respuesta API para ${tipo}:`, data);
            
            if (data.success && data.sugerencias && data.sugerencias.length > 0) {
                // Buscar coincidencia exacta
                const producto = data.sugerencias.find(p => 
                    (typeof p.numero_parte === 'string' ? p.numero_parte.toLowerCase() : '') === numeroParte.toLowerCase()
                ) || data.sugerencias[0]; // Si no hay coincidencia exacta, usar el primero
                
                productosCompletos[tipo] = {
                    numero_parte: producto.numero_parte,
                    descripcion: producto.descripcion,
                    precio_lista: producto.precio_lista,
                    precio_proveedor: producto.precio_proveedor,
                    marca: producto.marca,
                    categoria: producto.categoria,
                    color: producto.color
                };
                
                console.log(`✅ Datos obtenidos para ${tipo}:`, productosCompletos[tipo]);
            } else {
                console.log(`⚠️ No se encontró ${tipo} en catálogo: ${numeroParte}`);
                productosCompletos[tipo] = {
                    numero_parte: numeroParte,
                    descripcion: `${tipo.charAt(0).toUpperCase() + tipo.slice(1)} - ${numeroParte}`,
                    precio_lista: 0,
                    precio_proveedor: 0,
                    marca: 'N/A',
                    categoria: tipo
                };
            }
        } catch (error) {
            console.error(`❌ Error obteniendo ${tipo} del catálogo:`, error);
            productosCompletos[tipo] = {
                numero_parte: numeroParte,
                descripcion: `${tipo.charAt(0).toUpperCase() + tipo.slice(1)} - ${numeroParte}`,
                precio_lista: 0,
                precio_proveedor: 0,
                marca: 'N/A',
                categoria: tipo
            };
        }
    }
    
    console.log('🎯 Productos completos obtenidos:', productosCompletos);
    return productosCompletos;
}

            version: '2.0'
        };
        localStorage.setItem('volumetria_estado', JSON.stringify(estado));
        console.log('💾 Estado de volumetría guardado');
    } catch (error) {

    }

// Función para cargar el estado de la volumetría desde localStorage  
function cargarEstadoVolumetria() {
    try {
        const estadoStr = localStorage.getItem('volumetria_estado');
        if (estadoStr) {
            const estado = JSON.parse(estadoStr);
            // Verificar que el estado no sea muy antiguo (24 horas)
            if (Date.now() - estado.timestamp < 24 * 60 * 60 * 1000) {
                console.log('📂 Estado de volumetría cargado desde localStorage');
                return estado.datos;
            } else {
                console.log('⏰ Estado de volumetría expirado, eliminando');
                localStorage.removeItem('volumetria_estado');
            }
        }
    } catch (error) {
        console.error('❌ Error cargando estado:', error);
        localStorage.removeItem('volumetria_estado');
    }
    return null;
}

// Función para obtener el porcentaje de utilidad del cliente seleccionado
function obtenerPorcentajeUtilidadCliente() {
    const clientSelect = document.getElementById('cliente-general');
    if (!clientSelect || !clientSelect.value) return 25; // Default 25% (categoría C)
    
    const clienteId = parseInt(clientSelect.value);
    const clienteData = clientesDataGlobal.find(c => c.id === clienteId);
    
    if (clienteData) {
        console.log(`📊 Cliente seleccionado: ${clienteData.nombre_empresa}, Categoría: ${clienteData.categoria}, Utilidad: ${clienteData.porcentaje_utilidad}%`);
        return clienteData.porcentaje_utilidad;
    }
    
    return 25; // Default 25% (categoría C)
}

// Función para recalcular una fila específica en volumetría general
function recalcularFilaExcelGeneral(rowIndex) {
    console.log(`🧮 Recalculando fila general ${rowIndex}`);
    
    try {
        const row = document.querySelector(`#excel-table-general [data-row="${rowIndex}"]`);
        if (!row) return;
        
        const cantidad = parseFloat(row.querySelector('[data-field="cantidad"]').textContent) || 0;
        const costoUnitario = parseFloat(row.querySelector('[data-field="costoUnitario"]').textContent.replace(/[$,]/g, '')) || 0;
        const descuentoCliente = parseFloat(row.querySelector('[data-field="descuentoCliente"]').textContent.replace('%', '')) || 0;
        
        // NUEVO: Obtener porcentaje de utilidad según categoría del cliente
        const categoriaCliente = obtenerCategoriaClienteActual();
        let porcentajeUtilidad = 25; // Default categoría C
        
        switch (categoriaCliente) {
            case 'A':
                porcentajeUtilidad = 15;
                break;
            case 'B':
                porcentajeUtilidad = 20;
                break;
            case 'C':
                porcentajeUtilidad = 25;
                break;
            default:
                porcentajeUtilidad = 25;
                break;
        }
        
        // NUEVA LÓGICA SEGÚN LO SOLICITADO:
        
        // 1. Precio Lista = Costo Unitario × (1 + Porcentaje Utilidad/100)
        let precioLista = 0;
        if (costoUnitario > 0) {
            precioLista = costoUnitario * (1 + (porcentajeUtilidad / 100));
            console.log(`💰 Precio lista calculado: $${precioLista.toFixed(2)} (costo: $${costoUnitario.toFixed(2)} + ${porcentajeUtilidad}% utilidad)`);
            
            // Actualizar el campo precio lista en la interfaz
            row.querySelector('[data-field="precioLista"]').textContent = formatearMoneda(precioLista);
        } else {
            // Si no hay costo unitario, usar precio lista manual
            precioLista = parseFloat(row.querySelector('[data-field="precioLista"]').textContent.replace(/[$,]/g, '')) || 0;
        }
        
        // 2. P. Unitario = Precio Lista - Descuento Cliente (si no hay descuento, usar precio lista)
        const precioUnitario = descuentoCliente > 0 ? precioLista * (1 - descuentoCliente / 100) : precioLista;
        
        // 3. Total Cliente = P. Unitario × Cantidad 
        const totalCliente = precioUnitario * cantidad;
        
        // 4. Total Costo = Costo Unitario × Cantidad
        const totalCosto = costoUnitario * cantidad;
        
        // 5. Ganancia = Total Cliente - Total Costo
        const ganancia = totalCliente - totalCosto;
        
        // Actualizar solo las celdas calculadas
        row.querySelector('[data-field="precioUnitario"]').textContent = formatearMoneda(precioUnitario);
        row.querySelector('[data-field="totalCliente"]').textContent = formatearMoneda(totalCliente);
        row.querySelector('[data-field="totalCosto"]').textContent = formatearMoneda(totalCosto);
        row.querySelector('[data-field="ganancia"]').textContent = formatearMoneda(ganancia);
        
        // Recalcular totales generales
        recalcularTotalesGeneral();
        
    } catch (error) {
        console.error('❌ Error recalculando fila general:', error);
    }
}

// Función para recalcular totales generales
function recalcularTotalesGeneral() {
    console.log('📊 Recalculando totales generales');
    
    try {
        const table = document.getElementById('excel-table-general');
        if (!table) return;
        
        let totalCliente = 0;
        let totalCosto = 0;
        
        const rows = table.querySelectorAll('.excel-row');
        rows.forEach(row => {
            const totalClienteCell = row.querySelector('.excel-total-client');
            const totalCostoCell = row.querySelector('.excel-total-cost');
            
            if (totalClienteCell) {
                const valor = parseFloat(totalClienteCell.textContent.replace(/[$,]/g, '')) || 0;
                totalCliente += valor;
            }
            
            if (totalCostoCell) {
                const valor = parseFloat(totalCostoCell.textContent.replace(/[$,]/g, '')) || 0;
                totalCosto += valor;
            }
        });
        
        const ganancia = totalCliente - totalCosto;
        const margen = totalCliente > 0 ? (ganancia / totalCliente) * 100 : 0;
        
        // Actualizar elementos del resumen
        const totalClienteEl = document.getElementById('total-cliente-general');
        const totalCostoEl = document.getElementById('total-costo-general');
        const gananciaEl = document.getElementById('ganancia-total-general');
        const margenEl = document.getElementById('margen-general');
        
        if (totalClienteEl) totalClienteEl.textContent = formatearMoneda(totalCliente);
        if (totalCostoEl) totalCostoEl.textContent = formatearMoneda(totalCosto);
        if (gananciaEl) gananciaEl.textContent = formatearMoneda(ganancia);
        if (margenEl) margenEl.textContent = `${margen.toFixed(1)}% margen`;
        
        console.log('✅ Totales actualizados:', { totalCliente, totalCosto, ganancia, margen });
        
        // Actualizar resumen consolidado
        setTimeout(() => {
            actualizarResumenConsolidado();
        }, 100);
        
    } catch (error) {
        console.error('❌ Error recalculando totales generales:', error);
    }
}

        <td class="excel-cell excel-cell-currency excel-calculated" data-field="precioUnitario" data-row="${newIndex}">$0.00</td>

// Función para exportar CSV específica para volumetría general
function exportarCSVGeneral() {
    console.log('📊 Exportando CSV de volumetría general');
    
    const table = document.getElementById('excel-table-general');
    if (!table) return;
    
    let csvContent = 'data:text/csv;charset=utf-8,';
    
    // Headers
    const headers = [
        'No. Parte', 'Cantidad', 'Descripción', 'Marca', 
        'Precio Lista', 'Desc. Cliente %', 'Precio Unit.', 'Total Cliente',
        'Desc. Prov. %', 'Costo Unit.', 'Total Costo'
    ];
    csvContent += headers.join(',') + '\n';
    
    // Data rows
    const rows = table.querySelectorAll('.excel-row');
    rows.forEach(row => {
        const rowData = [];
        const cells = row.querySelectorAll('.excel-cell:not(.excel-cell-action)');
        
        cells.forEach(cell => {
            let value = cell.textContent.trim();
            // Escapar comillas y agregar comillas si contiene comas
            if (value.includes(',') || value.includes('"')) {
                value = '"' + value.replace(/"/g, '""') + '"';
            }
            rowData.push(value);
        });
        
        // Solo agregar filas que tengan al menos un campo lleno
        if (rowData.some(data => data && data !== '$0.00' && data !== '0%')) {
            csvContent += rowData.join(',') + '\n';
        }
    });
    
    // Crear y descargar archivo
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement('a');
    link.setAttribute('href', encodedUri);
    link.setAttribute('download', `volumetria_general_${new Date().toISOString().split('T')[0]}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    console.log('✅ CSV exportado exitosamente');
}

// Función para importar datos desde Excel/CSV
function importarDesdeExcel() {
    console.log('📥 Iniciando importación desde Excel/CSV');
    
    // Crear input de archivo temporal
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.csv,.xlsx,.xls';
    
    input.onchange = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        if (file.name.endsWith('.csv')) {
            // Leer archivo CSV
            const reader = new FileReader();
            reader.onload = function(e) {
                const csvData = e.target.result;
                procesarCSVImport(csvData);
            };
            reader.readAsText(file);
        } else {
            // Para archivos Excel, mostrar mensaje
            if (typeof Swal !== 'undefined') {
                Swal.fire({
                    title: 'Función en Desarrollo',
                    text: 'La importación desde Excel estará disponible pronto. Por ahora, puedes usar archivos CSV.',
                    icon: 'info',
                    confirmButtonText: 'Entendido'
                });
            } else {
                alert('Por ahora solo se admiten archivos CSV. La importación desde Excel estará disponible pronto.');
            }
        }
    };
    
    input.click();
}

// Función para procesar datos CSV importados
function procesarCSVImport(csvData) {
    console.log('🔄 Procesando datos CSV importados');
    
    try {
        const lines = csvData.split('\n');
        const headers = lines[0].split(',');
        
        // Limpiar tabla actual
        const tbody = document.getElementById('excel-tbody-general');
        if (!tbody) return;
        
        tbody.innerHTML = '';
        
        // Procesar cada línea de datos
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            const values = line.split(',');
            if (values.length < 4) continue; // Mínimo campos requeridos
            
            // Crear nueva fila
            const newRow = document.createElement('tr');
            newRow.className = 'excel-row';
            newRow.setAttribute('data-row', i - 1);
            
            const rowIndex = i - 1;
            
            newRow.innerHTML = `
                <td class="excel-cell excel-cell-text" contenteditable="true" data-field="noParte" data-row="${rowIndex}">${values[0] || ''}</td>
                <td class="excel-cell excel-cell-number" contenteditable="true" data-field="cantidad" data-row="${rowIndex}" onblur="recalcularFilaExcelGeneral(${rowIndex})">${values[1] || '1'}</td>
                <td class="excel-cell excel-cell-description" contenteditable="true" data-field="descripcion" data-row="${rowIndex}">${values[2] || ''}</td>
                <td class="excel-cell excel-cell-text" contenteditable="true" data-field="marca" data-row="${rowIndex}">${values[3] || ''}</td>
                <td class="excel-cell excel-cell-currency" contenteditable="true" data-field="precioLista" data-row="${rowIndex}" onblur="recalcularFilaExcelGeneral(${rowIndex})">${values[4] || '$0.00'}</td>
                <td class="excel-cell excel-cell-percent" contenteditable="true" data-field="descuentoCliente" data-row="${rowIndex}" onblur="recalcularFilaExcelGeneral(${rowIndex})">${values[5] || '0%'}</td>
                <td class="excel-cell excel-cell-currency excel-calculated" contenteditable="true">$0.00</td>
                <td class="excel-cell excel-cell-currency excel-calculated excel-total-client" contenteditable="true">$0.00</td>
                <td class="excel-cell excel-cell-percent" contenteditable="true" data-field="descuentoProveedor" data-row="${rowIndex}" onblur="recalcularFilaExcelGeneral(${rowIndex})">${values[8] || '0%'}</td>
                <td class="excel-cell excel-cell-currency excel-calculated" contenteditable="true">$0.00</td>
                <td class="excel-cell excel-cell-currency excel-calculated excel-total-cost" contenteditable="true">$0.00</td>
                <td class="excel-cell excel-cell-action">
                    <button onclick="eliminarFilaExcelGeneral(${rowIndex})" class="excel-delete-btn" title="Eliminar fila">⋯</button>
                </td>
            `;
            
            tbody.appendChild(newRow);
        }
        
        // Recalcular todas las filas
        setTimeout(() => {
            const rows = tbody.querySelectorAll('.excel-row');
            rows.forEach((row, index) => {
                recalcularFilaExcelGeneral(index);
            });
        }, 100);
        
        console.log(`✅ CSV importado: ${lines.length - 1} filas procesadas`);
        
        if (typeof Swal !== 'undefined') {
            Swal.fire({
                title: 'Importación Exitosa',
                text: `Se importaron ${lines.length - 1} filas correctamente.`,
                icon: 'success',
                timer: 2000,
                showConfirmButton: false
            });
        }
        
    } catch (error) {
        console.error('❌ Error procesando CSV:', error);
        if (typeof Swal !== 'undefined') {
            Swal.fire({
                title: 'Error de Importación',
                text: 'Hubo un problema procesando el archivo CSV. Verifica el formato.',
                icon: 'error'
            });
        }
    }
}

// Función para calcular precio de lista basado en categoría del cliente
function calcularPrecioSegunCategoria(costoUnitario, categoria) {
    if (!categoria || !costoUnitario) {
        console.log('⚠️ No se pudo calcular precio: categoría o costo faltante');
        return costoUnitario;
    }
    
    let porcentajeUtilidad = 0;
    
    switch (categoria) {
        case 'A':
            porcentajeUtilidad = 15; // 15% utilidad
            break;
        case 'B':
            porcentajeUtilidad = 20; // 20% utilidad
            break;
        case 'C':
            porcentajeUtilidad = 25; // 25% utilidad
            break;
        default:
            porcentajeUtilidad = 25; // Por defecto usar categoría C
            break;
    }
    
    const precioLista = costoUnitario * (1 + porcentajeUtilidad / 100);
    
    console.log(`💰 Cálculo de precio: Costo $${costoUnitario} + ${porcentajeUtilidad}% (Cat. ${categoria}) = $${precioLista.toFixed(2)}`);
    
    return precioLista;
}

// Función para obtener la categoría del cliente actual
function obtenerCategoriaClienteActual() {
    return window.categoriaClienteActual || 'C'; // Por defecto categoría C
}

// Función para búsqueda de productos en tabla Excel con nueva lógica de precios
function buscarProductoExcel(inputElement) {
    const query = inputElement.textContent.trim();
    const rowIndex = inputElement.getAttribute('data-row');
    const suggestionsDiv = document.getElementById(`suggestions-${rowIndex}`);
    
    if (!query || query.length < 2) {
        if (suggestionsDiv) {
            suggestionsDiv.style.display = 'none';
        }
        return;
    }
    
    console.log(`🔍 Buscando producto: "${query}" para fila ${rowIndex}`);
    
    // Llamar API para buscar productos
    fetch(`/app/api/sugerencias-productos/?q=${encodeURIComponent(query)}&limit=5`)
        .then(response => response.json())
        .then(productos => {
            if (productos && productos.length > 0) {
                mostrarSugerenciasProductos(productos, rowIndex, suggestionsDiv);
            } else {
                if (suggestionsDiv) {
                    suggestionsDiv.style.display = 'none';
                }
            }
        })
        .catch(error => {
            console.error('Error buscando productos:', error);
            if (suggestionsDiv) {
                suggestionsDiv.style.display = 'none';
            }
        });
}

// Función para mostrar sugerencias de productos
function mostrarSugerenciasProductos(productos, rowIndex, suggestionsDiv) {
    if (!suggestionsDiv) return;
    
    const categoriaCliente = obtenerCategoriaClienteActual();
    
    let html = '';
    productos.forEach(producto => {
        // Calcular precio según categoría del cliente
        const costoUnitario = parseFloat(producto.precio_proveedor) || 0;
        const precioLista = calcularPrecioSegunCategoria(costoUnitario, categoriaCliente);
        
        html += `
            <div class="suggestion-item p-2 hover:bg-gray-700 cursor-pointer border-b border-gray-600" 
                 onclick="seleccionarProductoExcel('${producto.numero_parte}', '${producto.descripcion}', ${costoUnitario}, ${precioLista}, ${rowIndex})">
                <div class="font-medium text-white">${producto.numero_parte}</div>
                <div class="text-sm text-gray-300">${producto.descripcion}</div>
                <div class="text-xs text-gray-400">Costo: $${costoUnitario.toFixed(2)} → Lista: $${precioLista.toFixed(2)} (Cat. ${categoriaCliente})</div>
            </div>
        `;
    });
    
    suggestionsDiv.innerHTML = html;
    suggestionsDiv.style.display = 'block';
}

// Función para seleccionar un producto de las sugerencias
function seleccionarProductoExcel(numeroParte, descripcion, costoUnitario, precioLista, rowIndex) {
    console.log(`✅ Seleccionando producto: ${numeroParte} para fila ${rowIndex}`);
    
    const row = document.querySelector(`[data-row="${rowIndex}"]`);
    if (!row) return;
    
    // Llenar campos del producto
    const celdaNoParte = row.querySelector('[data-field="noParte"]');
    const celdaDescripcion = row.querySelector('[data-field="descripcion"]');
    const celdaCostoUnitario = row.querySelector('[data-field="costoUnitario"]');
    const celdaPrecioLista = row.querySelector('[data-field="precioLista"]');
    
    if (celdaNoParte) celdaNoParte.textContent = numeroParte;
    if (celdaDescripcion) celdaDescripcion.textContent = descripcion;
    if (celdaCostoUnitario) celdaCostoUnitario.textContent = `$${costoUnitario.toFixed(2)}`;
    if (celdaPrecioLista) celdaPrecioLista.textContent = `$${precioLista.toFixed(2)}`;
    
    // Ocultar sugerencias
    const suggestionsDiv = document.getElementById(`suggestions-${rowIndex}`);
    if (suggestionsDiv) {
        suggestionsDiv.style.display = 'none';
    }
    
    // Recalcular la fila
    setTimeout(() => {
        if (typeof recalcularFilaExcelGeneral === 'function') {
            recalcularFilaExcelGeneral(rowIndex);
        }
    }, 100);
}

// Ocultar sugerencias cuando se hace clic fuera
document.addEventListener('click', function(event) {
    // Verificar si el clic no fue en un campo de búsqueda o en las sugerencias
    if (!event.target.closest('[data-field="noParte"]') && !event.target.closest('[id^="suggestions-"]')) {

        const allSuggestions = document.querySelectorAll('[id^="suggestions-"]');

});

    // Mostrar el contenido inicial nuevamente
    const initialContent = document.querySelector('.tables-container, .main-content, .container, #initial-workspace');
    if (initialContent) {
        initialContent.style.display = 'block';
        console.log('✅ Contenido inicial restaurado');
    }
    
    // Eliminar la tabla de volumetría actual
    const existingTable = document.getElementById('tabla-volumetria');
    if (existingTable) {
        existingTable.remove();
        console.log('✅ Tabla de volumetría eliminada');
    }
    
    // Remover clase de modo volumetría
    document.body.classList.remove('volumetria-mode');
    
    // Limpiar estado de volumetría guardado
    localStorage.removeItem('volumetria_estado');
}

// Función para volver a la página anterior
function volverAPaginaAnterior() {
    console.log('🔙 Volviendo a la página anterior...');
    
    // Intentar restaurar el contenido inicial primero
    const existingTable = document.getElementById('tabla-volumetria');
    if (existingTable) {
        // Si hay una tabla activa, solo restaurar el contenido inicial
        restaurarContenidoInicial();
        return;
    }
    
    // Limpiar estado de volumetría guardado
    localStorage.removeItem('volumetria_estado');
    
    // Verificar si hay historial de navegación
    if (window.history.length > 1) {
        // Usar history.back() para volver a la página anterior
        window.history.back();
    } else {
        // Si no hay historial, redirigir a la página principal de oportunidades
        window.location.href = '/app/todos/';
    }
}

// Estado global para el popup de búsqueda
let currentSearchPopup = null;
let currentFieldId = null;

// Función mejorada para mostrar popup de búsqueda al hacer clic en campo
function mostrarPopupBusquedaAvanzada(fieldId) {
    console.log(`🔍 Abriendo búsqueda avanzada para: ${fieldId}`);
    
    // Cerrar popup existente si hay uno
    cerrarPopupBusquedaActual();
    
    // Guardar referencia al campo actual
    currentFieldId = fieldId;
    
    // Determinar tipo de producto basado en el fieldId
    const tipoProducto = detectarTipoProducto(fieldId);
    
    // Crear el popup de búsqueda avanzada
    const popup = crearPopupBusquedaAvanzada(tipoProducto, fieldId);
    
    // Agregar al DOM
    document.body.appendChild(popup);
    currentSearchPopup = popup;
    
    // Activar el popup con animación
    setTimeout(() => {
        popup.classList.add('active');
    }, 10);
    
    // Enfocar en el campo de búsqueda después de la animación
    const searchInput = popup.querySelector('#search-input-popup');
    if (searchInput) {
        setTimeout(() => searchInput.focus(), 200);
    }
    
    // Cargar productos iniciales o recientes
    setTimeout(() => {
        const recentProducts = JSON.parse(localStorage.getItem(`recentProducts_${tipoProducto}`)) || [];

        if (recentProducts.length > 0) {
            mostrarMensajeResultados('🔄 Cargando productos recientes...');
            // Fetch details of recent products
            fetch(`/app/api/buscar-productos-por-numeros-parte/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ numeros_parte: recentProducts })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success && data.productos) {
                    mostrarResultadosPopup(data.productos);
                } else {
                    // Fallback to initial products if fetching recent fails
                    cargarProductosIniciales(tipoProducto);
                }
            })
            .catch(error => {
                console.error('Error fetching recent products:', error);
                cargarProductosIniciales(tipoProducto);
            });
        } else {
            cargarProductosIniciales(tipoProducto);
        }
    }, 300);
}

// Función para detectar tipo de producto basado en fieldId
function detectarTipoProducto(fieldId) {
    if (fieldId.includes('cable')) return 'cable';
    if (fieldId.includes('jack')) return 'jack';
    if (fieldId.includes('patchcord')) return 'patchcord';
    if (fieldId.includes('faceplate')) return 'faceplate';
    return 'general';
}
