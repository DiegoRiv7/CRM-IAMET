// Función para copiar toda la tabla al clipboard
function copiarTablaCompleta() {
    const table = document.getElementById('excel-table');
    if (!table) return;
    
    let csvContent = '';
    
    // Headers
    const headers = table.querySelectorAll('.excel-subheader th');
    csvContent += Array.from(headers).map(th => th.textContent.trim()).join('\t') + '\n';
    
    // Data rows
    const rows = table.querySelectorAll('.excel-row, .excel-totals-row');
    rows.forEach(row => {
        const cells = Array.from(row.children).slice(0, -1); // Excluir la columna de acciones
        const rowData = cells.map(cell => cell.textContent.trim()).join('\t');
        csvContent += rowData + '\n';
    });
    
    // Copiar al clipboard
    navigator.clipboard.writeText(csvContent).then(() => {
        alert('✅ Tabla copiada al portapapeles. Puedes pegarla en Excel.');
    }).catch(err => {
        console.error('Error copiando tabla:', err);
        alert('❌ Error al copiar tabla. Intenta seleccionar manualmente.');
    });
}

// Función para exportar como CSV
function exportarCSV() {
    console.log('📊 Exportando CSV unificado (principal + infraestructura)');
    
    let csvContent = 'data:text/csv;charset=utf-8,';
    
    // Headers una sola vez
    csvContent += 'Numero de Parte,Cantidad,Descripcion,Precio Lista,Descuento Cliente,Precio Unitario,Total Cliente,Descuento Proveedor,Costo Unitario,Total Costo,Ganancia\n';

        csvContent += '\n"=== PRODUCTOS PRINCIPALES ==="\n';
        const rowsPrincipal = tablePrincipal.querySelectorAll('.excel-row:not(.excel-totals-row)');
        rowsPrincipal.forEach(row => {
            const cells = row.querySelectorAll('.excel-cell:not(.excel-cell-action)');
            if (cells.length > 0) {
                const rowData = Array.from(cells).map(cell => `"${cell.textContent.trim()}"`).join(',');
                csvContent += rowData + '\n';
            }
        });
        
        // Totales de tabla principal
        const totalRowPrincipal = tablePrincipal.querySelector('.excel-totals-row');
        if (totalRowPrincipal) {
            const totalCells = Array.from(totalRowPrincipal.children).slice(0, -1);
            const totalData = totalCells.map(cell => `"${cell.textContent.trim()}"`).join(',');
            csvContent += totalData + '\n';
        }
    }
    
    // Sección 2: Tabla de Infraestructura (si existe y está visible)
    const tablaInfraestructura = document.getElementById('excel-table-infraestructura');
    const seccionInfraestructura = document.getElementById('seccion-infraestructura');
    
    if (tablaInfraestructura && seccionInfraestructura && seccionInfraestructura.style.display !== 'none') {
        csvContent += '\n"=== INFRAESTRUCTURA ==="\n';
        const rowsInfraestructura = tablaInfraestructura.querySelectorAll('.excel-row:not(.excel-totals-row)');
        let hayDatosInfra = false;
        
        rowsInfraestructura.forEach(row => {
            const cells = row.querySelectorAll('.excel-cell:not(.excel-cell-action)');
            if (cells.length > 0) {
                const primeraCelda = cells[0].textContent.trim();
                // Solo incluir filas que tengan datos (número de parte no vacío)
                if (primeraCelda && primeraCelda !== 'Nuevo producto' && primeraCelda !== '') {
                    const rowData = Array.from(cells).map(cell => `"${cell.textContent.trim()}"`).join(',');
                    csvContent += rowData + '\n';
                    hayDatosInfra = true;
                }
            }
        });
        
        // Si hay datos de infraestructura, incluir totales
        if (hayDatosInfra) {
            const totalRowInfra = tablaInfraestructura.querySelector('.excel-totals-row');
            if (totalRowInfra) {
                const totalCells = Array.from(totalRowInfra.children).slice(0, -1);
                const totalData = totalCells.map(cell => `"${cell.textContent.trim()}"`).join(',');
                csvContent += totalData + '\n';
            }
        }
    }
    
    // Totales Finales Consolidados
    csvContent += '\n"=== TOTALES CONSOLIDADOS ==="\n';
    const totalesPrincipal = obtenerTotalesTabla('excel-table');
    const totalesInfra = obtenerTotalesTabla('excel-table-infraestructura');
    
    const totalConsolidado = {
        cliente: totalesPrincipal.cliente + totalesInfra.cliente,
        costo: totalesPrincipal.costo + totalesInfra.costo,
        ganancia: (totalesPrincipal.cliente + totalesInfra.cliente) - (totalesPrincipal.costo + totalesInfra.costo)
    };
    
    csvContent += `"TOTAL GENERAL","","","","","","${formatearMoneda(totalConsolidado.cliente)}","","","${formatearMoneda(totalConsolidado.costo)}","${formatearMoneda(totalConsolidado.ganancia)}"\n`;
    
    // Descargar archivo
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement('a');
    link.setAttribute('href', encodedUri);
    link.setAttribute('download', `volumetria_${new Date().getTime()}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    console.log('📊 CSV exportado');
}

// Función auxiliar para obtener totales de una tabla específica
function obtenerTotalesTabla(tableId) {
    const table = document.getElementById(tableId);
    if (!table) return { cliente: 0, costo: 0 };
    
    let totalCliente = 0;
    let totalCosto = 0;
    
    const rows = table.querySelectorAll('.excel-row:not(.excel-totals-row)');
    rows.forEach(row => {
        const totalClienteCell = row.children[6]; // Columna de Total Cliente
        const totalCostoCell = row.children[9];   // Columna de Total Costo
        
        if (totalClienteCell && totalCostoCell) {
            totalCliente += parseCurrency(totalClienteCell.textContent) || 0;
            totalCosto += parseCurrency(totalCostoCell.textContent) || 0;
        }
    });
    
    return { cliente: totalCliente, costo: totalCosto };
}

// Función auxiliar para obtener totales de tabla de gastos
function obtenerTotalesGastos() {
    const table = document.getElementById('excel-table-gastos');
    if (!table) return 0;
    
    let totalGastos = 0;
    const rows = table.querySelectorAll('.excel-row:not(.excel-totals-row)');
    rows.forEach(row => {
        const totalCell = row.querySelector('[data-field="total"]');
        if (totalCell) {
            totalGastos += parseFloat(totalCell.textContent.replace(/[$,]/g, '')) || 0;
        }
    });
    
    return totalGastos;
}

// Función auxiliar para obtener totales de tabla de mano de obra
function obtenerTotalesManoObra() {
    const table = document.getElementById('excel-table-mano-obra');
    if (!table) return 0;
    
    let totalManoObra = 0;
    const rows = table.querySelectorAll('.excel-row:not(.excel-totals-row)');
    rows.forEach(row => {
        const costoTotalCell = row.querySelector('[data-field="costoTotal"]');
        if (costoTotalCell) {
            totalManoObra += parseFloat(costoTotalCell.textContent.replace(/[$,]/g, '')) || 0;
        }
    });

}

// Función para actualizar resumen consolidado (todas las 4 tablas)
function actualizarResumenConsolidado() {
    console.log('📊 Actualizando resumen consolidado de las 4 tablas');
    
    try {
        // Obtener totales de las tablas principales (general e infraestructura)
        const totalesGeneral = obtenerTotalesTabla('excel-table-general');
        const totalesInfra = obtenerTotalesTabla('excel-table-infraestructura');
        
        // Obtener totales de las tablas de costos (gastos e instalación, mano de obra)
        const totalGastos = obtenerTotalesGastos();
        const totalManoObra = obtenerTotalesManoObra();
        
        // Calcular totales consolidados
        const totalClienteConsolidado = totalesGeneral.cliente + totalesInfra.cliente;
        const totalCostoConsolidado = totalesGeneral.costo + totalesInfra.costo + totalGastos + totalManoObra;
        const gananciaTotalConsolidada = totalClienteConsolidado - totalCostoConsolidado;
        const margenConsolidado = totalClienteConsolidado > 0 ? (gananciaTotalConsolidada / totalClienteConsolidado) * 100 : 0;
        
        // Actualizar elementos del resumen consolidado si existen
        const elementoTotalCliente = document.getElementById('total-cliente-consolidado');
        const elementoTotalCosto = document.getElementById('total-costo-consolidado');  
        const elementoGananciaTotal = document.getElementById('ganancia-total-consolidada');
        const elementoMargenTotal = document.getElementById('margen-total-consolidado');
        
        if (elementoTotalCliente) {
            elementoTotalCliente.textContent = formatearMoneda(totalClienteConsolidado);
        }
        
        if (elementoTotalCosto) {
            elementoTotalCosto.textContent = formatearMoneda(totalCostoConsolidado);
        }
        
        if (elementoGananciaTotal) {
            elementoGananciaTotal.textContent = formatearMoneda(gananciaTotalConsolidada);
        }
        
        if (elementoMargenTotal) {
            elementoMargenTotal.textContent = `${margenConsolidado.toFixed(1)}% margen`;
        }
        
        console.log('💰 Totales consolidados (4 tablas) actualizados:', {
            cliente: formatearMoneda(totalClienteConsolidado),
            costoTotal: formatearMoneda(totalCostoConsolidado),
            ganancia: formatearMoneda(gananciaTotalConsolidada),
            margen: `${margenConsolidado.toFixed(1)}%`,
            desglose: {
                general: formatearMoneda(totalesGeneral.cliente),
                infraestructura: formatearMoneda(totalesInfra.cliente),
                gastos: formatearMoneda(totalGastos),
                manoObra: formatearMoneda(totalManoObra)
            }
        });
        
    } catch (error) {
        console.error('❌ Error actualizando resumen consolidado:', error);
    }
}

// Función auxiliar para parsear moneda
function parseCurrency(currencyString) {
    if (!currencyString) return 0;
    return parseFloat(currencyString.replace(/[$,]/g, '')) || 0;
}

// Función para recalcular fila de gastos de instalación
function recalcularFilaGastosInstalacion(rowIndex) {
    console.log(`💰 Recalculando fila gastos instalación ${rowIndex}`);
    
    try {
        const row = document.querySelector(`#excel-table-gastos [data-row="${rowIndex}"]`);
        if (!row) return;
        
        const cantidad = parseFloat(row.querySelector('[data-field="cantidad"]').textContent) || 0;
        const precioUnitario = parseFloat(row.querySelector('[data-field="precioUnitario"]').textContent.replace(/[$,]/g, '')) || 0;
        const descuento = parseFloat(row.querySelector('[data-field="descuento"]').textContent.replace('%', '')) || 0;
        
        // Nueva lógica simplificada:
        // Si hay descuento, aplicarlo al precio unitario
        let precioFinal = precioUnitario;
        if (descuento > 0) {
            precioFinal = precioUnitario * (1 - descuento / 100);
            // Actualizar el campo precio unitario con el descuento aplicado
            row.querySelector('[data-field="precioUnitario"]').textContent = formatearMoneda(precioFinal);
            // Limpiar el descuento ya que se aplicó
            row.querySelector('[data-field="descuento"]').textContent = '0%';
        }
        
        // Calcular total: Precio Unitario × Cantidad
        const total = cantidad * precioFinal;
        
        // Actualizar celda del total
        row.querySelector('[data-field="total"]').textContent = formatearMoneda(total);
        
        // Recalcular totales de la tabla
        recalcularTotalesGastosInstalacion();
        
    } catch (error) {
        console.error('❌ Error recalculando fila gastos instalación:', error);
    }
}

// Función para recalcular totales de gastos de instalación
function recalcularTotalesGastosInstalacion() {
    console.log('💰 Recalculando totales de gastos de instalación');
    
    try {
        const table = document.getElementById('excel-table-gastos');
        if (!table) return;
        
        let totalGastos = 0;
        
        const rows = table.querySelectorAll('.excel-row:not(.excel-totals-row)');
        rows.forEach(row => {
            const totalCell = row.querySelector('[data-field="total"]');
            if (totalCell) {
                const valor = parseFloat(totalCell.textContent.replace(/[$,]/g, '')) || 0;
                totalGastos += valor;
            }
        });
        
        // Actualizar fila de totales
        const totalsRow = table.querySelector('.excel-totals-row');
        if (totalsRow) {
            const totalCell = totalsRow.querySelector('.excel-total');
            if (totalCell) {
                totalCell.textContent = formatearMoneda(totalGastos);
            }
        }
        
        // Actualizar elementos del resumen de gastos si existen
        const totalGastosEl = document.getElementById('total-gastos-instalacion');
        if (totalGastosEl) {
            totalGastosEl.textContent = formatearMoneda(totalGastos);
        }
        
        console.log('✅ Totales gastos instalación actualizados:', { totalGastos });
        
        // Actualizar resumen consolidado
        setTimeout(() => {
            actualizarResumenConsolidado();
        }, 100);
        
    } catch (error) {
        console.error('❌ Error recalculando totales gastos instalación:', error);
    }
}

function agregarFilaGastosInstalacion() {
    const tbody = document.getElementById('excel-tbody-gastos');
    if (!tbody) return;

// Función para recalcular fila de mano de obra
function recalcularFilaManoObra(rowIndex) {
    console.log(`👷 Recalculando fila mano de obra ${rowIndex}`);
    
    try {
        const row = document.querySelector(`#excel-table-mano-obra [data-row="${rowIndex}"]`);
        if (!row) return;
        
        const cantidad = parseFloat(row.querySelector('[data-field="cantidad"]').textContent) || 0;
        const costoUnit = parseFloat(row.querySelector('[data-field="costoUnit"]').textContent.replace(/[$,]/g, '')) || 0;
        const dias = parseFloat(row.querySelector('[data-field="dias"]').textContent) || 0;
        
        // Calcular concentrado = costo unitario × cantidad
        const concentrado = costoUnit * cantidad;
        row.querySelector('[data-field="concentrado"]').textContent = formatearMoneda(concentrado);
        
        // Calcular costo total = costo unitario × cantidad × días
        const costoTotal = costoUnit * cantidad * dias;
        row.querySelector('[data-field="costoTotal"]').textContent = formatearMoneda(costoTotal);
        
        // Recalcular totales de la tabla
        recalcularTotalesManoObra();
        
    } catch (error) {
        console.error('❌ Error recalculando fila mano de obra:', error);
    }
}

// Función para recalcular totales de mano de obra
function recalcularTotalesManoObra() {
    console.log('👷 Recalculando totales de mano de obra');
    
    try {
        const table = document.getElementById('excel-table-mano-obra');
        if (!table) return;
        
        let totalManoObra = 0;
        
        const rows = table.querySelectorAll('.excel-row:not(.excel-totals-row)');
        rows.forEach(row => {
            const costoTotalCell = row.querySelector('[data-field="costoTotal"]');
            if (costoTotalCell) {
                const valor = parseFloat(costoTotalCell.textContent.replace(/[$,]/g, '')) || 0;
                totalManoObra += valor;
            }
        });
        
        // Actualizar fila de totales
        const totalsRow = table.querySelector('.excel-totals-row');
        if (totalsRow) {
            const totalCell = totalsRow.querySelector('.excel-total');
            if (totalCell) {
                totalCell.textContent = formatearMoneda(totalManoObra);
            }
        }
        
        // Actualizar elementos del resumen de mano de obra si existen
        const totalManoObraEl = document.getElementById('total-mano-obra');
        if (totalManoObraEl) {
            totalManoObraEl.textContent = formatearMoneda(totalManoObra);
        }
        
        console.log('✅ Totales mano de obra actualizados:', { totalManoObra });
        
        // Actualizar resumen consolidado
        setTimeout(() => {
            actualizarResumenConsolidado();
        }, 100);
        
    } catch (error) {
        console.error('❌ Error recalculando totales mano de obra:', error);
    }
}

function agregarFilaManoObra() {
    const tbody = document.getElementById('excel-tbody-mano-obra');
    if (!tbody) return;

// Función para eliminar fila individual de gastos de instalación
function eliminarFilaGastosInstalacion(rowIndex) {
    console.log(`🗑️ Eliminando fila ${rowIndex} de gastos de instalación`);
    
    const tbody = document.getElementById('excel-tbody-gastos');
    if (!tbody) return;
    
    const row = tbody.querySelector(`tr[data-row="${rowIndex}"]`);
    if (!row || row.classList.contains('excel-totals-row')) {
        console.warn('⚠️ No se puede eliminar: fila no encontrada o es fila de totales');
        return;
    }
    
    // Animación de salida
    row.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
    row.style.opacity = '0';
    row.style.transform = 'translateX(-20px) scale(0.95)';
    row.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';
    
    setTimeout(() => {
        row.remove();
        
        // Reindexar filas restantes
        reindexarFilasGastosInstalacion();
        
        // Recalcular totales
        recalcularTotalesGastosInstalacion();
        
        console.log('✅ Fila de gastos eliminada y totales recalculados');

}

// Función para reindexar filas de gastos de instalación
function reindexarFilasGastosInstalacion() {
    const tbody = document.getElementById('excel-tbody-gastos');
    if (!tbody) return;
    
    const rows = tbody.querySelectorAll('tr.excel-row:not(.excel-totals-row)');
    rows.forEach((row, index) => {
        row.setAttribute('data-row', index);
        
        // Actualizar atributos de las celdas
        const cells = row.querySelectorAll('.excel-cell[data-row]');
        cells.forEach(cell => {
            cell.setAttribute('data-row', index);
        });
        
        // Actualizar onclick del botón eliminar
        const deleteBtn = row.querySelector('.excel-delete-btn');
        if (deleteBtn) {
            deleteBtn.setAttribute('onclick', `eliminarFilaGastosInstalacion(${index})`);
        }
        
        // Actualizar onblur y oninput de las celdas editables
        const editableCells = row.querySelectorAll('.editable[onblur], .editable[oninput]');
        editableCells.forEach(cell => {
            const currentOnblur = cell.getAttribute('onblur');
            const currentOninput = cell.getAttribute('oninput');
            
            if (currentOnblur && currentOnblur.includes('recalcularFilaGastosInstalacion')) {
                cell.setAttribute('onblur', `recalcularFilaGastosInstalacion(${index})`);
            }
            if (currentOninput && currentOninput.includes('recalcularFilaGastosInstalacion')) {
                cell.setAttribute('oninput', `recalcularFilaGastosInstalacion(${index})`);
            }
        });
    });
    
    console.log(`🔢 Reindexadas ${rows.length} filas de gastos de instalación`);
}

// Crear zona invisible de hover en el borde derecho
function createInvisibleHoverZone() {
    console.log('🎯 Creando zona invisible de hover');
    
    const hoverZone = document.createElement('div');
    hoverZone.id = 'component-hover-zone';
    hoverZone.style.cssText = `
        position: fixed;
        top: 0;
        right: 0;
        width: 15px;
        height: 100vh;
        z-index: 9998;
        background: transparent;
        pointer-events: auto;
        cursor: pointer;
    `;
    
    document.body.appendChild(hoverZone);
    
    let hoverTimeout;
    const panel = document.getElementById('component-bar-panel');
    
    // Eventos para la zona invisible
    hoverZone.addEventListener('mouseenter', () => {
        clearTimeout(hoverTimeout);
        if (panel) {
            panel.classList.add('visible');
            console.log('👁️ Panel mostrado via hover zone');
            
            // Marcar que el usuario ya descubrió la funcionalidad
            localStorage.setItem('component-bar-discovered', 'true');
            
            // Ocultar indicador de onboarding si existe
            const indicator = document.getElementById('onboarding-indicator');
            if (indicator) {
                indicator.style.opacity = '0';
                setTimeout(() => indicator.remove(), 300);
            }
        }
    });
    
    // También agregar evento al container principal para mantener visible
    const container = document.getElementById('floating-component-bar');
    if (container) {
        container.addEventListener('mouseenter', () => {
            clearTimeout(hoverTimeout);
        });
        
        container.addEventListener('mouseleave', () => {
            hoverTimeout = setTimeout(() => {
                if (panel) {
                    panel.classList.remove('visible');
                    console.log('👁️ Panel ocultado');

// Configurar eventos de la barra de componentes
function setupComponentBarEvents() {
    const panel = document.getElementById('component-bar-panel');
    
    if (!panel) return;
    
    // Configurar drag and drop para cada componente
    const componentItems = document.querySelectorAll('.component-item');
    componentItems.forEach(item => {
        item.draggable = true;
        
        item.addEventListener('dragstart', (e) => {
            const componentType = item.dataset.component;
            const tableType = item.dataset.type;
            
            e.dataTransfer.setData('application/json', JSON.stringify({
                component: componentType,
                type: tableType,
                name: item.querySelector('.component-name').textContent
            }));
            
            item.classList.add('dragging');
            console.log(`🎯 Iniciando drag de componente: ${componentType}`);
        });
        
        item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
        });
    });
}

// Implementar drag and drop en las tablas
function setupTableDropZones() {
    console.log('🎯 Configurando zonas de drop en las tablas');
    
    // Obtener todas las tablas de volumetría
    const tables = [
        'excel-table-general',
        'excel-table-infraestructura', 
        'excel-table-gastos',
        'excel-table-mano-obra'
    ];
    
    tables.forEach(tableId => {
        const table = document.getElementById(tableId);
        if (!table) return;
        
        const tbody = table.querySelector('tbody');
        if (!tbody) return;
        
        // Configurar eventos de drop en el tbody
        tbody.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            tbody.classList.add('drop-zone-active');
        });
        
        tbody.addEventListener('dragleave', (e) => {
            if (!tbody.contains(e.relatedTarget)) {
                tbody.classList.remove('drop-zone-active');
            }
        });
        
        tbody.addEventListener('drop', (e) => {
            e.preventDefault();
            tbody.classList.remove('drop-zone-active');
            
            try {
                const componentData = JSON.parse(e.dataTransfer.getData('application/json'));
                console.log(`📦 Componente soltado en tabla ${tableId}:`, componentData);
                
                // Verificar compatibilidad de componente con tabla
                if (isComponentCompatibleWithTable(componentData, tableId)) {
                    addComponentToTable(componentData, tableId);
                    showDropSuccessNotification(componentData.name, getTableDisplayName(tableId));
                } else {
                    showDropErrorNotification(componentData.name, getTableDisplayName(tableId));
                }
            } catch (error) {
                console.error('❌ Error procesando drop:', error);
            }
        });
    });
}

// Verificar si un componente es compatible con una tabla específica
function isComponentCompatibleWithTable(componentData, tableId) {
    const compatibilityMap = {
        'network-node': ['excel-table-general'],
        'pipe': ['excel-table-infraestructura'],
        'camera': ['excel-table-general', 'excel-table-infraestructura'],
        'access-control': ['excel-table-general', 'excel-table-infraestructura']
    };
    
    return compatibilityMap[componentData.component]?.includes(tableId) || false;
}

// Obtener nombre display de la tabla
function getTableDisplayName(tableId) {
    const displayNames = {
        'excel-table-general': 'Tabla General',
        'excel-table-infraestructura': 'Infraestructura',
        'excel-table-gastos': 'Gastos de Instalación',
        'excel-table-mano-obra': 'Mano de Obra'
    };
    
    return displayNames[tableId] || tableId;
}

// Agregar componente a la tabla
function addComponentToTable(componentData, tableId) {
    console.log(`➕ Agregando ${componentData.name} a ${tableId}`);
    
    const tbody = document.querySelector(`#${tableId} tbody`);
    if (!tbody) return;
    
    // Buscar la primera fila vacía o agregar nueva fila
    const emptyRow = findEmptyRow(tbody) || addNewRowToTable(tableId);
    
    if (emptyRow) {
        fillRowWithComponentData(emptyRow, componentData, tableId);
        
        // Recalcular totales según la tabla
        setTimeout(() => {
            const rowIndex = emptyRow.dataset.row;
            if (tableId === 'excel-table-general') {
                recalcularFilaGeneral(rowIndex);
            } else if (tableId === 'excel-table-infraestructura') {
                recalcularFilaInfraestructura(rowIndex);
            }
        }, 100);
    }
}

// Buscar primera fila vacía en la tabla
function findEmptyRow(tbody) {
    const rows = tbody.querySelectorAll('tr.excel-row');
    
    for (let row of rows) {
        const firstCell = row.querySelector('.editable[contenteditable="true"]');
        if (firstCell && (!firstCell.textContent.trim() || firstCell.textContent.trim() === '-')) {
            return row;
        }
    }
    
    return null;
}

// Agregar nueva fila a la tabla
function addNewRowToTable(tableId) {
    if (tableId === 'excel-table-general') {
        agregarNuevaFilaGeneral();
        const tbody = document.querySelector(`#${tableId} tbody`);
        const rows = tbody.querySelectorAll('tr.excel-row');
        return rows[rows.length - 1];
    } else if (tableId === 'excel-table-infraestructura') {
        agregarNuevaFilaInfraestructura();
        const tbody = document.querySelector(`#${tableId} tbody`);
        const rows = tbody.querySelectorAll('tr.excel-row');
        return rows[rows.length - 1];
    }
    
    return null;
}

// Llenar fila con datos del componente
function fillRowWithComponentData(row, componentData, tableId) {
    const componentTemplates = {
        'network-node': {
            noParte: 'SW-24PORT-GIG',
            descripcion: 'Switch 24 puertos Gigabit',
            cantidad: 1,
            precioLista: 450.00
        },
        'pipe': {
            noParte: 'CONDUIT-2IN',
            descripcion: 'Conducto metálico 2" EMT',
            cantidad: 10,
            precioLista: 25.00
        },
        'camera': {
            noParte: 'CAM-IP-DOME-4MP',
            descripcion: 'Cámara IP Domo 4MP PoE',
            cantidad: 1,
            precioLista: 180.00
        },
        'access-control': {
            noParte: 'AC-PROX-READER',
            descripcion: 'Lector de proximidad para control de acceso',
            cantidad: 1,
            precioLista: 120.00
        }
    };
    
    const template = componentTemplates[componentData.component];
    if (!template) return;
    
    // Llenar campos según la estructura de la tabla
    const cells = {
        noParte: row.querySelector('[data-field="noParte"]'),
        cantidad: row.querySelector('[data-field="cantidad"]'),
        descripcion: row.querySelector('[data-field="descripcion"]'),
        precioLista: row.querySelector('[data-field="precioLista"]')
    };
    
    if (cells.noParte) cells.noParte.textContent = template.noParte;
    if (cells.cantidad) cells.cantidad.textContent = template.cantidad;
    if (cells.descripcion) cells.descripcion.textContent = template.descripcion;
    if (cells.precioLista) cells.precioLista.textContent = `$${template.precioLista.toFixed(2)}`;
    
    // Agregar efecto visual de éxito
    row.classList.add('row-just-added');
    setTimeout(() => {
        row.classList.remove('row-just-added');
    }, 2000);
}

// Notificaciones de éxito y error
function showDropSuccessNotification(componentName, tableName) {
    showNotification(`✅ ${componentName} agregado a ${tableName}`, 'success');
}

function showDropErrorNotification(componentName, tableName) {
    showNotification(`❌ ${componentName} no es compatible con ${tableName}`, 'error');
}

function showNotification(message, type = 'info') {
    // Crear elemento de notificación
    const notification = document.createElement('div');
    notification.className = `drop-notification ${type}`;
    notification.textContent = message;
    
    // Agregar al DOM
    document.body.appendChild(notification);
    
    // Mostrar con animación
    setTimeout(() => notification.classList.add('show'), 100);
    
    // Ocultar después de 3 segundos
    setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

// Inicializar funcionalidad del nuevo workspace
function initWorkspaceComponents() {
    console.log('🚀 Inicializando workspace de volumetría profesional');
    
    // Configurar drag and drop para las nuevas tarjetas de componentes
    const componentCards = document.querySelectorAll('.component-card');
    componentCards.forEach(card => {
        card.addEventListener('dragstart', (e) => {
            const componentType = card.dataset.component;
            const tableType = card.dataset.type;
            
            e.dataTransfer.setData('application/json', JSON.stringify({
                component: componentType,
                type: tableType,
                name: card.querySelector('.component-title').textContent
            }));
            
            card.classList.add('dragging');
            console.log(`🎯 Iniciando drag de componente desde sidebar: ${componentType}`);
        });
        
        card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
        });
    });
    
    // Configurar zonas de drop en tablas
    setupTableDropZones();
    
    // Actualizar información del proyecto en el workspace
    updateWorkspaceInfo();
    
    // Sincronizar selectores de moneda
    syncCurrencySelectors();
}

// Actualizar información del proyecto en el workspace
function updateWorkspaceInfo() {
    const oportunidadData = window.sessionOportunidadData;
    if (!oportunidadData) return;
    
    // Actualizar título del proyecto
    const projectInfo = document.getElementById('workspace-project-info');
    if (projectInfo && oportunidadData.cliente_nombre && oportunidadData.oportunidad_nombre) {
        projectInfo.textContent = `${oportunidadData.cliente_nombre} - ${oportunidadData.oportunidad_nombre}`;
    }
    
    // Actualizar resumen del pie de página
    const footerCliente = document.getElementById('footer-cliente-display');
    const footerOportunidad = document.getElementById('footer-oportunidad-display');
    
    if (footerCliente && oportunidadData.cliente_nombre) {
        footerCliente.textContent = oportunidadData.cliente_nombre;
    }
    
    if (footerOportunidad && oportunidadData.oportunidad_nombre) {
        footerOportunidad.textContent = oportunidadData.oportunidad_nombre;
    }
}

// Sincronizar selectores de moneda
function syncCurrencySelectors() {
    const mainSelector = document.getElementById('moneda-select');
    const footerSelector = document.getElementById('footer-moneda-select');
    
    if (mainSelector && footerSelector) {
        // Sincronizar valores iniciales
        footerSelector.value = mainSelector.value;
        
        // Sincronizar cambios
        mainSelector.addEventListener('change', () => {
            footerSelector.value = mainSelector.value;
        });
        
        footerSelector.addEventListener('change', () => {
            mainSelector.value = footerSelector.value;
            // Trigger el evento de cambio en el selector principal
            mainSelector.dispatchEvent(new Event('change'));
        });
    }
}

// Actualizar total en el pie de página
function updateFooterTotal(total) {
    const footerTotal = document.getElementById('footer-total-display');
    if (footerTotal && total !== undefined) {
        footerTotal.textContent = formatearMoneda(total);
    }
}

// Llamar función de inicialización cuando el DOM esté listo
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        // initComponentBar(); // DESHABILITADO - componentes ya están fijos en la izquierda
        setupTableDropZones();
        
        // Verificar si estamos en el nuevo workspace
        const workspace = document.getElementById('tabla-volumetria');
        if (workspace && workspace.classList.contains('volumetria-workspace')) {
            initWorkspaceComponents();
        }
    }, 1000); // Delay para asegurar que todo esté cargado
});

document.addEventListener('DOMContentLoaded', function() {

        console.log('📱 Dispositivo detectado:', deviceInfo);
        
        const body = document.body;
        const tables = document.querySelectorAll('.excel-table-wrapper');
        
        // Remover clases existentes
        body.classList.remove('device-mobile', 'device-tablet', 'device-desktop', 'device-monitor', 'device-tv', 'screen-4k');
        
        // Agregar clases basadas en detección
        body.classList.add(`device-${deviceInfo.type.replace('-', '')}`);
        body.classList.add(`screen-${deviceInfo.category.replace('-', '')}`);
        
        // Optimizaciones específicas para cada tipo de dispositivo
        switch (deviceInfo.type) {
            case 'tv':
                // TVs necesitan elementos más grandes y mejor contraste
                document.documentElement.style.setProperty('--table-font-scale', '1.3');
                document.documentElement.style.setProperty('--table-padding-scale', '1.5');
                console.log('📺 Optimizaciones para TV aplicadas');
                break;
                
            case 'monitor-large':
                // Monitores grandes pueden mostrar más información
                document.documentElement.style.setProperty('--table-font-scale', '1.1');
                document.documentElement.style.setProperty('--table-padding-scale', '1.2');
                console.log('🖥️ Optimizaciones para monitor grande aplicadas');
                break;
                
            case 'tablet':
                // Tablets necesitan elementos táctiles más grandes
                document.documentElement.style.setProperty('--table-touch-scale', '1.2');
                console.log('📱 Optimizaciones para tablet aplicadas');
                break;
                
            case 'mobile':
                // Móviles necesitan interfaz compacta pero accesible
                document.documentElement.style.setProperty('--table-font-scale', '0.9');
                document.documentElement.style.setProperty('--table-compact-mode', '1');
                console.log('📞 Optimizaciones para móvil aplicadas');
                break;
        }
        
        // Ajustes adicionales para pantallas de alta densidad
        if (deviceInfo.pixelRatio >= 2) {
            body.classList.add('high-dpi');
            document.documentElement.style.setProperty('--font-smoothing', 'antialiased');
        }
        
        // Aplicar optimizaciones a tablas existentes
        tables.forEach(table => {
            if (deviceInfo.type === 'tv' || deviceInfo.type === 'monitor-large') {
                table.style.minWidth = Math.max(1400, deviceInfo.viewport.width * 0.8) + 'px';
            }
        });
    }
    
    // Función para reajustar al cambiar tamaño de ventana
    function handleResize() {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(() => {
            const deviceInfo = detectDeviceType();
            applyDeviceOptimizations(deviceInfo);
            console.log('🔄 Tablas redimensionadas para:', deviceInfo.type);
        }, 250);
    }
    
    // Inicializar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', function() {
        const deviceInfo = detectDeviceType();
        applyDeviceOptimizations(deviceInfo);
        
        // Escuchar cambios de tamaño
        window.addEventListener('resize', handleResize);
        
        // Escuchar cambios de orientación en dispositivos móviles
        window.addEventListener('orientationchange', function() {
            setTimeout(() => {
                const deviceInfo = detectDeviceType();
                applyDeviceOptimizations(deviceInfo);
            }, 100);
        });
        
        console.log('✅ Sistema de redimensionamiento inteligente iniciado');
    });
    
    // Exponer funciones globalmente para depuración
    window.VolumetriaResponsive = {
        detectDevice: detectDeviceType,
        applyOptimizations: applyDeviceOptimizations
    };
})();

// Funciones de cálculo para tablas dinámicas
function recalcularFilaGastos(rowIndex) {
    const fila = document.querySelector(`#excel-table-gastos [data-row="${rowIndex}"]`);
    if (!fila) return;
    
    const cantidad = parseFloat(fila.querySelector('[data-field="cantidad"]')?.textContent || '0');
    const precio = parseFloat(fila.querySelector('[data-field="precio"]')?.textContent?.replace(/[$,]/g, '') || '0');
    const total = cantidad * precio;
    
    const totalCell = fila.querySelector('[data-field="total"]');
    if (totalCell) {
        totalCell.textContent = formatearMoneda(total);
    }
    
    // Recalcular total de gastos
    recalcularTotalGastos();
}

function recalcularFilaManoObra(rowIndex) {
    const fila = document.querySelector(`#excel-table-mano-obra [data-row="${rowIndex}"]`);
    if (!fila) return;
    
    const cantidad = parseFloat(fila.querySelector('[data-field="cantidad"]')?.textContent || '0');

    const precio = parseFloat(fila.querySelector('[data-field="precio"]')?.textContent?.replace(/[$,]/g, '') || '0');
    const total = cantidad * horas * precio;
    
    const totalCell = fila.querySelector('[data-field="total"]');
    if (totalCell) {
        totalCell.textContent = formatearMoneda(total);
    }
    
    // Recalcular total de mano de obra
    recalcularTotalManoObra();
}

function recalcularTotalGastos() {
    const filas = document.querySelectorAll('#excel-table-gastos [data-row]:not(.excel-totals-row)');
    let total = 0;
    
    filas.forEach(fila => {
        const totalCell = fila.querySelector('[data-field="total"]');
        if (totalCell) {
            total += parseFloat(totalCell.textContent?.replace(/[$,]/g, '') || '0');
        }
    });
    
    const totalElement = document.getElementById('total-gastos');
    if (totalElement) {
        totalElement.textContent = formatearMoneda(total);
    }
}

    const componentCards = document.querySelectorAll('.component-card');
    componentCards.forEach(card => {
        card.addEventListener('click', function() {
            const componentType = this.getAttribute('data-component');
            abrirCuestionarioComponente(componentType);

        card.style.cursor = 'pointer';
        card.addEventListener('mouseenter', function() {

        });
        card.addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1)';
        });
    });
}

// Función para generar el formulario del cuestionario
function generarFormularioCuestionario(questions, componentType) {
    let html = '<div class="max-h-96 overflow-y-auto mb-4"><form id="component-form" onsubmit="procesarCuestionario(event, \'' + componentType + '\')">';
    
    questions.forEach(question => {
        html += '<div class="mb-4">';
        
        // Label con indicador de requerido
        const requiredIndicator = question.required ? '<span class="text-red-400">*</span>' : '';
        html += '<label class="block text-white text-sm font-medium mb-2">' + question.label + ' ' + requiredIndicator + '</label>';
        
        // Atributos comunes
        const requiredAttr = question.required ? 'required' : '';
        const placeholderAttr = question.placeholder ? 'placeholder="' + question.placeholder + '"' : '';
        const baseClasses = 'w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:border-blue-500 focus:outline-none';
        
        switch (question.type) {
            case 'number':
                html += '<input type="number" id="' + question.id + '" name="' + question.id + '" class="' + baseClasses + '" value="' + (question.value || '') + '" ' + requiredAttr + ' ' + placeholderAttr + ' min="0">';
                break;
                
            case 'select':
                html += '<select id="' + question.id + '" name="' + question.id + '" class="' + baseClasses + '" ' + requiredAttr + '>';
                if (!question.required) {
                    html += '<option value="">Seleccionar (opcional)...</option>';
                } else {
                    html += '<option value="">Seleccionar...</option>';
                }
                question.options.forEach(option => {
                    html += '<option value="' + option + '">' + option + '</option>';
                });
                html += '</select>';
                break;
                
            case 'text':
                html += '<input type="text" id="' + question.id + '" name="' + question.id + '" class="' + baseClasses + '" ' + requiredAttr + ' ' + placeholderAttr + '>';
                break;
                
            case 'checkbox':
                html += '<label class="flex items-center"><input type="checkbox" id="' + question.id + '" name="' + question.id + '" class="mr-2 text-blue-500 bg-gray-700 border-gray-600 rounded focus:ring-blue-500"><span class="text-white">Sí</span></label>';
                break;
                
            default:
                html += '<input type="text" id="' + question.id + '" name="' + question.id + '" class="' + baseClasses + '" ' + requiredAttr + ' ' + placeholderAttr + '>';
        }
        html += '</div>';
    });
    
    html += '</form></div>';
    html += '<div class="flex space-x-3 mt-6 pt-4 border-t border-gray-600">';
    html += '<button type="submit" form="component-form" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg font-medium transition duration-200">Generar Tabla</button>';
    html += '<button type="button" onclick="cerrarCuestionario()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-2 px-4 rounded-lg font-medium transition duration-200">Cancelar</button>';
    html += '</div>';
    
    return html;
}

// Función para cerrar el cuestionario
function cerrarCuestionario() {
    const modal = document.getElementById('component-questionnaire-modal');
    if (modal) {
        modal.classList.add('hidden');
    }
    
    // Restaurar el estado del body y página completamente - más agresivo
    document.body.style.cssText = '';
    document.documentElement.style.cssText = '';
    
    // Aplicar los estilos correctos manualmente
    document.body.style.margin = '0';
    document.body.style.padding = '0';
    document.body.style.position = 'relative';
    document.body.style.width = '100%';
    document.body.style.height = 'auto';
    document.body.style.overflow = 'auto';
    
    document.documentElement.style.margin = '0';
    document.documentElement.style.padding = '0';
    document.documentElement.style.position = 'relative';
    document.documentElement.style.width = '100%';
    document.documentElement.style.height = '100%';
    document.documentElement.style.overflow = 'auto';
    
    // Asegurar que el workspace principal esté visible y bien posicionado
    setTimeout(() => {
        const workspace = document.getElementById('tabla-volumetria');
        if (workspace) {
            // Limpiar todos los estilos inline del workspace
            workspace.style.cssText = '';
            
            // Aplicar estilos correctos
            workspace.style.display = 'block';
            workspace.style.visibility = 'visible';
            workspace.style.position = 'static';
            workspace.style.width = '100%';
            workspace.style.height = 'auto';
            workspace.style.top = 'auto';
            workspace.style.left = 'auto';
            workspace.style.transform = 'none';
            workspace.style.zIndex = 'auto';
            
            // Forzar un reflow
            workspace.offsetHeight;
        }
        
        // Scroll hacia arriba para mostrar las tablas
        window.scrollTo(0, 0);
        console.log('✅ Layout completamente restaurado después de cerrar modal');
    }, 50);
}

// Función para procesar el cuestionario y generar tabla automáticamente
function procesarCuestionario(event, componentType) {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const respuestas = {};
    
    for (let [key, value] of formData.entries()) {
        respuestas[key] = value;
    }
    
    console.log('📋 Respuestas del cuestionario:', respuestas);
    
    // Generar tabla automáticamente basada en las respuestas
    generarTablaDesdeRespuestas(componentType, respuestas);
    
    // Cerrar modal
    cerrarCuestionario();
}

// Función para generar tabla automáticamente desde respuestas
function generarTablaDesdeRespuestas(componentType, respuestas) {
    console.log('🔧 Generando tabla automática para:', componentType);
    
    // Primero, asegurar que existe la tabla principal
    if (!document.getElementById('tabla-principal-precios')) {
        agregarTablaPrincipal();
    }
    
    // Generar items según el tipo de componente
    const items = generarItemsComponente(componentType, respuestas);
    
    // Agregar items a la tabla principal
    items.forEach(item => {
        agregarItemATabla(item);
    });
    
    // Mostrar mensaje de éxito
    mostrarMensajeExito(`Se agregaron ${items.length} items para ${componentType}`);
}

// Función para agregar item a tabla
function agregarItemATabla(item) {
    if (item.cantidad === 0) return; // No agregar items con cantidad 0
    
    const tbody = document.getElementById('excel-tbody-general');
    if (!tbody) return;
    
    const newIndex = tbody.children.length - 1; // -1 por la fila de totales
    
    const nuevaFila = document.createElement('tr');
    nuevaFila.className = 'excel-row';
    nuevaFila.setAttribute('data-row', newIndex);
    
    nuevaFila.innerHTML = `
        <td class="excel-cell" data-field="item">${newIndex + 1}</td>
        <td class="excel-cell editable" contenteditable="true" data-field="noParte" data-row="${newIndex}">AUTO-${Date.now()}</td>
        <td class="excel-cell editable" contenteditable="true" data-field="descripcion" data-row="${newIndex}">${item.descripcion}</td>
        <td class="excel-cell editable" contenteditable="true" data-field="cantidad" data-row="${newIndex}" onblur="recalcularFilaExcelGeneral(${newIndex})">${item.cantidad}</td>
        <td class="excel-cell editable" contenteditable="true" data-field="precioLista" data-row="${newIndex}" onblur="recalcularFilaExcelGeneral(${newIndex})">$${item.precio.toFixed(2)}</td>
        <td class="excel-cell editable" contenteditable="true" data-field="descuentoCliente" data-row="${newIndex}" onblur="recalcularFilaExcelGeneral(${newIndex})">0%</td>
        <td class="excel-cell calculated" data-field="precioFinalCliente" data-row="${newIndex}">$${(item.cantidad * item.precio).toFixed(2)}</td>
        <td class="excel-cell editable" contenteditable="true" data-field="descuentoProveedor" data-row="${newIndex}" onblur="recalcularFilaExcelGeneral(${newIndex})">0%</td>
        <td class="excel-cell editable" contenteditable="true" data-field="costoUnitario" data-row="${newIndex}" onblur="recalcularFilaExcelGeneral(${newIndex})">$${(item.precio * 0.7).toFixed(2)}</td>
        <td class="excel-cell calculated" data-field="costoTotal" data-row="${newIndex}">$${(item.cantidad * item.precio * 0.7).toFixed(2)}</td>
        <td class="excel-cell">
            <button onclick="eliminarFilaExcelGeneral(${newIndex})" class="excel-delete-btn" title="Eliminar fila">⋯</button>
        </td>
    `;
    
    // Insertar antes de la fila de totales
    const filaTotales = tbody.querySelector('.excel-totals-row');
    tbody.insertBefore(nuevaFila, filaTotales);
    
    // Recalcular totales
    setTimeout(() => {
        recalcularFilaExcelGeneral(newIndex);
        actualizarIndicesFilasGeneral();
    }, 100);
}
