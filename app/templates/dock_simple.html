<!-- Dock Simple y Funcional -->
<style>
.dock-simple {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 10px;
    display: flex;
    gap: 10px;
    z-index: 9999;
}

.dock-item-simple {
    width: 60px;
    height: 60px;
    background: #333;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-decoration: none;
    transition: transform 0.2s;
}

.dock-item-simple:hover {
    transform: scale(1.1);
}

.dock-item-simple i {
    font-size: 24px;
}
</style>

<div class="dock-simple">
    <a href="/app/home/" class="dock-item-simple">
        <i class="fas fa-home"></i>
    </a>
    <a href="/app/todos/" class="dock-item-simple">
        <i class="fas fa-tasks"></i>
    </a>
    <a href="/app/clientes/" class="dock-item-simple">
        <i class="fas fa-users"></i>
    </a>
    <a href="/app/cotizaciones/" class="dock-item-simple">
        <i class="fas fa-file-invoice-dollar"></i>
    </a>
    <a href="/app/dashboard/" class="dock-item-simple">
        <i class="fas fa-chart-bar"></i>
    </a>
</div>

<script>
// Asegurar que el dock se muestre
document.addEventListener('DOMContentLoaded', function() {
    const dock = document.querySelector('.dock-simple');
    if (dock) {
        dock.style.display = 'flex';
        console.log('✅ Dock simple cargado correctamente');
    }
});
</script>
