<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="iamBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <!-- Fondo azul navy -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="url(#iamBg)"/>
  <!-- Chip IAMET simplificado (trazos blancos) -->
  <g stroke="#FFFFFF" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cuerpo del chip -->
    <rect x="8" y="10" width="12" height="12" rx="1.4"/>
    <!-- Pines izquierda -->
    <line x1="6" y1="12.5" x2="8" y2="12.5"/>
    <line x1="6" y1="15.5" x2="8" y2="15.5"/>
    <line x1="6" y1="18.5" x2="8" y2="18.5"/>
    <line x1="6" y1="20.5" x2="8" y2="20.5" opacity="0.6"/>
    <!-- Pines inferior -->
    <line x1="11" y1="22" x2="11" y2="24"/>
    <line x1="14" y1="22" x2="14" y2="24"/>
    <line x1="17" y1="22" x2="17" y2="24"/>
    <!-- Flecha a la derecha (indica movimiento / evolución) -->
    <path d="M 20 13 L 25 16 L 20 19"/>
    <!-- Barra horizontal central (indicador) -->
    <line x1="11" y1="16" x2="17" y2="16"/>
  </g>
</svg>
