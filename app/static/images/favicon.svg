<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856D6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E5E7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="url(#bgGradient)" />
  
  <!-- Ícono de gráfico/ventas -->
  <!-- Barras del gráfico -->
  <rect x="7" y="20" width="3" height="6" fill="url(#iconGradient)" rx="1"/>
  <rect x="12" y="16" width="3" height="10" fill="url(#iconGradient)" rx="1"/>
  <rect x="17" y="12" width="3" height="14" fill="url(#iconGradient)" rx="1"/>
  <rect x="22" y="8" width="3" height="18" fill="url(#iconGradient)" rx="1"/>
  
  <!-- Línea de tendencia -->
  <path d="M 8.5 21 L 13.5 17 L 18.5 13 L 23.5 9" stroke="url(#iconGradient)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>
  
  <!-- Puntos en la línea -->
  <circle cx="8.5" cy="21" r="1.5" fill="#FFFFFF"/>
  <circle cx="13.5" cy="17" r="1.5" fill="#FFFFFF"/>
  <circle cx="18.5" cy="13" r="1.5" fill="#FFFFFF"/>
  <circle cx="23.5" cy="9" r="1.5" fill="#FFFFFF"/>
</svg>