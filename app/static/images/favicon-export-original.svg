<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Gradiente azul profesional -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5BBA;stop-opacity:1" />
    </linearGradient>
    
    <!-- Fondo negro elegante -->
    <radialGradient id="backgroundGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    
    <!-- Sombra suave -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Fondo con esquinas redondeadas -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#backgroundGradient)" />
  
  <!-- Recreación fiel del ícono original -->
  
  <!-- Conectores superiores -->
  <rect x="8" y="4" width="2" height="4" rx="1" fill="url(#iconGradient)" />
  <rect x="12" y="4" width="2" height="4" rx="1" fill="url(#iconGradient)" />
  
  <!-- Conector superior horizontal -->
  <rect x="6" y="6" width="10" height="2" rx="1" fill="url(#iconGradient)" />
  
  <!-- Cuerpo principal del componente -->
  <rect x="6" y="8" width="12" height="12" rx="2" fill="none" 
        stroke="url(#iconGradient)" stroke-width="2.5" />
  
  <!-- Conectores laterales izquierdos -->
  <rect x="3" y="10" width="3" height="1.5" fill="url(#iconGradient)" />
  <rect x="3" y="13" width="3" height="1.5" fill="url(#iconGradient)" />
  <rect x="3" y="16" width="3" height="1.5" fill="url(#iconGradient)" />
  
  <!-- Línea central (datos) -->
  <rect x="10" y="13" width="6" height="2" rx="1" fill="url(#iconGradient)" />
  
  <!-- Conectores inferiores -->
  <rect x="8" y="20" width="2" height="4" rx="1" fill="url(#iconGradient)" />
  <rect x="12" y="20" width="2" height="4" rx="1" fill="url(#iconGradient)" />
  
  <!-- Flecha de exportación (la parte más importante) -->
  <path d="M 18 14 L 26 14" 
        stroke="url(#iconGradient)" stroke-width="3" 
        stroke-linecap="round" fill="none" 
        filter="url(#softShadow)" />
  
  <!-- Punta de la flecha -->
  <path d="M 23 11 L 26 14 L 23 17" 
        stroke="url(#iconGradient)" stroke-width="3" 
        stroke-linecap="round" stroke-linejoin="round" 
        fill="none" filter="url(#softShadow)" />
  
  <!-- Highlight elegante -->
  <ellipse cx="16" cy="6" rx="6" ry="2" 
           fill="rgba(255,255,255,0.08)" />
</svg>