<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Gradiente azul profesional -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5BBA;stop-opacity:1" />
    </linearGradient>
    
    <!-- Fondo negro elegante -->
    <radialGradient id="bgGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    
    <!-- Sombra suave -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Fondo con esquinas redondeadas -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#bgGradient)" />
  
  <!-- COMPONENTE PRINCIPAL (el chip) -->
  
  <!-- Conectores superiores (2 pines) -->
  <rect x="9" y="3" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  <rect x="15" y="3" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  
  <!-- Cuerpo principal ABIERTO del lado derecho -->
  <path d="M 6 7 L 6 21 L 20 21 L 20 7 L 6 7" 
        fill="none" stroke="url(#blueGradient)" stroke-width="2.5" 
        stroke-linejoin="round" filter="url(#shadow)" />
  
  <!-- Conectores laterales izquierdos (3 pines) -->
  <rect x="2" y="10" width="4" height="1.5" rx="0.5" fill="url(#blueGradient)" />
  <rect x="2" y="13.5" width="4" height="1.5" rx="0.5" fill="url(#blueGradient)" />
  <rect x="2" y="17" width="4" height="1.5" rx="0.5" fill="url(#blueGradient)" />
  
  <!-- Línea central CENTRADA (más al medio) -->
  <rect x="10" y="13.5" width="6" height="1.5" rx="0.5" fill="url(#blueGradient)" />
  
  <!-- Conectores inferiores (2 pines) -->
  <rect x="9" y="21" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  <rect x="15" y="21" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  
  <!-- TRIÁNGULO que "cierra" el cuadrado por abajo -->
  <path d="M 20 12 L 26 14 L 20 16 Z" 
        fill="url(#blueGradient)" 
        filter="url(#shadow)" />
  
  <!-- Highlight elegante en la esquina -->
  <ellipse cx="12" cy="9" rx="3" ry="1" 
           fill="rgba(255,255,255,0.1)" />
</svg>