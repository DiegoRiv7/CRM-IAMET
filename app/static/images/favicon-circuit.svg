<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Gradiente azul profesional -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5BBA;stop-opacity:1" />
    </linearGradient>
    
    <!-- Fondo negro elegante -->
    <radialGradient id="bgGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    
    <!-- Sombra suave -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Fondo con esquinas redondeadas -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#bgGradient)" />
  
  <!-- COMPONENTE PRINCIPAL (el chip) -->
  
  <!-- Conectores superiores -->
  <rect x="8" y="3" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  <rect x="12" y="3" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  <rect x="16" y="3" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  
  <!-- Cuerpo principal del componente -->
  <rect x="6" y="7" width="14" height="14" rx="2" ry="2" 
        fill="none" stroke="url(#blueGradient)" stroke-width="2.5" 
        filter="url(#shadow)" />
  
  <!-- Conectores laterales izquierdos -->
  <rect x="2" y="9" width="4" height="2" rx="1" fill="url(#blueGradient)" />
  <rect x="2" y="13" width="4" height="2" rx="1" fill="url(#blueGradient)" />
  <rect x="2" y="17" width="4" height="2" rx="1" fill="url(#blueGradient)" />
  
  <!-- Línea/barra central interna (representa datos/procesamiento) -->
  <rect x="9" y="14" width="8" height="2" rx="1" fill="url(#blueGradient)" />
  
  <!-- Conectores inferiores -->
  <rect x="8" y="21" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  <rect x="12" y="21" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  <rect x="16" y="21" width="2" height="4" rx="1" fill="url(#blueGradient)" />
  
  <!-- FLECHA DE EXPORTACIÓN (la parte más importante) -->
  <path d="M 20 15 L 28 15" 
        stroke="url(#blueGradient)" stroke-width="3" 
        stroke-linecap="round" fill="none" 
        filter="url(#shadow)" />
  
  <!-- Punta de la flecha -->
  <path d="M 25 12 L 28 15 L 25 18" 
        stroke="url(#blueGradient)" stroke-width="3" 
        stroke-linecap="round" stroke-linejoin="round" 
        fill="none" filter="url(#shadow)" />
  
  <!-- Highlight elegante en la esquina -->
  <ellipse cx="12" cy="9" rx="4" ry="1.5" 
           fill="rgba(255,255,255,0.1)" />
</svg>