version: '3.8'

services:
  web:
    build: .
    volumes:
      - .:/app # Monta el directorio actual para desarrollo (opcional para producción)
      - media_files:/app/media # Volumen persistente para archivos media
      - static_files:/app/staticfiles # Volumen para archivos estáticos
    env_file:
      - .env # Carga variables de entorno desde el archivo .env
    depends_on:
      - db
    environment:
      # Sobrescribe DB_HOST para el entorno de Docker Compose para usar el nombre del servicio
      DB_HOST: db
    command: gunicorn cartera_clientes.wsgi:application --bind 0.0.0.0:8000 --timeout 240
    deploy:
      resources:
        limits:
          memory: 2084m
        reservations:
          memory: 512m
    networks:
      - app_network
    # No exponer puerto 8000 directamente, solo a través de nginx
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"  # Si usas HTTPS
    volumes:
      - ./nginx-docker.conf:/etc/nginx/conf.d/default.conf
      - media_files:/app/media  # Compartir volumen media con nginx
      - static_files:/app/staticfiles  # Compartir volumen static con nginx
    depends_on:
      - web
    networks:
      - app_network

  db:
    image: mysql:8.0
    volumes:
      - db_data:/var/lib/mysql # Volumen de datos persistente para la base de datos
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306" # Expone el puerto MySQL para acceso local
    networks:
      - app_network

volumes:
  db_data: # Define el volumen nombrado para la persistencia de la base de datos
  media_files: # Volumen para archivos media subidos
  static_files: # Volumen para archivos estáticos

networks:
  app_network:
    driver: bridge