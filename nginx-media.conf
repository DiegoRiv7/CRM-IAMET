# Configuración Nginx para servir archivos media
# Agregar este bloque dentro de tu configuración server {}

location /media/ {
    alias /path/to/your/project/media/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    
    # Permitir CORS para vista previa
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
    
    # Para archivos PDF y imágenes, permitir iframe embedding
    location ~* \.(pdf|jpg|jpeg|png|gif|webp)$ {
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Content-Security-Policy "frame-ancestors 'self'";
    }
}

# Configuración adicional para Django static files
location /static/ {
    alias /path/to/your/project/staticfiles/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}