# Configuración Nginx para Docker
# Archivo a colocar en /etc/nginx/sites-available/ o /etc/nginx/conf.d/

upstream django {
    server web:8000;  # nombre del servicio en docker-compose
}

server {
    listen 80;
    server_name tu-dominio.com;  # Cambiar por tu dominio
    client_max_body_size 100M;  # Permitir uploads grandes

    # Servir archivos media directamente
    location /media/ {
        alias /app/media/;  # Ruta dentro del contenedor
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Permitir CORS para vista previa
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
        
        # Para archivos PDF y imágenes, permitir iframe embedding
        location ~* \.(pdf|jpg|jpeg|png|gif|webp)$ {
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Content-Security-Policy "frame-ancestors 'self'";
        }
    }

    # Servir archivos estáticos
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

