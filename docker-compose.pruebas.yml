services:
  web:
    build: .
    container_name: crm-pruebas-web
    volumes:
      - .:/app
      - media_pruebas:/app/media
      - ./staticfiles:/app/staticfiles
    ports:
      - "8001:8000"
    env_file:
      - .env.pruebas
    depends_on:
      - db
    environment:
      DB_HOST: db
    command: gunicorn cartera_clientes.wsgi:application --bind 0.0.0.0:8000 --timeout 240
    deploy:
      resources:
        limits:
          memory: 1024m
        reservations:
          memory: 256m
    networks:
      - pruebas_net

  db:
    image: mysql:8.0
    container_name: crm-pruebas-db
    volumes:
      - db_pruebas:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - pruebas_net

volumes:
  db_pruebas:
  media_pruebas:

networks:
  pruebas_net:
    driver: bridge
